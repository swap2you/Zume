- id: gold-arch-002
  domain: framework-architecture
  subdomain: parallelism-thread-safety
  title: Design decisions before scaling a framework to distributed parallel execution
  level: advanced
  priority: P0
  frequency: common
  question: A framework must scale from one local test to distributed parallel execution. Which design decisions must be made
    before adding threads?
  concise_answer: 'Before turning on parallelism, fix five things: who owns each mutable resource (driver, connection, temp
    file) for the lifetime of one execution unit; how test data is isolated so two workers never collide on the same record;
    how artifacts (screenshots, logs, reports) get unique, correlatable names; that configuration objects are immutable snapshots
    rather than shared mutable state; and what the environment''s real concurrency ceiling is (grid nodes, API rate limits,
    database connection pool size). Adding threads without these decisions turns intermittent contention into "flaky" symptoms
    that are actually design defects.'
  recommended_answer: 'Resource ownership: define the smallest scope that creates and destroys a resource — typically the
    test method or a scenario fixture — and never share that resource reference outside that scope; a Selenium Grid session
    or JDBC connection must have exactly one owner at a time.

    Data isolation: either partition test data statically (each parallel lane owns a data range) or generate unique data per
    execution (unique emails, order IDs) so concurrent tests cannot observe or corrupt each other''s state, including in a
    shared database.

    Artifact naming: every screenshot, log line and report entry must carry a correlation ID (test name plus a run-unique
    suffix) so failures from concurrent runs are individually traceable, not overwritten or interleaved.

    Configuration immutability: build capability/config objects once per execution unit from an immutable source; never let
    one thread mutate a capability map another thread is reading.

    Environment limits: parallelism is bounded by the weakest real constraint — Grid node count, cloud-vendor concurrent-session
    quota, or a downstream API''s rate limit — not by CPU core count alone; exceeding it produces failures that look like
    flakiness but are actually capacity violations.'
  deep_dive: ''
  key_points:
  - Resource ownership per execution unit, never shared across threads.
  - Explicit data isolation strategy — partitioned or uniquely generated.
  - Artifact naming with correlation IDs for concurrent-safe evidence.
  - Immutable configuration objects, not shared mutable capability maps.
  - Concurrency ceiling set by environment/vendor limits, not core count.
  strong_signals:
  - Names all five decision areas before mentioning a thread count or thread pool.
  - Ties parallelism ceiling to a measured environment/vendor constraint, not a guess.
  - Distinguishes static data partitioning from dynamically generated unique data.
  weak_signals:
  - Jumps straight to "use TestNG parallel=methods" without ownership/data design.
  - Assumes more threads always means proportionally more throughput.
  red_flags:
  - Cannot name a single resource that must not be shared across threads.
  - Proposes a shared static WebDriver "for efficiency."
  common_mistakes:
  - Reusing one grid session across parallel test methods to save setup time.
  - Hardcoded test data (fixed usernames, fixed order IDs) that collides under parallelism.
  - Screenshot files named only by test method name, overwritten across concurrent runs.
  follow_ups:
  - question: What measurements determine the useful parallelism ceiling?
    recommended_answer: 'Run a ramp: increase parallel lanes while tracking wall-clock suite time, per-test failure rate,
      and environment saturation signals (Grid node queueing, API 429s, database connection-pool wait time). The useful ceiling
      is the point just before failure rate rises or wall-clock time stops improving — beyond that, added threads buy contention,
      not throughput. Re-measure after any environment or suite-size change; the ceiling is not a fixed constant.'
  examples: []
  code_examples:
  - '// Unsafe: shared mutable capability map read/written by every thread

    static Map<String,Object> caps = new HashMap<>();

    // Safer: immutable snapshot built once per execution unit

    Capabilities caps = new ImmutableCapabilities(Map.copyOf(baseOptions));'
