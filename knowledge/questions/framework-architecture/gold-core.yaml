- id: gold-arch-001
  domain: framework-architecture
  subdomain: layers
  title: Layering a multi-channel framework without a universal base class
  level: advanced
  priority: P0
  frequency: very_common
  question: Design a test automation framework that supports UI, API and database validation without making every test depend
    on every layer.
  concise_answer: 'Split the framework into independent layers: domain/business intent (what a test asserts), channel adapters
    (a UI driver, an HTTP client, a database accessor — each independently instantiable and testable), and a thin orchestration
    layer that wires the adapters a given scenario actually needs. Tests are composed from only the adapters they use, via
    constructor injection or a builder, never inherited from one "BaseTest" that stands up a browser, an HTTP client and a
    database connection for every test regardless of what it checks.'
  recommended_answer: 'The design failure this question targets is a universal base class: a shared superclass that opens
    a browser, builds a REST client and connects to a database in @Before, so every test pays the cost and risk of every channel.
    The fix is composition over inheritance. Define a small interface per business capability (for example OrderVerification)
    and provide channel-specific implementations (UiOrderVerification, ApiOrderVerification, DbOrderVerification) that a test
    receives through injection based on what it actually needs to prove.

    Layering then looks like: (1) a domain layer expressing intent in business vocabulary with no channel awareness; (2) channel
    adapters that translate domain calls into UI interactions, HTTP calls or SQL, each with its own lifecycle and failure
    translation; (3) test-data and configuration providers that are explicit inputs, not static singletons; (4) an orchestration/composition
    root — a fixture or factory — that assembles exactly the adapters a scenario needs.

    This directly follows test-pyramid economics: the same business rule usually can be verified via API/DB adapters, which
    are fast and stable, reserving the UI adapter for the small number of tests that must exercise the actual rendered experience.
    Sharing code across channels should only happen where business semantics are genuinely identical (an "Order" domain model),
    never for setup convenience.'
  deep_dive: ''
  key_points:
  - Separate domain intent, channel adapters, orchestration and infrastructure.
  - Use composition and injection, not a universal base class.
  - Share code only where business semantics truly match across channels.
  - Match each layer's cost to what it validates — cheap channels for most checks.
  - Keep every component independently instantiable and testable in isolation.
  strong_signals:
  - Proposes per-capability interfaces with channel-specific implementations, not a shared superclass.
  - Explicitly ties channel choice per test to test-pyramid cost/reliability trade-offs.
  - Identifies test-data and configuration as explicit inputs rather than static state.
  weak_signals:
  - Talks only about page objects and never addresses API or database validation.
  - Proposes "one framework" without naming a composition mechanism.
  red_flags:
  - Defaults to a single BaseTest that instantiates driver, REST client and DB connection for every test.
  - Cannot explain what would break if a DB-only test inherited UI setup.
  common_mistakes:
  - A God base class accumulating every channel's setup "just in case."
  - Leaking channel-specific types (WebElement, ResultSet) into assertions above the adapter boundary.
  - Mixing test-data generation logic inside a channel adapter instead of injecting it.
  follow_ups:
  - question: Show where authentication, logging and reporting should live and why.
    recommended_answer: 'Authentication mechanics differ per channel (a UI login flow versus a token endpoint) but should
      expose one abstraction — an AuthenticatedSession — so tests request "run as user X" without knowing which channel obtained
      the session. Logging and reporting are cross-cutting concerns: implement them as listeners/decorators wrapped around
      each adapter boundary, correlated by a shared test/run identifier, rather than duplicating log calls inside every channel
      implementation or inside test methods themselves.'
  examples:
  - A checkout discount rule is verified with an API call that creates the order and a direct SQL check of the applied discount
    for 40 data variations; only 2 tests drive the same rule through the actual UI to confirm it renders correctly to a user.
  code_examples:
  - 'interface OrderVerification { void placeOrder(OrderRequest r); void assertDiscount(String orderId, BigDecimal expected);
    }

    class ApiOrderVerification implements OrderVerification { /* HTTP client only */ }

    class UiOrderVerification implements OrderVerification { /* WebDriver only */ }

    // Test composes only what it needs:

    OrderVerification checkout = new ApiOrderVerification(httpClient);'
