- id: framework-architecture-i-01
  domain: framework-architecture
  subdomain: layers
  title: 'Layers: intermediate decision'
  level: intermediate
  priority: P0
  frequency: very_common
  question: How would you design layers for a changing product while preserving clear ownership?
  concise_answer: Layers should be applied to a stated outcome, observable evidence, and known constraints;
    using it as a ritual is not enough. In Automation framework architecture, validate both the intended
    result and the meaningful negative or failure path before treating it as reliable.
  recommended_answer: Start by naming the decision that layers supports and the invariant it must preserve.
    Choose the smallest mechanism that exposes inputs, outputs, failures, and ownership; then test representative
    normal, boundary, and failure cases. Explain the trade-off rather than claiming a single universal
    pattern, and use telemetry or review evidence to revise the design when reality differs.
  deep_dive: Probe for a concrete Automation framework architecture example, competing constraints, and
    evidence that would change the candidate's decision.
  key_points:
  - states an invariant
  - uses evidence
  - names trade-offs
  strong_signals:
  - distinguishes symptom from root cause
  - defines a bounded validation strategy
  weak_signals:
  - recites a tool feature without a decision context
  red_flags:
  - claims a pattern is universally correct
  - hides or ignores failure evidence
  common_mistakes:
  - testing only a happy path
  - confusing activity with outcome
  follow_ups:
  - question: What evidence would make you revise your layers approach?
    recommended_answer: A repeatable failure, a violated invariant, or telemetry showing the design misses
      its stated outcome should trigger review. Reproduce the evidence, classify the scope, and change
      the smallest responsible layer.
  examples:
  - Use a small, representative layers case before generalizing.
  role_tracks:
