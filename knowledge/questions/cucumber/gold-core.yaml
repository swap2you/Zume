- id: gold-tool-003
  domain: cucumber
  subdomain: state-context
  title: Scenario-scoped state and dependency injection for parallel Cucumber execution
  level: advanced
  priority: P1
  frequency: common
  question: Design scenario state and dependency injection for parallel Cucumber execution without static globals or hidden
    coupling between steps.
  concise_answer: Give every scenario its own context object (a plain class holding the driver, test data and any values steps
    need to share) constructed fresh per scenario and injected into every step-definition class via Cucumber's dependency
    injection (PicoContainer or another supported DI module) rather than through static fields. Each step-definition class
    stays small and receives the shared context and its own collaborators through the constructor; no step reaches into a
    static holder or a singleton to find "the current driver" or "the last response." Hooks (@Before/@After) own technical
    setup and teardown — creating and quitting the driver, opening and closing a database connection — while business flow
    stays entirely inside step definitions, and no scenario is allowed to assume a previous scenario already ran (no order
    dependence).
  recommended_answer: 'Cucumber constructs a new object graph per scenario when DI is enabled (Cucumber Picocontainer, Guice,
    Spring or another supported module) — every class Cucumber needs to instantiate step definitions for that scenario is
    created once for that scenario''s lifetime and discarded afterward, which is exactly the scope needed for parallel-safe
    state: as long as steps depend on injected collaborators rather than static/singleton access, two scenarios running on
    two threads never share an object graph, and shared mutable state (drivers, HTTP clients, accumulated data) is naturally
    scenario-scoped with zero explicit synchronization.

    A practical shape: one small "ScenarioContext" (or several purpose-specific context classes if one grows too broad) holds
    cross-step values — the last API response, an entity ID created earlier in the scenario — and is injected by the DI container
    into every step-definition class constructor that needs it. Step definition classes stay narrow (one feature area each)
    and receive both the shared context and any single-purpose collaborators (an ApiClient, a PageObject) through their constructors
    — never through statics, never by reaching into another step class directly. Hooks are the only place technical lifecycle
    concerns belong: @Before creates the driver/session and stores it in the context (or the DI container creates it directly),
    @After tears it down unconditionally, and a tagged hook can attach a screenshot on failure using the Scenario object passed
    into the hook. Business flow — what the scenario is actually verifying — must never live in a hook; a hook that branches
    on scenario content is a sign business logic leaked out of the step definitions.

    Order independence is a design constraint, not a happy accident: no scenario should rely on state left behind by a previous
    scenario (a created user, an open connection), because parallel and re-ordered execution will violate that assumption
    unpredictably. Each scenario''s Background/Given steps should establish everything that scenario needs from a clean baseline.'
  deep_dive: ''
  key_points:
  - Scenario-scoped context, constructed fresh per scenario via Cucumber's DI support.
  - Explicit constructor injection of context and collaborators into step-definition classes.
  - No order dependence across scenarios; each scenario establishes its own baseline state.
  - Hooks manage technical setup/teardown only; business flow stays in step definitions.
  - Parallel-safe driver/data ownership follows directly from per-scenario object graphs.
  strong_signals:
  - Explains that Cucumber's DI creates a new object graph per scenario, and ties that directly to parallel safety.
  - Draws a firm line between hook responsibilities (technical) and step-definition responsibilities (business flow).
  - Calls out order independence as a design requirement, not an incidental property.
  weak_signals:
  - Proposes "just use ThreadLocal" without recognizing Cucumber's DI already solves scoping.
  - Puts a static Map<String,Object> "context" behind a service-locator step method.
  red_flags:
  - Uses a static/singleton driver holder shared across all scenarios.
  - Writes hooks that branch on tags to run business setup logic.
  common_mistakes:
  - One giant "World"/context class that every step class touches, becoming a hidden coupling point.
  - Scenarios that depend on data created by a previous scenario in file order.
  - Step-definition methods calling other step-definition methods directly instead of sharing via context or page objects.
  follow_ups:
  - question: How would you split overly broad step-definition classes?
    recommended_answer: Split by feature/domain area rather than by technical layer — a CheckoutSteps, PaymentSteps and ShippingSteps
      class, each with a narrow set of steps and only the collaborators it actually needs injected. If a step needs data another
      area created, share it through the scenario context object rather than one class calling another class's step method
      directly; that keeps each class independently readable and testable, and avoids the fragile coupling of one step definition
      silently depending on another's side effects.
  examples: []
  code_examples:
  - "// Shared, scenario-scoped state — no statics\npublic class ScenarioContext {\n  private WebDriver driver;\n  private\
    \ Response lastResponse;\n  // getters/setters\n}\n\npublic class CheckoutSteps {\n  private final ScenarioContext context;\n\
    \  private final CheckoutPage checkoutPage;\n\n  public CheckoutSteps(ScenarioContext context, CheckoutPage checkoutPage)\
    \ {\n    this.context = context;          // injected, not static\n    this.checkoutPage = checkoutPage;\n  }\n\n  @When(\"\
    the customer applies a valid {int}% coupon\")\n  public void applyCoupon(int percent) {\n    checkoutPage.applyCoupon(percent);\n\
    \  }\n}\n\npublic class DriverHooks {\n  private final ScenarioContext context;\n  public DriverHooks(ScenarioContext\
    \ context) { this.context = context; }\n\n  @Before\n  public void setUp() { context.setDriver(new ChromeDriver()); }\n\
    \n  @After\n  public void tearDown() { context.getDriver().quit(); }\n}"
