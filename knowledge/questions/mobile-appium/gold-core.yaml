- id: gold-mobile-004
  domain: mobile-appium
  subdomain: device-matrix
  title: Building a risk-based mobile device matrix
  level: advanced
  priority: P1
  frequency: common
  question: Create a risk-based mobile device matrix across OS versions, manufacturers, screen sizes and real versus virtual
    devices.
  concise_answer: Anchor the matrix in production analytics (which OS versions, manufacturers and screen sizes real users
    actually run) and the platform's support policy, not arbitrary breadth. Cover the OS-version boundaries most likely to
    break (oldest still supported, newest/beta) and representative manufacturers whose OEM customizations diverge from stock
    behavior (rendering, permission dialogs, notification handling). Reserve real devices for anything hardware- or system-behavior-dependent
    (camera, biometrics, performance, battery, notifications); emulators/simulators are sufficient for most functional flows.
    Use tiers - a small PR set, a broader nightly set, a near-exhaustive release set - so cost scales with confidence needed,
    not with matrix size alone.
  recommended_answer: 'Start from data: production crash/analytics data on OS version and device-model distribution, and the
    platform''s official support policy for how far back to test. Device selection should target real coverage, not arbitrary
    breadth - a device cloud like BrowserStack exposes tens of thousands of real Android and iOS devices and a combinations
    API precisely so a matrix can be defined in configuration and refreshed against actual available OS/browser/device data
    rather than hand-maintained guesses, using version-relative flags (latest, latest-1) to avoid the matrix silently going
    stale as new OS versions ship.

    Manufacturer/form-factor selection should be representative, not exhaustive: pick devices whose OEM layer (camera permission
    flows, notification shades, gesture navigation) is known to diverge, plus at least one small-screen and one large-screen/
    tablet form factor if the app''s layout is responsive. Real devices are reserved for anything an emulator/simulator cannot
    faithfully reproduce - camera, biometric prompts, real cellular/network conditions, battery/performance characteristics,
    push-notification delivery - while emulators/simulators cover the bulk of functional UI logic at far lower cost and higher
    parallel throughput.

    Cost control comes from tiering: PR runs hit a minimal high-confidence subset (one current Android, one current iOS, real
    or virtual); nightly expands to the boundary OS versions and representative manufacturers; pre-release runs the fuller
    matrix including real-device hardware-dependent cases. Revisit the matrix on a schedule against updated production analytics,
    not only when something breaks.'
  deep_dive: ''
  key_points:
  - Anchor coverage in production OS/device analytics and platform support policy.
  - Cover OS-version boundaries and representative, divergence-prone manufacturers.
  - Reserve real devices for hardware/system-behavior-dependent cases.
  - Use version-relative flags/APIs so the matrix does not silently go stale.
  - Tier PR, nightly and release runs so cost scales with confidence required.
  strong_signals:
  - Grounds matrix scope in analytics/support-policy data, not arbitrary device counts.
  - Distinguishes what must run on real hardware from what emulators legitimately cover.
  - Designs tiers with different scope for PR, nightly and release runs.
  weak_signals:
  - Chooses devices by personal familiarity rather than production data.
  - Runs the full matrix on every PR regardless of cost or confidence needed.
  red_flags:
  - Uses only emulators/simulators for camera, biometrics or performance-sensitive tests.
  - Has no process to update the matrix as OS versions and device popularity shift.
  common_mistakes:
  - Freezing the matrix to devices used at project kickoff, ignoring version drift.
  - Testing exhaustively on PR builds, causing slow feedback with little added confidence.
  - Treating "runs on an emulator" as proof of real-device readiness for hardware features.
  follow_ups:
  - question: What should run on every PR, nightly and before release?
    recommended_answer: 'PR: a minimal smoke set on one current Android and one current iOS configuration, virtual devices,
      optimized for speed. Nightly: the boundary OS versions (oldest supported, latest/beta), representative manufacturers,
      and any previously-flaky-on-specific-hardware cases. Pre-release: the fuller matrix including real-device runs for camera/biometric/performance/notification
      flows, since those are exactly the cases an emulator cannot faithfully validate.'
