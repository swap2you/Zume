- id: gold-mobile-002
  domain: mobile-appium
  subdomain: capabilities-options
  title: Capability and options management across emulators, devices and a cloud
  level: intermediate
  priority: P0
  frequency: common
  question: Design capability/options management for local emulators, real devices and a device cloud without scattering environment
    conditionals through tests.
  concise_answer: 'Model capabilities as typed configuration objects built by environment-specific builders (LocalEmulatorOptions,
    RealDeviceOptions, CloudOptions), not as one mutable map with if-environment branches sprinkled through test code. Since
    Appium 2.0, vendor and driver-specific capabilities require the appium: prefix or an appium:options object - encode that
    structurally in the builder rather than as stringly-typed keys tests must remember. Secrets (cloud access keys) come from
    environment/secret stores, never literals, and every builder validates its required capabilities before returning, failing
    fast instead of producing an opaque session start error.'
  recommended_answer: 'Appium''s capability model requires appium:automationName plus platform/app identifiers as a minimum,
    and cloud providers layer their own vendor-namespaced capabilities ($cloud:... or provider-specific keys) on top; since
    2.0, extension capabilities must be namespaced with appium: to avoid W3C standard-capability collisions. A maintainable
    design encodes this as one builder per environment profile, each returning an immutable, fully validated capability set
    - no test method should construct or mutate a capability map directly.

    Structure: a common interface (e.g., SessionOptionsBuilder) with implementations per environment; each implementation
    reads its environment-specific inputs (device farm URL and access key for cloud; local emulator AVD name for local) from
    configuration or environment variables, builds the platform-appropriate capability object, and validates presence of required
    fields (platformName, automationName, app or browserName/bundleId as XCUITest requires at least one) before the session
    starts. This keeps environment selection a single factory decision at test-suite startup, not a conditional inside every
    test.

    Concurrency safety matters here too: since capability objects are immutable once built, one parallel session cannot accidentally
    read or mutate another session''s in-flight capability map - a shared mutable capabilities map is the same defect class
    as shared mutable driver state.'
  deep_dive: ''
  key_points:
  - Typed, environment-specific capability builders replace scattered environment conditionals.
  - 'Respect the appium: namespace requirement for extension/vendor capabilities since 2.0.'
  - Secrets come from environment/secret stores, never hardcoded literals.
  - Validate required capabilities in the builder and fail fast before session start.
  - Immutable built capability objects prevent one parallel session from leaking into another's.
  strong_signals:
  - 'Names the appium: namespacing rule and applies it inside the builder, not the test.'
  - Treats capability objects as immutable and built once per session.
  - Pulls secrets from environment/secret storage explicitly.
  weak_signals:
  - Uses one global mutable capabilities map with environment if-checks in test code.
  - Never validates required capabilities before attempting a session start.
  red_flags:
  - Hardcodes a cloud access key literal in source.
  - 'Cannot explain why appium:options/appium: prefixes exist since Appium 2.0.'
  common_mistakes:
  - Copy-pasting a capability map per test file, drifting out of sync over time.
  - Mixing local emulator AVD settings into the same object used for cloud sessions.
  - Skipping validation, letting a missing app/bundleId surface as a confusing session-start failure.
  follow_ups:
  - question: How would you prevent one parallel session from inheriting another session's options?
    recommended_answer: Build a fresh, immutable capability object per execution unit inside the composition root that also
      creates the driver for that unit - never cache or reuse a builder's mutable intermediate state across threads. If a
      base template is shared, copy it (Map.copyOf or a defensive clone) before customizing per session, so mutation for session
      B can never be observed by an in-flight session A.
  examples: []
  code_examples:
  - "interface SessionOptionsBuilder { Capabilities build(); }\nclass CloudOptionsBuilder implements SessionOptionsBuilder\
    \ {\n  public Capabilities build() {\n    UiAutomator2Options opts = new UiAutomator2Options()\n      .setApp(app).setAutomationName(\"\
    UiAutomator2\");\n    opts.setCapability(\"cloud:options\", Map.of(\"accessKey\", System.getenv(\"CLOUD_KEY\")));\n  \
    \  return opts; // immutable once returned\n  }\n}"
  role_tracks:
