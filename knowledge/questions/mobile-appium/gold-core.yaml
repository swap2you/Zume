- id: gold-mobile-003
  domain: mobile-appium
  subdomain: synchronization
  title: Synchronizing with animations and native view readiness beyond fixed sleeps
  level: advanced
  priority: P1
  frequency: common
  question: A mobile test intermittently interacts during an animation or before a native view is actionable. Design synchronization
    beyond fixed sleeps.
  concise_answer: 'Replace fixed sleeps with waits for the specific state the next action needs: element presence via Appium''s
    implicit wait for find operations, and explicit WebDriverWait/ExpectedConditions polling for element-specific state such
    as clickability or attribute values that Appium inherits from the WebDriver protocol. For animation-heavy transitions,
    wait for the platform-observable end state (a stable attribute value, a new screen''s identifying element) rather than
    a duration guess, and never mix implicit and explicit waits in the same flow since their interaction is officially unpredictable.
    Context switches need their own explicit wait for the target context/view to exist before interacting.'
  recommended_answer: 'Appium exposes the same implicit-wait mechanism as WebDriver: the server polls for an element up to
    a configured timeout before failing, set once per session via implicitlyWait/implicit_wait. That solves "element not found
    yet" races but not "element found but not yet actionable" races - a view mid-animation can be present in the hierarchy
    while still moving, unclickable, or about to be replaced.

    For those cases, use explicit waits with a condition that reflects app state rather than time: poll for the element''s
    clickable/enabled state, for a specific text/attribute that only appears once a transition completes, or for a stable
    bounding-rect (unchanged across two polls) as a practical animation-settled proxy when the platform provides no explicit
    "animation finished" signal. Custom expected conditions are appropriate when a single built-in condition cannot express
    the real readiness criterion (for example, "found and then successfully clicked," retried together).

    Two Appium-specific wrinkles: never combine implicit and explicit waits in the same test flow - official guidance flags
    this as producing unpredictable, hard-to-diagnose timing bugs - and context switches (native to webview) need their own
    explicit wait for the destination context to exist and be ready before any interaction, since a context can be listed
    before its content has finished loading.

    When a failure still occurs, capture page source, a screenshot, and device logs (logcat/syslog) at the moment of failure;
    on real devices in particular, the same wait strategy that is reliable on a fast emulator can still be too short under
    real hardware and network variance, which is a signal to make the wait condition-based rather than to simply enlarge a
    fixed timeout.'
  deep_dive: ''
  key_points:
  - Wait for the actionable state a specific action needs, not a fixed duration.
  - Implicit wait solves presence races; explicit waits solve actionability/animation races.
  - Never mix implicit and explicit waits in the same flow.
  - Context switches require their own explicit wait for destination-context readiness.
  - Capture page source, screenshot and device logs at the point of failure.
  strong_signals:
  - Distinguishes "element present" from "element actionable" as separate race conditions.
  - Explicitly avoids mixing implicit and explicit waits.
  - Proposes a condition-based readiness signal for animations instead of a longer sleep.
  weak_signals:
  - Proposes only "increase the implicit wait timeout" as the fix.
  - Uses Thread.sleep as the primary synchronization mechanism.
  red_flags:
  - Cannot explain why mixing implicit and explicit waits is discouraged.
  - Treats a longer fixed sleep as a permanent fix rather than a temporary workaround.
  common_mistakes:
  - Fixed sleeps sized for CI-average timing that fail under real-device variance.
  - Waiting for element presence but not for it to be clickable/enabled before interacting.
  - Switching context without waiting for the new context's content to be ready.
  follow_ups:
  - question: How would you diagnose a failure that appears only on slower real devices?
    recommended_answer: 'Compare timing evidence between the passing emulator run and the failing real-device run: device
      logs (logcat/syslog) timestamps around the interaction, whether the same explicit-wait condition eventually became true
      (just later), and whether the app itself performs slower cold-start/network work on that device class. If the condition-based
      wait eventually succeeded but only after the configured timeout, the fix is a longer condition-based timeout for that
      device tier, not a switch back to fixed sleeps; if the condition never became true, it points to an app defect specific
      to that hardware/OS combination.'
