- id: mobile-appium-reviewed-01
  domain: mobile-appium
  subdomain: locator-strategies
  title: locator strategies in mobile-appium
  level: basic
  priority: P1
  frequency: common
  question: In mobile-appium, explain the purpose and failure boundary of locator strategies. How would you verify that it
    behaves as intended?
  concise_answer: locator strategies should be chosen for its documented semantics, then verified against the observable result
    it is responsible for. A test should make the relevant precondition and failure mode visible.
  recommended_answer: 'For locator strategies, begin with the contract described at Appium: locator strategies. State the
    input, expected state transition or result, and the specific evidence collected when it fails. Use the smallest deterministic
    check that exercises that contract, isolate external timing or data dependencies, and report the failing condition rather
    than masking it with a retry. The correct implementation depends on the domain boundary, so the reviewer should name the
    trade-off and demonstrate a negative case.'
  deep_dive: Ask for a concrete mobile-appium example involving locator strategies, including how the candidate would distinguish
    a product defect from a test or environment fault.
  key_points:
  - uses documented locator strategies semantics
  - checks a meaningful negative path
  - preserves diagnostic evidence
  strong_signals:
  - names the ownership boundary
  - explains a falsifiable verification
  weak_signals:
  - uses a tool feature without explaining its contract
  red_flags:
  - hides a failure with an unbounded retry
  common_mistakes:
  - asserting incidental implementation details
  follow_ups:
  - question: What evidence would show that locator strategies is the source of a failure rather than a downstream symptom?
    recommended_answer: Capture the smallest reproducible input, the direct output or state from locator strategies, and correlated
      logs or traces. Compare that evidence with the documented contract before changing timeouts, retries, or unrelated code.
