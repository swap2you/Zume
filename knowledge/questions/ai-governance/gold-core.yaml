- id: gold-aiqa-005
  domain: ai-governance
  subdomain: data-privacy
  title: Privacy and governance policy for candidate/production data with external AI providers
  level: advanced
  priority: P0
  frequency: common
  question: Create a privacy and governance policy for using resumes, test data and production evidence with external AI providers.
  concise_answer: Classify data by sensitivity before deciding anything else, minimize and redact what is actually sent (never
    send candidate PII, secrets or unredacted production data by default), restrict usage to approved providers under contractual
    retention and training-use terms, and require an audit trail and incident-response plan for anything that is sent externally.
    Accountability stays with a named human owner, not 'the AI process,' and the default posture for anything not explicitly
    classified and approved is to withhold it, not to send it.
  recommended_answer: 'The policy starts with data classification, because ''AI governance'' without a classification scheme
    underneath it has nothing concrete to enforce: label data by sensitivity (public, internal, confidential, restricted/PII)
    before any decision about whether it can touch an external AI provider is even meaningful. Candidate resumes and interview
    notes are restricted/PII by default; production evidence (logs, error traces, database exports) is confidential and frequently
    contains PII embedded in it even when the export itself is not labeled as such — that embedded PII is the most common
    way a supposedly de-identified dataset actually leaks personal data.

    Minimization is the operating default, not an exception process: anything sent to an external provider should be the smallest
    necessary subset, redacted of names, identifiers and secrets wherever the task does not specifically require them, and
    never sent as raw data ''for convenience'' or ''to save preprocessing time.'' Only contractually approved providers —
    with explicit, verified terms on data retention, training-use restrictions (does the provider train future models on submitted
    data), and deletion — are eligible destinations; a provider without those terms in writing is treated as unapproved regardless
    of its technical quality.

    Governance requires an audit trail: what was sent, to which provider, when, and under which approval, retained in a way
    that supports both routine review and incident investigation. And every one of these controls needs a named human owner
    accountable for the decision to send data externally — ''the pipeline decided to send it'' is not an acceptable answer
    during an incident review; a specific role or person approved the data flow and is accountable for its correctness.'
  deep_dive: ''
  key_points:
  - Classify data by sensitivity before deciding what can go to an external provider.
  - Minimize and redact by default; never send raw candidate PII, secrets or unredacted production data.
  - Restrict usage to approved providers with explicit retention and training-use terms.
  - Maintain an audit trail of what was sent, to whom, and under what approval.
  - Assign human accountability for every external data-sharing decision, not an automated default.
  strong_signals:
  - Starts from a concrete data-classification scheme rather than treating governance as a vague policy statement.
  - Names embedded PII inside seemingly technical exports (logs, traces) as a specific, common leak vector.
  - Requires named human accountability for every external data-sharing decision.
  weak_signals:
  - Writes a policy that says 'protect sensitive data' with no classification scheme or enforcement mechanism.
  - Assumes production log/trace exports are automatically free of PII without content-level scanning.
  red_flags:
  - Sends unredacted candidate or production data to an external provider with no retention/training-use terms in writing.
  - Has no audit trail of what data was sent externally or under whose approval.
  common_mistakes:
  - Approving a provider based on technical capability alone without verifying retention/training-use contract terms.
  - Redacting obvious identifiers (names) but missing embedded PII in nested fields or free-text logs.
  - Treating 'anonymized' as equivalent to 'no re-identification risk' without checking for indirect identifiers.
  follow_ups:
  - question: What technical controls prove that candidate data was not sent?
    recommended_answer: A deny-by-default egress control at the integration boundary (the code path calling an external provider
      is not given access to candidate-labeled fields/tables at all, rather than being trusted to filter them out), combined
      with request/response logging of exactly what payload was transmitted to each provider call, gives an auditable, verifiable
      answer rather than a policy assertion. A scheduled review that samples actual transmitted payloads against the classification
      scheme closes the loop between the stated policy and what the system actually does.
  examples:
  - A production error log exported to help an AI provider debug an integration issue contains customer email addresses embedded
    in request payloads; the export looked like 'system logs,' not PII, and would have bypassed a classification scheme that
    only labels data at the dataset-name level instead of scanning content.
