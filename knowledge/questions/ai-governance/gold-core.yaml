- id: gold-aiqa-006
  domain: ai-governance
  subdomain: roi
  title: Evaluating an AI automation initiative beyond an impressive demo
  level: advanced
  priority: P1
  frequency: common
  question: Evaluate an AI automation initiative whose demo is impressive but whose operating cost and defect impact are unclear.
  concise_answer: Define a measurable baseline and outcome before trusting a demo — what specific metric (cycle time, defect
    escape rate, manual review hours) is expected to move, and by how much. Total the real operating cost, including human
    review time, model/API spend, integration maintenance and the cost of correcting its failures, not just the per-call price.
    Run a controlled pilot against that baseline, measure quality and cycle-time impact with the same rigor as any other engineering
    investment, and set explicit stop/scale criteria in advance so the decision is not made retroactively to justify sunk
    cost.
  recommended_answer: 'A demo is optimized to look impressive on a handful of curated examples; it says almost nothing about
    total operating cost or defect impact at production scale, and treating it as sufficient evidence is the single most common
    way an AI initiative becomes an expensive, unmeasured commitment. The first requirement is a baseline and a specific measurable
    outcome defined before the pilot starts: what is the current cycle time, defect escape rate, or manual-hours cost for
    the task this initiative targets, and what magnitude of improvement would justify the investment — without that number,
    any post-hoc result can be narrated as a success.

    Total cost has to include everything the demo hides: human review time for every output (which is often mandatory, not
    optional, especially early on), model/API spend at realistic production volume rather than demo volume, integration and
    maintenance engineering cost, and — critically — the cost of correcting the initiative''s own failures, including any
    downstream defect impact from a wrong output that was not caught in review. An initiative that looks cheap per call can
    be expensive once review time and failure-correction cost are counted honestly.

    Run a controlled pilot — a defined scope, a defined duration, the pre-agreed baseline metric measured before and after
    — rather than a rolling, informal expansion based on positive anecdotes. Measure quality (defect rate, review-override
    rate) and cycle-time impact with the same rigor applied to any other engineering change, and set stop/scale criteria in
    writing before the pilot begins: what result would justify scaling, and what result would justify stopping, decided in
    advance so the decision is not made retroactively to justify sunk cost or momentum. Positive user sentiment alone, without
    a measured outcome against the baseline, is not sufficient evidence to scale.'
  deep_dive: ''
  key_points:
  - Define a measurable baseline and specific expected outcome before trusting a demo.
  - Include review time, model/API spend, integration maintenance and failure-correction cost in total cost.
  - Run a controlled, bounded pilot against the pre-agreed baseline rather than an informal rolling expansion.
  - Measure quality and cycle-time impact with the same rigor as any other engineering investment.
  - Set stop/scale criteria in advance so the decision is not made retroactively to justify sunk cost.
  strong_signals:
  - Insists on a pre-defined baseline and outcome metric before evaluating pilot results.
  - Names review time and failure-correction cost as real, often-hidden components of total operating cost.
  - Sets stop/scale criteria in advance rather than deciding after seeing which way the data leans.
  weak_signals:
  - Evaluates the initiative primarily on demo quality or user enthusiasm.
  - Counts only per-call API price as the cost, ignoring review and integration effort.
  red_flags:
  - Scales an initiative to production with no baseline measurement and no defined success criteria.
  - Continues an initiative indefinitely with no evidence of the outcome it was meant to produce.
  common_mistakes:
  - Running an uncontrolled pilot with no comparison against a pre-change baseline.
  - Ignoring the cost of human review time because it is 'temporary' with no plan to actually reduce it.
  - Defining success criteria only after seeing the pilot's results, tailored to whatever those results were.
  follow_ups:
  - question: Which evidence would cause you to stop the initiative despite positive user sentiment?
    recommended_answer: A measured outcome against the pre-agreed baseline that fails to clear the stated bar — cycle time
      unchanged, defect escape rate flat or worse, or total cost (including review and correction time) exceeding the value
      delivered — should stop the initiative regardless of how positively users describe the experience, because sentiment
      reflects perceived convenience, not the specific outcome the initiative was funded to produce. Written stop criteria
      agreed before the pilot are what make that decision possible without it becoming a political argument after the fact.
