- id: gold-lead-001
  domain: technical-leadership
  subdomain: prioritization
  title: Prioritizing automation investment across channels with limited staff
  level: advanced
  priority: P0
  frequency: very_common
  question: You inherit UI, API, mobile and performance automation requests with limited staff. Build a prioritization model
    and explain what you would deliberately not automate.
  concise_answer: Score each request on business/release risk if it fails, repeatability (how often it would run and how often
    the current process finds real defects), technical feasibility and expected maintenance cost, and the value of manual/exploratory
    testing that automation would remove. Rank by risk-reduction per unit of ongoing maintenance cost, not by requester seniority
    or novelty. Publish the ranked backlog and its criteria so intake is transparent, and name categories you will not automate
    (one-off migrations, UI in active redesign, low-frequency exploratory-heavy flows) with the reasoning attached, not silence.
  recommended_answer: 'Start from the constraint, not the request list: staff time is fixed, so the model''s job is to make
    the opportunity cost of every "yes" visible. Score each candidate on four axes — (1) impact if the covered behavior breaks
    in production or blocks a release, (2) run frequency and defect-detection history, since a test that runs nightly and
    has caught real regressions earns its keep faster than one that runs twice a year, (3) automation feasibility and expected
    ongoing maintenance cost given current framework maturity, and (4) whether a human still needs to look at the behavior
    anyway (visual judgment, exploratory coverage, one-time verification) — automating that adds cost without removing manual
    effort.

    Rank by risk-reduction-per-maintenance-dollar rather than a single weighted score, so the trade-off stays visible in the
    conversation with stakeholders. DORA''s research treats test automation as one of several delivery-performance *capabilities*
    — it only predicts better outcomes together with fast feedback loops and low-risk release practices, which is the argument
    for prioritizing test suites that shorten the feedback loop on the highest-risk paths over suites that simply maximize
    count.

    Explicitly declare what will not be automated this cycle and why: a screen mid redesign (rework risk exceeds value), a
    one-time data migration (no repeat value), a flow whose value is genuinely exploratory judgment. Publish the backlog,
    its scoring criteria and the "not now" list together — an intake process stakeholders can see and challenge survives longer
    than a private mental model, and it converts "why wasn''t my request done" into a criteria conversation instead of a relationship
    one.'
  deep_dive: ''
  key_points:
  - Business and release risk drives priority, not requester seniority.
  - Repeatability and defect-detection value matter more than raw test count.
  - Technical feasibility and ongoing maintenance cost are real, recurring costs.
  - Manual/exploratory value is a reason to not automate, not an oversight.
  - Transparent roadmap and backlog intake criteria, published and revisitable.
  strong_signals:
  - Names concrete, weighable axes (risk, frequency, feasibility, manual value) instead of a gut-feel ranking.
  - Volunteers specific categories to deliberately not automate, with reasoning.
  - Ties the model to DORA-style capability thinking — automation serves faster, safer feedback, not raw coverage percentage.
  weak_signals:
  - Prioritizes by requester seniority or "who asked first."
  - Cannot name anything they would refuse to automate.
  red_flags:
  - Treats 100% automation coverage as an unqualified goal regardless of maintenance cost.
  - Has no mechanism for stakeholders to see or contest the ranking.
  common_mistakes:
  - Automating whatever is technically easiest first regardless of risk.
  - Letting the backlog become a private list with no visible criteria.
  - Ignoring maintenance cost of already-automated suites when planning new work.
  follow_ups:
  - question: How would you explain a rejected automation request to a senior stakeholder?
    recommended_answer: 'Walk the same criteria used for every request: state the risk score, the run frequency assumption
      and the maintenance cost estimate for their specific request, and show where it landed relative to the current cut line.
      Offer the concrete alternative — a lighter-weight check, a manual smoke test until the screen stabilizes, or a revisit
      date tied to a trigger (e.g., after the redesign ships). The goal is that the stakeholder can disagree with an input
      to the model, not with an opaque decision, which keeps the conversation about criteria rather than status.'
  examples:
  - A payment-checkout regression suite that runs on every PR and has caught three production-bound defects this quarter outranks
    a rarely-exercised admin report page even though the admin request came from a director, because the scoring is on risk
    and detection history, not requester rank.
