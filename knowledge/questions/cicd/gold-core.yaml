- id: gold-tool-006
  domain: cicd
  subdomain: quality-gates
  title: Designing PR, nightly and release quality gates without a blanket rerun-to-green policy
  level: advanced
  priority: P0
  frequency: very_common
  question: Design PR, nightly and release quality gates for an automation platform. Explain which failures block immediately
    and which create follow-up work.
  concise_answer: PR gates should be fast and deterministic — a small, curated smoke/regression subset plus static checks
    (lint, unit tests, build) — and block the merge on any failure, because the whole point of a PR gate is fast, trustworthy
    signal before code lands. Nightly runs cover the broader regression suite against a stable environment; failures there
    create triaged follow-up work (defect, flaky-test ticket, environment issue) rather than blocking anything, since nothing
    is merging at that moment, but persistent nightly red must have an owner and a deadline. Release gates re-validate against
    production-like environment and data, and should block a release specifically on failures that indicate real regression
    risk (contract breaks, critical-path failures), with clear, named ownership for flaky, infrastructure and product failures
    so they are routed correctly instead of piling into one undifferentiated queue. A rerun-to-green policy for any of these
    tiers hides real defects and should be explicitly rejected as a blanket practice.
  recommended_answer: 'PR gates exist to give a fast, trustworthy "safe to merge" signal, so they should run only what is
    fast and deterministic: build, static analysis, unit tests, and a curated smoke/critical-path subset of the automation
    suite chosen for stability and business criticality, not exhaustiveness. Any failure here blocks the merge — there is
    no acceptable "known flaky, ignore it" exception at this gate, because letting one through erodes trust in the entire
    gate; a test that is not stable enough to block a PR should be quarantined out of the PR tier entirely (with an owner
    and a ticket) rather than allowed to fail silently inside it.

    Nightly runs exist to get broad, deep coverage on a cadence that tolerates longer runtime and more environment dependencies
    — the full regression suite, cross-browser/cross-platform matrices, longer-running data scenarios. Nothing is waiting
    to merge at nightly time, so a failure does not block anything by itself; it should instead be automatically classified
    (product defect, automation defect, environment/infrastructure failure, unknown) and filed as follow-up work with an owner,
    while trend metrics (pass rate over time per suite/component) get reviewed regularly so a suite that stays red for days
    does not become invisible background noise.

    Release gates re-run critical coverage against a production-like environment and, where applicable, production-like data
    volume, specifically to catch what PR-tier and nightly-tier testing structurally cannot: environment-specific configuration
    issues, data-migration effects, and integration with dependencies that are only realistic at that stage. These gates should
    block the release on failures that represent real regression risk to the release candidate — broken critical paths, contract/API
    breaking changes, data-integrity failures — while routing infrastructure or environment-only failures to the team that
    owns that environment rather than blocking the release indefinitely on a problem the application team cannot fix.

    Across all three tiers, ownership must be explicit and different for different failure classes: a flaky test belongs to
    whoever owns test stability (often a dedicated automation-reliability rotation), an infrastructure failure belongs to
    platform/DevOps, and a product defect belongs to the feature team — routing a failure to the wrong owner is as damaging
    as not routing it at all. Artifacts (logs, screenshots, traces) and pass-rate trend metrics should be captured at every
    tier so a triager never has to reproduce a failure from scratch to understand it. No tier should adopt a policy of automatically
    rerunning failed tests until they pass and calling that "green" — that specifically converts real defects into invisible
    flakiness statistics.'
  deep_dive: ''
  key_points:
  - 'PR gates: fast, deterministic, curated subset; any failure blocks the merge.'
  - 'Nightly gates: broader coverage on a relaxed cadence; failures create classified, owned follow-up work, not a merge block.'
  - 'Release gates: production-like environment/data validation; block only on real regression risk, route environment issues
    to the right owner.'
  - Clear, differentiated ownership for flaky, infrastructure and product failures at every tier.
  - No blanket rerun-to-green policy at any tier; capture artifacts and trend metrics everywhere.
  strong_signals:
  - Assigns a different purpose and failure-response policy to each of the three tiers rather than "run more tests each time".
  - Explicitly rejects rerun-to-green as a blanket policy while allowing bounded, evidenced retries for known-transient classes.
  - Describes concrete ownership routing (automation-reliability rotation, platform/DevOps, feature team) for different failure
    classes.
  weak_signals:
  - Describes the three tiers only by runtime/schedule, not by what should block versus what should not.
  - Treats "flaky" as a catch-all category with no distinct owner or resolution path.
  red_flags:
  - Proposes retrying every failed test automatically until green at any tier.
  - Would block a release on an environment-only failure indefinitely with no routing to the owning team.
  common_mistakes:
  - Running the full regression suite as the PR gate, making PRs slow and encouraging people to bypass or ignore the gate.
  - Letting nightly failures accumulate with no owner or expiry, so the suite is permanently red and ignored.
  - Blocking a release on a known, already-ticketed flaky test instead of distinguishing it from a genuine regression.
  follow_ups:
  - question: How would you prevent a permanently quarantined test suite from becoming invisible debt?
    recommended_answer: 'Quarantine must be time-boxed and visible, not a permanent parking lot: every quarantined test carries
      an owner, a ticket and an expiry/review date, and a dashboard surfaces the quarantine list and its age so it cannot
      silently grow unnoticed. Set a policy cap (e.g. quarantine count or percentage of the suite) that triggers an explicit
      review when exceeded, and periodically re-run quarantined tests in a non-blocking diagnostic lane so a test that has
      become stable again is promoted back, while one that keeps failing for a real reason gets escalated rather than living
      in quarantine indefinitely.'
  examples:
  - A PR gate runs a 40-test smoke subset plus unit tests and lint (under 8 minutes) and blocks merge on any failure. The
    nightly run executes the full 2,000-test cross-browser regression suite; three unrelated failures are auto-classified
    (one product defect ticket, one flaky-test quarantine ticket, one environment DNS issue routed to platform) with none
    of them blocking anything, since nothing is merging. The release gate re-runs the critical-path subset against a staging
    environment seeded with production-like data volume and blocks the release only on a critical-path checkout failure, while
    a concurrently observed staging-only certificate warning is routed to platform without holding the release.
