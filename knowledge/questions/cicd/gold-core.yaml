- id: gold-arch-005
  domain: cicd
  subdomain: test-selection
  title: Risk-based PR test selection without creating blind spots
  level: advanced
  priority: P1
  frequency: common
  question: Design risk-based test selection for pull requests without creating blind spots.
  concise_answer: Map code, components and API/data contracts to the tests that exercise them, then run the mapped subset
    on every PR alongside a small fixed set of critical smoke/invariant tests that always run regardless of what changed.
    Use historical failure and change-impact data to prioritize, not to permanently exclude — anything not confidently mapped
    falls back to the broader suite rather than being skipped. Audit escaped defects periodically against what the selection
    would have run, and treat any miss as a signal to fix the mapping, not just the missed test.
  recommended_answer: 'Selection starts from a dependency/impact map: which tests exercise which modules, endpoints and database
    objects, built from static analysis, coverage instrumentation, or contract references, and kept current as the codebase
    changes. On each PR, the changed-file set is mapped to the tests that cover it, using GitHub Actions path filters or an
    equivalent CI trigger mechanism to scope which suites even start.

    Two safeguards keep this from creating blind spots. First, a small always-run set of smoke tests and business-critical
    invariants runs on every PR unconditionally, independent of the mapping — this catches cross-cutting regressions the impact
    map missed. Second, low-confidence changes (touching shared libraries, configuration, or files with no clear test ownership)
    fall back to running the broader suite rather than a narrow guess.

    This mirrors DORA''s test-automation guidance: fast, reliable automated suites are a core delivery capability, and selection
    should shrink feedback time without shrinking the guarantee that a regression will eventually be caught — ideally before
    merge, not after. Audit any defect that reaches later stages against what the PR selection ran; a recurring miss means
    the mapping, not just the test list, needs repair.'
  deep_dive: ''
  key_points:
  - Build and maintain an explicit map from code/contracts to the tests that cover them.
  - Always run a small fixed set of critical smoke/invariant tests regardless of mapping.
  - Fall back to broader suites when change confidence or ownership is low.
  - Use CI path filters to scope which suites even trigger, not to silently skip risk.
  - Audit escaped defects against what selection would have run and fix the mapping.
  strong_signals:
  - Names both an always-run set and a fallback rule alongside the mapped subset.
  - Treats an escaped defect as a mapping-repair signal, not just a missed test to add.
  - Distinguishes "scoping what triggers" from "silently reducing coverage."
  weak_signals:
  - Selection is based only on file-extension heuristics with no impact mapping.
  - No fallback path exists for low-confidence or shared-code changes.
  red_flags:
  - Skips tests based on "usually passes" history with no evidence-based mapping.
  - Has no audit loop connecting escaped defects back to the selection logic.
  common_mistakes:
  - Excluding a shared-utility change from broader test runs because "it's just a helper."
  - Letting the impact map go stale as the codebase refactors around it.
  - Treating AI/ML-based test selection confidence scores as ground truth without audit.
  follow_ups:
  - question: How would you evaluate whether AI-based test selection is actually safe?
    recommended_answer: 'Run the AI-based selector in shadow mode alongside full-suite execution for a period, then compare:
      for every defect the full suite caught, would the selector''s chosen subset have caught it too? Track precision (selected
      tests that were relevant) and, more importantly, recall against known regressions/escaped defects before trusting it
      to skip anything in production CI, and keep the always-run critical set outside the AI''s control as a floor guarantee.'
