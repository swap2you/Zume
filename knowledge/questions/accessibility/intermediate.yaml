- id: accessibility-i-15
  domain: accessibility
  subdomain: semantics
  title: 'Semantics: intermediate decision'
  level: intermediate
  priority: P3
  frequency: common
  question: How would you introduce semantics incrementally and measure whether it helped?
  concise_answer: Semantics should be applied to a stated outcome, observable evidence, and known constraints;
    using it as a ritual is not enough. In Accessibility testing, validate both the intended result and
    the meaningful negative or failure path before treating it as reliable.
  recommended_answer: Start by naming the decision that semantics supports and the invariant it must preserve.
    Choose the smallest mechanism that exposes inputs, outputs, failures, and ownership; then test representative
    normal, boundary, and failure cases. Explain the trade-off rather than claiming a single universal
    pattern, and use telemetry or review evidence to revise the design when reality differs.
  deep_dive: Probe for a concrete Accessibility testing example, competing constraints, and evidence that
    would change the candidate's decision.
  key_points:
  - states an invariant
  - uses evidence
  - names trade-offs
  strong_signals:
  - distinguishes symptom from root cause
  - defines a bounded validation strategy
  weak_signals:
  - recites a tool feature without a decision context
  red_flags:
  - claims a pattern is universally correct
  - hides or ignores failure evidence
  common_mistakes:
  - testing only a happy path
  - confusing activity with outcome
