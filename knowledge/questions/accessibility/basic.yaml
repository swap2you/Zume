  question: How would you explain the trade-off behind keyboard without relying on jargon?
  concise_answer: Keyboard should be applied to a stated outcome, observable evidence, and known constraints;
    using it as a ritual is not enough. In Accessibility testing, validate both the intended result and
    the meaningful negative or failure path before treating it as reliable.
  recommended_answer: Start by naming the decision that keyboard supports and the invariant it must preserve.
    Choose the smallest mechanism that exposes inputs, outputs, failures, and ownership; then test representative
    normal, boundary, and failure cases. Explain the trade-off rather than claiming a single universal
    pattern, and use telemetry or review evidence to revise the design when reality differs.
  deep_dive: Probe for a concrete Accessibility testing example, competing constraints, and evidence that
    would change the candidate's decision.
