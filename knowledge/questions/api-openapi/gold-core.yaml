- id: gold-api-006
  domain: api-openapi
  subdomain: resilience-rate-limits
  title: Testing retries, backoff and rate limits without a slow, destructive suite
  level: advanced
  priority: P1
  frequency: common
  question: Design tests for retries, backoff, circuit breakers and rate limits without creating a slow or destructive test
    suite.
  concise_answer: Test resilience logic as a component in isolation, against a controllable fake or fault-injecting mock server
    that returns scripted failures (500s, timeouts, connection resets) on demand, asserting the retry count, the backoff delay
    bounds, and the terminal give-up behavior deterministically and fast — never by attacking a real shared environment to
    force real failures. Rate-limit tests should assert the client honors a `Retry-After` header rather than hammering a real
    API until a 429 actually occurs; a small, explicitly separate set of environment checks can validate the real rate-limit
    response shape without being part of the fast component suite.
  recommended_answer: 'The key design decision is separating deterministic component tests from live environment checks —
    they answer different questions and have very different cost profiles. For the component tests: stand up a fault-injecting
    mock (WireMock, MockWebServer, or a hand-rolled stub server) that can be scripted to return a sequence of responses —
    fail twice with 503, then succeed — and drive the actual retry/backoff/circuit-breaker client code against it. Assert
    the exact number of attempts made, the delay between attempts falls within the expected backoff bounds (allowing tolerance
    for jitter), and that the circuit breaker opens after its configured failure threshold and stops issuing calls (rejecting
    fast) rather than continuing to retry. These tests run in milliseconds because the mock returns instantly and any deliberate
    delay is faked or accelerated (many backoff implementations accept an injectable clock/scheduler specifically to make
    this testable without real sleeps).

    For rate limits specifically: the client-side contract to test is honoring `Retry-After` (a delay in seconds or an HTTP
    date, per RFC 9110) when a 429 is received — again provoked by a mock server, not a real API — asserting the client waits
    at least that long before retrying and does not simply retry immediately or ignore the header.

    What must not happen: hammering a real shared staging/production API to force an actual rate-limit or failure response
    as the primary test mechanism. That is slow, non-deterministic (shared environment load varies), and can degrade the environment
    for other teams or trip real alerting. A small number of environment-level checks — confirming the real API does return
    a 429 with a Retry-After header under the documented condition — are still valuable, but they belong in a separate, explicitly
    labeled and infrequently-run suite, not the fast per-commit component tests.'
  deep_dive: ''
  key_points:
  - Use controllable mocks/fault injection rather than attacking real environments.
  - Assert retry count, delay bounds and terminal (give-up/circuit-open) behavior precisely.
  - Respect Retry-After semantics specifically when testing rate-limit handling.
  - Avoid testing resilience by forcing real failures on shared environments.
  - Separate deterministic component tests from limited, infrequent live environment checks.
  strong_signals:
  - Proposes scripted mock/fault injection as the default mechanism, not a live environment.
  - Asserts on attempt count, backoff bounds and circuit-breaker open state, not just "it eventually worked".
  - Explicitly separates fast deterministic tests from a small, labeled live-environment check set.
  weak_signals:
  - Tests resilience only by observing that a request "eventually succeeded" with no bound assertions.
  - Uses a live shared test environment as the primary way to trigger failure scenarios.
  red_flags:
  - Proposes intentionally overloading a shared staging environment to trigger real rate limits regularly.
  - Has no way to test backoff timing without real sleeps that make the suite slow.
  common_mistakes:
  - Asserting only that a retried call "eventually returns 200" without checking attempt count or timing.
  - Ignoring Retry-After and asserting a fixed client-side delay that happens to match by coincidence.
  - Running fault-injection tests against shared infrastructure, causing noisy-neighbor failures for others.
  follow_ups:
  - question: How would you prove that retries do not duplicate a business transaction?
    recommended_answer: Combine the fault-injection mock with a stateful stub that records how many times the underlying create-transaction
      call actually reached the "business logic" layer, then assert that despite N retries, exactly one transaction was recorded
      — this directly tests the idempotency-key/deduplication mechanism under the retry path, not just that the client eventually
      got a success response. It's the same technique as testing idempotency-key handling, applied specifically to the retry
      code path that would otherwise resend the identical request N times.
  examples: []
  code_examples:
  - "// WireMock stub sequence: fail twice, then succeed\nstubFor(get(\"/payments\").inScenario(\"retry\")\n    .whenScenarioStateIs(STARTED)\n\
    \    .willReturn(serverError()).willSetStateTo(\"second\"));\nstubFor(get(\"/payments\").inScenario(\"retry\")\n    .whenScenarioStateIs(\"\
    second\")\n    .willReturn(serverError()).willSetStateTo(\"third\"));\nstubFor(get(\"/payments\").inScenario(\"retry\"\
    )\n    .whenScenarioStateIs(\"third\")\n    .willReturn(ok().withBody(\"{\\\"status\\\":\\\"paid\\\"}\")));\n\n// Assertion\
    \ on the client under test\nResponse r = resilientClient.getPayments();\nassertThat(r.attemptCount()).isEqualTo(3);\n\
    assertThat(r.totalBackoffMillis()).isBetween(minExpected, maxExpected);"
  role_tracks:
