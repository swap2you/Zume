- id: gold-api-002
  domain: api-openapi
  subdomain: error-contracts
  title: Testing an API error contract beyond the status code
  level: intermediate
  priority: P0
  frequency: very_common
  question: Design negative tests for an API error contract. Go beyond checking the status code.
  concise_answer: A complete negative test validates the status code, a stable machine-readable error code/type, the content-type
    and schema of the error body, that a correlation/request ID is present for support, and that no internal detail (stack
    trace, SQL, internal hostnames) leaks into the response. It must cover the full input space that provokes errors — malformed
    JSON, missing required fields, wrong types, unauthorized, forbidden, conflicting state, not-found, and rate-limited —
    because each maps to a distinct contract the client must branch on differently.
  recommended_answer: 'Checking only the HTTP status code tests a fraction of the contract a client actually depends on. A
    thorough negative test asserts: (1) the status code is correct for the failure class (400 vs 422 vs 409 have distinct
    meanings clients rely on to decide whether to retry, fix input, or escalate); (2) the response has the documented content-type
    (application/problem+json or the API''s own error envelope) and validates against its schema, so a client''s error deserializer
    doesn''t break silently; (3) a stable, documented error code or type field is present and matches the specific failure
    — not just a human-readable message that can change wording without notice; (4) field-level detail is present for validation
    errors (which field, what constraint was violated) so a UI can highlight the right input; (5) a correlation/request ID
    is present so a support ticket or automated retry can be tied back to a server-side log entry; (6) the body does not leak
    internals — stack traces, database error text, internal hostnames or library versions — which is both a security and a
    stability concern (client code shouldn''t parse an internal detail that then breaks on the next deploy).

    The input space to cover systematically: malformed/unparseable body, missing required fields, wrong types or out-of-range
    values, missing/invalid auth (401), valid auth but insufficient permission (403), referencing a nonexistent resource (404),
    a request that conflicts with current state — e.g. double-booking, version mismatch (409), and requests exceeding a rate
    limit (429 with Retry-After). Each of these is a distinct contract, and a suite that only exercises "one 400 case" and
    "one 404 case" has not actually validated the error contract''s completeness.'
  deep_dive: ''
  key_points:
  - Validate stable error code, message policy, field/path details and correlation ID.
  - Check content type and schema of the error body, not just the status code.
  - Ensure sensitive internals (stack traces, SQL, hostnames) are not leaked.
  - Test malformed, missing, unauthorized, forbidden, conflict and rate-limit cases.
  strong_signals:
  - Lists the full set of error-body properties to check (code, schema, correlation ID, leakage) unprompted.
  - Enumerates the input-space categories (auth, conflict, rate-limit, malformed) systematically.
  - Explicitly checks for internal-detail leakage as both a security and stability concern.
  weak_signals:
  - Checks status code and a generic "error message contains X" substring match only.
  - Tests one negative case per endpoint and calls the error contract "covered".
  red_flags:
  - Asserts on the exact wording of a human-readable message as the pass/fail criterion.
  - Has no test for what happens when internal errors (500) occur — assumes they can't.
  common_mistakes:
  - Coupling assertions to a translatable/changeable message string instead of a stable code.
  - Never testing the schema of the error body, so a shape change breaks clients silently.
  - Skipping rate-limit and conflict-state cases because they're harder to set up.
  follow_ups:
  - question: Which error fields should remain stable enough for automation, and which should not?
    recommended_answer: Machine-readable fields — the error code/type, HTTP status, field-path identifiers for validation
      errors, and the presence of a correlation ID — should be part of the documented, versioned contract and are safe for
      automated assertions to depend on. Human-readable message text should be treated as unstable and excluded from automation
      entirely (it may be localized, reworded, or expanded without a version bump); tests should assert the message field
      *exists and is non-empty*, never its exact content.
  examples:
  - 'A validation failure on `POST /users` with an invalid email should return 422 with a body like `{"error": "VALIDATION_FAILED",
    "details": [{"field": "email", "issue": "invalid_format"}], "requestId": "..."}` — not just a 400 with a generic "Bad
    Request" string.'
  code_examples:
  - "given()\n  .body(Map.of(\"email\", \"not-an-email\"))\n.when().post(\"/users\")\n.then()\n  .statusCode(422)\n  .contentType(\"\
    application/json\")\n  .body(\"error\", equalTo(\"VALIDATION_FAILED\"))\n  .body(\"details[0].field\", equalTo(\"email\"\
    ))\n  .body(\"requestId\", not(emptyOrNullString()))\n  .body(\"$\", not(containsString(\"Exception\")));"
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range:
  - 3
  - 12
  tags:
  - api
  - error-handling
  - negative-testing
  - rest
  - contract-testing
  estimated_minutes: 6
  references:
  - source_id: rfc-http
    locator: RFC 9110 HTTP Semantics — Section 15 Status Codes (4xx Client Error, 5xx Server Error semantics)
