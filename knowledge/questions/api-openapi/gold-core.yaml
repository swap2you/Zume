- id: gold-api-001
  domain: api-openapi
  subdomain: methods-idempotency
  title: Safety and idempotency across HTTP methods
  level: basic
  priority: P0
  frequency: very_common
  question: Explain safety and idempotency for GET, PUT, POST, PATCH and DELETE. How should those semantics influence retries
    and automated assertions?
  concise_answer: Safe methods (GET, HEAD, OPTIONS) are defined to not intend any state change on the server, so they can
    always be retried freely. Idempotent methods (GET, PUT, DELETE) guarantee that N identical requests produce the same server
    state as one request, even though the response or status code may differ (a second DELETE may return 404 instead of 204).
    POST is neither safe nor generally idempotent — resubmitting a POST can create a duplicate resource — and PATCH's idempotency
    depends entirely on the patch semantics used (a "set field to X" patch is idempotent; an "increment field" patch is not).
    Automated retries should only ever be applied automatically to safe or idempotent operations, or to non-idempotent operations
    carrying an idempotency key; assertions on POST/PATCH should explicitly test what happens on resubmission rather than
    assuming safety.
  recommended_answer: 'RFC 9110 defines these terms precisely, and the distinction matters operationally, not just academically.
    "Safe" means the client did not request, and the server does not perform, any state-changing action as a result — GET,
    HEAD and OPTIONS are safe, which is why browsers, proxies and test frameworks can retry or prefetch them without hesitation.
    "Idempotent" is broader: it means the *intended effect* of N identical requests equals the effect of one, regardless of
    the exact response returned each time. GET, PUT, DELETE, HEAD and OPTIONS are defined as idempotent; POST is defined as
    neither safe nor idempotent because its defining purpose is often to create a new subordinate resource, and repeating
    it typically creates another one.

    PATCH is the interesting case RFC 9110 explicitly leaves open: whether a PATCH request is idempotent depends on the patch
    document''s semantics, not the method itself. `PATCH {"status": "shipped"}` is idempotent (applying it twice yields the
    same state); `PATCH {"op": "increment", "field": "retryCount"}` is not.

    For automated retries, the rule is: only automatically retry a request whose method is safe or idempotent, or a non-idempotent
    request explicitly protected by an idempotency key the server deduplicates on (common for POST payment/order APIs). Retrying
    a bare POST on a timeout without such a key risks a duplicate resource — the client cannot tell whether the original request
    succeeded server-side before the timeout.

    For automated assertions, idempotency claims should be tested directly, not assumed from the method name: issue the same
    PUT/DELETE twice and assert the resulting state is identical (accepting that the *status code* of the second call may
    legitimately differ, e.g. 204 then 404 for a repeated DELETE); issue the same POST twice without a key and assert whether
    a duplicate was created (documenting the actual behavior even if it''s "yes, duplicates are created" so consumers know
    not to retry blindly).'
  deep_dive: ''
  key_points:
  - Safe means no intended state change; idempotent means repeated identical requests have the same intended effect.
  - POST is not generally idempotent; PUT and DELETE are intended to be.
  - PATCH's idempotency depends on the semantics of the patch document, not the verb.
  - Retries require operation semantics and idempotency keys where supported.
  strong_signals:
  - Distinguishes "same response" from "same intended server-side effect" for idempotency.
  - Correctly places PATCH's idempotency as payload-semantics-dependent, not method-dependent.
  - Ties retry policy directly to safe/idempotent/idempotency-key status.
  weak_signals:
  - States the method list correctly but cannot explain PATCH's conditional case.
  - Assumes idempotent means "returns the same response every time".
  red_flags:
  - Claims POST is safe to retry automatically without any deduplication mechanism.
  - Believes idempotent means the method has no side effects at all (confusing with "safe").
  common_mistakes:
  - Retrying a timed-out POST automatically and creating duplicate orders/records.
  - Asserting only the status code of a repeated DELETE instead of the resulting state.
  - Assuming all PATCH endpoints are idempotent without checking the actual patch semantics.
  follow_ups:
  - question: How would you test an idempotency-key implementation under duplicate concurrent requests?
    recommended_answer: Fire two (or more) requests carrying the identical idempotency key at approximately the same time
      — genuinely concurrently, using parallel threads or an async HTTP client, not sequentially — and assert that exactly
      one resource was created server-side, that both responses reference the same resource ID, and that the second-arriving
      request either blocks until the first completes or returns the first's cached result rather than racing past a check-then-create
      window. This specifically probes the server's deduplication being atomic under concurrency, not just correct when called
      twice sequentially.
  examples:
  - 'Two identical `DELETE /orders/42` calls: the first returns 204 and removes the order; the second returns 404 because
    the resource no longer exists. The *state* (order 42 absent) is identical after either call — this is idempotent behavior
    even though the status codes differ.'
  code_examples:
  - "// Idempotency-key pattern for a non-idempotent POST\ngiven()\n  .header(\"Idempotency-Key\", orderKey)\n  .body(orderPayload)\n\
    .when().post(\"/orders\")\n.then().statusCode(201);\n\n// Repeating with the same key must not create a second order\n\
    given()\n  .header(\"Idempotency-Key\", orderKey)\n  .body(orderPayload)\n.when().post(\"/orders\")\n.then().statusCode(201).body(\"\
    id\", equalTo(firstOrderId));"
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range:
  - 2
  - 10
  tags:
  - api
  - http-methods
  - idempotency
  - rest
  - retries
  estimated_minutes: 5
  references:
  - source_id: rfc-http
    locator: RFC 9110 HTTP Semantics — Section 9.2 Common Method Properties (Safe, Idempotent, Cacheable Methods)
  last_verified: '2026-07-16'
  freshness_days: 365
  status: published
  quality_origin: researched
  review_status: reviewed
  reviewed_at: '2026-07-16'
  review_notes:
