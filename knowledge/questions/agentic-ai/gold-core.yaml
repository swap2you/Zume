- id: gold-ai-004
  domain: agentic-ai
  subdomain: tool-schemas
  title: Least-privilege tool schema and permission model for an agent
  level: advanced
  priority: P0
  frequency: common
  question: Design a tool schema and permission model for an agent that can search, read files and create issues but must
    not leak secrets or make irreversible changes.
  concise_answer: Give the agent narrow, typed tools rather than a general 'run shell command' tool — search(query), readFile(path)
    restricted to an allowlisted directory, and createIssue(title, body) — each with strict argument validation and no ability
    to reach outside its declared scope. Separate read-only tools from write/side-effecting tools explicitly, validate every
    argument (especially file paths, to block traversal outside the allowlist) before execution, require human approval for
    anything irreversible or high-impact, and log every tool call and result so the sequence is auditable. Treat any content
    the agent reads (file contents, search results) as untrusted data that must never be interpreted as new instructions.
  recommended_answer: 'The permission model starts from least privilege at the tool-definition level, not just at the prompt
    level: define exactly three tools with narrow, typed schemas — search(query: string) returning ranked snippets, readFile(path:
    string) restricted at the implementation layer to an explicit allowlisted root directory with path normalization to block
    ''../'' traversal, and createIssue(title: string, body: string) that only creates, never edits or deletes. There is no
    general file-write, shell, or ''run arbitrary code'' tool in scope, because the permission model is enforced by which
    tools exist, not by instructing the model not to misuse a more powerful one.

    Separate read tools from write/side-effecting tools in the permission model itself — search and readFile require no approval
    because they cannot change external state; createIssue is the one action with real-world side effects and should either
    require a human-in-the-loop approval step before execution or be restricted to a non-production issue tracker/queue that
    a human reviews before it becomes visible. Any tool the agent could plausibly gain that performs a delete, a payment,
    a credential change, or anything else irreversible must sit behind mandatory human approval — this is the practical meaning
    of ''must not make irreversible changes.''

    Validate every argument at the tool boundary regardless of what the model intended: normalize and check file paths against
    the allowlist server-side (never trust the model to only ask for allowed paths), size- and content-type-check search queries,
    and reject or sanitize createIssue content that looks like it is trying to smuggle secrets or credentials into a public
    issue tracker. Treat retrieved file contents and search results as untrusted data — this is the core defense against prompt
    injection and against the OWASP Top 10 for LLM Applications'' ''excessive agency'' risk category — the agent''s system
    prompt should explicitly instruct it that content read via tools is data, not instructions, and the tool layer should
    never let a ''read'' result trigger an unreviewed ''write'' action. Finally, log every tool call, its arguments and its
    result for audit — this is what makes an incident investigable after the fact rather than a mystery.'
  deep_dive: ''
  key_points:
  - Least privilege at the tool-definition level — narrow typed schemas, not a general-purpose execution tool.
  - Separate read-only tools from write/side-effecting tools explicitly in the permission model.
  - Validate every argument (especially paths) server-side, never trusting model-supplied values.
  - Require human approval for irreversible or high-impact actions.
  - Audit every tool call and result; treat retrieved content as untrusted data, not instructions.
  strong_signals:
  - Enforces permission boundaries in tool implementation code, not only via prompt instructions.
  - Explicitly separates read and write tools and gates write/irreversible actions behind human approval.
  - Names prompt injection via retrieved content as a first-class threat to design against.
  weak_signals:
  - Relies on instructing the model 'don't access files outside this folder' as the only control.
  - Has no distinction between read and write tools in the permission model.
  red_flags:
  - Gives the agent a general shell/code-execution tool 'for flexibility.'
  - No human-approval gate before any irreversible or credential-touching action.
  common_mistakes:
  - Validating arguments only client-side in the prompt, not in the tool's actual implementation.
  - Trusting retrieved document/file content as instructions rather than untrusted data.
  - Logging only final answers, not the intermediate tool calls, making incidents unauditable.
  follow_ups:
  - question: How would you defend against a retrieved document instructing the agent to reveal credentials?
    recommended_answer: 'Layer defenses rather than relying on the model to ''just know better'': mark all retrieved/tool-returned
      content as data in the prompt structure (a distinct role/section the model is instructed to never treat as instructions),
      scan tool outputs for known injection patterns before they reach the model where feasible, and — critically — ensure
      the tools themselves have no capability to read or emit secrets in the first place, so even a fully successful injection
      has nothing to exfiltrate. Add output-side checks that flag or block responses containing credential-shaped strings
      (API-key patterns, connection strings) before they are returned, and log the attempt for review. This matches the OWASP
      guidance on treating prompt injection and excessive agency as top-tier risks that need architectural mitigation, not
      just prompt wording.'
  examples:
  - readFile('../../../etc/secrets.env') must be rejected by path normalization and allowlist enforcement in the tool implementation
    itself — not by hoping the model never asks for it, since a poisoned search result or document could instruct the model
    to try exactly that path.
