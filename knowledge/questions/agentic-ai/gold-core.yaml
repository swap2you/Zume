- id: gold-ai-006
  domain: agentic-ai
  subdomain: evals
  title: Evaluating an agent that chooses tools and performs multi-step tasks
  level: advanced
  priority: P0
  frequency: common
  question: Create an evaluation strategy for an agent that chooses tools and performs multi-step tasks.
  concise_answer: 'Task success alone is insufficient because an agent can reach the right final answer through an unsafe
    or inefficient path. Evaluate the full trajectory: which tools it chose, whether arguments were correct, whether the sequence
    was efficient and policy-compliant, how it recovered from a failed tool call, and its latency and cost per run. Use deterministic
    fixtures (mocked tools with known responses) for repeatable regression, plus a smaller set of adversarial cases (bad tool
    results, injected instructions, ambiguous goals) to test safety and recovery. Trace every run so failures are diagnosable,
    and maintain the eval set as a versioned regression suite that grows every time a real failure is found.'
  recommended_answer: 'Grading only the final answer misses most of what can go wrong in an agent: it can arrive at a correct
    answer by calling an unauthorized tool, by leaking data through an intermediate step, by taking twenty turns where two
    would do, or by getting lucky after a wrong tool call rather than recovering deliberately. The evaluation strategy needs
    to score the trajectory, not just the destination — tool choice correctness (did it pick the right tool for each subgoal),
    argument correctness (were the parameters right, not just ''some call was made''), sequence efficiency (unnecessary calls,
    redundant searches), policy compliance (did it stay within its permitted tools and avoid disallowed actions), recovery
    behavior (what did it do when a tool call failed or returned unexpected data), and operational cost — latency and token/dollar
    cost per run, since an agent that succeeds at ten times the cost of a workflow may not be worth deploying.

    Build this on two complementary layers of fixtures. Deterministic fixtures — mocked tools with fixed, known responses
    — give repeatable, fast regression tests where the expected trajectory (or an acceptable set of trajectories) is known
    in advance, so CI can catch a regression in tool-choice logic immediately. Adversarial cases — a search tool returning
    content that tries to inject new instructions, a file read that returns malformed data, an ambiguous user goal with no
    clearly correct action — test the properties that matter most for safety: does the agent stay within its tool-permission
    boundary, does it recognize and reject injected instructions, does it ask for clarification instead of guessing destructively.

    Every run needs full tracing — the sequence of model calls, tool calls, arguments and results — so a failure can be diagnosed
    rather than just flagged. And the eval set should be a living regression suite: every real production failure that gets
    root-caused should turn into a new fixture, the same discipline unit tests get after a bug fix, so evaluation coverage
    compounds rather than staying frozen at launch-time.'
  deep_dive: ''
  key_points:
  - Task success alone is insufficient — evaluate the full trajectory.
  - Score tool choice, arguments, sequence efficiency, policy compliance, recovery, latency and cost.
  - Use deterministic mocked-tool fixtures for repeatable regression testing.
  - Add adversarial cases (injected instructions, malformed tool results, ambiguous goals) for safety evaluation.
  - Trace every run and grow the regression set from real production failures.
  strong_signals:
  - Scores the trajectory (tool choice, arguments, recovery) rather than only the final answer.
  - Proposes both deterministic fixtures and adversarial cases as distinct eval layers.
  - Treats every production failure as a candidate new regression fixture.
  weak_signals:
  - Evaluates only whether the final answer matches an expected string.
  - Has no plan for tracing intermediate tool calls when a run fails.
  red_flags:
  - Considers an agent that reaches the right answer via an unsafe tool call to be a passing run.
  - No adversarial/safety evaluation at all, only happy-path task success.
  common_mistakes:
  - Grading cost/latency only in aggregate, missing runs that succeed but are absurdly expensive.
  - Never updating the eval set after a real incident, so the same failure recurs untested.
  - Using live, non-deterministic external tools in CI regression, making failures unreproducible.
  follow_ups:
  - question: How would you evaluate a run that reaches the correct answer using an unsafe tool path?
    recommended_answer: 'Fail it, regardless of the final answer''s correctness. Define policy-compliance as a hard gate in
      the scoring rubric, evaluated independently of task success — a run that used a disallowed tool, exceeded its permission
      scope, or leaked data en route to a correct answer should score as a policy failure with its own severity, separate
      from and not offset by the correctness score. Treat it exactly like a security finding: log it, root-cause why the guardrail
      didn''t stop it, and add it as a new adversarial fixture so the same unsafe path is caught in future regression runs.'
