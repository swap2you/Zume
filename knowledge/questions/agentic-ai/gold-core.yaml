- id: gold-ai-005
  domain: agentic-ai
  subdomain: state-memory
  title: Separating conversation state, task state, memory and retrieval
  level: advanced
  priority: P1
  frequency: common
  question: Separate conversation state, task state, long-term memory and source retrieval in an agent system. What should
    not be remembered?
  concise_answer: 'Conversation state is the current turn''s message history, scoped to the session and typically ephemeral.
    Task state is the agent''s working progress on the current goal — plan, completed steps, intermediate results — scoped
    to the task and cleared on completion or handoff. Long-term memory is durable facts intentionally persisted across sessions
    (user preferences, prior decisions), which requires provenance, versioning and a correction/deletion path because it can
    go stale or wrong. Retrieved source content is neither memory nor state — it is external evidence fetched fresh per query
    and should never be blindly trusted or silently merged into long-term memory. What should not be remembered: secrets,
    unredacted PII beyond what the task genuinely needs, and low-confidence inferences promoted to ''fact'' status without
    review.'
  recommended_answer: 'These four state types differ in lifecycle and trust, and conflating them is the root of several classic
    agent bugs. Conversation state — the raw turn history — is scoped to a session and should generally not outlive it without
    explicit consent; it is high volume and often contains exactly the sensitive detail a user assumed was transient. Task
    state — the agent''s plan, completed sub-steps, and intermediate tool results for the current goal — is scoped to a single
    task/run; it should be cleared or archived once the task completes or hands off, and it is what makes a multi-step run
    resumable or debuggable, not a place for facts to leak into future unrelated conversations.

    Long-term memory is qualitatively different: it is a deliberate decision to persist a fact beyond the session because
    it will be useful later (a stated preference, a correction the user gave previously). Because it is durable, it needs
    provenance (when and from what interaction was this learned), a way to be corrected or deleted (a user who says ''that''s
    wrong, forget it'' must have a working mechanism, not just a wish), and a policy for what is even eligible to become memory
    — sensitive or ambiguous inferences should not silently graduate to ''remembered fact'' status without a confidence bar
    or human confirmation.

    Retrieved source content (documents, search results, database rows) is not memory at all — it is fetched fresh for the
    current query and should be treated as evidence to reason over, not as something to blindly write into long-term memory.
    Writing a retrieved claim into permanent memory without provenance is how an agent ends up permanently ''believing'' something
    that was only true at retrieval time, or was wrong to begin with. This connects to the Model Context Protocol''s separation
    of concerns between server-exposed resources (external, application-controlled context, fetched per request) and any client-side
    conversation/session state — the two are architected as distinct because they have different trust and lifecycle properties.

    What should never be remembered regardless of type: raw secrets or credentials seen during a task, PII beyond what the
    specific task requires, and speculative or low-confidence conclusions stored as if they were confirmed facts. Minimization
    is a design default, not an afterthought bolted on for compliance.'
  deep_dive: ''
  key_points:
  - State types (conversation, task, long-term memory, retrieval) have different lifecycle and trust properties.
  - Minimize sensitive retention by default rather than remembering everything by convenience.
  - Long-term memory requires provenance, versioning and a correction/deletion path.
  - Retrieved facts are evidence for the current query, not automatically trusted or automatically remembered.
  - Users need visible deletion/control over what has been remembered about them.
  strong_signals:
  - Distinguishes all four state types by lifecycle and trust, not just by 'storage location.'
  - Requires provenance and a deletion path before treating anything as durable memory.
  - Explicitly refuses to auto-promote retrieved content into long-term memory.
  weak_signals:
  - Uses 'memory' as a single undifferentiated bucket for everything the system has ever seen.
  - Has no user-facing mechanism to correct or delete remembered facts.
  red_flags:
  - Persists secrets or full conversation transcripts into long-term memory by default.
  - Treats retrieved search/document content as equivalent to a confirmed, permanent fact.
  common_mistakes:
  - Letting task-scoped intermediate results leak into a later, unrelated conversation.
  - Storing PII in long-term memory beyond what any task actually requires.
  - No versioning on memory, so a corrected fact and its outdated predecessor coexist silently.
  follow_ups:
  - question: How would you test that outdated memory does not override current source evidence?
    recommended_answer: Construct a fixture where long-term memory contains a stale fact (for example, 'user's plan tier is
      Basic') and retrieval/tooling returns current, contradicting evidence (an API call showing the tier is now Premium)
      in the same run, then assert the agent prefers the fresher, sourced evidence and — ideally — flags or updates the stale
      memory entry rather than silently answering from memory or presenting a contradiction to the user without resolution.
      Run this as a standing regression case, since memory-versus-fresh-evidence conflicts recur every time a persisted fact
      and live system diverge.
