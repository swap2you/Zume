- id: gold-ai-003
  domain: agentic-ai
  subdomain: agents-vs-workflows
  title: Deterministic workflow versus autonomous agent
  level: basic
  priority: P0
  frequency: common
  question: When should a deterministic workflow be used instead of an autonomous agent?
  concise_answer: Use a deterministic workflow when the sequence of steps, the available paths and the decision logic between
    them are known in advance — a fixed pipeline of LLM calls and tools chained in code gives predictable cost, latency and
    behavior. Reach for an agent — a model that dynamically decides its own steps and tool calls in a loop — only when the
    task has genuine, bounded ambiguity that a fixed sequence cannot anticipate, because autonomy trades predictability for
    flexibility and multiplies evaluation, security and failure-recovery cost. The right default is the least autonomy that
    solves the task, not the most impressive architecture.
  recommended_answer: 'The distinction is about who decides the next step. A workflow is orchestration code that calls models
    and tools in a predetermined sequence or a small set of predefined branches — the developer already knows the paths, so
    the code encodes them directly and the LLM is used for the parts that genuinely need language understanding or generation
    within a step. An agent is a model given a goal, a set of tools and a loop that lets it decide, at each turn, what to
    do next — the developer does not enumerate the paths, the model discovers them.

    That difference has concrete costs. A workflow''s behavior is testable step-by-step and its cost/latency are predictable
    because the number of model calls is bounded and known. An agent''s number of steps, tool calls and therefore cost and
    latency are open-ended, its failure modes multiply (wrong tool choice, wrong argument, infinite or looping behavior, tool
    misuse under adversarial input), and its evaluation surface grows from ''did it produce the right output'' to ''did it
    choose a safe and efficient path to get there.'' Public guidance on building agents frames this exactly as a threshold
    decision: start with the simplest workflow that could work, and only introduce agentic autonomy where the task has real
    ambiguity in the number of steps or the right tool to use that cannot be reasonably hard-coded, and where the cost of
    that autonomy (evaluation, guardrails, monitoring) is worth paying.

    In practice: a fixed intake form that always runs the same three validation steps is a workflow, even if one of those
    steps calls an LLM to summarize free text. A support system that must decide, case by case, whether to search documentation,
    escalate to a human, or issue a refund based on an open-ended conversation is a legitimate candidate for an agent, because
    the right sequence of actions genuinely cannot be enumerated in advance.'
  deep_dive: ''
  key_points:
  - Use a workflow when steps and transitions between them are known in advance.
  - Agents add value only under genuine, bounded ambiguity in path or tool choice.
  - Autonomy increases evaluation, security and recovery cost, not just capability.
  - Start with the least autonomy that solves the task and add agentic behavior only when needed.
  strong_signals:
  - Frames the decision around 'who decides the next step' rather than marketing language.
  - Names the concrete costs of autonomy (evaluation surface, cost/latency variance, failure modes).
  - Defaults to the least autonomous design that satisfies the requirement.
  weak_signals:
  - Calls any system with an LLM call inside it an 'agent' regardless of whether it makes decisions.
  - Cannot name a concrete cost of choosing agentic autonomy over a workflow.
  red_flags:
  - Recommends an open-ended autonomous agent for a task with a small, fully enumerable set of steps.
  - Has no plan for bounding an agent's number of steps, tool calls, or cost.
  common_mistakes:
  - Building an agent for marketing/architecture-astronaut reasons rather than a real ambiguity requirement.
  - Failing to bound iteration count, leading to runaway cost or infinite tool-call loops.
  - Not distinguishing 'uses an LLM' from 'makes autonomous decisions' when describing the system.
  follow_ups:
  - question: Give an example where calling the system an agent adds no practical value.
    recommended_answer: A form that extracts three fields from a resume with one LLM call, always validates them against a
      fixed schema, and always writes the same report format has a fully enumerable set of steps — wrapping it in an agent
      loop with tool-choice autonomy adds unpredictable cost and a larger failure surface (the model could 'decide' to skip
      a step or invoke an unnecessary tool) without adding any capability the fixed workflow did not already have. Calling
      it an agent here is a marketing choice, not an engineering one.
  examples:
  - A resume-intake pipeline that always extracts fields, always validates them against a schema, and always writes a fixed
    report is a workflow — an LLM call inside one step does not make the overall system an agent, because the sequence of
    steps never changes based on what the model decides.
  code_examples: []
  role_tracks:
  - AI QA Engineer
