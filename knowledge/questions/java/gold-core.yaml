- id: gold-java-002
  domain: java
  subdomain: collections
  title: Choosing collections by semantics, not habit
  level: intermediate
  priority: P0
  frequency: very_common
  question: Choose collections for ordered input with duplicates, keyed lookup, and concurrent updates. Explain the trade-offs
    rather than naming one universal collection.
  concise_answer: 'Each requirement maps to different semantics. Ordered input with duplicates is a List (ArrayList for random
    access, ArrayDeque for queue-like use). Keyed lookup is a Map — LinkedHashMap when insertion order must be observable,
    TreeMap for sorted keys. Concurrent updates need ConcurrentHashMap or immutable snapshots handed between threads. The
    trap is choosing one "safe" structure for everything: a synchronized map still does not make check-then-act sequences
    atomic, and ordering, duplicate policy and iteration cost differ per type.'
  recommended_answer: 'The disciplined approach is to write down the semantic requirements first: does order matter and which
    order (insertion, sorted, access)? Are duplicates legal? Is lookup by key or by position? Who mutates it and from how
    many threads? Then map requirements to types: ArrayList preserves insertion order and duplicates with O(1) positional
    access; LinkedHashMap gives keyed lookup with deterministic iteration, which matters for reproducible test output; TreeMap
    trades O(log n) operations for sorted traversal; ConcurrentHashMap provides lock-striped thread-safe access and atomic
    compute/merge methods.

    The critical trade-off to articulate is that a thread-safe collection does not make compound operations atomic. `if (!map.containsKey(k))
    map.put(k, v)` is a race even on ConcurrentHashMap; the atomic form is putIfAbsent or computeIfAbsent. Similarly, iterating
    while another thread mutates has different contracts: ConcurrentHashMap iterators are weakly consistent, while Collections.synchronizedMap
    iteration must be manually synchronized or it throws ConcurrentModificationException.

    In automation frameworks, a common pattern is to build results concurrently in a ConcurrentHashMap, then expose an immutable
    snapshot (Map.copyOf) to reporting code, which makes ownership and mutation boundaries explicit.'
  deep_dive: ''
  key_points:
  - Model sequence and keyed lookup as separate requirements.
  - ArrayList, LinkedHashMap, ConcurrentHashMap and immutable snapshots serve different semantics.
  - Define duplicate-key and ordering behavior explicitly.
  - Thread safety of a collection does not make compound operations atomic.
  strong_signals:
  - Asks about ordering, duplicates and mutation ownership before naming a type.
  - Distinguishes weakly consistent iteration from fail-fast iteration.
  - Names putIfAbsent/computeIfAbsent as the atomic forms of check-then-act.
  weak_signals:
  - Defaults to HashMap/ArrayList for everything and reasons only about "speed".
  - Says "use synchronized" without identifying which compound operation is racy.
  red_flags:
  - Claims ConcurrentHashMap makes any sequence of calls on it thread-safe.
  - Cannot explain why LinkedHashMap iteration order matters for reproducible tests.
  common_mistakes:
  - Using Vector or Hashtable in new code because they are "thread-safe".
  - Sorting a HashMap's entrySet on every access instead of choosing TreeMap.
  - Sharing a mutable collection between test threads and the reporter without a snapshot.
  follow_ups:
  - question: Show how you would make a read-modify-write operation atomic without locking the entire application.
    recommended_answer: 'Use the collection''s atomic primitives: compute(key, fn) applies the mutation under the map''s internal
      fine-grained locking; merge(key, delta, Long::sum) is the atomic counter idiom. For multi-key invariants that a single
      map method cannot cover, confine the state to one owner thread or guard just that state with a dedicated small lock
      object — never the whole service. AtomicReference with a compare-and-set loop is the lock-free alternative for single-reference
      state.'
  examples: []
  code_examples:
  - '// Race even on a concurrent map:

    if (!results.containsKey(testId)) { results.put(testId, outcome); }

    // Atomic equivalents:

    results.putIfAbsent(testId, outcome);

    results.computeIfAbsent(testId, id -> expensiveOutcome(id));'
