- id: gold-java-004
  domain: java
  subdomain: streams-lambdas
  title: Deciding when a Stream pipeline should stay
  level: intermediate
  priority: P1
  frequency: common
  question: A Stream pipeline is concise but difficult to debug and performs side effects. How would you decide whether to
    keep it, refactor it, or replace it with an explicit loop?
  concise_answer: 'Keep a stream when it is a pure transformation — map/filter/collect over a source with no side effects
    — because intent is declarative and testable. Refactor when the pipeline mixes transformation with side effects (forEach
    mutating external state, peek used for logic) by extracting named methods or moving accumulation into a collector. Replace
    with a loop when control flow dominates: early exits with complex conditions, checked exceptions, index-coupled logic,
    or when debugging visibility matters more than concision. Parallel streams need measured evidence, never assumption.'
  recommended_answer: 'The Stream API''s contract assumes behavioral parameters are non-interfering and mostly stateless;
    side effects inside map/filter are explicitly discouraged by the java.util.stream package documentation. That gives an
    objective test: if removing the side effect breaks the pipeline''s result, the code is a loop wearing stream syntax.

    Decision criteria in review: (1) Purity — pure transformations stay; side-effecting pipelines get refactored so mutation
    happens in the terminal operation or, better, in a Collector. (2) Readability — a pipeline whose lambdas exceed a few
    lines should have them extracted to named private methods so the pipeline reads as a sentence. (3) Debuggability — if
    developers routinely need breakpoints inside the pipeline, an explicit loop with local variables is more honest. (4) Exceptions
    — checked exceptions inside lambdas force wrappers that obscure intent; loops handle them naturally. (5) Performance —
    parallelStream() changes ordering guarantees, uses the common ForkJoinPool, and only pays for large, CPU-bound, splittable
    workloads; switching it on without a measurement is a defect, not an optimization.'
  deep_dive: ''
  key_points:
  - Streams suit declarative transformations.
  - Side effects and hidden mutable state make pipelines fragile.
  - Readability and observability outweigh line-count reduction.
  - Parallel streams require evidence, not assumption.
  strong_signals:
  - Uses the non-interference/statelessness contract as the review criterion.
  - Extracts lambdas to named methods before abandoning the pipeline.
  - States concrete conditions under which parallelStream is even a candidate.
  weak_signals:
  - Argues purely on style preference ("streams are modern") without behavioral criteria.
  - Treats peek as a legitimate place for business logic.
  red_flags:
  - Unaware that side effects in intermediate operations are contract violations.
  - Would parallelize by default "because more threads are faster".
  common_mistakes:
  - Collecting to a list only to iterate it again immediately with a loop.
  - Using forEach with external mutation instead of collect/reduce.
  - Ignoring that streams cannot be reused after a terminal operation.
  follow_ups:
  - question: What specific risks appear when the same pipeline is changed to parallelStream()?
    recommended_answer: 'Interference and ordering: side-effecting lambdas now race on shared state; forEach loses encounter
      order (forEachOrdered restores it at a cost); non-associative reductions produce wrong results silently. Operationally,
      the work runs on the shared common ForkJoinPool, so a blocking call inside the pipeline can starve every other parallel
      stream in the JVM. Ordering-dependent collectors, stateful lambdas and small workloads typically make the parallel version
      slower, so the change requires a benchmark and a review of every lambda for shared state.'
  examples: []
  code_examples:
  - '// Fragile: side effect inside map, shared list mutation

    List<Result> out = new ArrayList<>();

    ids.stream().map(id -> { out.add(fetch(id)); return id; }).count();

    // Honest equivalent:

    List<Result> out = ids.stream().map(this::fetch).collect(Collectors.toList());'
