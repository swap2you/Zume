- id: gold-java-006
  domain: java
  subdomain: jvm-memory-gc
  title: Separating leaks from retention in a slowing regression suite
  level: advanced
  priority: P2
  frequency: occasional
  question: A long regression suite slows over time and eventually fails with memory pressure. Explain how you would separate
    a real application leak, test-framework retention, browser-process growth and normal GC behavior.
  concise_answer: 'Instrument first: collect JVM heap and GC metrics, OS-level process memory for the test JVM and every browser/driver
    process, over the suite''s lifetime. A real application leak shows monotonic old-generation growth in the application
    JVM after full GCs; test-framework retention shows the same curve in the test JVM, usually dominated by listeners, screenshots,
    response bodies or static caches in a heap dump; browser growth appears in chrome/driver RSS while both JVMs stay flat;
    normal GC shows a sawtooth that returns to a stable floor. The heap dump''s dominator tree distinguishes the second case
    precisely.'
  recommended_answer: 'The mistake to avoid is concluding "memory leak" from wall-clock slowdown alone. The investigation:
    (1) Trend the data — enable GC logging (-Xlog:gc*) and record heap-after-full-GC over time. A flat post-GC floor with
    rising pause frequency is a throughput problem, not a leak. A rising floor is retention. (2) Attribute the process — suites
    commonly conflate the test JVM, the application under test and a fleet of browser processes. Per-process RSS over time
    tells you which one grows. (3) For JVM retention, take two heap dumps far apart and compare dominators: typical test-framework
    culprits are result listeners accumulating every response body, screenshot byte arrays referenced by report objects, static
    Map caches keyed by test ID that are never cleared, and ThreadLocals holding drivers after their test ended. (4) Browser
    growth means sessions are not truly quit (driver.quit versus close), or a single long-lived session accumulates tabs/service
    workers; recycling sessions every N tests bounds it. (5) Only after attribution do you tune GC or raise heap — raising
    -Xmx to hide framework retention just delays the failure and lengthens pauses.'
  deep_dive: ''
  key_points:
  - Collect heap, process and browser metrics over time before hypothesizing.
  - Inspect dominators and retained references in comparative heap dumps.
  - Check listeners, screenshots, response bodies, static caches and ThreadLocal cleanup.
  - Correlate GC pauses with throughput rather than assuming GC is the root cause.
  strong_signals:
  - Separates the three process families (test JVM, app JVM, browsers) before analysis.
  - Uses heap-after-full-GC trend, not instantaneous usage, as the leak criterion.
  - Names concrete framework retention culprits from experience.
  weak_signals:
  - First move is raising -Xmx or forcing System.gc().
  - Talks about GC algorithms without any attribution methodology.
  red_flags:
  - Cannot distinguish a leak from normal sawtooth heap behavior.
  - Blames "Selenium being leaky" with no process-level evidence.
  common_mistakes:
  - Reading Task Manager totals instead of per-process trends.
  - Keeping every screenshot in memory until suite end for the report.
  - Never calling driver.quit in failure paths, leaking browser processes.
  follow_ups:
  - question: Which artifacts would you capture in CI before increasing heap size?
    recommended_answer: GC logs for the full run, heap-after-full-GC trend extracted into the report, two heap dumps (mid-run
      and near-failure, HeapDumpOnOutOfMemoryError as the safety net), per-process RSS samples for JVMs and browsers, thread
      dump at peak, and the count of live driver sessions versus completed tests. With those, the "raise heap" decision becomes
      a reviewable engineering change instead of a guess — and most of the time the dominator tree makes it unnecessary.
