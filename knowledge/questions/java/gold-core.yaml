- id: gold-java-005
  domain: java
  subdomain: concurrency
  title: Wrong driver/data in parallel tests — ownership diagnosis
  level: advanced
  priority: P1
  frequency: common
  question: A parallel test framework occasionally assigns the wrong driver and test data to a test. Diagnose the likely concurrency
    design errors and propose a safer ownership model.
  concise_answer: 'The classic causes are shared static mutable state — a static WebDriver field or a singleton "TestContext"
    written by every thread — and ThreadLocal used without cleanup or across thread handoffs. The safer model is explicit
    per-test ownership: the execution unit (test instance or fixture) creates or receives its own driver and data context
    as immutable references, passes them explicitly, and tears them down in a finally/fixture hook. Logs must carry test ID
    and thread identity so any future cross-contamination is observable rather than mysterious.'
  recommended_answer: 'Diagnosis starts from the symptom: "occasionally wrong assignment" means state is keyed on something
    with wider scope than the test. The usual suspects, in order: (1) static mutable fields (static driver, static current-user)
    that every thread writes; (2) a ThreadLocal that is populated in a listener but never removed, so a pooled worker thread
    reuses the previous test''s driver when the framework reuses threads; (3) async callbacks or parallel data providers that
    run continuation work on a different thread than the one that owns the ThreadLocal; (4) test-instance sharing, e.g. one
    class instance running methods in parallel with instance fields.

    The ownership model that removes the class of defects: create driver and data in the narrowest scope that needs them,
    hold them in effectively final locals or final fields of a per-test object, inject them explicitly into collaborators
    (page objects take the driver in the constructor), and guarantee cleanup in the same scope that created them. Configuration
    should be immutable snapshots, so no thread can observe a half-updated capability set. If ThreadLocal remains (it is legitimate
    for per-thread caches), pair every set() with remove() in a finally block and never assume it crosses an async boundary.

    Finally, make contamination detectable: correlation IDs per test, thread name and session ID in every log line, and an
    assertion at test start that the context is empty. That converts a heisenbug into a deterministic failure.'
  deep_dive: ''
  key_points:
  - Shared static mutable state is a primary suspect.
  - Use per-test/per-thread scoped context carefully.
  - ThreadLocal requires cleanup and does not survive async handoff automatically.
  - Prefer explicit ownership and immutable configuration.
  - Capture correlation IDs and thread/test identity in logs.
  strong_signals:
  - Immediately asks how drivers and context are scoped and who writes them.
  - Knows thread pools reuse threads, making stale ThreadLocals a contamination vector.
  - Proposes constructor injection of the driver into page objects over static access.
  weak_signals:
  - Proposes "add synchronized" without identifying the shared state.
  - Treats ThreadLocal as a magic fix without a cleanup story.
  red_flags:
  - Wants to serialize the whole suite as the permanent fix.
  - Cannot explain why a listener-populated ThreadLocal leaks across tests.
  common_mistakes:
  - Static driver field "for convenience" in a base test class.
  - ThreadLocal.set without remove in frameworks that pool threads.
  - Mutable global capability maps mutated per test.
  follow_ups:
  - question: How would virtual threads affect this design, and which ThreadLocal assumptions would you re-evaluate?
    recommended_answer: 'Virtual threads (JEP 444) make thread-per-test cheap, which strengthens the one-owner-per-thread
      model: no pooling means no stale ThreadLocal reuse. But ThreadLocal becomes costlier and more error-prone at millions
      of threads, and thread identity is no longer a stable correlation key across a task''s lifetime if work moves between
      virtual threads. The re-evaluation: prefer explicit context passing or scoped values (JEP 506 finalized scoped values
      in JDK 25) over ThreadLocal, and verify third-party pooling assumptions — pinning and synchronized-block behavior —
      with measurements on the actual JDK version.'
