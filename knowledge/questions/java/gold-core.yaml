- id: gold-java-003
  domain: java
  subdomain: exceptions
  title: Exception translation boundaries in automation frameworks
  level: intermediate
  priority: P1
  frequency: common
  question: Where should an automation framework translate low-level exceptions into domain-specific failures, and what information
    must be preserved?
  concise_answer: 'Translation belongs at ownership boundaries — where a layer stops being responsible for the mechanics and
    starts reporting meaning: the HTTP client wrapper, the page or component object, the database access helper. Each translation
    must wrap, not replace, the original: keep the cause chain, the operation being attempted, the identifying input (request
    ID, locator, SQL statement key) and environment evidence. The failure taxonomy should distinguish assertion failures,
    infrastructure failures, test-data failures and programming defects, because each routes to a different owner.'
  recommended_answer: 'A useful rule: translate an exception exactly once, at the boundary where the abstraction changes.
    Inside a REST client adapter, an IOException or a 503 becomes an InfrastructureFailure("payments API unreachable", cause)
    carrying method, URL, correlation ID and elapsed time. Inside a page component, a NoSuchElementException becomes a UiStateFailure
    naming the intended user action and the awaited condition. Above that boundary, code reasons in domain vocabulary only.

    What must be preserved: the complete cause chain (initCause/constructor cause — never log-and-swallow), the operation
    identity, the specific inputs needed to reproduce (sanitized), and the environment evidence a triager needs — screenshot
    reference, response body location, host/build identifiers. What must be avoided: broad `catch (Exception e) { log(e);
    }` blocks that convert every failure class into a passed-over log line, and rethrowing raw driver exceptions to the test
    layer where they read as noise.

    Classifying failures into assertion (product defect candidate), infrastructure, test-data and framework-defect categories
    is what lets reporting route each failure to the right owner rather than a single triage queue.'
  deep_dive: ''
  key_points:
  - Translate at an ownership boundary, exactly once.
  - Preserve original cause, operation, input identity and environment evidence.
  - Avoid broad catch-and-log patterns.
  - Distinguish assertion, infrastructure, test-data and programming-defect failures.
  strong_signals:
  - Names concrete boundaries (client adapter, page object, data helper) rather than "everywhere".
  - Insists on cause-chain preservation and gives the constructor-cause idiom.
  - Connects the failure taxonomy to triage ownership and reporting.
  weak_signals:
  - Talks only about checked-versus-unchecked without addressing where translation happens.
  - Preserves the message but discards the cause and stack.
  red_flags:
  - Advocates catching Throwable centrally so the suite "never crashes".
  - Cannot explain the difference between a test failure and a framework defect.
  common_mistakes:
  - Double-translating so the report shows three nested wrappers with the same text.
  - Losing the response body or SQL key that would have made the failure reproducible.
  - Encoding retry decisions in string-matching on exception messages.
  follow_ups:
  - question: How should retryable failures differ from non-retryable failures in the exception model?
    recommended_answer: 'Retryability is a property of the failure type, not of a message. Model it explicitly — an interface
      or a field on the framework''s failure hierarchy — set at translation time where context is known: a connection reset
      or a 503 with Retry-After is retryable; an assertion failure or a 400 contract violation is not. The retry executor
      then consults the type, honors bounded attempts and backoff, and records every retry in the result so the report shows
      first-failure evidence and retry count instead of silently absorbing them.'
