- id: gold-java-001
  domain: java
  subdomain: equals-hashcode
  title: Mutable HashMap keys and the equals/hashCode contract
  level: basic
  priority: P0
  frequency: very_common
  question: A value object is used as a HashMap key. Explain the equals/hashCode contract and what breaks when fields used
    by that contract are mutated after insertion.
  concise_answer: The contract requires that equal objects return equal hash codes and that hashCode stays consistent while
    the object is unchanged. HashMap stores an entry in a bucket derived from the key's hash at insertion time. If a field
    used by equals/hashCode is mutated afterwards, the recomputed hash points at a different bucket, so get() with an equal
    key misses the entry even though it is still in the map. The fix is to make key state immutable (or key only on immutable
    fields) and to test retrieval with a separate, equal instance rather than the same reference.
  recommended_answer: 'java.lang.Object defines the contract: equals must be reflexive, symmetric, transitive and consistent,
    and any two objects that are equal must return the same hashCode. Hash-based collections rely on both parts in sequence
    — first the hash selects a bucket, then equals identifies the entry within it.

    When a key is inserted, HashMap records it in the bucket for its current hash value. The map never re-hashes an entry
    because a key object changed. If code later mutates a field that participates in hashCode, the logical identity of the
    key moves but its stored bucket does not. A lookup with an equal key computes the new hash, walks the wrong bucket, and
    returns null; containsKey reports false; the entry is effectively orphaned and can even be "re-added", creating two entries
    that are equal to each other.

    The design remedy is to make the key type immutable — final fields, no setters for identity state — or to base equals/hashCode
    only on fields that never change (for example a database identifier assigned once). In test code, retrieval should always
    be asserted with a newly constructed equal instance; asserting with the same reference hides exactly this defect class.'
  deep_dive: ''
  key_points:
  - Equal objects must return equal hash codes.
  - Hash collections use the hash to pick a bucket, then equals within the bucket.
  - Mutating key fields moves the logical key without moving its stored bucket.
  - Prefer immutable key state and test retrieval with a separate equal instance.
  strong_signals:
  - States both halves of the contract and the bucket-then-equals lookup sequence unprompted.
  - Explains that the map stores the hash at insertion and never re-buckets a mutated key.
  - Proposes immutability or identity-only keys as the structural fix, not a workaround.
  - Mentions testing lookups with a distinct equal instance.
  weak_signals:
  - Recites "override both equals and hashCode" without explaining why lookups fail.
  - Believes calling put() again "fixes" the map without recognizing the duplicate entry.
  red_flags:
  - Claims HashMap compares every key with equals, ignoring hashing entirely.
  - Suggests overriding equals only, or hashCode returning a constant, as acceptable.
  common_mistakes:
  - Hashing on all fields of a mutable JavaBean because the IDE generated it that way.
  - Using the same object reference in test assertions, which masks the moved-bucket defect.
  - Assuming HashSet behaves differently from HashMap keys (it is a HashMap underneath).
  follow_ups:
  - question: How would records change the implementation, and what risks remain if a record contains mutable components?
    recommended_answer: 'A record generates equals/hashCode from all components and makes the component references final,
      which removes accidental setter mutation and boilerplate errors. The residual risk is a mutable component type: if a
      record holds a List or a Date and code mutates that object''s content, the reference is unchanged but its hash contribution
      changes, recreating the moved-bucket problem. The remedy is defensive copying in the canonical constructor (for example
      List.copyOf) and choosing immutable component types.'
  - question: Independence check — without an IDE, what would your test for this defect look like?
    recommended_answer: 'Insert the key, mutate the identity field, then assert three things: get with an equal fresh instance
      returns null (documents the defect), containsKey with the original reference is false, and the map size after re-put
      is 2. A candidate who can write that sequence has actually understood the bucket mechanics rather than memorized the
      rule.'
  examples:
  - An Employee(id, department) key hashed on both fields is inserted, then employee.setDepartment("QA") runs. map.get(new
    Employee(7, "QA")) computes the new hash, checks the wrong bucket and returns null, while the stale entry still occupies
    the old bucket.
  code_examples:
  - 'Map<Employee, Badge> badges = new HashMap<>();

    Employee e = new Employee(7, "Engineering");

    badges.put(e, badge);

    e.setDepartment("QA");                    // field participates in hashCode

    badges.get(new Employee(7, "QA"));        // null — new hash, wrong bucket

    badges.containsKey(e);                    // false — same reference, new hash'
