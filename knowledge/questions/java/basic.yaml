- id: java-b1
  domain: java
  subdomain: equals-hashcode
  title: Object equality and hash collections
  level: basic
  priority: P0
  frequency: very_common
  question: A value object is used as a HashMap key. Explain identity versus logical equality, and the
    contract its equality methods must keep.
  concise_answer: Reference identity answers whether two variables point to the same object; logical equality
    answers whether their values represent the same thing. Equal keys must produce the same hash code,
    otherwise a hash collection can place an equal key in a different bucket and fail to find it.
  recommended_answer: Use identity only when object instance ownership matters. For a value object, implement
    equality from the stable fields that define its value and implement hashCode from the same fields.
    Verify behavior by inserting one equal instance into a HashMap or HashSet and retrieving it with another;
    do not mutate fields used by equality while the object is a key.
  deep_dive: Probe for a concrete Java example, competing constraints, and evidence that would change
    the candidate's decision.
  key_points:
  - identity differs from logical equality
  - equal objects require equal hash codes
  - key fields must remain stable
