- id: java-b2
  domain: java
  subdomain: exceptions
  title: Exception boundaries and context
  level: basic
  priority: P0
  frequency: very_common
  question: How would you decide whether an API should expose a checked exception, an unchecked exception,
    or a domain-specific wrapper?
  concise_answer: Choose an exception boundary based on what the caller can realistically recover from,
    not merely the exception's origin. A domain wrapper can preserve useful context while keeping low-level
    implementation details from leaking across the boundary.
  recommended_answer: Identify the recovery action at the call site. Propagate or model a recoverable
    condition deliberately, use unchecked exceptions for violated programming contracts or unrecoverable
    invariants, and wrap infrastructure errors only when the wrapper adds domain context and retains the
    cause. Avoid broad catch blocks that erase evidence; log or translate at the boundary that owns the
    response.
  deep_dive: Probe for a concrete Java example, competing constraints, and evidence that would change
    the candidate's decision.
  key_points:
  - caller recovery drives the boundary
  - preserve cause and context
  - do not swallow exceptions
