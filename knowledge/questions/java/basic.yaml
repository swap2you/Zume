- id: java-b3
  domain: java
  subdomain: collections
  title: Choosing collection semantics
  level: basic
  priority: P0
  frequency: very_common
  question: A test needs ordered iteration, duplicate values, and frequent lookup by a business key. How
    would you choose and combine Java collections?
  concise_answer: A List preserves sequence and permits duplicates, while a Map supports keyed lookup;
    neither is a universal substitute for the other. Model the required semantics explicitly, often using
    a list for ordered input and a map when fast keyed access is independently needed.
  recommended_answer: 'Start from operations: ordered traversal, duplicate handling, and key lookup. Use
    an ArrayList for ordered records where indexed access is useful, and build a HashMap keyed by a stable
    unique identifier when average constant-time lookup matters. State duplicate-key behavior explicitly
    rather than silently overwriting it, and choose LinkedHashMap only when map iteration order is also
    a requirement.'
  deep_dive: Probe for a concrete Java example, competing constraints, and evidence that would change
    the candidate's decision.
  key_points:
  - select by operations and semantics
  - define duplicate-key behavior
  - avoid linear search when a key is available
