- id: gold-ai-001
  domain: llm-engineering
  subdomain: grounding-citations
  title: Preventing fabricated or mismatched citations in a grounded answer system
  level: intermediate
  priority: P0
  frequency: common
  question: Design a grounded answer system that must cite sources. How do you prevent a fluent answer with fabricated or
    mismatched citations?
  concise_answer: Retrieve source chunks with stable, traceable IDs, force the model to bind each claim to a retrieved chunk
    ID rather than generating a citation string from memory, and validate after generation that every cited ID actually exists
    in the retrieved set and that the cited passage actually supports the claim near it. Require the model to abstain or hedge
    when retrieval confidence is low instead of answering fluently with no support, and score citation completeness (every
    non-trivial claim has a citation) separately from citation correctness (the cited source actually supports the claim)
    — a fluent answer can score well on one and fail the other.
  recommended_answer: 'The failure mode is that a language model is fluent at producing citation-shaped text regardless of
    whether it retrieved anything relevant, so citation formatting is not evidence of grounding. The structural fix is to
    make the citation mechanism impossible to fabricate: retrieve chunks with stable identifiers (document ID plus offset
    or section anchor) before generation, pass only those identifiers to the model as the allowed citation vocabulary, and
    instruct — or better, constrain via a structured output schema — the model to attach one or more of those exact IDs to
    each claim rather than free-text source names or URLs it could invent.

    After generation, validate mechanically: every citation ID in the answer must appear in the retrieved set (catches outright
    fabrication), and a separate check — either an embedding-similarity or a smaller LLM-as-judge pass — verifies the cited
    chunk actually entails the adjacent claim (catches a real citation attached to the wrong claim, which is a subtler and
    more common failure than outright invention). When retrieval returns nothing sufficiently relevant, the system should
    be instructed and evaluated on abstaining or explicitly flagging insufficient evidence rather than answering fluently
    from parametric knowledge — a confident wrong answer with a plausible-looking citation is worse for a grounded system
    than a stated ''I don''t have enough information.''

    Evaluate citation completeness and citation correctness as two separate metrics: an answer can cite everything (complete)
    while citing the wrong passages (incorrect), or cite one strong source correctly while leaving other claims unsupported.
    Treating ''has citations'' as a single pass/fail signal hides both failure modes.'
  deep_dive: ''
  key_points:
  - Retrieve traceable source chunks with stable identifiers before generation.
  - Bind claims to source IDs from a constrained, retrieved vocabulary — not free-text citations the model can invent.
  - Validate citation IDs exist in the retrieved set and that the cited passage supports the claim.
  - Require abstention when retrieval confidence or coverage is insufficient.
  - Evaluate citation completeness and citation correctness as separate metrics.
  strong_signals:
  - Proposes constraining citations to a retrieved-ID vocabulary rather than trusting free-text citation output.
  - Separates completeness and correctness as distinct, independently measured properties.
  - Designs an explicit abstention path for low-confidence retrieval.
  weak_signals:
  - Believes prompting the model to 'always cite sources' is sufficient without mechanical validation.
  - Treats 'the answer contains a citation' as proof the answer is grounded.
  red_flags:
  - No plan to verify that a cited source actually supports the adjacent claim.
  - Assumes retrieval always returns relevant content and never designs for the empty/low-relevance case.
  common_mistakes:
  - Letting the model generate citation text (titles, URLs) instead of picking from retrieved IDs.
  - Checking only that a citation exists, not that it entails the claim next to it.
  - Skipping an abstention path, so weak retrieval still produces a fluent, unsupported answer.
  follow_ups:
  - question: How would you score citation completeness and citation correctness?
    recommended_answer: 'Completeness: for every extracted, non-trivial claim in the answer, check whether at least one citation
      is attached — a simple coverage ratio over claims. Correctness: for every attached citation, check whether the cited
      chunk''s content entails or directly supports the specific claim it is attached to, using either human review on a sample
      or an automated entailment/LLM-judge check calibrated against human labels. Report both numbers separately in evaluation
      dashboards; a system can be complete but incorrect (confidently wrong with citations) or correct but incomplete (a few
      well-supported claims among many unsupported ones), and only reporting one hides the other failure mode.'
  examples:
  - A support assistant answers a refund-policy question fluently and cites 'Refund Policy section 4.2,' but retrieval only
    returned the shipping policy document. Because the citation vocabulary was free text generated by the model rather than
    constrained to retrieved chunk IDs, the fabricated section reference passes a naive 'has a citation' check while being
    entirely unsupported.
