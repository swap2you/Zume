- id: gold-ai-002
  domain: llm-engineering
  subdomain: structured-output
  title: Prompt-only JSON versus JSON mode versus schema-constrained output
  level: intermediate
  priority: P0
  frequency: common
  question: An LLM must return a typed decision object. Compare prompt-only JSON, JSON mode and schema-constrained structured
    output.
  concise_answer: Prompt-only JSON ('respond in JSON') is the least reliable — the model can add prose, use inconsistent field
    names, or produce invalid JSON, and reliability degrades under schema complexity. JSON mode guarantees syntactically valid
    JSON but not that it matches any particular shape. Schema-constrained structured output (a supplied JSON Schema with strict
    mode) constrains decoding so the output is guaranteed to match the schema's types and required fields. None of the three
    guarantees semantic correctness — a schema-valid object can still contain a wrong or hallucinated value — so business-rule
    validation after parsing is required regardless of which mode is used.
  recommended_answer: 'The three approaches trade reliability for constraint at increasing levels of guarantee. Prompt-only
    JSON relies entirely on instruction-following: the model may wrap the object in explanatory prose, omit a field, invent
    extra fields, or emit almost-valid JSON (trailing commas, unescaped quotes) that a naive parser rejects. It is the most
    fragile option and the failure mode is often silent until a parse exception in production.

    JSON mode (a model-level flag that constrains decoding to always produce syntactically valid JSON) removes the parse-failure
    class entirely, but the shape of the object is still unconstrained — the model can still return valid JSON with the wrong
    keys, wrong types, or a completely different structure than expected, especially as the schema grows more complex or the
    model runs many turns.

    Schema-constrained structured output goes further: providing a JSON Schema (with strict mode where the provider supports
    it) constrains the decoding process itself so every generated token is checked against the schema''s grammar, guaranteeing
    required fields, correct types, and no additional properties. This removes an entire class of integration bugs — parsing
    exceptions and shape mismatches — and is the right default for any pipeline that hands the object directly to typed business
    logic.

    What none of the three modes guarantees is semantic correctness: a schema-valid decision object can still contain a wrong
    enum value, an internally inconsistent combination of fields, or a hallucinated identifier that happens to be the right
    type. Business logic must still validate the values — does this ID exist, is this combination of fields legal, is this
    decision within allowed bounds — treating the model''s output the same way it would treat any untrusted external input.
    Refusals, truncated output on token limits, and provider schema-version changes also need explicit handling; a schema-constrained
    call can still fail closed if the schema itself is malformed or the request is refused for policy reasons.'
  deep_dive: ''
  key_points:
  - Prompt-only JSON output is fragile and fails silently on shape and validity.
  - JSON mode guarantees syntactic validity but not schema shape.
  - Schema-constrained structured output guarantees shape (types, required fields) via constrained decoding.
  - Semantic/business-rule validation is still required after parsing regardless of mode.
  - Handle refusals, truncation and provider schema-version changes explicitly.
  strong_signals:
  - Explains that schema constraint is enforced at decode time, not just via a stronger prompt.
  - Distinguishes syntactic validity (JSON mode) from shape validity (schema-constrained).
  - Insists on business-rule/semantic validation after parsing regardless of the mode used.
  weak_signals:
  - Believes a strongly worded prompt is as reliable as schema constraint.
  - Assumes schema-valid output means the values are trustworthy.
  red_flags:
  - Passes model output directly into business logic with no validation layer at all.
  - Cannot explain any failure mode of prompt-only JSON beyond 'sometimes it's wrong.'
  common_mistakes:
  - Parsing with a permissive/lenient JSON parser that hides malformed output instead of surfacing it.
  - Skipping enum/range/business-rule validation because 'the schema already enforces it.'
  - Not handling model refusals or max-token truncation as a distinct failure path.
  follow_ups:
  - question: Which validation belongs before the object reaches business logic?
    recommended_answer: 'Parse and confirm schema conformance defensively even when the provider claims strict mode (defense
      in depth against provider bugs or version drift), then run semantic checks: referenced IDs exist, enum values are within
      the currently valid set (which can change independently of the schema), numeric fields are within business-legal ranges,
      and any cross-field invariants hold (for example, an ''approved'' decision cannot carry a ''blocked'' risk level). Only
      an object that passes both layers should reach code that acts on it irreversibly.'
  examples: []
  code_examples:
  - "// Schema-constrained request (illustrative)\n{\n  \"response_format\": {\n    \"type\": \"json_schema\",\n    \"json_schema\"\
    : {\n      \"name\": \"decision\",\n      \"strict\": true,\n      \"schema\": {\n        \"type\": \"object\",\n    \
    \    \"properties\": {\n          \"approved\": {\"type\": \"boolean\"},\n          \"riskLevel\": {\"type\": \"string\"\
    , \"enum\": [\"low\", \"medium\", \"high\"]}\n        },\n        \"required\": [\"approved\", \"riskLevel\"],\n     \
    \   \"additionalProperties\": false\n      }\n    }\n  }\n}"
