  domain: qa-strategy-governance
  subdomain: prioritization
  title: 'Prioritization: basic decision'
  level: basic
  priority: P3
  frequency: common
  question: How would you explain the trade-off behind prioritization without relying on jargon?
  concise_answer: Prioritization should be applied to a stated outcome, observable evidence, and known
    constraints; using it as a ritual is not enough. In QA strategy, metrics, management, and governance,
    validate both the intended result and the meaningful negative or failure path before treating it as
    reliable.
  recommended_answer: Start by naming the decision that prioritization supports and the invariant it must
    preserve. Choose the smallest mechanism that exposes inputs, outputs, failures, and ownership; then
    test representative normal, boundary, and failure cases. Explain the trade-off rather than claiming
    a single universal pattern, and use telemetry or review evidence to revise the design when reality
    differs.
  deep_dive: Probe for a concrete QA strategy, metrics, management, and governance example, competing
    constraints, and evidence that would change the candidate's decision.
  key_points:
  - states an invariant
  - uses evidence
  - names trade-offs
  strong_signals:
  - distinguishes symptom from root cause
  - defines a bounded validation strategy
  weak_signals:
  - recites a tool feature without a decision context
  red_flags:
  - claims a pattern is universally correct
  - hides or ignores failure evidence
  common_mistakes:
  - testing only a happy path
  - confusing activity with outcome
  follow_ups: []
  examples:
  - Use a small, representative prioritization case before generalizing.
  role_tracks:
  - QA Manager
  - Quality Engineering Manager
  - Quality Engineering Lead
  years_range:
  - 1
  - 8
