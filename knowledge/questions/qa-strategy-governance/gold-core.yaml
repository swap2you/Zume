- id: gold-lead-002
  domain: qa-strategy-governance
  subdomain: metrics
  title: Choosing quality-engineering metrics that resist gaming
  level: advanced
  priority: P0
  frequency: very_common
  question: Choose a small set of quality-engineering metrics and explain how each could be gamed or misinterpreted.
  concise_answer: 'Prefer outcome and flow metrics over raw test counts: escaped defects (with severity and root-cause context),
    change failure rate and time-to-restore for the pipeline as a whole, automation suite reliability (flaky rate, not just
    pass rate), and coverage expressed as risk covered rather than a percentage of lines. Every one of these can be gamed
    — escaped defects drop if triage reclassifies bugs as "enhancements," pass rate rises if flaky tests are quarantined and
    never fixed, coverage percentage rises from trivial assertions. The defense is pairing each metric with its narrative
    and never using a single number as an individual performance target.'
  recommended_answer: 'A small, defensible set: (1) escaped defect rate by severity, reviewed with root cause, not just counted;
    (2) DORA''s change failure rate and time-to-restore, because they measure the system''s actual safety net rather than
    test-suite size; (3) automation reliability — flaky-failure rate and mean time to fix a quarantined test — because a rising
    pass rate achieved by quarantining flaky tests is a regression wearing a disguise; (4) risk-weighted coverage, tied to
    a risk model rather than a line-coverage percentage that rewards trivial assertions.

    Each is gameable, and a good leader names how before publishing it: escaped-defect counts fall if triage relabels bugs
    as feature requests, or if reporting channels get harder to use; change-failure-rate improves if teams simply ship less;
    flaky-rate improves if flaky tests are deleted instead of fixed; coverage rises with tests that execute code without asserting
    behavior. DORA''s own guidance is explicit that these are *capability* metrics meant to describe a system, and using them
    as individual developer or tester performance targets invites exactly this gaming — a version of Goodhart''s Law where
    the measure stops representing the goal once it becomes the target of an incentive.

    The mitigation is structural: publish the metric with its known failure modes, review trend and narrative together in
    retros rather than a single number in isolation, and give metric ownership to a role who is accountable for investigating
    anomalies rather than defending the number.'
  deep_dive: ''
  key_points:
  - Outcome and flow metrics over raw test counts.
  - Escaped defects need severity and root-cause context, not a bare count.
  - Automation reliability (flaky rate) must be tracked alongside pass rate.
  - Coverage should be risk-weighted, not a line-percentage vanity metric.
  - Metric ownership and narrative prevent silent gaming.
  strong_signals:
  - Names the specific gaming failure mode for every metric proposed, unprompted.
  - Distinguishes capability metrics (describing a system) from individual performance targets.
  - Insists metrics ship with narrative/trend review, not a bare dashboard number.
  weak_signals:
  - Lists metrics with no discussion of how they could be gamed.
  - Treats test-count or pass-rate as sufficient quality signals on their own.
  red_flags:
  - Proposes using an easily-gamed metric (e.g., bug count) as an individual performance target.
  - Cannot describe Goodhart's Law or an equivalent gaming risk in their own words.
  common_mistakes:
  - Reporting pass rate without reporting flaky/quarantine rate alongside it.
  - Using raw test count as a proxy for coverage or quality.
  - Setting a single-number target with no owner accountable for investigating drift.
  follow_ups:
  - question: Which metric would you refuse to use as an individual performance target?
    recommended_answer: Escaped defect count tied to an individual tester or developer — it punishes the person who tests
      hardest and reports the most, and it creates an incentive to under-report or reclassify. The same logic applies to raw
      bug-count and to automation pass rate as individual targets; both push toward hiding problems rather than fixing them.
      Capability metrics belong to teams and systems; individual accountability should be based on behavior — did they investigate,
      disclose and fix — not on a number that a system, not a person, ultimately produces.
