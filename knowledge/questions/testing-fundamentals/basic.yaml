- id: testing-fundamentals-b-01
  domain: testing-fundamentals
  subdomain: testing-principles
  title: 'Testing Principles: basic decision'
  level: basic
  priority: P0
  frequency: very_common
  question: What problem does testing principles address, and what is its practical boundary?
  concise_answer: Testing Principles should be applied to a stated outcome, observable evidence, and known
    constraints; using it as a ritual is not enough. In Testing fundamentals and quality engineering,
    validate both the intended result and the meaningful negative or failure path before treating it as
    reliable.
  recommended_answer: Start by naming the decision that testing principles supports and the invariant
    it must preserve. Choose the smallest mechanism that exposes inputs, outputs, failures, and ownership;
    then test representative normal, boundary, and failure cases. Explain the trade-off rather than claiming
    a single universal pattern, and use telemetry or review evidence to revise the design when reality
    differs.
  deep_dive: Probe for a concrete Testing fundamentals and quality engineering example, competing constraints,
    and evidence that would change the candidate's decision.
  key_points:
  - states an invariant
  - uses evidence
  - names trade-offs
  strong_signals:
  - distinguishes symptom from root cause
  - defines a bounded validation strategy
  weak_signals:
  - recites a tool feature without a decision context
  red_flags:
  - claims a pattern is universally correct
  - hides or ignores failure evidence
  common_mistakes:
  - testing only a happy path
  - confusing activity with outcome
  follow_ups:
  - question: What evidence would make you revise your testing principles approach?
    recommended_answer: A repeatable failure, a violated invariant, or telemetry showing the design misses
      its stated outcome should trigger review. Reproduce the evidence, classify the scope, and change
      the smallest responsible layer.
  examples:
  - Use a small, representative testing principles case before generalizing.
