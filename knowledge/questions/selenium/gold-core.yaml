- id: gold-sel-004
  domain: selenium
  subdomain: grid-parallelism
  title: Designing driver and data ownership for parallel Grid execution
  level: advanced
  priority: P1
  frequency: common
  question: Design a parallel Selenium execution model for local and cloud grids. Cover driver ownership, capability construction,
    test data, artifact naming and cleanup.
  concise_answer: Give each parallel test execution context exactly one driver/session, created fresh from an immutable capability
    object built per test (never a shared mutable Capabilities/Options instance mutated in place), and injected explicitly
    rather than read from a static field. Test data must be unique per execution (generated or namespaced identifiers) so
    parallel tests never collide on the same record. Artifacts — screenshots, logs, videos — are named with a correlation
    ID (session ID plus test ID) so failures are traceable. Driver quit must run in a finally/fixture teardown that always
    executes, and the parallelism level must be bounded by both local machine capacity and the cloud vendor's concurrent-session
    quota.
  recommended_answer: 'Ownership: model "one driver per execution context" as an invariant enforced by the framework, not
    a convention — a fixture/extension creates the driver at test start and the same fixture is the only code that quits it.
    No static or shared driver field, because Grid tests routinely run on multiple threads/JVM-forks and a shared reference
    is a direct route to one test operating another test''s browser.

    Capability construction: build a fresh, immutable capabilities/options object per test from typed configuration (browser,
    version, platform, cloud-specific keys like build name and test name for reporting) rather than mutating one shared ChromeOptions
    instance across the suite — mutation from multiple threads is a race, and even single-threaded reuse risks leaking one
    test''s flags into another''s session.

    Test data: every parallel test must operate on data it does not share with any other concurrently running test — generate
    unique identifiers (order numbers, usernames) or partition a fixed dataset by worker index, and avoid tests that assert
    on global counts or shared fixture rows.

    Artifact naming and correlation: name every captured artifact with the WebDriver session ID and the test''s unique ID
    (not just a timestamp, which collides under parallelism), and log the same IDs on both the test-runner side and, where
    the cloud vendor exposes it, the session dashboard, so a failed test can be traced to its exact video/log without ambiguity.

    Cleanup and limits: quit the driver in a finally block or test-framework after-hook that runs even on failure/timeout,
    and cap concurrency to what the local machine or the grid/cloud plan can sustain — exceeding a vendor''s concurrent-session
    quota causes queuing or session-creation failures that look like flakiness but are a capacity-planning defect.'
  deep_dive: ''
  key_points:
  - One driver/session owner per test execution context.
  - Immutable capability creation per test, not a shared mutated object.
  - Unique test data and artifact correlation via session/test IDs.
  - Guaranteed quit in finally/fixture teardown.
  - Concurrency limits based on environment capacity and vendor quota.
  strong_signals:
  - Names "one driver per execution context" as an explicit invariant, not a convention.
  - Explains why mutating a shared Options object across tests is dangerous under parallelism.
  - Ties artifact naming to session ID + test ID specifically for traceability.
  weak_signals:
  - Discusses parallelism only in terms of thread count without addressing data isolation.
  - Assumes cloud grids have unlimited concurrent sessions.
  red_flags:
  - Proposes a static shared WebDriver field "to save setup time" across tests.
  - Has no plan for quit() running when a test times out or throws during setup.
  common_mistakes:
  - Naming screenshots only by timestamp, causing collisions or ambiguity under parallel runs.
  - Sharing one ChromeOptions instance and appending capabilities per test.
  - Not bounding parallelism to the grid's quota, causing session-creation failures.
  follow_ups:
  - question: How would you diagnose a failure that occurs only at 20-way parallelism?
    recommended_answer: 'First rule out resource exhaustion: check grid node/queue metrics and vendor concurrent-session limits
      at that parallelism level — a session queued or rejected looks like a random UI failure otherwise. Next check for shared-state
      contamination (static fields, ThreadLocal without cleanup, shared test data) correlated by thread/worker ID in logs.
      Finally check host resource pressure — CPU, memory, network — on the machine or grid node running that many browser
      processes, since real timing-sensitive UI bugs can also only manifest under CPU contention that stretches JavaScript
      execution and network round-trips.'
  examples: []
  code_examples:
  - "// Per-test, immutable capability construction (not a shared mutable Options field)\nChromeOptions options = new ChromeOptions();\n\
    options.setCapability(\"browserVersion\", \"stable\");\noptions.setCapability(\"selenoid:options\", Map.of(\n    \"name\"\
    , testId, \"sessionTimeout\", \"5m\"\n));\nWebDriver driver = new RemoteWebDriver(gridUrl, options);\ntry {\n    // test\
    \ steps, artifacts named with driver session id + testId\n} finally {\n    driver.quit();   // guaranteed, even on assertion\
    \ failure\n}"
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  - Test/Quality Architect
  - Solution Architect
  - Technical Architect
  years_range:
  - 6
  - 18
  tags:
