- id: gold-sel-005
  domain: selenium
  subdomain: flakiness
  title: Investigating a CI-only click interception before adding retries
  level: advanced
  priority: P0
  frequency: very_common
  question: A test passes locally and fails only in CI with click interception. Give a disciplined investigation sequence
    and explain why adding a retry is not the first fix.
  concise_answer: Start from the evidence a click-intercepted failure already carries — the exception reports the element
    that was actually at the click point, which is often an overlay, sticky header, or cookie banner rather than the intended
    target. Reproduce with the same browser/version, viewport size and network throttling CI uses, since CI headless viewports
    and slower rendering commonly expose timing/layout differences invisible locally. Only after identifying and fixing the
    causal condition — the real obstruction or a missing wait — does a bounded retry become a legitimate mitigation for genuinely
    transient cases; used first, a retry launders a real defect into a "flaky test" statistic and can hide a production UI
    regression.
  recommended_answer: 'The investigation sequence: (1) Read the exception itself — Selenium''s ElementClickInterceptedException
    reports the element actually receiving the click, which frequently names the real obstruction (a modal backdrop, a fixed-position
    header, a toast). (2) Pull the failure''s screenshot and DOM snapshot from CI artifacts to see the page state at the moment
    of failure, not a guess about it. (3) Check browser console and network logs for a slow-loading resource that delays layout
    stabilization only under CI''s typically slower/headless environment. (4) Reproduce locally using the exact CI browser
    version and viewport dimensions (CI runners are frequently headless with a different default viewport than a developer''s
    browser), and, if available, the same network throttling — many click interceptions only appear at a specific viewport
    width where an element overlaps. (5) Compare timing: CI machines are often slower/more contended, so a race that never
    surfaces locally (an animation finishing just before the click locally) loses the race in CI.

    Why retry-first is wrong: a bounded retry treats every failure as equally likely to be transient, but click interception
    is frequently deterministic given the same conditions — if a cookie-consent banner always renders on first page load in
    a region CI simulates and never locally, retrying doesn''t fix it; it either fails every retry (wasting CI time while
    reporting a confusing final state) or occasionally passes because the banner auto-dismisses, silently normalizing a real
    synchronization or UI defect into background noise. Fixing the causal condition — waiting for the banner''s invisibility,
    or fixing scroll-into-view behavior — removes the failure class entirely rather than papering over one instance of it.'
  deep_dive: ''
  key_points:
  - Inspect screenshot, DOM, browser console, network and timing evidence first.
  - Identify overlays, viewport, animations, stale state and environment differences.
  - Reproduce with CI's browser/version and viewport, not a local default.
  - Retries classify uncertainty but can hide real defects.
  - Fix the causal synchronization or application condition, not the symptom.
  strong_signals:
  - Reads the exception's reported obstructing element as the first diagnostic step.
  - Explicitly reproduces with CI's viewport/browser version rather than guessing.
  - 'Explains the harm of retry-first: normalizing a deterministic defect into noise.'
  weak_signals:
  - Jumps straight to "add a wait" without identifying what condition it should wait for.
  - Says "it's probably an environment difference" without naming which one to check.
  red_flags:
  - Proposes wrapping the click in a retry loop as the complete fix.
  - Has no plan to capture or examine screenshot/DOM evidence from the CI failure.
  common_mistakes:
  - Increasing a global implicit wait to "fix" a specific click-interception failure.
  - Not checking that CI runs headless with a different default viewport than local Chrome.
  - Treating one successful retry as proof the underlying condition was transient.
  follow_ups:
  - question: When is a bounded retry justified, and what telemetry must accompany it?
    recommended_answer: A retry is justified only for a classified, genuinely transient failure type — e.g. a network blip
      on a third-party resource unrelated to the assertion under test — after the deterministic causes above have been ruled
      out or fixed. It must be bounded (one or two attempts), scoped to a specific exception type rather than "any failure",
      and every retry must be recorded in the test report with the first-failure evidence preserved (screenshot, stack trace,
      retry count) so a rising retry rate for a given test is visible and triaged, rather than quietly absorbed into a green
      build.
  examples: []
