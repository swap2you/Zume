- id: gold-sel-003
  domain: selenium
  subdomain: page-components
  title: Where page objects end and tests begin
  level: intermediate
  priority: P1
  frequency: very_common
  question: Define the boundary between tests, page/component objects and assertions. What symptoms show that a page object
    has become a hidden test script?
  concise_answer: 'Page and component objects own UI mechanics — locators, waits, and meaningful user-facing actions (login(),
    addToCart()) — and expose state as typed accessors (isErrorDisplayed(), getLineItemCount()). Tests own scenario intent:
    which actions to call, in what order, and what the expected outcome is, expressed through assertions that live in the
    test, not the page object. A page object has become a hidden test script when it contains assertions, conditional branching
    on business rules, or multi-step workflows that encode a specific scenario rather than a reusable page capability — at
    that point a test failure inside the "page object" hides which scenario actually failed.'
  recommended_answer: 'The Page Object pattern''s intent, as described in Selenium''s own documentation, is to separate the
    "what" (test intent and expected outcomes) from the "how" (finding elements and driving the UI). A page object method
    should read as a user-facing capability — `checkout.applyPromoCode("SAVE10")` — and return either `this`/another page
    object for navigation, or plain data for the test to assert against. It should never call assert/verify internally, because
    that couples a specific expectation to every caller of that method and makes failures report from the wrong place in the
    stack.

    Component objects extend this to reusable regions — a table row, a modal, a nav bar — modeled once and composed into multiple
    pages, so a table''s sorting/paging behavior is written and fixed in one place instead of duplicated per page that embeds
    a table.

    Symptoms that a page object has drifted into being a test script: methods with names like `verifyOrderSubmittedSuccessfully()`
    that assert internally; `if/else` branches responding to business state (different behavior for guest vs logged-in checkout)
    baked into the object rather than expressed as two explicit test paths; long workflow methods that chain five unrelated
    actions into one call, so a single test failure can''t tell you which step broke; and page objects that accept and interpret
    test data (discount thresholds, expected totals) instead of the test computing and asserting on them. All of these push
    scenario logic below the layer where failures are diagnosable.'
  deep_dive: ''
  key_points:
  - Objects encapsulate UI mechanics and meaningful user-facing actions.
  - Tests own scenario intent and outcome assertions.
  - Component objects model reusable page regions once.
  - Large workflow methods, conditional branching and broad assertions are warning signs.
  strong_signals:
  - Can point to a concrete method and say "this assertion belongs in the test, not here".
  - Distinguishes component objects (reusable regions) from page objects (whole screens) with an example.
  - Flags multi-step workflow methods as diagnosability risks, not just style issues.
  weak_signals:
  - Says "assertions don't belong in page objects" as a rule without explaining the diagnosability cost.
  - Cannot describe what a component object is beyond "a smaller page object".
  red_flags:
  - Believes page objects should return booleans for every check so tests never touch elements — but then buries assertions
    inside those same booleans.
  - Thinks the Page Object pattern is only about "storing locators in one file".
  common_mistakes:
  - Growing a single page object per page into a god-object with 50+ methods and no component decomposition.
  - Returning raw WebElement from page-object accessors, leaking driver mechanics into tests.
  - Encoding one specific test's expected values as constants inside the page object.
  follow_ups:
  - question: How would you model a table row or repeated card component without exposing raw WebElements?
    recommended_answer: 'Create a component object wrapping the row''s root WebElement, with typed accessors (`getPrice():
      BigDecimal`, `getStatus(): OrderStatus`, `clickCancel(): void`) scoped to searches within that root element (`root.findElement(By...)`),
      and a parent list page object exposes `getRows(): List<OrderRowComponent>` or `findRow(orderId)`. This keeps row-specific
      locators contained in one class reused across every page that renders the same table, and callers never see a WebElement
      — only typed domain values and actions.'
  examples:
  - '`LoginPage.loginAs(user)` returning a `DashboardPage` is a healthy page-object method. `LoginPage.loginAndVerifyDashboardShowsWelcomeMessage(user)`
    is a hidden test script — it hides the assertion and the intent inside infrastructure code.'
  code_examples:
  - "// Hidden test script inside a \"page object\"\npublic void completeCheckout(Cart cart) {\n    applyPromo(cart.promoCode());\n\
    \    clickPay();\n    Assert.assertTrue(successBanner.isDisplayed()); // assertion buried here\n}\n\n// Correct separation\n\
    public CheckoutPage applyPromo(String code) { ...; return this; }\npublic OrderConfirmationPage submitPayment() { ...;\
    \ return new OrderConfirmationPage(driver); }\n// In the test:\nOrderConfirmationPage confirmation = checkoutPage.applyPromo(\"\
    SAVE10\").submitPayment();\nassertThat(confirmation.isSuccessBannerDisplayed()).isTrue();"
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  - Test/Quality Architect
  - Solution Architect
  - Technical Architect
  years_range:
  - 4
  - 15
