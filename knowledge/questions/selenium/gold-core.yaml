- id: gold-sel-006
  domain: selenium
  subdomain: bidi-cdp
  title: WebDriver, CDP and BiDi — choosing a cross-browser boundary
  level: advanced
  priority: P2
  frequency: emerging
  question: Compare WebDriver commands, browser-specific CDP integration and WebDriver BiDi. How would you avoid coupling
    a framework to a temporary browser implementation detail?
  concise_answer: WebDriver (the W3C standard Selenium implements) is the stable, cross-browser automation contract — navigation,
    element interaction, session management — but it has no standardized way to intercept network traffic or listen for console/JS
    events. Chrome DevTools Protocol fills those gaps for Chromium-based browsers but is Chromium-specific, versioned per
    Chrome release, and not implemented by Firefox or Safari the same way. WebDriver BiDi is the emerging W3C standard that
    brings bidirectional, event-driven capabilities (network interception, console messages, logging) into the cross-browser
    WebDriver contract itself. The way to avoid coupling a framework to a temporary detail is to hide any CDP-specific capability
    behind an interface with a capability check and an explicit fallback, so the framework degrades gracefully on browsers
    or versions that lack it, and to migrate to BiDi APIs as Selenium's support matures rather than deepening CDP-specific
    code.
  recommended_answer: 'WebDriver defines a synchronous, request/response command protocol standardized by the W3C — click,
    sendKeys, navigate — and every WebDriver-conformant browser driver implements the same contract, which is why the same
    Selenium test code drives Chrome, Firefox and Safari. Its scope is deliberately limited to user-facing interaction and
    session management; it does not standardize network interception or push-style events from the browser to the client.

    Chrome DevTools Protocol is Chromium''s own debugging protocol, and Selenium exposes a subset of it (via DevTools/CDP
    session objects) to fill that gap — mocking network responses, capturing console logs, emulating geolocation. The cost
    is that CDP is not a stable cross-browser contract: it changes between Chrome versions, and Firefox/Safari either don''t
    implement it or implement a different debugging protocol, so CDP-based code only runs reliably on Chromium browsers and
    needs version-aware handling.

    WebDriver BiDi is the W3C''s answer to this gap: a bidirectional, event-driven protocol layered onto WebDriver itself,
    aiming to standardize exactly the capabilities CDP currently provides ad hoc — network interception, console/log events,
    and more — across all conformant browsers, not just Chromium. As of current Selenium versions, BiDi support is real but
    still maturing across browsers and Selenium''s own API surface for it.

    To avoid coupling: define an interface in the framework for each optional capability (e.g. `NetworkInterceptor`), implement
    it against CDP today, check the browser/driver capability before invoking it, and provide an explicit no-op or skip path
    when the capability is unavailable rather than letting a CDP call throw deep inside a test. When BiDi coverage for a given
    capability becomes available and stable in the Selenium version in use, swap the implementation behind the same interface
    — tests and page objects never reference CDP or BiDi directly.'
  deep_dive: ''
  key_points:
  - WebDriver is the cross-browser automation contract for interaction and sessions.
  - CDP is Chromium-specific, version-sensitive, and not a cross-browser standard.
  - BiDi aims to standardize bidirectional/event capabilities across all browsers.
  - Hide optional capabilities behind an interface with explicit capability checks.
  - Fallback behavior for unsupported browsers/versions must be explicit, not silent.
  strong_signals:
  - Correctly scopes WebDriver to interaction/session commands versus CDP/BiDi's event capabilities.
  - Names Chromium-only support as CDP's specific limitation, not "it's newer".
  - Proposes an interface + capability-check pattern to isolate the framework from either API.
  weak_signals:
  - Treats CDP and BiDi as interchangeable without noting cross-browser scope differences.
  - Cannot explain what capability CDP/BiDi add that plain WebDriver commands lack.
  red_flags:
  - Recommends writing all new framework code directly against CDP with no abstraction.
  - Believes WebDriver itself supports network interception natively today.
  common_mistakes:
  - Building network-mocking tests on CDP without a fallback, silently skipping on Firefox/Safari.
  - Assuming a CDP feature available in one Chrome version is stable across all supported versions.
  - Not tracking Selenium's BiDi support maturity when planning a migration timeline.
  follow_ups:
  - question: Which observability use cases justify a BiDi/CDP adapter?
    recommended_answer: 'Cases where WebDriver''s own contract has no equivalent: asserting no console errors occurred during
      a flow, intercepting/mocking a specific network response to test an error-handling path deterministically, capturing
      performance timing events, or asserting on JS exceptions thrown asynchronously. These justify the added complexity because
      they test conditions unreachable through clicks and assertions alone; routine UI interaction and state assertions should
      stay on plain WebDriver so the majority of the suite remains browser-portable.'
