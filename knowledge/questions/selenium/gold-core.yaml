- id: gold-sel-002
  domain: selenium
  subdomain: waits-synchronization
  title: Waiting for the right condition, not just visibility
  level: intermediate
  priority: P0
  frequency: very_common
  question: Explain why element visibility is not always the condition required before interaction. Give examples involving
    overlays, stale elements and asynchronous state.
  concise_answer: Visibility only means the element has non-zero size and no `display:none`/hidden ancestor; it says nothing
    about whether the element is enabled, unobstructed by an overlay, or attached to the current DOM. A spinner overlay can
    leave a button visible but not clickable; a re-rendered list after an API call leaves the old element visible-looking
    but stale in the DOM (StaleElementReferenceException on interaction); an asynchronously loaded dropdown can be visible
    before its options are populated. The wait condition must match exactly what the next action needs — elementToBeClickable,
    invisibilityOf(overlay), or a custom condition on staleness — not a single generic "wait for visible" used everywhere.
  recommended_answer: 'WebDriver''s own interactability checks (used internally before a click/send-keys command) test several
    things beyond visibility: the element must be displayed, within the viewport or scrolled into view, not obscured by another
    element at its click point, and not disabled. ExpectedConditions.visibilityOf only proves the first of these. That gap
    is exactly where "visible but click intercepted" failures come from — a modal overlay, a sticky header, or a toast notification
    sits on top of a visible button.

    Stale elements are a different failure mode entirely: after an AJAX refresh or a framework re-render, the old DOM node
    backing a previously located WebElement is detached, even if a visually identical element replaced it. Waiting for visibility
    on the *old* reference cannot help — the correct pattern is either to re-locate the element after the refresh completes,
    or to wait for staleness of the old reference before re-locating, so the test never operates on a detached node.

    Asynchronous state adds a third dimension: a container can become visible while its content is still being populated (a
    dropdown rendered empty before an API response fills it). Here the wait condition must target the actual precondition
    for the next step — "at least one option is present" or "loading spinner is gone" — not the container''s own visibility,
    which is already true.

    The discipline is to ask "what does the next action actually require?" and select or compose the wait for that: elementToBeClickable
    for a click, invisibilityOf for an overlay to clear, a custom ExpectedCondition for domain-specific readiness. Mixing
    an implicit wait with these explicit waits produces compounding, unpredictable timeouts and should be avoided; pick one
    timing model per driver instance.'
  deep_dive: ''
  key_points:
  - Wait for the state the next action needs, not a generic default.
  - Visibility does not guarantee enabled, unobstructed or stable.
  - Use staleness or explicit state-change conditions after refreshes.
  - Avoid mixing implicit and explicit timing reasoning.
  - Timeout messages should expose the awaited condition, not just "timed out".
  strong_signals:
  - Names the specific interactability checks WebDriver performs beyond visibility.
  - Distinguishes stale-element handling (re-locate after staleness) from a plain wait.
  - Writes a wait condition that expresses the actual business precondition, not a generic proxy.
  weak_signals:
  - Treats Thread.sleep as an acceptable substitute for a targeted wait.
  - Knows ExpectedConditions exists but can't say which condition fits which failure.
  red_flags:
  - Proposes wrapping every click in try/catch-and-retry instead of fixing the wait condition.
  - Cannot explain what a StaleElementReferenceException actually means.
  common_mistakes:
  - Setting both an implicit wait and explicit WebDriverWait, causing additive delays.
  - Waiting for the container's visibility when the async content inside isn't ready yet.
  - Catching StaleElementReferenceException and retrying the same stale reference.
  follow_ups:
  - question: How would you create a reusable wait without hiding application-specific conditions?
    recommended_answer: Build small, named, composable ExpectedCondition (or Function<WebDriver, Boolean>) helpers per domain
      concept — e.g. `overlayCleared()`, `gridPopulated(minRows)` — rather than one generic `waitForReady()` that silently
      absorbs whatever the page happens to need that day. Each helper should produce a diagnostic message describing exactly
      what it was waiting for on timeout, and the framework should expose a fluent way to compose them (wait for overlay cleared,
      then element clickable) without collapsing them into an opaque catch-all that a future engineer can't safely change.
  examples: []
  code_examples:
  - '// Wrong condition for the actual need

    wait.until(ExpectedConditions.visibilityOf(submitButton));

    submitButton.click();   // ElementClickInterceptedException — overlay still present


    // Matches what the click actually requires

    wait.until(ExpectedConditions.invisibilityOf(loadingOverlay));

    wait.until(ExpectedConditions.elementToBeClickable(submitButton)).click();


    // Stale-element safe re-render pattern

    WebElement oldRow = driver.findElement(By.id("row-42"));

    triggerRefresh();

    wait.until(ExpectedConditions.stalenessOf(oldRow));

    WebElement newRow = driver.findElement(By.id("row-42"));'
