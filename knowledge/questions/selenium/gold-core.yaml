- id: gold-sel-001
  domain: selenium
  subdomain: locators
  title: Designing resilient locators for a dynamic UI
  level: basic
  priority: P0
  frequency: very_common
  question: A button has generated classes and moves during layout changes. Design a locator strategy that remains stable
    and explain when text, accessibility attributes, data attributes, CSS and XPath are appropriate.
  concise_answer: 'Anchor locators to an intentional contract rather than incidental structure: a dedicated test attribute
    (data-testid) or a stable accessibility attribute (aria-label, role) survives layout and style changes that break generated
    classes like btn-3f8a2 or nth-child position. Text locators fit user-facing labels that are part of the product contract
    (button copy), CSS should target IDs/attributes rather than style classes, and XPath is reserved for cases only it can
    express — traversing to a sibling/ancestor or matching on partial text/contains() — used sparingly because it is slower
    and more brittle to DOM restructuring. Every candidate locator must be checked for uniqueness on the page, not just presence.'
  recommended_answer: 'The stability problem is that hashed utility classes and DOM position are implementation details the
    developer can change on every build; locating against them couples the test to accidents of the build, not to product
    intent. The fix is to locate against something that represents a deliberate contract between the product and the test:
    a data-testid/data-qa attribute owned by the team, or — better where it also improves the product — a semantic accessibility
    attribute like role="button" combined with an aria-label, which doubles as an accessibility check.

    Guidance for each mechanism: use text locators when the visible label is itself the behavior under test and is unlikely
    to be a translation/copy variable in scope; use CSS selectors for attribute and ID matching because they are fast and
    native to the browser''s selector engine; use XPath only for what CSS cannot do — axis traversal (following-sibling, ancestor),
    text-contains matching, or matching on multiple possible attributes with `or` — because XPath evaluation is slower and
    its axis syntax is easy to write in a way that silently matches zero or many elements.

    Before accepting any locator, verify it resolves to exactly one element in the current DOM and stays unique across the
    states the test will exercise (loading, populated, error). The most durable long-term fix is coordinating with development
    to add stable `data-testid` attributes as part of the component''s contract, rather than reverse-engineering stability
    from styling classes that were never meant to be a public API.'
  deep_dive: ''
  key_points:
  - Prefer intentional semantic/test contracts.
  - Verify uniqueness.
  - Avoid absolute paths, indexes and styling classes.
  - Use XPath only when its relationship/text capabilities are needed.
  - Coordinate with developers for stable attributes.
  strong_signals:
  - Distinguishes incidental structure (generated classes, DOM position) from intentional contracts (test IDs, accessibility
    attributes) unprompted.
  - States a concrete reason for each mechanism (CSS speed, XPath axis/text capability).
  - Checks uniqueness across UI states, not just the happy-path DOM.
  weak_signals:
  - Defaults to "use XPath because it's more powerful" without a concrete need.
  - Names data-testid as the answer but cannot say why generated classes are unstable.
  red_flags:
  - Proposes indexed/positional locators (nth-child, absolute XPath) as the primary strategy.
  - Cannot explain the difference between "element exists" and "locator is unique".
  common_mistakes:
  - Locating on a CSS class that is also a styling hook shared by unrelated components.
  - Writing `contains(text(), '...')` XPath against copy that is subject to A/B tests or i18n.
  - Never re-checking uniqueness after adding a new similar component to the page.
  follow_ups:
  - question: How would you validate that a locator fails for the right reason after a UI redesign?
    recommended_answer: 'Distinguish "locator found zero elements" from "element found but interaction failed" by inspecting
      the failure evidence: a NoSuchElementException after a redesign, with a screenshot/DOM dump showing the target control
      still visually present under a new attribute, confirms the locator itself broke — the fix is updating the locator to
      the new contract, not adding a wait. If the same locator finds multiple matches, the redesign introduced a duplicate
      contract and the test should fail loudly rather than pick the first match. Capturing the page source and a screenshot
      on every locator failure makes this distinction fast instead of guesswork.'
  examples:
  - A "Submit" button rendered as <button class="btn-3f8a2 mt-2">Submit</button> should be located via `[data-testid="submit-order"]`
    or `[aria-label="Submit order"]`, not `.btn-3f8a2` or `//div[3]/button[1]`, either of which breaks on the next CSS refactor
    or layout reflow.
  code_examples:
  - '// Fragile — generated class and absolute position

    driver.findElement(By.cssSelector(".btn-3f8a2"));

    driver.findElement(By.xpath("/html/body/div[3]/div/button[1]"));


    // Stable — intentional contract

    driver.findElement(By.cssSelector("[data-testid=''submit-order'']"));

    driver.findElement(By.xpath("//button[@aria-label=''Submit order'']"));'
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range:
  - 2
  - 10
  tags:
