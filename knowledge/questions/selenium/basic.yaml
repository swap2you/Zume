- id: sel-b3
  domain: selenium
  subdomain: page-components
  title: Page and component object boundaries
  level: basic
  priority: P0
  frequency: very_common
  question: What should a page or component object encapsulate, and what should remain in the test?
  concise_answer: An object should encapsulate how the UI is located and operated, while the test states
    the business scenario and its assertions. This keeps UI changes local without making the object a
    hidden test script.
  recommended_answer: Expose meaningful actions and state queries rather than leaking raw locators to
    tests. Keep navigation and synchronization close to the component that owns them, return the next
    page or observable state where useful, and let tests assert the scenario outcome. Avoid putting broad
    scenario assertions or unrelated workflow decisions inside page objects, because that reduces reuse
    and obscures failures.
  deep_dive: Probe for a concrete Selenium WebDriver example, competing constraints, and evidence that
    would change the candidate's decision.
  key_points:
  - encapsulate UI mechanics
  - tests own scenario assertions
  - prefer meaningful actions over locator leakage
