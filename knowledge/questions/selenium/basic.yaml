- id: sel-b2
  domain: selenium
  subdomain: waits-synchronization
  title: Condition-based synchronization
  level: basic
  priority: P0
  frequency: very_common
  question: Why should a WebDriver test wait for a specific condition instead of sleeping for a fixed
    duration?
  concise_answer: A fixed sleep guesses timing and is either slow when the page is ready early or flaky
    when it is not ready in time. A condition-based wait polls for the state the next action actually
    needs and produces a focused timeout when that state never occurs.
  recommended_answer: 'Identify the actionable condition: for example, an element is visible, enabled,
    detached after a refresh, or a request-driven status has completed. Apply an explicit wait around
    that condition and keep timeout ownership clear; do not mix unrelated global delays into the same
    reasoning. If it times out, inspect the locator, application state, overlay, and page event rather
    than immediately increasing the timeout.'
  deep_dive: Probe for a concrete Selenium WebDriver example, competing constraints, and evidence that
    would change the candidate's decision.
  key_points:
  - wait for the next action's condition
  - fixed sleeps are guesses
  - timeouts are diagnostic evidence
  strong_signals:
  - distinguishes symptom from root cause
  - defines a bounded validation strategy
  weak_signals:
  - recites a tool feature without a decision context
  red_flags:
