- id: sel-b1
  domain: selenium
  subdomain: locators
  title: Stable WebDriver locators
  level: basic
  priority: P0
  frequency: very_common
  question: How do you choose a locator for a control whose layout and CSS classes change often?
  concise_answer: Prefer a unique, intentionally stable semantic or test attribute over structural position
    or styling. A locator should express the control's durable role or business identity, so it fails
    when behavior changes rather than when a layout refactor occurs.
  recommended_answer: Work with the product team to expose a stable accessibility name, label relationship,
    or purpose-built data attribute. Use a concise CSS selector when it expresses that stable contract;
    use XPath only when its relationship or text capability is necessary and robust. Avoid copied absolute
    paths, indexes, and generated IDs, then verify uniqueness and behavior through the user interaction.
  deep_dive: Probe for a concrete Selenium WebDriver example, competing constraints, and evidence that
    would change the candidate's decision.
  key_points:
  - prefer stable semantic attributes
  - verify uniqueness
  - avoid layout-coupled selectors
  strong_signals:
  - distinguishes symptom from root cause
  - defines a bounded validation strategy
  weak_signals:
  - recites a tool feature without a decision context
  red_flags:
  - claims a pattern is universally correct
  - hides or ignores failure evidence
  common_mistakes:
  - testing only a happy path
  - confusing activity with outcome
  follow_ups:
  - question: What evidence would make you revise your webdriver architecture approach?
    recommended_answer: A repeatable failure, a violated invariant, or telemetry showing the design misses
      its stated outcome should trigger review. Reproduce the evidence, classify the scope, and change
      the smallest responsible layer.
