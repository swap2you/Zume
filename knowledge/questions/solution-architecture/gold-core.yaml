- id: gold-lead-005
  domain: solution-architecture
  subdomain: trade-offs
  title: When the technically strongest option is not the right organizational choice
  level: advanced
  priority: P0
  frequency: common
  question: Present an architecture decision where the technically strongest option is not the best organizational choice.
  concise_answer: 'A concrete example: choosing a well-understood, "boring" framework the team already operates over a technically
    superior but unfamiliar one, because the migration cost, hiring/skill availability, and support burden of the stronger
    option outweigh its technical edge within the decision''s time horizon. The decision should explicitly name the quality
    attributes traded away (e.g., some performance headroom) against what was gained (lower delivery risk, faster ramp-up),
    and should be recorded as a reversible step with a stated trigger for revisiting it, not framed as a permanent technical
    verdict.'
  recommended_answer: 'A good example: a team evaluates a newer, technically superior contract-testing tool against the REST
    Assured stack it already runs in production. The new tool wins on isolated technical criteria — faster feedback, better
    diagnostics — but the team has two people who know it, no CI integration built, and a release in six weeks. The organizationally
    responsible decision is to stay on the current stack for this cycle, and schedule a bounded pilot of the new tool against
    a real but non-critical service afterward, rather than adopting mid-cycle on the strength of a spike.

    What makes the decision defensible rather than merely conservative is what gets written down: the specific quality attributes
    being traded (some diagnostic speed and future maintainability, given up for delivery predictability and available skill),
    the reversibility of the choice (a pilot is explicitly scoped so the team is not locked in either direction), and a stated
    trigger for revisiting it (after the release, or if the current stack''s known limitation causes a second incident). This
    maps directly onto the standard architecture decision record structure — context, decision, and consequences — which exists
    precisely so a decision that looks conservative in isolation is legible as a considered trade-off in retrospect, with
    the option to change course recorded as part of the decision itself rather than treated as reversing a mistake.

    The failure mode this avoids is two-sided: picking the "best" technology and ignoring organizational readiness produces
    a stalled migration and a demoralized team; picking the safe option and calling it final with no revisit trigger produces
    permanent technical stagnation dressed up as prudence.'
  deep_dive: ''
  key_points:
  - Decisions include skills, ownership, migration cost and support burden, not just technical merit.
  - State the specific quality attributes being traded away and gained.
  - Prefer reversible steps (bounded pilots) over irreversible full commitments.
  - Document consequences and an explicit trigger for revisiting the decision.
  strong_signals:
  - Names concrete quality attributes traded, not a vague "we chose stability."
  - Structures the answer around context/decision/consequences rather than a bare recommendation.
  - Defines a specific, falsifiable trigger for revisiting the decision later.
  weak_signals:
  - Frames the choice as simply "safe versus risky" without naming what was actually traded.
  - Presents the decision as permanent with no path to reconsider it.
  red_flags:
  - Cannot articulate any cost of the "safe" choice — treats it as free.
  - Confuses conservatism (avoiding change by default) with a reasoned, evidenced trade-off.
  common_mistakes:
  - Choosing the technically superior tool without assessing team skill or migration cost.
  - Recording only the decision, not the context and consequences, so it reads as arbitrary later.
  - Never setting a revisit trigger, so the decision becomes permanent by inertia.
  follow_ups:
  - question: What makes an architecture decision responsible rather than merely conservative?
    recommended_answer: A responsible decision names the trade-off explicitly (what capability or quality attribute is being
      given up, and why the org context justifies it now), commits to a reversible or bounded path rather than closing the
      door permanently, and states the evidence or event that would trigger revisiting it. A merely conservative decision
      picks the familiar option by default, never names what was given up, and has no mechanism or intention to ever reconsider
      it — it optimizes for avoiding blame rather than for the organization's actual outcomes.
