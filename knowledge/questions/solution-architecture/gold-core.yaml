- id: gold-arch-006
  domain: solution-architecture
  subdomain: decision-records
  title: Single framework, multiple specialized frameworks, or a shared adapter platform
  level: advanced
  priority: P1
  frequency: common
  question: Write the decision criteria for choosing a single framework, multiple specialized frameworks or a shared platform
    with adapters.
  concise_answer: 'The decision mirrors the "monolith first" argument in reverse scale: a single framework is right when teams,
    tech stacks and release cadence are similar enough that shared abstractions describe reality rather than distort it; multiple
    specialized frameworks are right when teams, channels or release cadences genuinely differ and forcing one framework adds
    a coordination tax without shared benefit; a shared platform with thin adapters is the middle path — common infrastructure
    (reporting, CI integration, data management) with channel- or team-specific adapters — justified once duplication cost
    across independent frameworks exceeds the governance cost of a shared core. Each option has an explicit exit strategy
    and revisit trigger.'
  recommended_answer: 'Decision criteria, weighted by evidence rather than preference: (1) Team skills and ownership — can
    one team realistically own a single framework''s full surface area, or would that concentrate a bottleneck? (2) Product/channel
    diversity — one web app favors one framework; ten products across web, mobile and API with different release trains favor
    specialization or a platform. (3) Release cadence — frameworks tied to different deployment rhythms fight each other inside
    one repo/pipeline. (4) Maintenance and migration cost — estimate cost of the chosen path''s eventual replacement, not
    just its initial build. (5) Governance versus autonomy — a shared platform requires a real governance function (a maintaining
    team, an RFC process); without one, "shared platform" becomes an unowned dependency everyone fears to change. (6) Exit
    strategy and measurable outcomes — define up front what evidence (duplicated defect classes, onboarding time, cross-team
    blocked-on-platform time) would trigger revisiting the decision.

    This is the same class of decision Fowler''s monolith-first reasoning describes for application architecture: start with
    the option that carries the least structural premium for your current scale and complexity, and treat the more distributed
    option (multiple frameworks, or a platform with governance overhead) as something you earn the need for with evidence,
    not something you adopt on anticipated future scale alone. DORA''s research on loosely coupled teams applies directly
    here — the platform-with-adapters option only pays off when it lets teams change and release independently; if the platform
    forces cross-team coordination for every change, it has recreated tight coupling under a different name.'
  deep_dive: ''
  key_points:
  - Weigh team skills/ownership, product diversity and release cadence explicitly.
  - Estimate migration/maintenance cost of the chosen path, not just initial build cost.
  - A shared platform requires real governance, or it becomes an unowned liability.
  - Define measurable evidence and a trigger for revisiting the decision up front.
  - Prefer the option with the least structural premium for current scale, not future guesses.
  strong_signals:
  - Weighs governance cost explicitly against duplication cost for the platform option.
  - Names concrete evidence that would trigger revisiting the decision later.
  - Draws the parallel to architectural coupling rather than treating this as pure preference.
  weak_signals:
  - Picks an option based on what is currently popular rather than team/product evidence.
  - No mention of who governs a shared platform or how it evolves.
  red_flags:
  - Recommends a shared platform with no owning team or change process.
  - Treats the decision as permanent with no revisit trigger or exit strategy.
  common_mistakes:
  - Building a "universal" shared platform before any second team actually needs it.
  - Letting each team build a bespoke framework silently, discovering duplication years later.
  - Confusing "shared platform" with "one team's framework everyone else must adopt."
  follow_ups:
  - question: What evidence would trigger revisiting the architecture decision?
    recommended_answer: Recurring duplicated defect classes fixed independently in each framework, measurable onboarding-time
      growth for new team members, cross-team work repeatedly blocked waiting on a platform-owning team, or a release cadence
      mismatch causing frequent conflicts are all concrete triggers. The decision record should name these thresholds in advance
      so revisiting the architecture is a scheduled, evidence-driven review rather than a reactive scramble.
