- id: gold-arch-004
  domain: debugging-reliability
  subdomain: retry-vs-repair
  title: Evaluating a blanket "retry every failure twice" policy
  level: intermediate
  priority: P0
  frequency: very_common
  question: A team proposes retrying every failed test twice. Evaluate the proposal and design a safer retry policy.
  concise_answer: 'Blanket retries treat every failure as noise, which is exactly backward: retries can legitimately confirm
    that a failure was transient, but applied indiscriminately they hide real defects behind a "passed on retry 2" result
    and quietly normalize non-determinism instead of fixing it. A safer policy limits retries to failure classes known to
    be retryable (network blip, documented infrastructure flake), preserves the first-failure evidence unconditionally, reports
    the retry rate per test as a first-class metric, and puts an expiry and an owner on any test allowed to retry — it is
    a temporary quarantine, not a permanent feature.'
  recommended_answer: 'Martin Fowler''s guidance on non-deterministic tests is the right frame: quarantine reduces the damage
    a flaky test does to the rest of the suite''s signal, but quarantine is not a fix, and an unbounded quarantine list is
    a silently growing risk. Retrying every failed test twice is quarantine-by-default applied to the entire suite, which
    erases the distinction between "flaky" and "broken."

    The safer design: (1) retries apply only to tests explicitly tagged as known-retryable, with the tag itself requiring
    a linked investigation ticket and an expiry date; (2) the first failure''s full evidence (screenshot, logs, stack trace)
    is captured and stored before any retry runs, so a defect is never lost even if the retry passes; (3) the report always
    shows attempt count and outcome per attempt, so "passed" and "passed after 2 retries" are visibly different results, not
    indistinguishable green checkmarks; (4) a dashboard tracks retry rate per test over time — a test that keeps needing its
    retry is not stable, it is failing at a lower rate, and belongs back in active investigation, not permanent quarantine.'
  deep_dive: ''
  key_points:
  - Retries can identify transient behavior but indiscriminate retries hide real defects.
  - Limit retries to explicitly tagged, known-retryable failure classes.
  - Always preserve first-failure evidence before any retry executes.
  - Report retry rate and attempt outcomes as visible, first-class results.
  - Put an expiry and an owner on every retry exception; it is temporary quarantine.
  strong_signals:
  - Distinguishes quarantine (temporary damage control) from a permanent retry policy.
  - Insists first-failure evidence is captured regardless of retry outcome.
  - Proposes retry-rate as a tracked metric, not a hidden implementation detail.
  weak_signals:
  - Accepts retries as a reasonable default with no expiry or evidence requirement.
  - Cannot distinguish a flaky test from a legitimately fixed one.
  red_flags:
  - Treats "pass on retry" as equivalent to "pass" in the report with no distinction.
  - Has no mechanism to ever remove a test from the retry-allowed list.
  common_mistakes:
  - Applying the same fixed retry count to unit-level and full end-to-end tests alike.
  - Losing the original failure's stack trace/screenshot once a retry succeeds.
  - Letting retry-tagged tests accumulate indefinitely with no review cadence.
  follow_ups:
  - question: Which failures must never be retried automatically?
    recommended_answer: Assertion failures that represent a business-rule mismatch, data-integrity violations, and security/permission
      check failures must never be silently retried — retrying implies "maybe transient," and treating a wrong calculation
      or an authorization bypass as possibly transient is itself a defect in the retry policy. Anything whose failure could
      indicate real user-facing harm should fail hard and route directly to investigation.
