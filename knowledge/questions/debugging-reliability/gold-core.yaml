- id: gold-arch-003
  domain: debugging-reliability
  subdomain: failure-classification
  title: Building an evidence-based failure classification model
  level: intermediate
  priority: P0
  frequency: very_common
  question: Create a failure-classification model that distinguishes product defects, automation defects, environment failures,
    data failures and unknowns.
  concise_answer: 'Classify from evidence collected at failure time, not from a guess: screenshot/DOM or response body, application
    logs, environment/version markers and prior history for that test. Product defect means the observed behavior contradicts
    a specification or prior passing baseline with no automation-side cause found. Automation defect means the framework or
    locator/logic is wrong while the product behaved correctly. Environment failure means infrastructure (network, service
    availability, grid capacity) caused it. Data failure means test data was invalid, stale or collided. Unknown is a legitimate,
    tracked category when evidence is insufficient — not a default dumping ground, and not silently converted into "flaky."'
  recommended_answer: 'A usable model has categories that are mutually understandable by developers, testers and triagers,
    each with a required evidence field before it can be assigned: product-defect requires a spec/baseline mismatch citation;
    automation-defect requires the specific broken assertion, locator or logic; environment-failure requires an infrastructure
    signal (timeout pattern, node/queue status, dependency outage); data-failure requires the specific invalid/stale/colliding
    record. If none of those can be evidenced, the failure is classified "unknown" with an owner and a follow-up action —
    not silently retried away or defaulted to "flaky."

    Attach the classification and its evidence to the failure record itself so it survives triage handoffs, and prevent retries
    from overwriting the original classification: a test that fails once with a real defect and passes on retry did not stop
    being a defect — the retry masked it, and the report must show both the first-failure evidence and the retry outcome.'
  deep_dive: ''
  key_points:
  - Classification is driven by required evidence per category, not guesswork.
  - Categories must be mutually understandable across developers, testers and triagers.
  - Unknown is a legitimate, owned, tracked state — not a default or a dead end.
  - Attach classification and evidence to the failure record so it survives handoffs.
  - Retries must not silently overwrite the original failure's classification.
  strong_signals:
  - Requires specific evidence per category before allowing that classification.
  - Explains why "unknown" must be tracked with an owner rather than discarded.
  - Flags that retry-to-pass can hide a real classification if not recorded.
  weak_signals:
  - Names categories but gives no evidence requirement for assigning them.
  - Treats every unexplained failure as "flaky" by default.
  red_flags:
  - Has no "unknown" category and forces every failure into pass/fail only.
  - Lets an automatic retry silently erase the first-failure classification.
  common_mistakes:
  - Classifying from the error message text alone without checking the actual evidence.
  - One triage queue for all failure types instead of routing by evidence-backed category.
  - Measuring "unknown rate" as a team failure instead of a tracked, improvable metric.
  follow_ups:
  - question: How would you measure classification accuracy and reduce unknowns?
    recommended_answer: Sample a set of classified failures and have an independent reviewer re-classify from the same evidence;
      disagreement rate is your classification accuracy signal. To reduce "unknown," work backward from each unknown case
      to identify the missing evidence type (usually a log, a network trace, or a DOM/response snapshot) and add that capture
      to the framework — unknowns shrink by improving evidence collection, not by inventing more categories.
