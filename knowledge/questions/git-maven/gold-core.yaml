- id: gold-tool-005
  domain: git-maven
  subdomain: merge-rebase
  title: Merge versus rebase for a shared automation repository
  level: intermediate
  priority: P1
  frequency: common
  question: Compare merge and rebase for a shared automation repository. What history and collaboration risks drive the choice?
  concise_answer: git merge creates a new merge commit that ties two branch histories together, preserving exactly what happened
    (including the branch topology), at the cost of a history that can be cluttered with merge commits and "merge branch main
    into feature" noise. git rebase replays a branch's commits onto a new base, producing a linear history that reads cleanly
    but rewrites commit hashes — doing this to commits that have already been pushed and pulled by teammates (published history)
    creates duplicate/diverged history for everyone else and should be avoided; rebase is safe and useful for a developer's
    own not-yet-shared local commits before opening a PR. Conflict resolution during either operation should be verified by
    re-running the test suite, not just checking that the diff looks reasonable, because a textually clean merge can still
    combine two changes into a logically broken state.
  recommended_answer: 'Merge preserves the true branch topology and never rewrites existing commits — every commit that existed
    on the feature branch keeps its original hash, and a new merge commit records that two histories were joined. This is
    the only safe option once commits have been pushed to a shared branch that others have already pulled from, because rewriting
    published history forces every other collaborator to reconcile diverged histories (typically by force-pulling or creating
    their own confusing merge of the rewritten and original lines).

    Rebase rewrites the feature branch''s commits so they appear to have been made starting from the current tip of the target
    branch, producing a linear, easy-to-read history with no merge commits — valuable for a developer''s own branch before
    it is shared, and for keeping a long-lived feature branch up to date with main without the noise of repeated "merge main
    into feature" commits. The rule most teams converge on (and the one Git''s own documentation warns about) is: never rebase
    commits that exist in a public/shared branch that other people might have already based work on — doing so silently duplicates
    commits for anyone who already has the old versions and can produce very confusing, hard-to-untangle divergence.

    For a shared automation repository specifically, the practical convention is: protect main so it only receives merges
    (often squash-merges) from reviewed pull requests; allow individual contributors to rebase their own feature branches
    freely before or during review to keep history clean and to resolve conflicts against a moving main; and require that
    any conflict resolution — merge or rebase — is validated by actually running the test suite against the resolved result,
    since Git''s conflict markers only flag textual overlap, not whether the combined logic is still correct (e.g. two people
    editing the same page-object method to fix different locators can merge without a conflict marker while producing a broken
    locator).'
  deep_dive: ''
  key_points:
  - Merge preserves branch topology and never rewrites existing commit history.
  - Rebase rewrites commits to produce linear history; safe only before sharing/publishing.
  - Do not rebase shared, already-published history — it silently diverges everyone else's copy.
  - Use a documented team convention (e.g. protected main, rebase-before-PR) and protect the main branch.
  - Resolve conflicts and validate with the test suite, not by reading the diff alone.
  strong_signals:
  - States the "never rewrite published/shared history" rule and explains the concrete consequence for teammates.
  - Ties conflict resolution correctness to re-running tests, not just diff inspection.
  - Proposes a concrete team convention (protected main, rebase-before-PR) rather than a personal preference.
  weak_signals:
  - Has a strong opinion on merge vs rebase without discussing whether the branch is shared.
  - Treats force-push as routine without discussing the impact on collaborators.
  red_flags:
  - Recommends rebasing main or another shared branch directly.
  - Considers a conflict "resolved" once it compiles, without running tests.
  common_mistakes:
  - Force-pushing a rebased branch that other people already pulled, without warning them.
  - Rebasing to "clean up" a long-lived shared integration branch mid-project.
  - Resolving a merge conflict by picking one side entirely without checking whether both changes were needed.
  follow_ups:
  - question: When would you use revert instead of reset after a bad merge?
    recommended_answer: Use revert when the bad commit or merge has already been pushed and potentially pulled by others —
      revert creates a new commit that undoes the change while preserving history, so it is safe to push without rewriting
      anything anyone else has. Reset (especially --hard combined with a force push) rewrites the branch tip and is only appropriate
      for commits that are still local/unpublished; using reset on a shared branch has the same "everyone else now diverges"
      problem as rebasing published history. For a bad merge already on a shared branch, `git revert -m 1 <merge-commit>`
      is the standard way to undo it without disturbing the branch's public history.
  examples: []
  code_examples:
  - '# Safe: rebase your own not-yet-pushed/not-yet-shared branch onto latest main

    git fetch origin

    git rebase origin/main


    # Unsafe once teammates have already pulled feature-branch commits:

    # this rewrites history they already have a copy of

    git rebase origin/main   # on a branch others have already fetched/based work on

    git push --force         # forces the rewritten history onto everyone else'
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
