- id: gold-tool-004
  domain: git-maven
  subdomain: maven-lifecycle
  title: Surefire versus Failsafe — why "mvn test" can pass while "mvn verify" fails
  level: basic
  priority: P1
  frequency: very_common
  question: Explain the Maven lifecycle difference between unit-style tests and integration tests using Surefire and Failsafe.
  concise_answer: The Maven Surefire Plugin binds to the test phase of the default lifecycle and, by its default naming convention,
    runs classes matching **/Test*.java, **/*Test.java and **/*Tests.java — these are meant to be fast, isolated unit tests
    with no external dependencies. The Maven Failsafe Plugin binds to integration-test and verify and, by default, matches
    **/IT*.java, **/*IT.java and **/*ITCase.java; critically, Failsafe's integration-test goal runs tests but does not fail
    the build immediately, and the verify goal (run after integration-test, typically after other plugins have torn down test
    infrastructure such as a started server) is what actually inspects results and fails the build. That separation lets teardown
    (e.g. stopping an application server) run between test execution and the pass/fail decision, which Surefire alone cannot
    do inside a single test phase.
  recommended_answer: 'Maven''s default lifecycle phases run in order: validate, compile, test, package, integration-test,
    verify, install, deploy. Surefire''s default binding is to the test phase, so mvn test (or any phase up through package)
    triggers it; it is designed for tests that need no external environment — pure unit tests — and it fails the build immediately
    when a test fails, which is appropriate because there is no teardown step to protect.

    Failsafe is designed specifically for integration tests, which typically need something started before they run (an embedded
    server, a database container) and stopped afterward regardless of test outcome. Its integration-test goal executes the
    tests but deliberately does not fail the build there — if it did, a failed integration test would abort the build before
    the post-integration-test teardown goal (commonly another plugin bound to post-integration-test, like stopping a Docker
    container or an app server) ever ran, leaving the environment dangling. The verify goal, bound after post-integration-test,
    is what reads the recorded results and fails the build if any integration test failed. This is exactly why `mvn test`
    can succeed (Surefire ran, all unit tests passed, and Surefire never even saw integration tests because of the differing
    naming convention) while `mvn verify` fails (Failsafe''s later verify goal detects an integration test failure that only
    becomes visible once the full lifecycle including integration-test has run).

    Discovery for both plugins can be reconfigured via <includes>/<excludes> in the plugin configuration, so relying purely
    on the default naming convention is fragile — a class named ServiceTest.java that is actually a slow integration test
    will be picked up by Surefire (wrong phase, wrong failure semantics, possibly no environment yet) unless naming and includes
    are kept consistent with intent. CI pipelines should invoke the goal that matches what they need — `mvn verify` (or `mvn
    test` for a fast PR gate that deliberately skips slower integration tests) — rather than assuming `mvn test` alone exercises
    the full suite.'
  deep_dive: ''
  key_points:
  - Surefire commonly binds to the test phase for fast, isolated tests.
  - Failsafe binds to integration-test and verify; verify is what actually fails the build, after teardown has run.
  - Default naming conventions (Test*/*/*IT*) control which plugin discovers which classes.
  - CI must invoke the lifecycle goal (test vs verify) that matches the intended scope.
  strong_signals:
  - Explains why Failsafe splits execution (integration-test) from failure detection (verify) rather than treating them as
    one step.
  - Connects the split directly to environment teardown ordering.
  - Names the default include patterns for both plugins accurately.
  weak_signals:
  - Knows "Failsafe is for integration tests" but not why it defers failing the build.
  - Assumes mvn test always runs the entire test suite regardless of naming.
  red_flags:
  - Believes Surefire and Failsafe are interchangeable configuration of the same plugin.
  - Cannot explain why a failing integration test might not fail `mvn test`.
  common_mistakes:
  - Naming a slow integration test class *Test.java, causing Surefire to run it in the wrong phase with no environment.
  - Running only `mvn test` in CI and believing integration tests were exercised.
  - Forgetting to bind Failsafe's verify goal, so integration-test failures never fail the build at all.
  follow_ups:
  - question: Why can `mvn test` pass while `mvn verify` fails?
    recommended_answer: Because `mvn test` only executes phases up to and including test, where Surefire runs — it never reaches
      integration-test or verify, so Failsafe never executes and any integration-test failure is invisible at that point.
      `mvn verify` runs the full sequence through integration-test and verify; Failsafe executes the IT-named tests there,
      and its verify goal is where a recorded integration-test failure is finally surfaced as a build failure. A pipeline
      that only runs `mvn test` for speed is intentionally not exercising Failsafe's tests, which is fine as a fast PR gate
      but must be paired with a broader `mvn verify` stage before merge or release.
  examples: []
  code_examples:
  - "<!-- Failsafe bound explicitly to integration-test and verify -->\n<plugin>\n  <groupId>org.apache.maven.plugins</groupId>\n\
    \  <artifactId>maven-failsafe-plugin</artifactId>\n  <executions>\n    <execution>\n      <goals>\n        <goal>integration-test</goal>\n\
    \        <goal>verify</goal>\n      </goals>\n    </execution>\n  </executions>\n</plugin>"
