- id: gold-aiqa-001
  domain: ai-quality
  subdomain: nondeterminism
  title: Testing when one prompt can produce multiple acceptable outputs
  level: basic
  priority: P0
  frequency: common
  question: How should testing change when the same prompt can produce multiple acceptable outputs?
  concise_answer: Replace a single golden-string assertion with a rubric of acceptable properties — required facts present,
    forbidden content absent, format constraints met, tone within range — and grade generated output against that rubric rather
    than exact-match text. Use repeated sampling where variance matters, track the distribution of outcomes over time rather
    than a single pass/fail run, and keep deterministic assertions for the parts of the system that are not actually probabilistic
    — schema validity, tool-call arguments, retrieval correctness — so model version, temperature and prompt changes are regression-tested
    against a stable contract.
  recommended_answer: 'Exact-match assertions assume a single correct output, which is false the moment a system can legitimately
    phrase the same correct answer several ways. The first change is defining what ''acceptable'' actually means before writing
    any test: a rubric of required properties (does it mention the correct policy, does it avoid a disallowed claim, does
    it stay within a length or format bound) that a grader — human, rule-based, or an LLM-as-judge calibrated against human-labeled
    examples — can score reproducibly, replacing ''does this string equal the golden string'' with ''does this output satisfy
    these properties.''

    Where output variance itself is a property under test (creativity, phrasing diversity, or checking that a system does
    not collapse into one repeated response), sample the same input multiple times and evaluate the distribution — pass rate
    across N samples, or the range of a scored property — rather than trusting one run. Regression testing then tracks that
    distribution over time (did the pass rate for this scenario drop between model versions) instead of a single boolean that
    a single lucky or unlucky sample could flip.

    Not everything in an LLM-backed system is actually probabilistic, and conflating the two erodes test discipline: schema
    validity of a structured output, whether a required tool was called with the correct arguments, whether retrieval returned
    the expected document ID, and any deterministic post-processing step should keep exact assertions — pinning model, version
    and temperature/seed where the provider allows it for the tests that must be reproducible run to run, and isolating the
    genuinely probabilistic quality judgment to the rubric-based layer.'
  deep_dive: ''
  key_points:
  - Define acceptable properties and rubrics instead of a single golden string.
  - Use repeated sampling where output variance is itself a property under test.
  - Separate deterministic plumbing (schema, tool-call arguments, retrieval) from probabilistic quality judgment.
  - Track score/pass-rate distributions over time, not a single pass/fail run.
  - Control model, version and temperature/seed explicitly in regression tests.
  strong_signals:
  - Designs a rubric of required/forbidden properties before writing any assertion.
  - Distinguishes which parts of the pipeline are genuinely deterministic from the probabilistic parts.
  - Proposes tracking pass-rate or score distributions across model/prompt versions over time.
  weak_signals:
  - Writes a single exact-match golden-string test and treats occasional failures as flaky noise to ignore.
  - Applies probabilistic grading to a step that is actually fully deterministic (schema/tool-call validation).
  red_flags:
  - Has no rubric or property list at all — grading is 'looks about right' with no reproducible criteria.
  - Cannot explain why sampling once is insufficient when variance is a property under test.
  common_mistakes:
  - Silencing nondeterminism entirely by pinning every parameter, hiding real production variance from tests.
  - Grading tone/style with the same exact-match method used for factual claims.
  - Never revisiting the rubric after the acceptable-output definition drifts from real usage.
  follow_ups:
  - question: Which parts of an LLM application should still have exact deterministic assertions?
    recommended_answer: 'Anything that is not actually generated free text: structured output schema conformance, the specific
      tool selected and its exact arguments for a fixed scenario, retrieval returning the expected document ID or chunk for
      a fixed query, and any deterministic post-processing (formatting, redaction, business-rule enforcement) applied after
      the model responds. These are legitimate exact-match regression targets because their correctness does not depend on
      phrasing.'
  examples:
  - A support-reply generator that must mention the correct refund window and avoid promising a specific dollar amount can
    be graded by checking those two rubric properties across several valid phrasings, instead of failing every response that
    does not match one memorized golden sentence.
