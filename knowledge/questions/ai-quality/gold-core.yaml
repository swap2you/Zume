- id: gold-aiqa-003
  domain: ai-quality
  subdomain: evals
  title: Building an evaluation dataset for a test-generation assistant
  level: advanced
  priority: P0
  frequency: common
  question: Build an evaluation dataset for a QA assistant that generates tests from requirements.
  concise_answer: Source requirements that are representative of real defect risk — ambiguous, multi-condition and edge-case-heavy,
    not just clean happy-path specs — and pair each with gold rubrics describing what a good test set must cover rather than
    one gold text answer, since many different valid test suites can satisfy the same requirement. Score coverage, correctness,
    redundancy and harmful/incorrect-suggestion rate as separate metrics, route difficult or ambiguous cases through human
    review, and version the dataset with contamination controls so the model being evaluated was never trained or prompted
    on the exact eval cases.
  recommended_answer: 'A dataset built only from clean, unambiguous requirements will overstate the assistant''s real-world
    usefulness, because production requirements are rarely clean — they are ambiguous, have implicit edge cases, and sometimes
    contradict other requirements. Deliberately include that difficulty distribution: a mix of straightforward requirements,
    requirements with hidden edge cases the assistant must infer, and a smaller set of genuinely ambiguous or underspecified
    requirements where the correct behavior is to ask a clarifying question or flag the ambiguity rather than guess.

    Because many different test suites can correctly cover the same requirement, grade against gold rubrics (the set of conditions,
    edge cases and negative scenarios a correct answer must cover) rather than a single gold text of literal test cases —
    exact-match against one reference test suite would penalize an equally valid alternative suite. Score at least four separate
    dimensions: coverage (did the generated tests address the required conditions and edge cases), correctness (are the generated
    tests themselves accurate — no wrong expected results or invalid preconditions), redundancy (does the set avoid excessive
    near-duplicate tests that inflate apparent coverage without adding value), and harmful-suggestion rate (did the assistant
    ever generate a test that would mask a real defect, test against the wrong behavior, or encourage an unsafe practice).

    Route the hardest and most ambiguous cases through human review rather than trying to automate every judgment — some evaluations
    of ''did this correctly interpret an ambiguous requirement'' need a human domain expert, at least to calibrate the automated
    grader. Version the dataset explicitly and control for contamination: verify the model or its provider was not trained
    or previously exposed to the exact eval cases, and refresh the dataset periodically so a model cannot appear to improve
    simply because it has memorized the fixed eval set.'
  deep_dive: ''
  key_points:
  - Include representative requirements — ambiguous and edge-case-heavy, not only clean happy-path specs.
  - Grade against gold rubrics describing required coverage, not a single gold text answer.
  - Score coverage, correctness, redundancy and harmful-suggestion rate as separate metrics.
  - Route the hardest/ambiguous cases through human review to calibrate automated grading.
  - Version the dataset and control for contamination against the model being evaluated.
  strong_signals:
  - Designs the requirement mix around real ambiguity and edge-case difficulty, not only clean specs.
  - Uses rubric-based grading because multiple valid test suites can satisfy one requirement.
  - Separates coverage, correctness, redundancy and harm as independent scored dimensions.
  weak_signals:
  - Grades generated tests only against one fixed reference test suite via exact match.
  - Measures only 'did it produce tests' without checking whether those tests are themselves correct.
  red_flags:
  - Has no contamination control and cannot say whether the model was exposed to the eval set previously.
  - Never checks whether a generated test could mask a real defect (a harmful-suggestion case).
  common_mistakes:
  - Building the eval set once and never refreshing it as real production requirements evolve.
  - Conflating 'many tests generated' with 'good coverage' without checking for redundancy.
  - Skipping human review entirely and trusting an automated grader on every ambiguous case.
  follow_ups:
  - question: How would you measure whether generated tests find defects rather than only look plausible?
    recommended_answer: Run the generated tests against a set of known-buggy implementations (seeded mutants or historical
      defective versions of the code under test) and measure defect detection rate directly, rather than trusting a plausibility
      judgment on the test text alone. A test suite that reads well but fails to catch any of the seeded defects is scoring
      high on surface plausibility while failing at its actual purpose, and mutation-style defect injection is what exposes
      that gap.
