- id: gold-aiqa-004
  domain: ai-quality
  subdomain: failure-triage
  title: Validating an AI failure-classifier before automatic routing
  level: intermediate
  priority: P1
  frequency: common
  question: An AI classifier assigns automation failures to product, test, environment or data categories. How would you validate
    it before allowing automatic routing?
  concise_answer: Validate against a labeled, representative history of past failures — not a convenient small sample — and
    measure precision and recall per category separately, since a classifier can look accurate overall while being unreliable
    on the category that matters most (missing real product defects, for example). Set confidence thresholds below which a
    case routes to human review instead of automatic action, and put drift monitoring and a feedback-correction loop in place
    before trusting it unsupervised, because the failure-mix distribution will shift as the system and its codebase evolve.
  recommended_answer: 'Overall accuracy is a misleading single number for a multi-category classifier feeding automatic routing,
    because the cost of an error is not symmetric across categories: misrouting a real product defect as ''environment flake''
    has a much higher cost than the reverse. Validate with a labeled, representative history of past failures — pulled from
    real triage records, not a hand-picked convenient sample — and report precision and recall per category independently,
    so a weak category (commonly the rarer but highest-cost ''product defect'' class) cannot hide behind a strong overall
    number dominated by the most common category.

    Set explicit confidence thresholds calibrated against that validation data: cases the classifier is confident about and
    that validation shows are reliably correct at that confidence level can route automatically, while lower-confidence or
    historically error-prone categories route to human review rather than automatic action. This is not a one-time calibration
    — track the classifier''s confidence-versus-actual-accuracy curve over time, because as the codebase, test suite and environment
    change, the failure-mix distribution the classifier was validated against will drift, and a threshold calibrated on last
    quarter''s failure mix can silently become miscalibrated.

    Put a feedback-correction loop in place from day one: every case a human corrects after automatic routing should feed
    back into a monitored error rate and, eventually, retraining or threshold adjustment, so drift is caught from real outcomes
    rather than discovered months later when a pattern of misrouted defects surfaces.'
  deep_dive: ''
  key_points:
  - Validate against a labeled, representative history of real failures, not a convenient sample.
  - Report precision and recall per category, not one aggregate accuracy number.
  - Set confidence thresholds below which cases route to human review instead of automatic action.
  - Monitor for drift as the failure-mix distribution shifts over time.
  - Build a feedback-correction loop from human-reviewed corrections back into the classifier's monitored accuracy.
  strong_signals:
  - Insists on per-category precision/recall rather than trusting one aggregate accuracy figure.
  - Ties confidence thresholds explicitly to validated accuracy at that confidence level, not an arbitrary cutoff.
  - Designs drift monitoring and a feedback loop before allowing unsupervised automatic routing.
  weak_signals:
  - Validates on a small, convenient sample rather than a representative historical distribution.
  - Reports only overall accuracy with no per-category breakdown.
  red_flags:
  - Allows fully automatic routing with no human-review threshold or escalation path at all.
  - Has no plan for detecting drift once the classifier is in production.
  common_mistakes:
  - Calibrating thresholds once at launch and never revisiting them as the failure mix shifts.
  - Treating the rare, highest-cost category the same as the common, low-cost category during validation.
  - Not closing the loop from human corrections back into monitored classifier accuracy.
  follow_ups:
  - question: Which classification errors are most costly and how would that affect thresholds?
    recommended_answer: 'Misrouting a genuine product defect as environment or test flake is typically the most costly error,
      since it risks a real defect reaching release unnoticed; misrouting the reverse (flagging real flake as a product defect)
      mainly costs wasted investigation time. That asymmetry should drive an asymmetric threshold: bias the classifier toward
      routing anything with meaningful uncertainty in the product-defect direction to human review, even at the cost of more
      manual review volume, rather than optimizing for the single highest overall accuracy number.'
