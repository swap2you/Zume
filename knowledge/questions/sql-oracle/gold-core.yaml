- id: gold-sql-002
  domain: sql-oracle
  subdomain: window-functions
  title: Deterministic "latest row per account" with ROW_NUMBER, RANK and correlated subqueries
  level: intermediate
  priority: P1
  frequency: common
  question: Return the latest status row per account while preserving deterministic tie handling. Compare ROW_NUMBER, RANK
    and a correlated subquery.
  concise_answer: Partition by the business key (account_id) and order by the effective timestamp, then add a deterministic
    tie-breaker such as a surrogate id, because two rows can share the exact same timestamp. ROW_NUMBER() always assigns exactly
    one "1" per partition, so filtering WHERE rn = 1 guarantees a single latest row — but only if the ORDER BY is fully deterministic;
    if it is not, ROW_NUMBER picks an arbitrary one of the tied rows on each run. RANK() assigns the same rank to ties, so
    WHERE rnk = 1 can return multiple rows when timestamps tie, which is correct for "show me all leaders" but wrong if the
    requirement is "exactly one row per account." A correlated subquery (SELECT ... WHERE ts = (SELECT MAX(ts) FROM t2 WHERE
    t2.account_id = t1.account_id)) has the same multi-row-on-tie problem as RANK and is typically slower without a matching
    index, though it avoids requiring analytic function support.
  recommended_answer: 'Correctness starts with an explicit tie-break policy: ORDER BY effective_ts DESC is not deterministic
    by itself if effective_ts has duplicate values for an account, so the practical pattern is ORDER BY effective_ts DESC,
    status_id DESC (or a monotonically increasing surrogate key) to guarantee a total order within each partition.

    ROW_NUMBER() OVER (PARTITION BY account_id ORDER BY effective_ts DESC, status_id DESC) numbers rows 1..n per partition
    with no ties possible in the numbering itself — WHERE rn = 1 always returns exactly one row per account_id, which is the
    right choice when the requirement is "exactly one latest row." RANK() OVER (...) assigns identical ranks to rows that
    tie on every ORDER BY expression, so if the tie-breaker is incomplete, WHERE rnk = 1 can legitimately return more than
    one row per account — this is a feature when the domain genuinely allows simultaneous "latest" rows (e.g. two statuses
    posted in the same transaction and truly indistinguishable), but a defect if the caller expected exactly one row and did
    not add the tie-breaker.

    The correlated-subquery form (SELECT * FROM status s WHERE s.effective_ts = (SELECT MAX(effective_ts) FROM status s2 WHERE
    s2.account_id = s.account_id)) reproduces RANK''s tie behavior (multiple max-timestamp rows can come back) and additionally
    executes the subquery once per outer row, which without an index on (account_id, effective_ts) becomes an O(n) scan per
    row — analytic functions typically evaluate in a single sorted pass and are the better default in Oracle for this reason.
    The correlated form remains useful when the target engine lacks window function support or when the "latest" predicate
    needs to reference columns unavailable to an analytic ORDER BY.'
  deep_dive: ''
  key_points:
  - Partition by the business key; order by effective timestamp plus a deterministic tie-breaker.
  - ROW_NUMBER always yields exactly one row per partition; RANK can yield ties.
  - A correlated MAX subquery has the same tie behavior as RANK, and different performance.
  - Indexes and the completeness of the ORDER BY affect both correctness and performance.
  strong_signals:
  - Proactively raises the tie-break problem before being asked about it.
  - Correctly predicts that RANK/correlated-subquery can return more than one row on ties.
  - Mentions indexing (account_id, effective_ts) as relevant to the subquery's cost.
  weak_signals:
  - Treats ROW_NUMBER and RANK as interchangeable "top-1 per group" tools.
  - Writes ORDER BY effective_ts DESC with no tie-breaker and calls it deterministic.
  red_flags:
  - Claims WHERE rnk = 1 with RANK() always returns one row.
  - Cannot explain why a correlated subquery re-executes per outer row.
  common_mistakes:
  - Forgetting the tie-breaker column, producing a query that is correct today and flaky after a data change.
  - Using DENSE_RANK when the intent was RANK or ROW_NUMBER, changing gap semantics unexpectedly.
  - Filtering rn = 1 inside the same SELECT as the window function instead of an outer query (not permitted; window functions
    cannot be filtered in the same query block's WHERE).
  follow_ups:
  - question: How would you return both the latest row and the immediately previous row?
    recommended_answer: Use ROW_NUMBER with the same partition/order and filter WHERE rn <= 2, then distinguish the two with
      the rn value itself, or use LAG(effective_ts) OVER (PARTITION BY account_id ORDER BY effective_ts DESC, status_id DESC)
      alongside ROW_NUMBER to pull the previous row's timestamp onto the latest row's line without a self-join. The LAG approach
      is preferable when the goal is "latest row annotated with what changed", while ROW_NUMBER <= 2 is preferable when both
      rows need to be returned as separate output rows.
  examples: []
  code_examples:
  - "-- Exactly one latest row per account, ties broken deterministically\nSELECT * FROM (\n  SELECT s.*,\n         ROW_NUMBER()\
    \ OVER (\n           PARTITION BY account_id\n           ORDER BY effective_ts DESC, status_id DESC\n         ) AS rn\n\
    \  FROM account_status s\n) WHERE rn = 1;\n\n-- May return multiple rows per account if effective_ts ties\nSELECT * FROM\
    \ (\n  SELECT s.*,\n         RANK() OVER (PARTITION BY account_id ORDER BY effective_ts DESC) AS rnk\n  FROM account_status\
    \ s\n) WHERE rnk = 1;\n\n-- Correlated subquery equivalent (same tie behavior as RANK)\nSELECT s.*\nFROM account_status\
    \ s\nWHERE s.effective_ts = (\n  SELECT MAX(s2.effective_ts) FROM account_status s2\n  WHERE s2.account_id = s.account_id\n\
    );"
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range:
