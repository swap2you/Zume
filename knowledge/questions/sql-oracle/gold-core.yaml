- id: gold-sql-001
  domain: sql-oracle
  subdomain: joins
  title: INNER/LEFT/FULL joins and validation-row loss or duplication
  level: basic
  priority: P0
  frequency: very_common
  question: Given customers and orders, explain the difference between INNER, LEFT and FULL joins and how an incorrect join
    can silently lose or duplicate validation rows.
  concise_answer: INNER JOIN returns only customers that have at least one matching order, so a customer with zero orders
    disappears from the result with no error. LEFT JOIN keeps every customer row and fills order columns with NULL when there
    is no match, which is required for "all customers" validation. FULL JOIN adds any orders that reference a customer_id
    that no longer matches a customer row (e.g. an orphan). Because customers-to-orders is one-to-many, any join that includes
    the orders side multiplies each customer row once per matching order — counting rows with COUNT(*) after such a join overstates
    the customer count unless you aggregate with COUNT(DISTINCT customer_id) or pre-aggregate orders first.
  recommended_answer: 'The three joins encode different inclusion semantics, and a reconciliation query that picks the wrong
    one fails silently rather than erroring. INNER JOIN customers c JOIN orders o ON c.customer_id = o.customer_id keeps only
    rows where both sides match — a customer who has never ordered is simply absent from the output, which is catastrophic
    if the query''s job is "prove every customer has a valid record." LEFT JOIN customers c LEFT JOIN orders o ON ... preserves
    every customer row regardless of match and exposes the no-order case as o.order_id IS NULL, which is the standard test
    for "find customers with no orders." FULL JOIN (or FULL OUTER JOIN) additionally surfaces orders whose customer_id has
    no corresponding customer row — an orphan-order case that a LEFT JOIN from the customer side would never reveal because
    it starts enumeration from customers.

    The cardinality trap is independent of join type: customers to orders is one-to-many, so any join touching the orders
    table produces one output row per matching order, not one row per customer. A validation query that runs SELECT COUNT(*)
    FROM customers c LEFT JOIN orders o ON ... is actually counting (customer, order) pairs, and will overstate the customer
    population by exactly the excess order rows. The fix is either to aggregate orders into one row per customer_id before
    joining (a derived table with GROUP BY), or to use COUNT(DISTINCT c.customer_id) explicitly rather than COUNT(*) after
    the join. NULL handling compounds this: NULL never equals NULL in a join predicate or in aggregate comparisons, so a customer_id
    that is NULL on either side will not match in any join type and must be checked separately with IS NULL logic, not with
    = NULL.'
  deep_dive: ''
  key_points:
  - Join type represents inclusion semantics, not just a syntax choice.
  - One-to-many joins multiply rows; COUNT(*) after the join counts pairs, not entities.
  - NULL handling in outer joins is the standard way to detect "no match" rows.
  - Validate expected cardinality (rows per key) before trusting any aggregate.
  strong_signals:
  - Names the specific COUNT(o.order_id) versus COUNT(*) distinction unprompted.
  - Uses IS NULL on the outer side, not = NULL, to find non-matches.
  - Distinguishes "customer with no orders" from "orphan order" as separate queries.
  weak_signals:
  - Can define the three join types abstractly but not connect them to row multiplication.
  - Reaches for COUNT(DISTINCT ...) everywhere as a blanket fix without explaining why.
  red_flags:
  - Believes LEFT JOIN and INNER JOIN return the same row count "if there's no bug".
  - Suggests filtering NULLs with WHERE o.customer_id = NULL.
  common_mistakes:
  - Using COUNT(*) instead of COUNT(distinct_column) after a one-to-many join.
  - Filtering an outer join's NULL-producing side in the WHERE clause, which silently converts it back into an inner join.
  - Assuming FULL JOIN is only needed for "completeness" rather than as an orphan-detection tool.
  follow_ups:
  - question: How would you detect an accidental many-to-many join in a reconciliation query?
    recommended_answer: 'Compare the row count of the join result against the row count of each source table filtered to the
      same predicate: if the joined result has more rows than either side, at least one side has duplicate join-key values.
      Concretely, run SELECT customer_id, COUNT(*) FROM orders GROUP BY customer_id HAVING COUNT(*) > 1 on both tables independently
      before joining, and add a post-join sanity assertion such as "row count after join <= row count of the larger table
      times the max duplicates per key observed on the smaller table." In practice, a sudden explosion in row count during
      a reconciliation run is the first symptom, and the root cause is almost always a join key that is not unique on at least
      one side, often a missing date/version qualifier in the ON clause.'
  examples: []
  code_examples:
  - '-- Wrong: silently drops customers with zero orders

    SELECT c.customer_id, COUNT(*) AS order_count

    FROM customers c JOIN orders o ON c.customer_id = o.customer_id

    GROUP BY c.customer_id;


    -- Correct: every customer appears, zero-order customers show count 0

    SELECT c.customer_id, COUNT(o.order_id) AS order_count

    FROM customers c LEFT JOIN orders o ON c.customer_id = o.customer_id

    GROUP BY c.customer_id;


    -- Find customers with no orders at all

    SELECT c.customer_id

    FROM customers c LEFT JOIN orders o ON c.customer_id = o.customer_id

    WHERE o.order_id IS NULL;


    -- Find orphan orders (customer_id with no matching customer row)

    SELECT o.order_id, o.customer_id

    FROM customers c FULL JOIN orders o ON c.customer_id = o.customer_id

    WHERE c.customer_id IS NULL;'
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range:
