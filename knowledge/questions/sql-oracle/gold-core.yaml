- id: gold-sql-005
  domain: sql-oracle
  subdomain: indexes-execution-plans
  title: Diagnosing a validation query that times out only at production-like volume
  level: advanced
  priority: P2
  frequency: occasional
  question: A validation query works on small data but times out in production-like volumes. Explain how you would inspect
    its execution plan and improve it without changing correctness.
  concise_answer: 'Run EXPLAIN PLAN (or capture the actual plan from V$SQL_PLAN / DBMS_XPLAN for the executed statement) and
    read it for access paths, join methods, cardinality estimates and sort operations. On small data a full table scan and
    a nested-loop join are cheap, but at production volume they scale linearly or worse per outer row; the plan will typically
    show a large estimated-versus-actual row-count mismatch (visible via DBMS_XPLAN.DISPLAY_CURSOR with STATISTICS_LAST) pointing
    at stale optimizer statistics, or a predicate wrapped in a function that disables an otherwise-usable index. Fixes that
    do not change correctness: add or use an index that matches the actual filter/join columns, rewrite a function-wrapped
    predicate to a function-based index or an equivalent sargable form, gather fresh statistics on the larger dataset, and
    re-measure before and after rather than assuming the change helped.'
  recommended_answer: 'The diagnostic sequence: (1) Get the real plan for the real statement — EXPLAIN PLAN FOR <query> followed
    by SELECT * FROM TABLE(DBMS_XPLAN.DISPLAY) shows the optimizer''s chosen plan and estimated cardinalities; better, execute
    the statement with statistics enabled (ALTER SESSION SET STATISTICS_LEVEL = ALL) and pull SELECT * FROM TABLE(DBMS_XPLAN.DISPLAY_CURSOR(NULL,
    NULL, ''ALLSTATS LAST'')) to compare Estimated Rows against Actual Rows per plan step — a large disagreement is the single
    most common root cause of "fast on small data, slow at scale." (2) Identify the specific operation that dominates cost
    — a full table scan feeding a nested loop is fine at hundreds of rows and disastrous at millions, because nested loops
    cost roughly outer-rows times inner-lookup-cost; the optimizer often switches to nested loops itself when statistics understate
    the outer row count. (3) Check predicates for sargability: WHERE TRUNC(order_date) = :d or UPPER(customer_name) = :n cannot
    use a plain b-tree index on order_date or customer_name; either rewrite the predicate to a range (order_date >= :d AND
    order_date < :d + 1) or create a function-based index matching the exact expression. (4) Verify statistics are representative
    of the larger dataset — stats gathered against a 100-row dev table do not describe a 50-million-row production table''s
    data distribution, histograms or clustering factor, and the optimizer will choose a plan optimized for the wrong shape
    of data.

    None of these changes correctness because they only affect how the same result set is retrieved: adding an index, rewriting
    a predicate to an equivalent sargable form, or refreshing statistics never changes which rows qualify. Every change must
    be measured with before/after execution plans and timings on representative data volume — "it looks like it should be
    faster" is not evidence, and an index added blindly in production can also slow down writes or be ignored by the optimizer
    if selectivity assumptions are wrong.'
  deep_dive: ''
  key_points:
  - Check access paths, cardinality estimates (estimated vs actual), join methods, sorts and predicates.
  - Avoid functions/expressions on indexed columns that prevent index use (sargability).
  - Use statistics representative of production-like volume, not dev-sized data.
  - Measure before and after; never add indexes to production without evidence.
  strong_signals:
  - Goes straight to actual-vs-estimated cardinality as the primary diagnostic signal.
  - Identifies a function-wrapped predicate as an index-defeating pattern and proposes a sargable rewrite.
  - Insists on measuring with production-representative statistics before concluding.
  weak_signals:
  - Jumps directly to "add an index" without reading the plan first.
  - Cannot explain why nested-loop cost scales with outer row count.
  red_flags:
  - Adds indexes to a production table without measuring impact on writes or existing plans.
  - Assumes EXPLAIN PLAN's estimated rows are always accurate.
  common_mistakes:
  - Testing the fix against the same small dataset that never reproduced the problem.
  - Wrapping a WHERE column in a function for convenience without considering index usability.
  - Gathering statistics with default sampling that misses skewed data distributions needing histograms.
  follow_ups:
  - question: How can bind-variable behavior or stale statistics change the chosen plan?
    recommended_answer: 'Bind-variable peeking means the optimizer builds its first plan using the actual value bound on the
      first execution and then reuses that plan for later executions with different bind values — a plan optimized for a highly
      selective value can be reused (and be terribly wrong) for a common value, producing inconsistent performance for a query
      that looks textually identical. Adaptive cursor sharing/SQL plan directives can mitigate this by allowing different
      plans per bind-value bucket. Stale statistics compound the problem: if the optimizer''s cardinality estimates no longer
      reflect the table''s actual size or distribution, both the initial plan choice and any bind-sensitive re-planning are
      based on wrong assumptions, so refreshing statistics (and histograms for skewed columns) is often the fix even when
      the query text never changed.'
  examples: []
  code_examples:
  - "-- Capture the real executed plan with actual vs estimated cardinality\nALTER SESSION SET STATISTICS_LEVEL = ALL;\n--\
    \ run the query once\nSELECT * FROM TABLE(\n  DBMS_XPLAN.DISPLAY_CURSOR(NULL, NULL, 'ALLSTATS LAST')\n);\n\n-- Non-sargable\
    \ predicate that disables an index on order_date\nWHERE TRUNC(order_date) = TO_DATE('2026-07-16','YYYY-MM-DD')\n-- Sargable\
    \ rewrite that can use a b-tree index on order_date\nWHERE order_date >= DATE '2026-07-16'\n  AND order_date <  DATE '2026-07-17'"
