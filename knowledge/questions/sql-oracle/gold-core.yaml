- id: gold-sql-004
  domain: sql-oracle
  subdomain: duplicates-data-quality
  title: SQL checks for duplicates, orphans, invalid ranges and reconciliation mismatches
  level: intermediate
  priority: P1
  frequency: common
  question: Design SQL checks that detect duplicates, orphan records, invalid ranges and cross-table reconciliation mismatches.
  concise_answer: 'Start from an explicit business key and its expected cardinality (e.g. one row per (account_id, effective_date)).
    Duplicates: GROUP BY the business key HAVING COUNT(*) > 1. Orphans: a NOT EXISTS or LEFT JOIN ... WHERE right.key IS NULL
    anti-join from the dependent table to its parent. Invalid ranges: direct predicate checks (end_date < start_date, amount
    < 0, status NOT IN (...)) surfaced as a row-level report, not just a pass/fail count. Cross-table reconciliation: compare
    aggregates first (sum, count per key) to localize which keys differ, then drill into row-level differences only for the
    mismatched keys, with an explicit, documented tolerance for rounding or timing differences rather than exact equality.'
  recommended_answer: 'Each check needs its business-key and cardinality definition made explicit before writing SQL, because
    "duplicate" and "orphan" are meaningless without knowing what uniquely identifies a valid row. Duplicates: SELECT key_cols,
    COUNT(*) FROM t GROUP BY key_cols HAVING COUNT(*) > 1 — returning the offending keys and their counts, not just a boolean,
    so triage does not require rerunning a broader query. Orphans: an anti-join is more efficient and clearer than NOT IN
    (which behaves incorrectly if the parent-side column can contain NULL) — SELECT c.* FROM child c LEFT JOIN parent p ON
    c.parent_id = p.parent_id WHERE p.parent_id IS NULL, or the equivalent NOT EXISTS form, which Oracle typically optimizes
    to an anti-join plan.

    Invalid ranges and constraint-shaped checks (date ordering, non-negative amounts, enumerated status values, referential
    date windows) should each be a named, independent predicate returning the violating rows plus the values that violated
    it, so a report can list "17 rows failed check X" with evidence rather than an aggregate pass/fail. Cross-table reconciliation
    (e.g. source system total versus warehouse total) should be layered: first compare grouped aggregates per reconciliation
    key (SUM/COUNT by key) to identify which keys disagree cheaply, then only pull full row-level detail for the disagreeing
    keys to explain the difference. Tolerances (rounding to two decimal places, a bounded time-window difference) must be
    explicit constants reviewed with the business, not an accidental byproduct of a JOIN or a CAST.

    All of these checks should be written to report evidence — the specific keys, counts and values involved — because a validation
    suite that only emits pass/fail forces a second investigative query cycle before anyone can act.'
  deep_dive: ''
  key_points:
  - Define business keys and expected cardinality before writing any check.
  - Use GROUP BY/HAVING for duplicates, anti-joins (not NOT IN) for orphans.
  - Compare aggregates first, then row-level differences, for reconciliation.
  - Make tolerances explicit and report evidence, not just pass/fail.
  strong_signals:
  - Insists on defining the business key and cardinality before proposing SQL.
  - Chooses anti-join over NOT IN and explains the NULL-correctness reason.
  - Designs reconciliation as aggregate-first, then drill-down, not one giant row-diff query.
  weak_signals:
  - Writes checks that return only counts, with no way to identify the offending rows.
  - Uses NOT IN for orphan detection without considering NULLs.
  red_flags:
  - Treats "no rows returned" as proof of correctness without validating the check logic itself.
  - Hardcodes a tolerance without documenting why that value was chosen.
  common_mistakes:
  - Comparing floating-point or rounded currency values with exact equality.
  - Forgetting that a LEFT JOIN anti-join pattern breaks if filters are placed in the ON clause instead of WHERE.
  - Running duplicate/orphan checks against a table snapshot taken at a different time than the reconciliation source.
  follow_ups:
  - question: How would you report enough evidence to investigate without exporting sensitive rows?
    recommended_answer: Report the business key, the check name, the count and derived/aggregated values (differences, counts,
      date ranges) rather than full row content; mask or omit PII columns and free-text fields by default. When a human needs
      full row detail to investigate, provide a narrow, audited lookup path (a query-by-key tool or a time-boxed access grant)
      rather than including raw rows in the automated report output, and log who accessed the detail and why.
  examples: []
  code_examples:
  - "-- Duplicates on the business key, with counts\nSELECT account_id, effective_date, COUNT(*) AS dup_count\nFROM account_status\n\
    GROUP BY account_id, effective_date\nHAVING COUNT(*) > 1;\n\n-- Orphan child rows (anti-join, safe with NULL parent_id)\n\
    SELECT c.*\nFROM orders c\nLEFT JOIN customers p ON c.customer_id = p.customer_id\nWHERE p.customer_id IS NULL;\n\n--\
    \ Invalid range check with evidence\nSELECT order_id, start_date, end_date\nFROM contracts\nWHERE end_date < start_date;\n\
    \n-- Reconciliation: aggregate mismatch first\nSELECT s.account_id, s.total AS source_total, w.total AS warehouse_total,\n\
    \       ABS(s.total - w.total) AS diff\nFROM source_totals s\nJOIN warehouse_totals w ON s.account_id = w.account_id\n\
    WHERE ABS(s.total - w.total) > 0.01;"
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range:
  - 3
  - 12
  tags:
  - sql
  - oracle
  - data-quality
  - duplicates
  - orphans
  - reconciliation
  - anti-join
  estimated_minutes: 6
