- id: gold-sql-003
  domain: sql-oracle
  subdomain: transactions-acid
  title: Isolation levels and stale, non-repeatable or phantom data in validation tests
  level: intermediate
  priority: P0
  frequency: very_common
  question: Explain how transaction isolation can cause a database validation test to see stale, non-repeatable or phantom
    data.
  concise_answer: 'Isolation controls what a transaction is allowed to see of concurrent, uncommitted or newly committed changes.
    Oracle''s default READ COMMITTED means a query only ever sees data committed before the query started, so a validation
    query that runs immediately after the application writes but before that write''s transaction commits sees stale (pre-write)
    data — this is not a bug in Oracle, it is the test polling before the fact it depends on was actually committed. Re-running
    the exact same query twice within one transaction can also return different results (non-repeatable read) because each
    statement in READ COMMITTED gets its own snapshot; a new row matching the query''s predicate that appears between the
    two reads is a phantom read. The practical rule for test code: never assume "the write happened" just because the application
    call returned — poll for the committed business state (e.g. status = ''COMPLETE'') with a timeout, and be explicit about
    whether the test''s own connection and the application''s connection are in the same transaction or different ones.'
  recommended_answer: 'Oracle only implements two isolation levels directly: READ COMMITTED (the default) and SERIALIZABLE,
    both built on multiversion read consistency rather than blocking readers. Under READ COMMITTED, each individual SQL statement
    sees a snapshot of the data as of the moment that statement began, taken from undo segments if necessary; it never sees
    uncommitted changes from another session (dirty reads are impossible), but two statements in the same transaction can
    each get a different snapshot, so the same query issued twice can return different row sets (non-repeatable read) or additional
    rows that satisfy the predicate but did not exist during the first read (phantom read). SERIALIZABLE instead takes one
    snapshot for the entire transaction, eliminating non-repeatable and phantom reads within that transaction, at the cost
    of ORA-08177 "cannot serialize access" when a write conflict is detected at commit.

    For automated validation, the failure mode is almost always about transaction and connection boundaries rather than the
    isolation level itself: the application performs a write and returns success to the test as soon as its local transaction
    commits, but the test''s separate connection/session only becomes able to see that data after that commit is visible to
    new snapshots. If the test queries too early — even a few milliseconds early — it sees the prior state, which looks like
    "stale data" but is actually a race between the test and the commit. Sleeping a fixed duration is not reliable; the correct
    pattern is polling with a timeout for the specific committed business condition (e.g. WHERE status = ''COMPLETE'' AND
    updated_at > :start), because that predicate is what the test actually depends on, not wall-clock time. Autocommit also
    matters: if the test''s own connection is in autocommit mode while it performs setup, each setup statement commits independently,
    which can itself create interim states that a concurrently running validation query observes as "phantom" rows relative
    to what the test author had in mind as a single atomic setup.'
  deep_dive: ''
  key_points:
  - Isolation controls visibility and locking, not correctness of the write itself.
  - Autocommit boundaries and connection/session separation change what a test observes.
  - Test setup and the application's write may not be committed together, or committed at all yet.
  - Poll for the committed business state with a timeout; do not use a fixed sleep.
  strong_signals:
  - Distinguishes statement-level snapshot from transaction-level snapshot in Oracle.
  - Identifies the test/application connection and commit-timing race as the real defect, not "the database is inconsistent".
  - Proposes condition-based polling instead of sleep-based waits.
  weak_signals:
  - Can define isolation levels academically but not connect them to the observed test flakiness.
  - Assumes the test and application always share one transaction without checking.
  red_flags:
  - Believes Oracle supports dirty reads under READ COMMITTED.
  - Adds a longer Thread.sleep as the permanent fix for a flaky validation query.
  common_mistakes:
  - Validating immediately after an asynchronous or fire-and-forget call with no wait strategy.
  - Running setup and validation in autocommit mode without considering interleaving.
  - Treating a non-repeatable read inside the test's own multi-statement transaction as a database bug.
  follow_ups:
  - question: How would you test a lost-update scenario safely?
    recommended_answer: 'Reproduce it deliberately rather than hoping for a race: open two sessions, have session A read a
      row, have session B read and then update and commit the same row, then have session A update based on its stale read
      and commit. Assert that session A''s update either overwrote session B''s change (proving the lost-update risk exists
      without protection) or was blocked/rejected (proving the protection works) — for example via SELECT ... FOR UPDATE causing
      session A to block until B commits, or an optimistic version/row-version column causing A''s update to affect zero rows
      and be detected by the application. The test must control commit ordering explicitly (via synchronization barriers between
      the two sessions) rather than relying on timing, or it will be flaky.'
  examples: []
  code_examples:
  - "-- Unreliable: assumes the write is visible immediately after the call returns\napplicationClient.submitOrder(orderId);\n\
    ResultSet rs = query(\"SELECT status FROM orders WHERE order_id = ?\", orderId);\nassertEquals(\"SUBMITTED\", rs.getString(\"\
    status\")); -- may see pre-write / stale row\n\n-- Reliable: poll for the committed business condition with a bounded\
    \ timeout\napplicationClient.submitOrder(orderId);\nawaitCondition(Duration.ofSeconds(10), () ->\n  \"SUBMITTED\".equals(query(\n\
    \    \"SELECT status FROM orders WHERE order_id = ?\", orderId).getString(\"status\")));"
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range:
  - 3
  - 12
  tags:
  - sql
  - oracle
  - transactions
  - isolation
  - read-committed
  - flaky-tests
  - concurrency
  estimated_minutes: 6
  references:
  - source_id: oracle-sql
    locator: Database Concepts — "Data Concurrency and Consistency" chapter, read consistency and isolation levels
  - source_id: oracle-sql
    locator: Database SQL Language Reference — SET TRANSACTION statement, ISOLATION LEVEL clause (READ COMMITTED, SERIALIZABLE)
