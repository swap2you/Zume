- id: gold-sql-006
  domain: sql-oracle
  subdomain: oracle-functions
  title: Oracle pitfalls — empty string as NULL, DATE vs TIMESTAMP, time zones, implicit conversion
  level: advanced
  priority: P2
  frequency: occasional
  question: Explain common Oracle-specific pitfalls involving empty strings, NULL, DATE versus TIMESTAMP, time zones and implicit
    conversion.
  concise_answer: Oracle treats a zero-length VARCHAR2/CHAR string as NULL in SQL, so WHERE column = '' never matches anything
    and INSERT of '' stores NULL, unlike most other databases where empty string is a distinct value from NULL. DATE always
    stores a time component down to the second (even when only a date is intended), so date-only comparisons need explicit
    truncation or range predicates or they silently exclude rows with a non-midnight time. TIMESTAMP adds fractional seconds
    and, in the WITH TIME ZONE/WITH LOCAL TIME ZONE variants, time-zone-aware storage and display that depends on the session's
    time zone setting — comparing a TIMESTAMP WITH TIME ZONE value across sessions with different time zones can look inconsistent
    if the display, not the underlying instant, is what changed. Implicit conversion (comparing a VARCHAR2 column to a NUMBER
    or DATE literal) depends on NLS session settings for date/number format and can throw ORA-01858/ORA-01722 on malformed
    data or silently misinterpret ambiguous formats — tests should use explicit TO_DATE/TO_TIMESTAMP/TO_NUMBER with an explicit
    format mask rather than relying on implicit conversion.
  recommended_answer: 'Empty string versus NULL: Oracle''s SQL engine (unlike the ANSI SQL standard strictly, and unlike PostgreSQL/SQL
    Server) treats '''' as NULL for VARCHAR2 and CHAR — assigning '''' to a column stores NULL, and any predicate comparing
    a column to '''' (col = '''') is really comparing to NULL and therefore never true (three-valued logic: NULL comparisons
    evaluate to unknown, not true). Tests that assert "field was set to empty string" by checking = '''' will always fail
    silently as "no rows"; the correct check is IS NULL, and application code that relies on distinguishing "explicitly cleared"
    from "never set" cannot use a plain VARCHAR2 column for that in Oracle.

    DATE versus TIMESTAMP: Oracle''s DATE type always includes hour/minute/second (century to second precision) even when
    the application only cares about the calendar date — a value inserted as TO_DATE(''2026-07-16'',''YYYY-MM-DD'') is midnight,
    but any other code path that writes the "same" date with a non-zero time (SYSDATE, for example) will fail an exact equality
    check even though both represent "July 16". The safe pattern is a half-open range (col >= d AND col < d + 1) or TRUNC(col)
    = d, being aware TRUNC on an indexed column prevents normal index use unless a function-based index exists. TIMESTAMP
    adds fractional-second precision and two time-zone-aware variants: TIMESTAMP WITH TIME ZONE stores the UTC offset with
    the value and always displays it in the stored offset; TIMESTAMP WITH LOCAL TIME ZONE stores in the database''s time zone
    but displays converted to the querying session''s time zone — the same stored row can render differently to two sessions
    with different SESSIONTIMEZONE settings, which looks like a data bug but is a display/session artifact.

    Implicit conversion: comparing a VARCHAR2 to a DATE or NUMBER triggers Oracle to apply an implicit TO_DATE/TO_NUMBER using
    the session''s NLS_DATE_FORMAT or NLS_NUMERIC_CHARACTERS, which differs across sessions, clients and locales; the same
    query can succeed in one environment and throw ORA-01858 "a non-numeric character was found where a numeric was expected"
    or silently parse a date as the wrong day/month order in another. Tests and application queries should always convert
    explicitly with an explicit format mask (TO_DATE(x, ''YYYY-MM-DD''), TO_NUMBER(x, ''999.99'')) so behavior does not depend
    on session NLS settings, and daylight-saving or time-zone-dependent assertions should normalize to UTC before comparison
    rather than comparing local wall-clock strings.'
  deep_dive: ''
  key_points:
  - Oracle treats an empty string as NULL for VARCHAR2/CHAR; use IS NULL, not = ''.
  - DATE always carries a time component to the second; use ranges, not exact equality, for date-only checks.
  - TIMESTAMP WITH (LOCAL) TIME ZONE display depends on session time-zone settings, not just stored data.
  - Implicit conversion depends on NLS session settings; always convert explicitly with a format mask.
  strong_signals:
  - States the empty-string-as-NULL behavior unprompted and gives the IS NULL correction.
  - Proposes a half-open date range instead of exact equality for date-only comparisons.
  - Distinguishes stored instant from display time zone for TIMESTAMP WITH LOCAL TIME ZONE.
  weak_signals:
  - Knows DATE includes time but does not connect it to failed equality assertions.
  - Uses implicit conversion in test assertions and blames "environment differences" without diagnosing NLS settings.
  red_flags:
  - Assumes Oracle behaves like other RDBMSes where '' and NULL are distinct.
  - Compares TIMESTAMP WITH TIME ZONE values as raw strings across environments.
  common_mistakes:
  - Asserting col = '' to verify a field was cleared, and treating a false "no rows" as absence of a bug.
  - Hardcoding date literals without a time-zone-aware conversion, breaking near daylight-saving transitions.
  - Relying on default NLS_DATE_FORMAT in CI, which can differ from a developer's local session.
  follow_ups:
  - question: How would you make a date/time assertion stable across sessions and daylight-saving changes?
    recommended_answer: Always convert with an explicit format mask (TO_DATE/TO_TIMESTAMP_TZ with a literal pattern) rather
      than relying on NLS session defaults, store and compare in UTC (TIMESTAMP WITH TIME ZONE normalized, or explicit AT
      TIME ZONE 'UTC' conversions) so daylight-saving transitions in a display time zone never affect the underlying comparison,
      and use half-open ranges for date-only assertions instead of exact equality. In CI, pin the session's NLS_DATE_FORMAT
      and time zone explicitly at the start of the test run so the assertion does not depend on the executing machine's locale
      or the database client's defaults.
  examples: []
  code_examples:
  - '-- Never matches, because '''' is stored/compared as NULL

    SELECT * FROM customers WHERE middle_name = '''';

    -- Correct check for "explicitly empty" (which Oracle cannot distinguish from unset)

    SELECT * FROM customers WHERE middle_name IS NULL;


    -- Exact-equality DATE check that silently excludes non-midnight rows

    SELECT * FROM orders WHERE order_date = DATE ''2026-07-16'';

    -- Correct half-open range, independent of time-of-day and index-friendly

    SELECT * FROM orders

    WHERE order_date >= DATE ''2026-07-16'' AND order_date < DATE ''2026-07-17'';


    -- Implicit conversion depends on session NLS_DATE_FORMAT; can throw or misparse

    SELECT * FROM orders WHERE order_date = ''07/16/2026'';

    -- Explicit conversion is session-independent

    SELECT * FROM orders WHERE order_date = TO_DATE(''2026-07-16'', ''YYYY-MM-DD'');'
