- id: vendor-economics-b-01
  domain: vendor-economics
  subdomain: selection
  title: 'Selection: basic decision'
  level: basic
  priority: P0
  frequency: very_common
  question: What problem does selection address, and what is its practical boundary?
  concise_answer: Selection should be applied to a stated outcome, observable evidence, and known constraints;
    using it as a ritual is not enough. In Vendor/tool evaluation and quality economics, validate both
    the intended result and the meaningful negative or failure path before treating it as reliable.
  recommended_answer: Start by naming the decision that selection supports and the invariant it must preserve.
    Choose the smallest mechanism that exposes inputs, outputs, failures, and ownership; then test representative
    normal, boundary, and failure cases. Explain the trade-off rather than claiming a single universal
    pattern, and use telemetry or review evidence to revise the design when reality differs.
  deep_dive: Probe for a concrete Vendor/tool evaluation and quality economics example, competing constraints,
    and evidence that would change the candidate's decision.
  key_points:
  - states an invariant
  - uses evidence
  - names trade-offs
  strong_signals:
  - distinguishes symptom from root cause
  - defines a bounded validation strategy
  weak_signals:
  - recites a tool feature without a decision context
  red_flags:
  - claims a pattern is universally correct
  - hides or ignores failure evidence
  common_mistakes:
  - testing only a happy path
  - confusing activity with outcome
  follow_ups:
  - question: What evidence would make you revise your selection approach?
    recommended_answer: A repeatable failure, a violated invariant, or telemetry showing the design misses
      its stated outcome should trigger review. Reproduce the evidence, classify the scope, and change
      the smallest responsible layer.
  examples:
  - Use a small, representative selection case before generalizing.
  role_tracks:
  - QA Manager
  - Quality Engineering Manager
  - Quality Engineering Lead
  years_range:
  - 1
  - 8
  tags:
  - vendor-economics
  - selection
  - basic
  estimated_minutes: 4
  references:
  - source_id: istqb-glossary
    locator: selection
  last_verified: '2026-07-15'
  freshness_days: 365
