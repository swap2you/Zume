- id: gold-arch-004
  domain: debugging-reliability
  subdomain: retry-vs-repair
  title: Why a blanket retry-twice policy hides defects, and a safer alternative
  level: intermediate
  priority: P0
  frequency: very_common
  question_type: framework_design
  question: >-
    A team proposes retrying every failed test twice before reporting a failure. Evaluate the proposal
    and design a safer retry policy. Which failures must never be retried automatically?
  concise_answer: >-
    Blanket retry-everything-twice is dangerous because it treats 'passed on retry' as equivalent to 'passed',
    silently absorbing real intermittent defects, race conditions, timing bugs, actual flaky product behavior,
    into a green build with no record. A safer policy retries only failures already evidenced as belonging
    to a known-retryable class, transient network or environment errors, specific documented flaky-infrastructure
    conditions, applies a bounded number of attempts with backoff, always preserves and reports the first-failure
    evidence and retry count, and tracks retry rate as a trend metric that triggers investigation if it
    rises. Assertion failures representing an actual behavioral mismatch, and known product-defect signatures,
    must never be auto-retried; they should fail once and stay visible.
  recommended_answer: |-
    Retry-twice-then-it's-fine optimizes for a green dashboard over defect detection, and the math makes the risk concrete: a test that genuinely fails about thirty percent of the time will pass at least once across three attempts roughly ninety-one percent of the time, so a blanket policy converts a real, actionable reliability problem into something that is almost entirely invisible on a dashboard. Retries should instead be scoped to specific, evidenced failure signatures, for example a particular timeout exception known to correlate with a documented infrastructure issue, rather than 'any failure'.

    Every retry must be logged with the original failure's stack trace, screenshot, and evidence preserved, not overwritten, so trend dashboards can show retry rate per test and flag tests whose retry rate is creeping up, which is a leading indicator of a real defect being masked rather than resolved. Any retry-classification rule tied to a specific known issue should carry an expiry so it does not outlive the issue's fix and keep masking a problem that no longer exists for the reason it was written. The policy needs an owner who reviews the retry-rate trend, and a rising retry rate for a given test should trigger the same investigation as a hard failure, not be treated as already handled.

    A never-retry list keeps the policy honest: assertion failures against documented expected behavior, data-integrity or security-control check failures, which must always be investigated rather than masked, and any failure category not yet classified with evidence, since auto-retrying unknowns removes both the incentive and the trail needed to ever classify them properly.
  key_points:
  - >-
    Blanket retry-everything policies convert real intermittent defects into statistically likely passes.
  - >-
    Scope retries to specific, evidenced failure signatures with bounded attempts and backoff, not 'any
    failure'.
  - >-
    Preserve and report first-failure evidence and retry count even when a later attempt passes.
  - Track retry rate as a trend metric and investigate tests whose rate rises.
  - >-
    Never auto-retry assertion failures, data-integrity or security failures, or unclassified unknown
    failures.
  strong_signals:
  - Quantifies why blanket retries hide defects with a probability argument.
  - Proposes scoping retries to evidenced classes with an expiry.
  - Insists on preserving first-failure evidence and tracking retry-rate trend.
  weak_signals:
  - Accepts retry-twice as 'standard practice' without quantifying the masking effect.
  - Has no plan for reporting retry counts.
  red_flags:
  - Treats a passing rerun as equivalent to no failure ever occurring, with no record kept.
  - Would retry assertion or security-check failures automatically.
  common_mistakes:
  - Unbounded or unlogged retries.
  - No distinction between failure classes when deciding to retry.
  - No periodic review of which tests are retried most often.
  follow_ups:
  - question: Which failures must never be retried automatically?
    recommended_answer: >-
      Assertion failures documenting an actual mismatch between expected and observed application behavior,
      data-integrity or security-control failures, which must be investigated rather than masked, and
      any failure whose cause is not yet classified with evidence, unknowns, because auto-retrying unknowns
      removes the incentive and the trail needed to ever classify them properly.
  - question: >-
      How would you report retry rate so it doesn't just become another ignored dashboard number?
    recommended_answer: >-
      Publish retry rate per test, not just per suite, alongside pass or fail trend, with an alert threshold
      that flags a specific test once its retry rate crosses a set level over a rolling window; route
      that alert to the test's owner as an action item with an expectation of root-causing within a defined
      time, and periodically review the aggregate retry rate at a team level as a reliability metric alongside
      escaped-defect counts, so rising retries are treated with the same severity as rising failure counts.
  role_tracks: *id002
  years_range:
  - 4
  - 14
