- id: gold-arch-002
  domain: framework-architecture
  subdomain: parallelism-thread-safety
  title: Design decisions required before scaling a framework across threads
  level: advanced
  priority: P0
  frequency: common
  question_type: framework_design
  question: >-
    A framework must scale from one local test to distributed parallel execution. Which design decisions
    must be made before adding threads?
  concise_answer: >-
    Before any thread count is raised, the framework needs explicit resource ownership, each execution
    unit creates and owns its own driver or connection, never a shared static; enforced data isolation,
    unique or partitioned test data per execution unit; deterministic artifact naming keyed by a correlation
    ID that includes run, test, and thread rather than a reused filename; immutable configuration and
    capabilities built fresh per execution unit; awareness of external rate or environment limits such
    as API quotas or grid concurrency caps; and guaranteed cleanup and failure containment so one test's
    crash cannot leak state or resources into another's run. Only after those are true does raising thread
    count produce more throughput instead of more flakiness.
  recommended_answer: |-
    Resource ownership generalizes the classic ThreadLocal-driver discussion to distributed workers: each worker process should be fully isolated so ownership is largely a non-issue at that granularity, but within a worker running multiple threads it still matters, and the rule is that whatever creates a resource, a driver session, a connection, also owns its cleanup, never a field shared implicitly across executions. Data isolation means test-data factories generate unique keys per execution rather than relying on a fixed shared row, or a shared dataset is explicitly partitioned by worker index so two parallel tests never contend for the same record.

    Artifact naming is an easy failure mode to overlook: two parallel tests writing to a fixed filename such as screenshot.png silently overwrite each other, so correlation IDs, run, test, and thread identity, must be baked into every artifact path before scaling, not retrofitted after collisions are observed. Configuration immutability matters because a capabilities object built once and then mutated by reference is a classic race when a builder is reused across threads; capabilities should be constructed fresh, or as an immutable value, per execution unit.

    External rate and environment limits, a login API's rate limit, a Selenium Grid or cloud vendor's concurrent-session quota, a database's connection-pool size, cap useful parallelism regardless of how many local threads are available, and exceeding them produces queuing or errors that are easily misread as flaky test failures rather than capacity exhaustion. Finally, cleanup and failure containment must guarantee that a crashed worker or thread does not hold a lock, leave a browser session open, or leave a database transaction uncommitted in a way that blocks other execution units.

    Measuring the useful parallelism ceiling should be evidence-based: run the same suite at increasing concurrency, one, two, four, eight, sixteen, and so on, recording wall-clock time, failure rate, and resource saturation, CPU, memory, network, external API error and latency. The ceiling is the concurrency level where marginal wall-clock improvement flattens or failure and error rates start rising due to saturation, and it should be re-measured whenever the environment or suite composition changes materially, rather than assumed to be a fixed number.
  key_points:
  - >-
    Establish explicit resource ownership, data isolation, artifact naming, and configuration immutability
    before scaling threads.
  - >-
    Account for external rate and environment limits, API quotas, grid or cloud concurrency caps, that
    cap useful parallelism independent of local capacity.
  - >-
    Guarantee cleanup and failure containment so one execution unit's failure cannot leak into another's.
  - >-
    Measure the parallelism ceiling empirically: wall-clock time and failure or error rate versus concurrency,
    not intuition.
  - >-
    Re-measure the ceiling whenever environment capacity, suite composition, or infrastructure changes.
  strong_signals:
  - >-
    Lists a concrete ownership, isolation, naming, configuration, limits, and cleanup checklist unprompted.
  - >-
    Proposes a concurrency-versus-wall-clock-and-failure-rate measurement methodology for finding the
    ceiling.
  weak_signals:
  - >-
    Says 'just increase thread count and see what breaks' without a systematic measurement plan.
  - Ignores external rate limits as a ceiling factor.
  red_flags:
  - >-
    Assumes more threads always means more throughput with no diminishing returns or environment constraints.
  - Has no plan for cleanup when a worker crashes mid-test.
  common_mistakes:
  - Hardcoded artifact filenames colliding under parallel runs.
  - Shared mutable capability or configuration builders reused across threads.
  - >-
    Discovering a vendor's grid concurrency cap only when sessions start silently queuing in production
    CI.
  follow_ups:
  - question: What measurements determine the useful parallelism ceiling?
    recommended_answer: >-
      Plot suite wall-clock duration and failure or error rate against increasing concurrency levels while
      also sampling resource saturation, CPU and memory on runners, external API latency and error codes,
      grid or cloud session queue depth; the ceiling is the concurrency level just before wall-clock gains
      flatten or failure and error rates begin rising due to saturation rather than genuine defects. Beyond
      that point, added threads buy queuing and flakiness, not speed.
  - question: >-
      How would you diagnose whether a parallelism-related failure is a framework bug versus an environment
      capacity limit?
    recommended_answer: >-
      Reproduce at the same concurrency against an environment with headroom, a higher quota, an isolated
      grid; if the failure disappears, it is capacity-bound, not a framework defect. If it persists, inspect
      for the ownership and isolation classes of bugs, shared static state, colliding artifact names,
      stale ThreadLocal, using correlation IDs in logs to trace which two execution units collided.
  role_tracks: *id001
  years_range:
  - 6
  - 18
