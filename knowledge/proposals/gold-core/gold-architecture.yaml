- id: gold-arch-005
  domain: cicd
  subdomain: test-selection
  title: Risk-based PR test selection with an audited floor and an AI-safety bar
  level: advanced
  priority: P1
  frequency: common
  question_type: framework_design
  question: >-
    Design risk-based test selection for pull requests without creating blind spots. Which evidence should
    drive the selection, and how would you evaluate whether an AI-based test-selection approach is actually
    safe to trust?
  concise_answer: >-
    Build an explicit map from code, components, and contracts to the tests that exercise them, via coverage
    data, dependency graphs, or ownership metadata, always run a small set of critical smoke or invariant
    tests on every PR regardless of the selection algorithm's output, use historical failure and change
    data to prioritize, not exclude, additional tests, and fall back to the broader suite whenever confidence
    in the mapping is low, new files, cross-cutting changes, sparse history for the touched area. Continuously
    audit for blind spots by periodically running the full suite and comparing against what the selective
    approach would have chosen, tracking any defect a broader run caught but the selective run would have
    missed.
  recommended_answer: |-
    The code-to-test map can come from coverage instrumentation, which tests exercised which lines or methods on a prior full run, or from static dependency analysis, but either source goes stale as code changes, and a stale map is worse than no map because it creates false confidence while quietly skipping tests that now matter. The map must be refreshed on a defined cadence, not built once and trusted indefinitely.

    Regardless of what the selection algorithm decides, a fixed tier of critical invariant tests, smoke tests and high-severity regression guards, should run on every PR unconditionally, so even a wrong selection decision cannot skip the tests that catch the worst outcomes. Historical failure and change data, for example files that have historically correlated with test failures, is a legitimate signal for prioritizing or widening the selected set, but it should never be the sole basis for skipping tests outright.

    Explicit low-confidence triggers should widen selection to the full suite: large diffs, changes to shared or core modules, new files with no coverage history, and changes to build or CI configuration itself all warrant broader coverage rather than trusting a thin mapping. Auditing closes the loop: run the full suite on a schedule, or across a sample of PRs, and diff its results against what the selective approach would have chosen, treating any missed defect as a bug in the selection model that must be fixed, not an acceptable cost of speed.

    An AI-based selector should be evaluated exactly like any other risk model: measure its precision and, more importantly, its recall or miss rate against the same full-suite ground truth; require it to expose which changed files it associated with which tests so specific decisions can be audited; run it in shadow or advisory mode, recording what it would have selected without acting on it, before ever letting it actually skip tests; and keep the same fixed critical-invariant floor that the model's decision can never override, so a wrong AI judgment cannot silently remove the last line of defense.
  key_points:
  - >-
    Build and continuously refresh an explicit code, component, or contract-to-test map, using coverage
    or dependency data.
  - >-
    Always run a small, fixed set of critical smoke or invariant tests regardless of what selection picks.
  - >-
    Use historical failure and change data to prioritize and widen selection, not to justify skipping
    tests outright.
  - >-
    Fall back to broader or full-suite runs when confidence in the mapping is low, new files, core-module
    changes, sparse history.
  - >-
    Audit continuously by comparing selective results against periodic full runs, treating any missed
    defect as a model bug to fix.
  strong_signals:
  - Proposes concrete confidence triggers that widen the selected set.
  - Treats missed-defect audits as a hard, owned metric rather than an accepted risk.
  - >-
    Would evaluate an AI selector against the same full-suite ground truth in shadow mode before trusting
    it.
  weak_signals:
  - Trusts a coverage map without discussing staleness.
  - Has no always-run invariant tier as a floor.
  red_flags:
  - >-
    Would let an AI-based selector skip tests in production without any shadow-mode validation or audit
    trail.
  - Treats faster PR feedback as sufficient justification with no missed-defect tracking.
  common_mistakes:
  - Never refreshing the code-to-test map as the codebase evolves.
  - No critical-tier floor, so a wrong selection decision can skip everything.
  - No periodic full-suite audit to catch blind spots.
  follow_ups:
  - question: How would you evaluate whether AI-based test selection is actually safe?
    recommended_answer: >-
      Run the AI selector in shadow or advisory mode against real PRs for a defined period, recording
      what it would have selected without acting on it, then compare against actual full-suite results
      to compute precision, selected tests that were actually relevant, and, more importantly, recall
      or miss rate, real failures the selector would have skipped. Require the selector to expose which
      signals drove each decision so specific misses can be root-caused, and only promote it from advisory
      to blocking after it clears a defined miss-rate bar over a representative sample, keeping the fixed
      critical-tier floor regardless.
  - question: >-
      What would cause you to widen selection to the full suite even if the model reports high confidence?
    recommended_answer: >-
      Changes to shared or core modules or to build and CI configuration, large or structurally unusual
      diffs, new files with no coverage history, any recent history of the model missing a defect in a
      similar area, or a defect escaping to production that the model would have skipped; any of these
      should trip an automatic override to run the broader or full suite regardless of the model's own
      confidence score.
  role_tracks: *id001
  years_range:
  - 6
  - 18
  tags:
  - cicd
