- id: gold-arch-003
  domain: debugging-reliability
  subdomain: failure-classification
  title: An evidence-based failure-classification model with a legitimate unknown bucket
  level: intermediate
  priority: P0
  frequency: very_common
  question_type: framework_design
  question: >-
    Create a failure-classification model that distinguishes product defects, automation defects, environment
    failures, data failures, and unknowns. What makes the model trustworthy in practice?
  concise_answer: >-
    A trustworthy model classifies from evidence, not from who happens to be looking at the failure: a
    product defect has a reproducible mismatch between actual and specified behavior; an automation defect
    has evidence the test or framework code itself is wrong, a bad locator, an incorrect assertion, a
    race in the test; an environment failure has evidence external to the code under test, a service outage,
    a network error, an expired certificate; a data failure has evidence of missing, invalid, or stale
    test data; unknown is a legitimate, tracked category for insufficient evidence rather than a forced
    guess. Trustworthiness comes from mutually exclusive, evidence-based categories, an owner and next
    action attached to every classified failure, and retries or reruns that never silently rewrite the
    original classification.
  recommended_answer: |-
    Each category needs a concrete evidence definition, not just a name, or two triagers will reach different conclusions from the same failure. Product versus automation defect is distinguished by comparing observed behavior against a specification or prior known-good behavior using screenshot, DOM, or response-body evidence: if the application state itself is wrong, it is a product defect; if the test's locator, assertion, or timing logic is wrong against a correct application state, it is an automation defect. Environment failures are confirmed against external evidence, infrastructure dashboards, status pages, connectivity logs, independent of the test's own output. Data failures are confirmed against data lineage or fixture-provisioning logs showing the expected record was missing, stale, or malformed.

    Unknown must be a first-class, trended category rather than something the team eliminates by forcing every ambiguous failure into a convenient bucket; a rising unknown rate is itself a signal that diagnostics, structured logging, correlation IDs, are inadequate, and treating it as an embarrassing number to hide produces false confidence elsewhere in the model instead.

    A common way the model breaks in practice is letting retries or reruns silently overwrite the original classification: if a flaky rerun passes and the first failure's evidence and category are discarded, the team loses the trail needed to ever notice a recurring class of intermittent product defects. The report should always show the first-failure classification and evidence, the retry count, and the final outcome as separate facts.

    Finally, the model is only useful with ownership attached: product defects route to the responsible development team, automation defects to the automation owner, environment failures to infrastructure or DevOps, data failures to whoever owns fixtures or test-data pipelines. A consistent decision order, for example checking environment health before assuming an application-layer defect, since an outage can produce misleading symptoms at the application layer, is what lets two independent triagers reach the same classification.
  key_points:
  - Classify from concrete evidence per category, not from convenience or who is triaging.
  - Treat unknown as a legitimate, tracked category rather than forcing a guess.
  - Attach an owner and next action to every classified failure.
  - >-
    Never let a retry or rerun silently overwrite or discard the original failure's classification and
    evidence.
  - >-
    Define a consistent decision order, for example checking environment health first, so independent
    triagers agree.
  strong_signals:
  - Defines evidence criteria per category concretely, not just category names.
  - Insists unknown be tracked and trended, not eliminated by forcing a guess.
  - Flags retries overwriting original evidence as a specific, named anti-pattern.
  weak_signals:
  - Proposes categories without defining what evidence distinguishes them.
  - Treats classification as a one-time label with no owner or next action.
  red_flags:
  - Classifies every unexplained failure as 'flaky' by default.
  - Discards the first failure's evidence once a rerun passes.
  common_mistakes:
  - No environment-health check before assuming a product defect.
  - >-
    Automation owners re-labeling failures as 'product' without evidence, to avoid triage work.
  - No periodic audit of the unknown bucket.
  follow_ups:
  - question: How would you measure classification accuracy and reduce unknowns?
    recommended_answer: >-
      Periodically audit a sample of classified failures against ground truth, confirmed fixes, closed
      tickets, to compute precision and recall per category if any automated or semi-automated classification
      is used; track the unknown rate as a trend and treat sustained increases as a signal to invest in
      better diagnostics, structured logging, correlation IDs, environment health checks, rather than
      accepting it as a permanent bucket. Feed confirmed misclassifications back into the triage checklist
      or automated rules.
  - question: How should this classification model interact with an automatic retry policy?
    recommended_answer: >-
      The retry policy should consult the classification, not the other way around: only failures already
      evidenced as environment-transient are auto-retried, and every retry attempt is logged alongside
      the original failure's evidence rather than replacing it, so the report always shows first-failure
      classification, retry count, and final outcome. A passing rerun changes the run's final status but
      must never erase the record that a first-attempt failure of a given class occurred.
  role_tracks: &id002
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range:
  - 4
  - 14
  tags:
  - failure-classification
  - triage
  - reliability
  - retries
  - evidence
  estimated_minutes: 6
  references:
