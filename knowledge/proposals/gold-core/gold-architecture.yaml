questions:
- id: gold-arch-001
  domain: framework-architecture
  subdomain: layers
  title: Layering a UI/API/DB framework so tests depend only on what they use
  level: advanced
  priority: P0
  frequency: very_common
  question_type: framework_design
  question: >-
    Design a test automation framework that supports UI, API, and database validation without making every
    test depend on every layer. Where should authentication, logging, and reporting live, and why?
  concise_answer: >-
    Structure the framework in independent layers: a domain layer expressing business intent, channel
    adapters, UI page or component objects, API clients, database access helpers, that each encapsulate
    one integration's mechanics, and thin orchestration that composes only the adapters a given test actually
    needs, never a single base class that every test extends and therefore depends on UI, API, and database
    machinery simultaneously. Cross-cutting concerns, authentication, logging, reporting, live in their
    own infrastructure services injected into whichever adapters need them, not baked into a shared superclass,
    so a pure API test never instantiates a browser and a pure UI test never pulls in database driver
    dependencies it does not use.
  recommended_answer: |-
    Composition over inheritance is the organizing principle: a single AbstractBaseTest that every test extends inevitably accumulates a driver field, an API client field, and a database connection field, because some subset of tests needs each one, and every test pays the coupling and setup cost of all three regardless of what it actually exercises. Instead, each channel gets its own adapter with a clear responsibility boundary: UI page and component objects encapsulate locators and waits and expose user-meaningful actions; an API client wraps request construction and response parsing behind typed methods; a database helper wraps SQL or ORM access behind repository-style methods. A test declares, through its constructor or a DI container, exactly which adapters it needs, so a checkout-flow UI test composes a page object and an API client, while a price-reconciliation test composes an API client and a database repository, with neither test instantiating machinery it does not use.

    Authentication belongs in a dedicated session or auth service that any adapter needing a token or cookie calls, with token acquisition and caching logic living exactly once instead of being duplicated per channel; a UI adapter and an API client both ask the same service for a valid session rather than each reimplementing login. Logging belongs behind a thin, consistent facade used uniformly by every layer, always stamping a correlation or test-run ID, so log lines from the UI, API, and database layers for the same test can be joined during triage regardless of which channel produced them. Reporting should be event-driven: adapters and orchestration emit structured events, test started, step executed, assertion failed, and a separate reporting service subscribes to those events, which means adding or changing a report format never requires touching test code.

    The payoff of this separation is independent testability: because each adapter's dependencies are explicit and narrow, the API client can be unit tested against a mocked HTTP layer to verify it parses error contracts correctly, without ever touching a browser or a database, which is not possible when every test class inherits all three capabilities from one shared base.
  key_points:
  - >-
    Separate domain intent, channel adapters (UI, API, DB), and thin orchestration; avoid a universal
    base class.
  - >-
    Compose only the adapters a test actually needs via constructor or DI instead of inheriting from all
    of them.
  - >-
    Centralize authentication as a shared service that adapters call, not duplicated per layer.
  - >-
    Treat logging and reporting as cross-cutting, event-driven services independent of any one channel.
  - >-
    Make each layer independently unit-testable by keeping its dependencies explicit and narrow.
  code_examples:
  - |-
    // Composition instead of inheritance:
    class CheckoutFlowTest {
      CheckoutFlowTest(UiCheckoutPage ui, OrdersApiClient api) { ... } // only needs UI+API
    }
    class PriceReconciliationTest {
      PriceReconciliationTest(OrdersApiClient api, OrderRepository db) { ... } // only needs API+DB
    }
  strong_signals:
  - Explicitly rejects a single shared base class in favor of composition.
  - >-
    Places authentication, logging, and reporting as independent services rather than superclass members.
  - Can justify why a database-only test should not instantiate a browser.
  weak_signals:
  - >-
    Defaults to 'one BaseTest with everything' and calls it reusable without discussing coupling cost.
  red_flags:
  - Cannot explain why coupling every test to every layer is a problem.
  - Puts business assertions inside page objects because 'it's easier'.
  common_mistakes:
  - >-
    A giant AbstractBaseTest with driver, API client, and database connection fields used by every subclass
    regardless of need.
  - Duplicating auth-token logic in each adapter.
  - Hard-wiring a specific report format into test logic.
  follow_ups:
  - question: Show where authentication, logging, and reporting should live and why.
    recommended_answer: >-
      Authentication lives in a dedicated session or auth service that issues and caches tokens or cookies
      for the scope of a test or run, injected into whichever adapters, UI, API, need to be authenticated,
      so token logic and expiry handling exist exactly once. Logging lives behind a thin facade used uniformly
      across adapters, always stamping a correlation or test ID, so log lines from UI, API, and database
      layers for the same test can be joined. Reporting subscribes to structured events, test started,
      step executed, assertion failed, emitted by orchestration and adapters rather than being called
      explicitly from test code, which lets you add or change report formats without touching any test
      or adapter.
  - question: >-
      How would you evolve this architecture if a new channel, for example message-queue validation, needs
      to be added later?
    recommended_answer: >-
      Add a new adapter implementing the same conventions as existing ones, its own client wrapper, its
      own failure-translation boundary, injected auth and logging like the others, without touching existing
      UI, API, or database adapters or the orchestration layer, then compose it into only the tests that
      need it. If adding the new channel requires touching unrelated adapters, that is a signal the original
      boundaries were not actually independent.
  role_tracks: &id001
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  - Test/Quality Architect
  - Solution Architect
  - Technical Architect
