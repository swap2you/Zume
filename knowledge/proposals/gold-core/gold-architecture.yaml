- id: gold-arch-006
  domain: solution-architecture
  subdomain: decision-records
  title: Single framework, specialized frameworks, or a shared platform with adapters
  level: advanced
  priority: P1
  frequency: common
  question_type: framework_design
  question: >-
    Write the decision criteria for choosing a single shared framework, multiple specialized frameworks,
    or a shared platform with adapters, for a test automation organization spanning multiple products.
  concise_answer: >-
    The choice hinges on team skills and ownership boundaries, can one team realistically support every
    product's needs, product and channel diversity, how different are the products' technology stacks
    and testing needs, release cadence and coupling, do teams need to move independently, and maintenance
    and migration cost versus governance value. A shared platform with pluggable adapters can capture
    common infrastructure, reporting, CI integration, authentication, while letting each product team
    own its adapter, often the best balance when diversity is moderate and governance still matters. Any
    choice should include an explicit exit strategy and measurable outcomes so the decision can be revisited
    with evidence rather than becoming permanent by inertia.
  recommended_answer: |-
    A single shared framework minimizes duplication and maximizes consistency, one reporting format, one CI integration pattern, one set of conventions, but it risks becoming a lowest-common-denominator solution as products' needs diverge, and it concentrates the ability to serve many different teams' requirements in a single owning team, which can become a bottleneck. Multiple specialized frameworks per product or team maximize autonomy and fit-for-purpose design, but duplicate infrastructure, reporting, CI wiring, authentication handling, across teams, fragment best practices, and hurt cross-team mobility of engineers who must relearn a different framework at every product boundary. A shared platform with adapters aims to capture the governance and consistency benefit of a single framework while allowing the fit-for-purpose benefit of specialization: a common core, execution engine, reporting, CI integration, shared libraries, with each product owning a thin adapter for its specific technology, at the cost of a more complex core that must stay genuinely optional and pluggable rather than quietly becoming another lowest-common-denominator.

    The decision criteria to score explicitly: team skills and ownership capacity, whether one team can realistically support every product's needs; degree of product and channel diversity, how different the actual testing needs are across products; required release-cadence independence, whether teams need to ship on different schedules without coordinating framework changes; current and projected maintenance cost under each option; governance and compliance needs, for example consistent reporting for a regulator or an executive dashboard; and migration cost from the current state, since a technically superior target architecture is not free to reach.

    The decision itself should be documented as a lightweight decision record: context, options considered, decision, consequences, and, critically, the conditions that would trigger revisiting it, for example if the organization exceeds a certain number of products or a product's needs diverge beyond what an adapter can express.
  key_points:
  - >-
    Base the choice on team skills and ownership capacity, product and channel diversity, release-cadence
    independence, and maintenance and governance cost.
  - >-
    A single shared framework maximizes consistency but risks becoming a lowest-common-denominator bottleneck
    as needs diverge.
  - >-
    Multiple specialized frameworks maximize fit-for-purpose autonomy but duplicate infrastructure and
    fragment best practices.
  - >-
    A shared platform with pluggable adapters often balances governance and fit-for-purpose, if the core
    stays genuinely optional.
  - >-
    Document the decision with explicit consequences and revisit triggers, not as a permanent, unreviewed
    choice.
  strong_signals:
  - >-
    Scores the decision against explicit criteria, skills, diversity, cadence, cost, governance, rather
    than a general preference.
  - >-
    Names the lowest-common-denominator risk of a single framework and the duplication risk of fully specialized
    frameworks.
  - Insists on documented revisit triggers.
  weak_signals:
  - >-
    Picks one option as universally 'best practice' without weighing the organization's actual diversity
    or skills.
  red_flags:
  - Treats the decision as permanent with no revisit criteria.
  - Ignores maintenance and governance cost entirely in favor of short-term convenience.
  common_mistakes:
  - >-
    Adopting a shared platform whose adapter layer is so thin that every product ends up forking the core
    anyway.
  - >-
    Choosing multiple specialized frameworks without a plan for shared reporting or governance, fragmenting
    visibility for leadership.
  - Never revisiting an old decision as the organization's product portfolio changes.
  follow_ups:
  - question: What evidence would trigger revisiting the architecture decision?
    recommended_answer: >-
      A material increase in the number or diversity of products or channels beyond what current adapters
      can cleanly express, rising maintenance cost or duplicated defects traced to the chosen structure,
      a governance failure such as inconsistent reporting blocking a compliance or executive need, a team-skills
      shift from attrition or reorganization changing who can own what, or a measurable mismatch between
      promised and actual velocity or autonomy under the current model; any of these should trigger a
      scheduled or ad hoc re-evaluation using the same criteria as the original decision.
  - question: What makes an architecture decision responsible rather than merely conservative?
    recommended_answer: >-
      A responsible decision states its trade-offs and consequences explicitly rather than presenting
      the choice as objectively correct, prefers reversible or incrementally adoptable steps, for example
      piloting the shared-platform adapter with one product before an organization-wide rollout, over
      irreversible big-bang commitments, and commits to measurable outcomes and revisit triggers up front.
      A merely conservative decision avoids risk by default without evaluating whether the status quo's
      cost has grown to exceed the risk of changing it.
