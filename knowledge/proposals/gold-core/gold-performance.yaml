  quality_origin: researched
  review_status: unreviewed

- id: gold-perf-002
  domain: performance-observability
  subdomain: percentiles
  title: Percentiles vs averages for latency SLAs
  level: intermediate
  priority: P0
  frequency: common
  question_type: concept
  question: >-
    Explain why average response time can hide user pain and how percentiles should be
    interpreted.
  concise_answer: >-
    An average blends every response time into one number, so a fast majority can mask
    a slow tail - or a bimodal distribution (cache hit vs cache miss) can average into
    a value neither group actually experiences. Percentiles describe where a value
    sits in the sorted distribution: p95 means 95% of requests were at or below that
    time, so it reports tail behavior an average cannot. Percentiles still describe a
    batch, not a guarantee for any single user, and they are sensitive to sample size,
    aggregation window and how the data was collected.
  recommended_answer: >-
    Two systems can have identical averages and completely different user experiences:
    one where every request takes 200ms, and one where 90% take 50ms and 10% take
    1500ms. The average (roughly 195ms in the second case) reports neither reality.
    Percentiles fix this by describing the distribution's shape - p50 (median) reports
    typical experience, p95/p99 report the tail that a meaningful fraction of real
    users actually hit, and reporting several together (p50, p95, p99) reveals whether
    a system is uniformly slow or has a narrow but painful tail.

    Percentiles have their own failure modes. Small sample sizes make high percentiles
    statistically noisy - a single slow outlier can dominate a p99 computed over a few
    hundred samples, so tools like JMeter's Aggregate Report and k6's Trend metrics
    both depend on enough samples per aggregation window to be meaningful. Aggregation
    window size matters too: a p95 computed over an entire multi-hour soak test can
    hide a ten-minute spike that a per-minute p95 would expose. And a percentile is a
    population statistic, not a per-user guarantee - "p99 < 1s" says nothing about
    whether the same user's next three requests will also be under a second.

    The deeper trap is coordinated omission: if the load generator's own request rate
    slows down when the system under test slows down (a closed workload model), the
    slowest responses are undersampled or never issued at all, and the measured
    percentiles look better than what real, arrival-driven traffic would experience.
    Pairing percentile latency with throughput and error rate - and generating load
    with an open or arrival-rate model when the SLA is rate-based - is what keeps the
    percentile honest.
  key_points:
  - Averages hide tails and multimodal (cache-hit vs cache-miss) behavior.
  - Percentiles report where a value sits in the sorted distribution, not a per-user guarantee.
  - Sample size and aggregation-window size change how trustworthy a percentile is.
  - Coordinated omission from closed-model load generation can understate true tail latency.
  - Pair latency percentiles with throughput and error rate, never read alone.
  strong_signals:
  - Gives a concrete example where identical averages hide different distributions.
  - Raises coordinated omission as a threat to percentile validity.
  - Discusses aggregation-window size, not just percentile choice.
  weak_signals:
  - Recommends "just use p95" without discussing sample size or window effects.
  - Cannot explain why p99 over 50 samples is unreliable.
  red_flags:
  - Treats a percentile as a guarantee that applies to every individual request.
  - Has never heard of coordinated omission and dismisses it as irrelevant.
  common_mistakes:
  - Reporting only the average in a performance test summary.
  - Computing p99 over a tiny sample and treating it as stable.
  - Ignoring throughput and error rate when a percentile looks good.
  follow_ups:
  - question: How would you detect coordinated omission or misleading client-side timing?
    recommended_answer: >-
      Compare the load generator's configured or target rate against its achieved rate
      over time - a gap that widens as response time degrades is the signature of a
      closed model throttling itself. Re-run the same scenario with an open or
      arrival-rate executor and compare the resulting percentiles; a large gap
      indicates the closed-model numbers were optimistic. Also verify timing
      boundaries: client-side timers that start after connection setup, or that
      exclude queueing, DNS or TLS time, will under-report latency versus server-side
      or end-to-end trace timing, so cross-check the client's reported percentile
      against a server-side or distributed-trace measurement of the same requests.
  role_tracks: [Performance Engineer, Senior SDET, Quality Engineering Lead]
  years_range: [3, 12]
  tags: [performance-testing, percentiles, latency, coordinated-omission, metrics]
  estimated_minutes: 6
  references:
  - source_id: grafana-k6
    locator: 'k6 docs: Thresholds - percentile aggregation methods p(95) and p(99) for Trend metrics'
  - source_id: jmeter-docs
    locator: 'Apache JMeter User Manual: Generating Dashboard Report - configurable percentile properties'
