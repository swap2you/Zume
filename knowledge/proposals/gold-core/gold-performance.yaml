- id: gold-perf-006
  domain: performance-observability
  subdomain: performance-gates
  title: Performance quality gates that tolerate baseline noise
  level: advanced
  priority: P1
  frequency: common
  question_type: framework_design
  question: >-
    Create a performance quality gate that accounts for baseline variability and
    avoids blocking on noise.
  concise_answer: >-
    A defensible gate starts from a stable, repeated baseline - the same environment,
    data and load shape run enough times to know the natural variance, not a single
    prior run treated as ground truth. Gate a small set of critical signals (key
    percentiles, error rate, throughput) against a tolerance band derived from that
    variance, use abort-on-threshold conditions for hard limits, and separate hard
    failures that block a release from warnings that create follow-up work. A
    regression that exceeds normal variance should block; noise within the
    established band should not.
  recommended_answer: >-
    Gating on a single number from a single prior run treats measurement noise as
    signal and produces both false failures (a normal-variance run blocks a release)
    and false confidence (a real regression inside the noise band ships). The remedy
    starts with the baseline itself: run the same test against a stable, dedicated
    environment multiple times to characterize natural run-to-run variance before
    defining any threshold, and re-baseline whenever the environment, data volume or
    code path meaningfully changes - an old baseline compared against a changed system
    is not a valid comparison.

    With variance characterized, define a tolerance policy explicitly: a percentage or
    statistical-interval band around the baseline for each gated metric, rather than a
    single hard number nobody can justify. Gate only the metrics that represent real
    risk - typically p95/p99 latency for critical transactions, error rate and
    throughput - and use abort-on-fail thresholds (as in k6's abortOnFail and
    delayAbortEval, or an equivalent in other tools) for values that indicate the
    system is already failing, so the test stops burning time and money once the
    outcome is clear.

    Separate hard limits from warnings: a hard limit blocks the release and requires
    investigation before proceeding; a warning (a metric trending worse but still
    inside tolerance) creates tracked follow-up work without blocking. This avoids a
    policy where every small fluctuation becomes an emergency, which erodes trust in
    the gate and leads teams to bypass it. Finally, investigate the magnitude and
    trend, not only the pass/fail bit - a metric that is technically inside tolerance
    but has degraded for three consecutive releases is a signal the gate's binary
    result would otherwise hide.
  key_points:
  - Characterize baseline variance from repeated runs on a stable environment before setting thresholds.
  - Define an explicit statistical or percentage tolerance policy per gated metric.
  - Gate the critical percentiles, error rate and throughput, not every available metric.
  - Separate hard limits that block a release from warnings that create follow-up work.
  - Investigate trend and regression magnitude, not just the pass/fail bit.
  strong_signals:
  - Insists on repeated baseline runs to characterize variance before defining a threshold.
  - Distinguishes hard-limit metrics from trend-tracked warning metrics.
  - Re-baselines deliberately when environment or data volume changes, rather than reusing a stale number.
  weak_signals:
  - Sets a single threshold from one prior run with no discussion of variance.
  - Gates every available metric equally instead of the few that represent real risk.
  red_flags:
  - Treats every gate failure as equally urgent regardless of magnitude.
  - Would raise the threshold whenever the gate fails, rather than investigating the cause.
  common_mistakes:
  - Comparing against a baseline from a materially different environment or data volume.
  - Using a hard-coded absolute number that nobody can trace back to a risk or SLA.
  - Ignoring a metric that is inside tolerance but trending worse release after release.
  follow_ups:
  - question: How would you handle a faster response time caused by returning incorrect data?
    recommended_answer: >-
      Treat correctness as a precondition for any performance comparison, not a
      separate concern - a gate that only checks latency and throughput will happily
      pass a build that returns a cached error, a truncated payload or a wrong record
      faster than the correct one. Pair every performance assertion with a functional
      or contract check (schema validation, checksum or business-rule assertion) on
      the same responses being timed, and fail the gate if either fails. Investigate
      any latency improvement that lacks a corresponding engineering change as
      suspicious by default, since an unexplained speedup is exactly the symptom of
      accidentally-skipped work.
