questions:
- id: gold-perf-001
  domain: performance-observability
  subdomain: workload-models
  title: Translating a business workload into a load-test model
  level: basic
  priority: P0
  frequency: common
  question_type: framework_design
  question: >-
    Translate a business workload into users, arrival rate, pacing, data distribution
    and transaction mix.
  concise_answer: >-
    A workload model starts from production behavior, not a round number of "500
    users." Translate business volume into an arrival rate (requests or transactions
    per unit time), decide whether the system should be modeled as open (arrivals
    independent of response time) or closed (a fixed pool of users who wait, then
    think, then repeat), and set pacing/think time so demand matches reality. Data
    distribution and transaction mix must reflect production skew, not uniform
    synthetic values, and every assumption should be written down so a stakeholder can
    challenge it before the run.
  recommended_answer: >-
    Concurrency and arrival rate answer different questions, and conflating them is
    the most common workload-modeling defect. Concurrency ("500 concurrent users")
    describes a closed model: a fixed VU pool where each virtual user waits for its
    previous iteration to finish, then thinks, then starts again. Arrival rate ("120
    requests per second") describes an open model: new work arrives on a schedule
    regardless of how long the system takes to respond. When response time degrades
    under load, a closed model silently throttles itself - VUs are still "waiting," so
    the offered load drops exactly when it should be rising - a problem documented in
    load-testing literature as coordinated omission. Public-facing APIs and
    event-driven systems are usually closer to an open model in production, so an
    arrival-rate executor (k6's constant-arrival-rate/ramping-arrival-rate, or a
    JMeter throughput-shaping timer setup) is the safer default when the SLA is stated
    as a rate or a percentile latency.

    Beyond the model choice, the workload needs: think time and pacing derived from
    real session analytics rather than zero-wait loops; a transaction mix weighted the
    way production traffic is actually weighted (browse-to-checkout ratios, not equal
    shares); and data distribution that avoids cache-friendly repetition - random or
    production-sampled account IDs, not "customer 1" for every virtual user. Every one
    of these choices is an assumption; documenting it (source of the ratio, sampling
    window, why an open or closed model was chosen) is what lets a reviewer catch a
    wrong assumption before it becomes a wrong capacity decision.
  key_points:
  - Workload modeling starts from production/business behavior, not a round VU count.
  - Concurrency (closed model) and arrival rate (open model) are different things.
  - Closed models can hide true load loss under degradation (coordinated omission).
  - Think time, pacing and transaction mix must reflect real session and traffic data.
  - Document every workload assumption so it can be challenged before the run.
  strong_signals:
  - Distinguishes open (arrival-rate) from closed (VU-based) models unprompted.
  - Names coordinated omission as the risk of pure closed-model testing under degradation.
  - Ties transaction mix and data distribution to actual production analytics.
  weak_signals:
  - Picks a VU count "that feels right" without connecting it to a business rate.
  - Uses uniform or sequential test data without discussing cache or skew effects.
  red_flags:
  - Believes "500 users" and "500 requests per second" are interchangeable.
  - Has no answer for where the transaction-mix ratios came from.
  common_mistakes:
  - Modeling every workload as closed even when the target SLA is expressed as an RPS or percentile latency.
  - Using zero think time, which manufactures unrealistic arrival bursts.
  - Reusing the same small data set across all virtual users, hiding cache-miss behavior.
  follow_ups:
  - question: How would you validate that the test actually generated the intended workload?
    recommended_answer: >-
      Verify the generator's own reported rate against the target before trusting any
      result: compare achieved iterations-per-second or requests-per-second to the
      configured rate, and check that VU or thread saturation (hitting maxVUs or the
      thread-pool ceiling) did not silently cap throughput below the intended level.
      Confirm pacing empirically - measured think time between requests should match
      the modeled value, not collapse under load. Finally, sample the actual request
      payloads and parameters sent during the run to confirm the transaction mix and
      data distribution matched the plan, since a misconfigured weight or a data-file
      exhaustion issue can quietly change the test that ran versus the test that was
      designed.
  role_tracks: [Performance Engineer, Senior SDET, Quality Engineering Lead]
  years_range: [3, 12]
  tags: [performance-testing, workload-modeling, arrival-rate, coordinated-omission, load-testing]
  estimated_minutes: 6
  references:
  - source_id: grafana-k6
    locator: 'k6 docs: Open and closed models - arrival-rate vs virtual-user workload configuration'
  - source_id: jmeter-docs
    locator: 'Apache JMeter User Manual: Component Reference - Thread Group ramp-up, loop count and scheduler'
  last_verified: '2026-07-16'
