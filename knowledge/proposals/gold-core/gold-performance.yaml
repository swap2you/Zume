- id: gold-perf-003
  domain: performance-observability
  subdomain: bottleneck-analysis
  title: Diagnosing high latency with low CPU utilization
  level: advanced
  priority: P0
  frequency: common
  question_type: troubleshooting
  question: >-
    A test reaches high latency with low CPU. Build a bottleneck investigation using
    application, database, network and dependency evidence.
  concise_answer: >-
    Low CPU does not mean the system is idle - it usually means work is waiting rather
    than executing: a connection pool exhausted, a lock held, a downstream dependency
    slow, or threads blocked on I/O. The investigation collects queue depth, pool
    utilization, lock wait time, and downstream/dependency latency alongside CPU, then
    uses distributed traces to find which span in the request's path is actually
    consuming the wall-clock time. Change one variable at a time and correlate every
    metric by timestamp and load stage so the bottleneck evidence and the symptom line
    up.
  recommended_answer: >-
    High latency with low CPU is a saturation-on-something-other-than-CPU signature.
    The investigation should widen from CPU to the full resource set: connection pool
    utilization (application-to-database and application-to-downstream-service pools
    both have finite size and a wait queue when exhausted), thread pool queue depth,
    database lock and wait-event statistics, garbage-collection pause time, and
    network-level retransmits or connection setup latency. Any one of these can hold a
    request "in flight" without touching the CPU.

    Distributed tracing is the tool that turns a vague "latency is high" into "this
    span is high": a trace shows the request's path through every hop with per-span
    duration, so the investigation can see whether the time is spent waiting to
    acquire a database connection, inside a slow query, in a downstream HTTP call, or
    in serialization. Pair the trace with resource metrics scoped to the same time
    window - a spike in span duration that lines up with a spike in a pool-wait-time
    metric is strong evidence; one that lines up with nothing is a clue to keep
    looking rather than to accept a hypothesis.

    Discipline matters as much as tooling: correlate every signal by timestamp and by
    load stage (ramp-up vs steady-state vs ramp-down behave differently), and change
    one variable at a time - increasing pool size while also adding an index at the
    same time makes it impossible to attribute the improvement. Only after the
    bottleneck is attributed to a specific resource should a fix (larger pool, added
    index, faster downstream call, reduced serialization cost) be proposed and
    re-measured.
  key_points:
  - Low CPU does not mean no saturation - work can be blocked rather than executing.
  - Inspect connection pools, thread queues, database locks and downstream dependency latency.
  - Use distributed traces to find which span in the request path consumes the time.
  - Correlate every metric by timestamp and load stage, not in isolation.
  - Change one variable at a time to keep the attribution valid.
  strong_signals:
  - Immediately widens the search beyond CPU to pools, locks, queues and dependencies.
  - Uses trace span duration as the primary localization tool, not a guess.
  - Insists on timestamp and load-stage correlation before proposing a fix.
  weak_signals:
  - Jumps straight to "add more CPU" or "scale up the instance" without evidence.
  - Treats every metric independently instead of correlating them by time.
  red_flags:
  - Cannot name a single non-CPU resource that could cause this symptom.
  - Changes multiple variables simultaneously and still claims to know the root cause.
  common_mistakes:
  - Concluding "no bottleneck" because average CPU looks healthy.
  - Skipping traces and relying only on aggregate dashboards for localization.
  - Fixing the first plausible-looking metric spike without confirming causation.
  follow_ups:
  - question: Which evidence would distinguish connection-pool exhaustion from database locking?
    recommended_answer: >-
      Connection-pool exhaustion shows up as growing pool-wait-time or a rising count
      of threads queued for a connection while the database itself reports low
      active-query time - the database is idle, waiting for work that never arrives
      because it is stuck in the pool's queue. Database locking shows the opposite:
      connections are checked out and active, but the database's own lock or
      wait-event statistics show sessions blocked on other sessions, and query
      duration (not connection-acquisition time) is what grows. A trace confirms
      which: a long span before the query starts points to pool exhaustion, a long
      span inside the query execution itself points to locking.
  role_tracks: [Performance Engineer, Senior SDET, Quality Engineering Lead, Test Automation Architect, Test/Quality Architect, Solution Architect, Technical Architect]
  years_range: [5, 16]
  tags: [performance-testing, bottleneck-analysis, distributed-tracing, connection-pools, database-locking]
  estimated_minutes: 7
  references:
  - source_id: opentelemetry
    locator: 'OpenTelemetry docs: Signals - Traces (spans and the request path through a distributed system)'
  - source_id: opentelemetry
    locator: 'OpenTelemetry docs: Signals - Metrics (resource and dependency measurements captured at runtime)'
  last_verified: '2026-07-16'
  freshness_days: 365
  status: draft
  quality_origin: researched
  review_status: unreviewed

- id: gold-perf-004
  domain: performance-observability
  subdomain: traces-metrics-logs
  title: Observability design for actionable performance-test failures
  level: advanced
  priority: P1
  frequency: common
  question_type: framework_design
  question: >-
    Design observability for a performance test so a failed SLA produces an actionable
    diagnosis rather than only a graph.
  concise_answer: >-
    Instrument the test itself, not just the system under test: inject a correlation
    ID and a test-stage marker (ramp-up, steady-state, ramp-down) into every request so
    results can be sliced by load stage later. Collect the three complementary signals
    - metrics for aggregated resource/service health, distributed traces for
    per-request path and latency attribution, and structured logs/errors for the
    specific failure detail - and build dashboards around the hypotheses the team
    expects to test, not a generic "everything" board. A failed SLA should point at a
    span, a resource metric and a log line, not just a red line on a chart.
  recommended_answer: >-
    A performance test that only produces a pass/fail graph forces a second
    investigation every time it fails. The fix is to design the test's observability
    the same way the production system's observability is designed, using the same
    three signal types. Metrics give aggregated, cheap-to-store service and resource
    health (CPU, pool utilization, queue depth, request rate) over the test's
    duration. Distributed traces give per-request causality - which span in a failing
    request's path actually consumed the latency - and are the signal that turns "the
    SLA failed" into "the SLA failed because the payment-service call added 800ms."
    Structured logs and error records carry the specific detail a trace span cannot:
    an exception type, a validation message, a downstream error code.

    Correlation is what ties the three together: every request the test issues should
    carry (or receive, for a synthetically injected header) a request or trace ID that
    appears in the trace, in structured log lines, and ideally in the test's own
    result record. A test-stage marker (which phase of the load profile was active)
    lets a post-run query answer "did the failures cluster in ramp-up or
    steady-state?" without re-running the test.

    Dashboards should be built to test specific hypotheses the team already holds -
    "is the database connection pool the limiting factor," "does p99 degrade before
    p95" - rather than a single dashboard trying to show everything at every zoom
    level. Finally, observability has a cost: high-cardinality trace sampling, verbose
    logging, or a monitoring agent's own CPU and network footprint can distort the
    very load test it is meant to observe, so sampling rates and instrumentation
    overhead need to be measured and bounded, not left at a library's default.
  key_points:
  - Correlation IDs and test-stage markers let failures be sliced by load phase after the run.
  - Combine metrics, distributed traces and structured logs/errors, not one signal alone.
  - Dashboards should be built around specific hypotheses, not a generic overview.
  - Traces provide per-request path attribution that a metric graph cannot.
  - Observability overhead itself can distort the test and must be measured and bounded.
  strong_signals:
  - Explains what each of metrics, traces and logs uniquely contributes to diagnosis.
  - Proposes correlation IDs and stage markers before being asked how to slice results.
  - Raises instrumentation overhead as a risk to the test's own validity.
  weak_signals:
  - Equates observability with "a dashboard with more charts on it."
  - Cannot explain why a trace adds anything beyond an aggregate latency metric.
  red_flags:
  - Believes logging every request body at full verbosity has no cost to the test.
  - Has no way to correlate a specific failed request across signals after the fact.
  common_mistakes:
  - Building one dashboard that mixes every metric at every zoom level, making nothing readable.
  - Omitting a correlation ID, so a failure can be seen in a trace but not matched to a log line.
  - Sampling traces at 100% in a high-throughput test and having the tracing overhead become the bottleneck.
  follow_ups:
  - question: How would you avoid observability overhead distorting the test?
    recommended_answer: >-
      Measure the instrumentation's own resource footprint before trusting the test's
      results - run the same load profile with and without full instrumentation and
      compare throughput and latency. Use sampling for traces (head-based or
      tail-based) rather than capturing every request at full detail during
      high-throughput phases, reserve full-detail capture for failure-investigation
      runs at lower load, and keep structured logging at a level that carries
      diagnostic fields without dumping full payloads on every request. Treat the
      collector or agent's CPU and network cost as part of the system under test's
      resource budget, not as a free side channel.
  role_tracks: [Performance Engineer, Senior SDET, Lead SDET, Test Automation Architect, Quality Engineering Lead]
  years_range: [5, 16]
  tags: [performance-testing, observability, distributed-tracing, correlation-ids, dashboards]
  estimated_minutes: 7
  references:
  - source_id: opentelemetry
    locator: 'OpenTelemetry docs: Signals - Traces, Metrics and Logs and their shared context-propagation mechanism'
  - source_id: dora-dev
    locator: 'DORA: Capabilities - Monitoring and observability'
  last_verified: '2026-07-16'
  freshness_days: 365
  status: draft
  quality_origin: researched
  review_status: unreviewed

- id: gold-perf-005
  domain: performance-observability
  subdomain: soak-spike
  title: Load, stress, spike, soak and capacity tests compared
  level: intermediate
  priority: P1
  frequency: common
  question_type: compare_contrast
  question: >-
    Compare load, stress, spike, soak and capacity tests. Which risk does each reveal?
  concise_answer: >-
    Each test type applies a different traffic shape to answer a different question.
    Load (average-load) testing confirms the system handles expected production
    traffic within its performance targets. Stress testing raises load above average
    to find the point where performance degrades or fails. Spike testing applies a
    sudden, short surge to check how the system handles and recovers from a burst. Soak
    testing holds an average load for an extended duration to reveal slow accumulation
    - memory growth, connection leaks, log-disk exhaustion - that a short test would
    never surface. Capacity (breakpoint) testing ramps load until the system actually
    breaks, to find the ceiling for planning.
  recommended_answer: >-
    The five test types differ in load level and duration, and each is designed to
    surface a distinct failure mode. An average-load test uses production-
    representative concurrency or arrival rate for a moderate duration to validate
    that normal traffic meets its performance targets - this is the baseline every
    other test type is compared against. A stress test uses the same shape but a
    higher load level to find where performance starts to degrade non-linearly or
    where the system fails outright; it should only run after the average-load
    baseline is established, or the degradation point cannot be interpreted. A spike
    test applies a short, very high surge (with little to no ramp) to check whether
    the system absorbs a sudden traffic burst gracefully and, critically, whether it
    recovers cleanly afterward rather than staying degraded.

    A soak (endurance) test keeps an average load running for hours or days - the
    load level resembles the average-load test, but the extended duration is the
    point: memory leaks, unbounded caches, connection-pool leaks, log or disk-space
    exhaustion, and certificate or token expiry issues only appear given enough
    elapsed time, not enough concurrent load. A capacity or breakpoint test
    progressively increases load (often via an arrival-rate executor with an
    abort-on-threshold-fail condition) until the system actually breaks, producing the
    ceiling number that capacity planning and auto-scaling policy both need.

    Running these out of order wastes effort and misleads interpretation: a stress
    test without a load-test baseline cannot say what "degraded" means, and a soak
    test at stress-level load conflates two different risk classes (accumulation
    versus peak capacity) into one ambiguous result.
  key_points:
  - Load (average-load) tests validate expected production traffic against performance targets.
  - Stress tests find the degradation or failure point above average load.
  - Spike tests validate sudden-surge handling and, importantly, recovery afterward.
  - Soak tests reveal accumulation defects that only appear over extended duration.
  - Capacity/breakpoint tests progressively find the system's actual ceiling for planning.
  strong_signals:
  - States the distinct failure mode each test type is designed to surface.
  - Insists on running an average-load baseline before interpreting a stress test.
  - Adds recovery assertions after spike/stress, not just peak-load assertions.
  weak_signals:
  - Uses the terms interchangeably or describes only load level without duration.
  - Cannot explain why soak tests need duration rather than higher concurrency.
  red_flags:
  - Believes a single test type covers every performance risk.
  - Runs a stress or breakpoint test directly against a production environment with no safeguards.
  common_mistakes:
  - Running a soak test at stress-level load, conflating accumulation risk with capacity risk.
  - Treating a spike test's recovery period as optional and only checking the peak.
  - Skipping the average-load baseline, leaving no reference point for stress-test results.
  follow_ups:
  - question: What recovery assertions belong after a stress or spike test?
    recommended_answer: >-
      After load returns to baseline, assert that latency and error rate return to
      their pre-test average-load values within a bounded recovery window, not just
      that the system "came back up." Check that resource metrics - connection pools,
      thread counts, queue depth, memory - return to their pre-test baseline rather
      than staying elevated, which would indicate a leak triggered by the stress
      rather than genuine elasticity. Also verify that any circuit breakers, rate
      limiters or autoscaling actions that engaged during the spike disengage cleanly,
      and that no requests were silently dropped without an error being recorded
      during the surge.
  role_tracks: [Performance Engineer, Senior SDET, Quality Engineering Lead]
  years_range: [3, 12]
  tags: [performance-testing, load-testing, stress-testing, spike-testing, soak-testing, capacity-planning]
  estimated_minutes: 6
  references:
  - source_id: grafana-k6
    locator: 'k6 docs: Test Types - smoke, average-load, stress, spike, soak and breakpoint tests'
  - source_id: jmeter-docs
    locator: 'Apache JMeter User Manual: Component Reference - Thread Group ramp-up and scheduler for shaping load profiles'
  last_verified: '2026-07-16'
  freshness_days: 365
  status: draft
  quality_origin: researched
