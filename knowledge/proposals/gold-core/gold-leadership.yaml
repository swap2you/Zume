- id: gold-lead-003
  domain: technical-leadership
  subdomain: conflict
  title: Resolving "flaky test" versus "real defect" disagreements
  level: intermediate
  priority: P1
  frequency: very_common
  question_type: scenario
  question: >-
    A developer says an automated failure is a flaky test; the tester says it is a
    product defect. How do you resolve the disagreement without turning it into
    ownership conflict?
  concise_answer: >-
    Move the conversation from opinion to evidence: reproduce the failure, inspect logs,
    screenshots and timing, and check whether the same assertion has failed intermittently
    under identical conditions before. If it reproduces on a stable environment with the
    same input, it is very likely a defect regardless of who called it flaky first; if it
    only fails under timing/load variance with no state corruption, it is a
    synchronization or environment issue in the test, but that still needs a fix, not a
    label. Agree on a shared diagnostic checklist in advance so the decision is made by
    the checklist, not by whoever argues more persistently, and record the resolution and
    the prevention action either way.
  recommended_answer: >-
    The unproductive version of this disagreement treats "flaky" and "defect" as a
    territory dispute — whoever wins the label wins the argument about whose backlog it
    goes on. The productive version treats both claims as hypotheses to test against the
    same evidence: does the failure reproduce with the same input on a controlled
    environment? Does the application's persisted state show the wrong outcome, or does
    only the automation's synchronization/timing look wrong? Google's public postmortems
    on flaky-test mitigation describe exactly this discipline — tracking failure history
    per test, distinguishing tests that are inherently non-deterministic from tests that
    are occasionally revealing real, intermittent product bugs, because a "flaky" label
    can hide a genuine race condition in the product.

    A pre-agreed diagnostic sequence removes the ownership fight: capture the same
    evidence every time (screenshot, DOM/response snapshot, timing, environment build),
    check reproduction rate under controlled reruns, and classify using shared, written
    criteria rather than either party's instinct. If it reproduces deterministically, it
    routes to the developer as a defect regardless of who raised it. If it is
    non-deterministic but the automation's wait condition was wrong, it routes to test
    ownership as a synchronization fix. If it is non-deterministic in the product itself
    (a genuine race condition), it still routes to the developer — "flaky" is not a
    synonym for "not a bug."

    Every resolution gets recorded with its evidence and a prevention action, so recurring
    disagreements build a shared case history instead of restarting the argument from
    zero each time.
  key_points:
  - Start from evidence and reproducibility, not from who claims the label first.
  - Classify uncertainty explicitly using a shared, pre-agreed diagnostic checklist.
  - '"Flaky" in the product itself can still mean a real, intermittent defect.'
  - Fix the system (checklist, ownership routing) rather than win the individual argument.
  - Record the decision and the prevention action regardless of outcome.
  strong_signals:
  - Immediately asks for reproduction evidence rather than adjudicating opinions.
  - Distinguishes automation-timing flakiness from a genuinely non-deterministic product defect.
  - Proposes a standing, written diagnostic checklist to prevent repeat disputes.
  weak_signals:
  - Resolves it by seniority or by whichever side is more insistent.
  - Assumes "flaky" always means "not a real problem."
  red_flags:
  - Routes every disputed failure to quarantine without an investigation record.
  - Has no process for the same disagreement recurring release after release.
  common_mistakes:
  - Accepting "it's flaky" as a closing statement instead of a hypothesis to verify.
  - Failing to record why a failure was classified a certain way, so the next dispute restarts from zero.
  - Letting the automation owner be blamed for a genuine intermittent product race condition.
  follow_ups:
  - question: What would you do if the same conflict recurs every release?
    recommended_answer: >-
      Treat the recurrence itself as data: a repeating dispute usually means either the
      diagnostic checklist isn't actually being followed, or there is a real systemic
      cause (a genuinely racy feature, or a test area with chronic synchronization debt)
      that keeps generating ambiguous failures. Pull the history of past resolutions for
      that area, look for a pattern in root causes, and escalate it as a named
      improvement item — fix the race condition, redesign the flaky suite's waits, or
      retrain the team on the checklist — rather than re-litigating the same argument
      every cycle.
  role_tracks:
  - QA Manager
  - Quality Engineering Manager
  - Engineering Manager
  - Quality Engineering Lead
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  years_range: [5, 18]
  tags: [leadership, conflict, flaky-tests, failure-classification, evidence-based]
  estimated_minutes: 6
  references:
  - source_id: google-testing-blog
    locator: Google Testing Blog — Flaky Tests at Google and How We Mitigate Them
  - source_id: fowler-bliki
    locator: martinfowler.com articles — NonDeterminism (distinguishing genuinely non-deterministic tests from masked defects)
  last_verified: '2026-07-16'
