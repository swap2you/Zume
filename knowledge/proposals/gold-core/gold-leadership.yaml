questions:
- id: gold-lead-001
  domain: technical-leadership
  subdomain: prioritization
  title: Prioritizing automation investment across channels with limited staff
  level: advanced
  priority: P0
  frequency: very_common
  question_type: leadership
  question: >-
    You inherit UI, API, mobile and performance automation requests with limited staff.
    Build a prioritization model and explain what you would deliberately not automate.
  concise_answer: >-
    Score each request on business/release risk if it fails, repeatability (how often it
    would run and how often the current process finds real defects), technical
    feasibility and expected maintenance cost, and the value of manual/exploratory
    testing that automation would remove. Rank by risk-reduction per unit of ongoing
    maintenance cost, not by requester seniority or novelty. Publish the ranked backlog
    and its criteria so intake is transparent, and name categories you will not automate
    (one-off migrations, UI in active redesign, low-frequency exploratory-heavy flows)
    with the reasoning attached, not silence.
  recommended_answer: >-
    Start from the constraint, not the request list: staff time is fixed, so the model's
    job is to make the opportunity cost of every "yes" visible. Score each candidate on
    four axes — (1) impact if the covered behavior breaks in production or blocks a
    release, (2) run frequency and defect-detection history, since a test that runs
    nightly and has caught real regressions earns its keep faster than one that runs
    twice a year, (3) automation feasibility and expected ongoing maintenance cost given
    current framework maturity, and (4) whether a human still needs to look at the
    behavior anyway (visual judgment, exploratory coverage, one-time verification) —
    automating that adds cost without removing manual effort.

    Rank by risk-reduction-per-maintenance-dollar rather than a single weighted score, so
    the trade-off stays visible in the conversation with stakeholders. DORA's research
    treats test automation as one of several delivery-performance *capabilities* — it
    only predicts better outcomes together with fast feedback loops and low-risk release
    practices, which is the argument for prioritizing test suites that shorten the
    feedback loop on the highest-risk paths over suites that simply maximize count.

    Explicitly declare what will not be automated this cycle and why: a screen mid
    redesign (rework risk exceeds value), a one-time data migration (no repeat value), a
    flow whose value is genuinely exploratory judgment. Publish the backlog, its scoring
    criteria and the "not now" list together — an intake process stakeholders can see and
    challenge survives longer than a private mental model, and it converts "why wasn't my
    request done" into a criteria conversation instead of a relationship one.
  key_points:
  - Business and release risk drives priority, not requester seniority.
  - Repeatability and defect-detection value matter more than raw test count.
  - Technical feasibility and ongoing maintenance cost are real, recurring costs.
  - Manual/exploratory value is a reason to not automate, not an oversight.
  - Transparent roadmap and backlog intake criteria, published and revisitable.
  examples:
  - >-
    A payment-checkout regression suite that runs on every PR and has caught three
    production-bound defects this quarter outranks a rarely-exercised admin report page
    even though the admin request came from a director, because the scoring is on risk
    and detection history, not requester rank.
  strong_signals:
  - Names concrete, weighable axes (risk, frequency, feasibility, manual value) instead of a gut-feel ranking.
  - Volunteers specific categories to deliberately not automate, with reasoning.
  - Ties the model to DORA-style capability thinking — automation serves faster, safer feedback, not raw coverage percentage.
  weak_signals:
  - Prioritizes by requester seniority or "who asked first."
  - Cannot name anything they would refuse to automate.
  red_flags:
  - Treats 100% automation coverage as an unqualified goal regardless of maintenance cost.
  - Has no mechanism for stakeholders to see or contest the ranking.
  common_mistakes:
  - Automating whatever is technically easiest first regardless of risk.
  - Letting the backlog become a private list with no visible criteria.
  - Ignoring maintenance cost of already-automated suites when planning new work.
  follow_ups:
  - question: How would you explain a rejected automation request to a senior stakeholder?
    recommended_answer: >-
      Walk the same criteria used for every request: state the risk score, the run
      frequency assumption and the maintenance cost estimate for their specific request,
      and show where it landed relative to the current cut line. Offer the concrete
      alternative — a lighter-weight check, a manual smoke test until the screen
      stabilizes, or a revisit date tied to a trigger (e.g., after the redesign ships).
      The goal is that the stakeholder can disagree with an input to the model, not with
      an opaque decision, which keeps the conversation about criteria rather than status.
  role_tracks:
  - QA Manager
  - Quality Engineering Manager
  - Engineering Manager
  - Quality Engineering Lead
  - Test Automation Architect
  - Test/Quality Architect
  - Solution Architect
  - Technical Architect
  years_range: [8, 20]
  tags: [leadership, prioritization, automation-strategy, risk-based-testing, roadmap, dora]
  estimated_minutes: 7
  references:
  - source_id: dora-dev
    locator: DORA Core / Capabilities catalog — Test Automation capability and its relationship to software delivery performance
  - source_id: gitlab-handbook
    locator: GitLab Handbook — Engineering Workflow, Severity and Priority label definitions used for issue triage
  last_verified: '2026-07-16'
  freshness_days: 365
  status: draft
  quality_origin: researched
  review_status: unreviewed

- id: gold-lead-002
  domain: qa-strategy-governance
  subdomain: metrics
  title: Choosing quality-engineering metrics that resist gaming
  level: advanced
  priority: P0
  frequency: very_common
  question_type: leadership
  question: >-
    Choose a small set of quality-engineering metrics and explain how each could be
    gamed or misinterpreted.
  concise_answer: >-
    Prefer outcome and flow metrics over raw test counts: escaped defects (with severity
    and root-cause context), change failure rate and time-to-restore for the pipeline as
    a whole, automation suite reliability (flaky rate, not just pass rate), and coverage
    expressed as risk covered rather than a percentage of lines. Every one of these can
    be gamed — escaped defects drop if triage reclassifies bugs as "enhancements," pass
    rate rises if flaky tests are quarantined and never fixed, coverage percentage rises
    from trivial assertions. The defense is pairing each metric with its narrative and
    never using a single number as an individual performance target.
  recommended_answer: >-
    A small, defensible set: (1) escaped defect rate by severity, reviewed with root
    cause, not just counted; (2) DORA's change failure rate and time-to-restore, because
    they measure the system's actual safety net rather than test-suite size; (3)
    automation reliability — flaky-failure rate and mean time to fix a quarantined test —
    because a rising pass rate achieved by quarantining flaky tests is a regression
    wearing a disguise; (4) risk-weighted coverage, tied to a risk model rather than a
    line-coverage percentage that rewards trivial assertions.

    Each is gameable, and a good leader names how before publishing it: escaped-defect
    counts fall if triage relabels bugs as feature requests, or if reporting channels get
    harder to use; change-failure-rate improves if teams simply ship less; flaky-rate
    improves if flaky tests are deleted instead of fixed; coverage rises with tests that
    execute code without asserting behavior. DORA's own guidance is explicit that these
    are *capability* metrics meant to describe a system, and using them as individual
    developer or tester performance targets invites exactly this gaming — a version of
    Goodhart's Law where the measure stops representing the goal once it becomes the
    target of an incentive.

    The mitigation is structural: publish the metric with its known failure modes,
    review trend and narrative together in retros rather than a single number in
    isolation, and give metric ownership to a role who is accountable for investigating
    anomalies rather than defending the number.
  key_points:
  - Outcome and flow metrics over raw test counts.
  - Escaped defects need severity and root-cause context, not a bare count.
  - Automation reliability (flaky rate) must be tracked alongside pass rate.
  - Coverage should be risk-weighted, not a line-percentage vanity metric.
  - Metric ownership and narrative prevent silent gaming.
  strong_signals:
  - Names the specific gaming failure mode for every metric proposed, unprompted.
  - Distinguishes capability metrics (describing a system) from individual performance targets.
  - Insists metrics ship with narrative/trend review, not a bare dashboard number.
  weak_signals:
  - Lists metrics with no discussion of how they could be gamed.
  - Treats test-count or pass-rate as sufficient quality signals on their own.
  red_flags:
  - Proposes using an easily-gamed metric (e.g., bug count) as an individual performance target.
  - Cannot describe Goodhart's Law or an equivalent gaming risk in their own words.
  common_mistakes:
  - Reporting pass rate without reporting flaky/quarantine rate alongside it.
  - Using raw test count as a proxy for coverage or quality.
  - Setting a single-number target with no owner accountable for investigating drift.
  follow_ups:
  - question: Which metric would you refuse to use as an individual performance target?
    recommended_answer: >-
      Escaped defect count tied to an individual tester or developer — it punishes the
      person who tests hardest and reports the most, and it creates an incentive to
      under-report or reclassify. The same logic applies to raw bug-count and to
      automation pass rate as individual targets; both push toward hiding problems rather
      than fixing them. Capability metrics belong to teams and systems; individual
      accountability should be based on behavior — did they investigate, disclose and fix
      — not on a number that a system, not a person, ultimately produces.
  role_tracks:
  - QA Manager
  - Quality Engineering Manager
  - Engineering Manager
  - Quality Engineering Lead
  years_range: [8, 20]
  tags: [leadership, metrics, dora, goodharts-law, flaky-tests, governance]
  estimated_minutes: 6
  references:
  - source_id: dora-dev
    locator: DORA — Four Keys metrics (change failure rate, time to restore service) and guidance against individual performance targets
  - source_id: gitlab-handbook
    locator: GitLab Handbook — Engineering Metrics guidance on using data respectfully and avoiding vanity metrics
