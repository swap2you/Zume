- id: gold-lead-004
  domain: qa-strategy-governance
  subdomain: roadmap
  title: Building a twelve-month quality-engineering roadmap
  level: advanced
  priority: P1
  frequency: common
  question_type: estimation_planning
  question: >-
    Build a twelve-month quality-engineering roadmap that balances delivery support,
    framework modernization, pipeline reliability and team capability.
  concise_answer: >-
    Start from a baseline of current pain (flaky rate, pipeline duration, escaped
    defects, on-call/support load) and define measurable twelve-month outcomes for each,
    not just activities. Sequence work so foundational reliability fixes (pipeline
    stability, flaky-test backlog) land before modernization that depends on them, keep
    a reserved percentage of capacity for ongoing delivery support so the roadmap does
    not silently starve day-to-day releases, and review progress quarterly against the
    baseline with evidence, adjusting scope rather than pretending the plan was perfect.
  recommended_answer: >-
    A roadmap that survives contact with a real year starts with measurement, not
    ambition: baseline current flaky-test rate, pipeline duration and reliability,
    escaped-defect trend, and the proportion of team time already consumed by delivery
    support versus planned improvement work. Every roadmap item then gets a measurable,
    twelve-month-horizon outcome — "reduce PR pipeline p95 duration by 30%," "reduce
    flaky quarantine backlog to under N tests," "cut mean time to add a new API
    regression suite from weeks to days" — rather than open-ended activities like
    "modernize the framework."

    Sequence dependencies deliberately: pipeline reliability and flaky-test remediation
    usually need to happen before framework modernization, because a team cannot safely
    validate a new architecture against a suite that already lies about its own health.
    Reserve explicit operational capacity — a fixed percentage of the team's time — for
    ongoing delivery support (new feature coverage, triage, on-call), because roadmaps
    that assume 100% dedicated improvement time are fictional and get silently abandoned
    the first time a release deadline slips.

    Review quarterly against the original baseline with evidence, not sentiment: did the
    p95 pipeline duration actually drop, did the flaky backlog actually shrink. Treat
    schedule slippage as information to re-sequence, not as failure to hide — a roadmap
    that never changes over twelve months either had no real dependencies or is not being
    honestly tracked.
  key_points:
  - Baseline current pain and risk with real measurements before planning.
  - Define measurable outcomes per roadmap item, not open-ended activities.
  - Sequence dependencies — reliability work usually precedes modernization.
  - Reserve explicit operational capacity for ongoing delivery support.
  - Review quarterly against the baseline with evidence and adjust scope.
  strong_signals:
  - Anchors every roadmap item to a measurable baseline and target, not an activity description.
  - Explicitly reserves capacity for delivery support rather than assuming 100% improvement time.
  - Treats quarterly review as a re-sequencing checkpoint, not a status theater exercise.
  weak_signals:
  - Presents a list of activities ("migrate to X", "adopt Y") with no baseline or measurable outcome.
  - Assumes the team has zero ongoing delivery-support load during the roadmap period.
  red_flags:
  - Roadmap has no review checkpoint or explicit way to detect it is off track.
  - Modernization work is sequenced ahead of known pipeline/flaky reliability problems for no stated reason.
  common_mistakes:
  - Planning a year of work with no baseline measurement to compare against later.
  - Ignoring interrupt-driven support work when allocating roadmap capacity.
  - Treating every slipped deadline as a failure to conceal instead of information to re-sequence.
  follow_ups:
  - question: How would you prevent modernization from becoming an endless internal project?
    recommended_answer: >-
      Give the modernization effort the same discipline as customer-facing work: a
      scoped outcome, a deadline, and a definition of done tied to measurable impact
      (e.g., "old framework fully decommissioned" or "new pattern adopted by N of M
      suites"), not "continuously improve." Timebox exploration phases, require a go/no-go
      decision point with evidence before committing further investment, and report
      progress against the same baseline used to justify starting it — if the numbers
      stop moving, that is the trigger to stop, pause, or change approach rather than
      keep funding by default.
  role_tracks:
  - QA Manager
  - Quality Engineering Manager
  - Engineering Manager
  - Quality Engineering Lead
  - Test Automation Architect
  - Test/Quality Architect
  - Solution Architect
  - Technical Architect
  years_range: [8, 20]
  tags: [leadership, roadmap, planning, dora, pipeline-reliability, modernization]
  estimated_minutes: 7
  references:
  - source_id: dora-dev
    locator: DORA Core model — capability-based improvement sequencing and measuring delivery performance over time
  - source_id: gitlab-handbook
    locator: GitLab Handbook — Product Development Flow, milestone-based planning and issue readiness stages
  last_verified: '2026-07-16'
  freshness_days: 365
