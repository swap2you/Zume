- id: gold-tool-003
  domain: cucumber
  subdomain: state-context
  title: Scenario-scoped state and dependency injection for parallel Cucumber runs
  level: advanced
  priority: P1
  frequency: common
  question_type: framework_design
  question: >-
    Design scenario state and dependency injection for parallel Cucumber execution without static globals
    or hidden coupling between step-definition classes.
  concise_answer: >-
    Give every scenario its own object graph, created and torn down by the DI container's scenario scope,
    such as PicoContainer, Guice, or cucumber-spring's scenario scope. Step-definition classes receive
    collaborators, driver, data context, API client, through constructor injection from that scenario-scoped
    container, never through static fields or singletons. Hooks create and dispose of technical resources
    for the scenario and must not encode business flow. When Cucumber runs scenarios in parallel, each
    thread gets its own container instance, so no scenario can observe another scenario's state, and step
    classes can be split by responsibility without worrying about execution order across scenarios.
  recommended_answer: |-
    Cucumber-JVM ships a scenario-scoped dependency-injection model by default (PicoContainer), and integrates with Guice or Spring's cucumber-spring module for teams with existing DI conventions. The key property to preserve, regardless of which container is used, is scenario scope: the container constructs a fresh object graph for each scenario and discards it afterward, so any object registered in that graph is naturally isolated from every other scenario running concurrently.

    The practical pattern is a scenario-scoped context or 'World' object holding technical state, the driver session, an API client, a map of scenario-local test data, injected via constructor into every step-definition class that needs it. Step classes never instantiate their own collaborators and never reach for static fields; they declare what they need in their constructor and the container wires the same shared-within-scenario instance to every class that asks for it, which is how state flows between, for example, a login-steps class and an assertion-steps class without a global variable.

    Hooks, @Before and @After, are strictly technical: create the driver session or open a database connection in @Before, close and release it in @After. Business sequencing belongs in Given steps, not in hooks, because hooks run for every scenario regardless of tags or content and mixing business logic into them creates implicit, undocumented coupling.

    For parallel execution, Cucumber's parallel configuration (cucumber.execution.parallel.enabled plus a strategy, or a parallel JUnit/TestNG runner) gives each worker thread its own container instance automatically when scope is respected; the only remaining risk is a shared, mutable resource declared outside scenario scope, for example a static test-data cache, which must either be made immutable and safely shareable or moved into scenario scope.
  key_points:
  - Bind a scenario-scoped context or container so every scenario gets its own object graph.
  - >-
    Inject collaborators via constructors; never reach for static globals or singletons for scenario state.
  - Hooks manage only technical setup and teardown, not business sequencing.
  - >-
    Split step-definition classes by responsibility, sharing state through the injected context, not static
    fields.
  - Verify true isolation by running the same scenario set in random order and in parallel.
  code_examples:
  - |-
    public class ScenarioContext {
      private WebDriver driver;
      private final Map<String, Object> data = new HashMap<>();
      public void setDriver(WebDriver d) { driver = d; }
      public WebDriver driver() { return driver; }
      public void put(String key, Object value) { data.put(key, value); }
    }

    public class NavigationSteps {
      private final ScenarioContext context;
      public NavigationSteps(ScenarioContext context) { this.context = context; }

      @Given("Alice has a registered account")
      public void aliceHasAccount() { context.put("user", userFactory.create()); }
    }
  strong_signals:
  - >-
    Names scenario-scope DI, PicoContainer, Guice, or cucumber-spring, explicitly and unprompted.
  - >-
    Distinguishes hook responsibility, technical setup, from business flow, which belongs in Given steps.
  - Flags cross-scenario order dependence as a specific defect class worth testing for.
  weak_signals:
  - >-
    Uses a single monolithic step-definition class holding all state as instance fields without discussing
    DI.
  - Is unaware Cucumber ships a dependency-injection container by default.
  red_flags:
  - Uses a static 'World' class shared across scenarios.
  - >-
    Relies on scenario execution order, for example scenario two depends on data created by scenario one.
  common_mistakes:
  - Static WebDriver or static test-data maps shared across scenarios.
  - >-
    Step classes instantiating their own collaborators instead of receiving them via injection, defeating
    scenario scoping.
  - Hooks that perform assertions or business setup that belongs in Given steps.
  follow_ups:
  - question: >-
      How would you split an overly broad step-definition class without breaking the injected scenario
      context?
    recommended_answer: >-
      Identify the class's distinct responsibilities, navigation, form-filling, API setup, assertions,
      and extract one step class per responsibility, each taking the same scenario-scoped context, or
      a narrower interface view of it, via constructor injection; the DI container wires all of them to
      the same instance per scenario, so state still flows correctly even though step text is spread across
      files. Keep step text and glue thin, and push any nontrivial logic into page objects or service
      clients the context exposes.
  - question: >-
      How would you verify, in CI, that scenarios have no hidden order dependence once running in parallel?
    recommended_answer: >-
      Run the suite twice with different explicit orderings, for example alphabetical versus a randomized
      seed, and with parallel execution enabled at a thread count greater than one, then compare pass
      and fail sets; any scenario that only fails under one ordering or thread count indicates shared
      or leaked state. Add a scenario-scope assertion in a @Before hook that the context starts empty,
      which converts silent contamination into an immediate, attributable failure.
  role_tracks: &id002
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  - Test/Quality Architect
  - Solution Architect
  - Technical Architect
  years_range:
  - 5
  - 15
  tags:
  - cucumber
  - gherkin
  - dependency-injection
  - parallelism
  - scenario-scope
  - state-management
  estimated_minutes: 7
  references:
