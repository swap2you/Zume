questions:
- id: gold-tool-001
  domain: testng
  subdomain: parallelism
  title: Thread-safety across TestNG's parallel execution lifecycle
  level: intermediate
  priority: P0
  frequency: common
  question_type: troubleshooting
  question: >-
    TestNG can run methods, classes, or entire suites in parallel using thread pools. When results become
    order-dependent or occasionally wrong, which parts of the lifecycle, data providers, and listeners
    must be made thread-safe, and why?
  concise_answer: >-
    TestNG shares one test-class instance across the threads running its methods unless a factory or a
    per-invocation data provider forces separate instances, so any instance field mutated by a test method
    is a race. Data providers configured with parallel=true are pulled from multiple worker threads at
    once, so the provider and anything it reads from must be thread-safe. Listener callbacks (ITestListener,
    IReporter) fire on whichever worker thread is running the test they report, so listener-held aggregates
    need synchronized or concurrent collections plus explicit thread/test correlation.
  recommended_answer: |-
    TestNG's parallel attribute (methods, classes, tests, instances) combined with thread-count controls how many worker threads execute the suite, but it does not, by itself, isolate the state a test class holds. The default model shares a single instance of a test class across the parallel invocations of its methods, so an instance field such as a WebDriver reference or a mutable counter is read and written concurrently unless the framework intervenes. Two mechanisms restore isolation without disabling parallelism: giving each execution a distinct object via @Factory (or a data-provider-driven factory), or scoping the shared resource per thread with ThreadLocal set in @BeforeMethod and cleared in @AfterMethod.

    Data providers add a second axis. When a @DataProvider is marked parallel=true, TestNG pulls rows for multiple threads concurrently from the same provider method; if the provider reads from a shared iterator, a database cursor, or a mutable cache, that access itself becomes a race independent of the test method's own state. The provider should either be stateless per call or explicitly synchronized at the point it touches shared state.

    Listeners are the third axis and the easiest to overlook. ITestListener/IReporter callbacks such as onTestSuccess or onTestFailure execute on the worker thread of the test they are reporting on, interleaved with callbacks for other tests running on other threads. A listener that appends to a plain ArrayList to build a summary report is corrupting that list under concurrent writes; the fix is a concurrent collection (or synchronized block) plus stamping each entry with the test method name and thread name so results can be correlated correctly after the fact, since callback order across threads is not the same as suite declaration order.
  key_points:
  - >-
    TestNG's default execution model shares one class instance across parallel method invocations unless
    a factory or per-invocation data provider forces new instances.
  - >-
    Data providers marked parallel=true are pulled from multiple worker threads simultaneously, so provider
    state must not mutate a shared iterator or cursor.
  - >-
    Listener callbacks fire on the worker thread of the test they report, so listener-held aggregates
    need thread-safe collections and explicit test/thread correlation.
  - >-
    Prefer ThreadLocal-scoped or constructor-injected resources over instance fields implicitly shared
    by the framework.
  - >-
    @BeforeMethod/@AfterMethod are the right place to create and tear down thread-scoped resources when
    methods run in parallel.
  code_examples:
  - |-
    public class BaseTest {
      private static WebDriver driver; // shared across parallel threads - BUG
      @BeforeMethod
      public void setup() { driver = new ChromeDriver(); }
    }
  - |-
    public class BaseTest {
      private static final ThreadLocal<WebDriver> DRIVER = new ThreadLocal<>();
      @BeforeMethod
      public void setup() { DRIVER.set(new ChromeDriver()); }
      protected WebDriver driver() { return DRIVER.get(); }
      @AfterMethod
      public void teardown() { DRIVER.get().quit(); DRIVER.remove(); }
    }
  strong_signals:
  - >-
    Names the default TestNG instance-sharing behavior unprompted, before being asked about a specific
    symptom.
  - Distinguishes dataProviderThreadCount from suite-level thread-count.
  - Proposes ThreadLocal with an explicit remove() in teardown, not just set().
  - >-
    Knows listener callbacks run on worker threads and require correlation, not just locking.
  weak_signals:
  - Says 'add @Test(threadPoolSize=...)' without discussing instance sharing.
  - Assumes every @Test method always gets a fresh class instance.
  red_flags:
  - Claims TestNG automatically thread-isolates instance fields.
  - >-
    Recommends synchronizing the entire test method to fix 'flakiness' without diagnosing which state
    is actually shared.
  common_mistakes:
  - Static or instance driver fields reused across parallel methods.
  - A data provider reading from a shared, non-thread-safe iterator or cursor.
  - Report listeners appending to a plain ArrayList without synchronization.
  - Forgetting ThreadLocal.remove(), so thread-pool reuse leaks state into the next test.
  follow_ups:
  - question: >-
      How would using @Factory or per-instance data providers change test-instance ownership compared
      to a shared base class?
    recommended_answer: >-
      @Factory creates a new instance of the test class per factory-supplied parameter, so instance fields
      become naturally test-scoped instead of shared; combined with dataProviderThreadCount, each thread
      gets both a distinct instance and a distinct data row, removing the need for ThreadLocal for that
      data. The trade-off is more objects and more constructor-time setup cost, and shared expensive resources
      such as a connection pool still need explicit, thread-safe pooling, because instance-per-test does
      not imply resource-per-test at scale.
  - question: >-
      How would you prove, in CI, that a suspected shared-state race is actually the cause of an intermittent
      parallel failure?
    recommended_answer: >-
      Run the same suite at thread-count=1 and thread-count=N several times; if failures appear only at
      N>1, add thread name and test-method name to every log line and driver session ID as a correlation
      key, then reproduce with a stress run that repeats the suite many times at high N and inspect logs
      for two threads referencing the same resource ID at overlapping timestamps. A thread dump captured
      at the moment of failure confirms which field or listener collection was accessed concurrently.
  role_tracks: &id001
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range:
  - 3
  - 12
  tags:
  - testng
  - parallelism
  - thread-safety
  - threadlocal
  - listeners
  - data-providers
  estimated_minutes: 6
  references:
  - source_id: testng-docs
    locator: >-
      TestNG documentation — parallel execution (parallel attribute, thread-count, dataProviderThreadCount)
  - source_id: java-oracle-docs
    locator: java.lang.ThreadLocal API — per-thread values and remove() lifecycle
  last_verified: '2026-07-16'
