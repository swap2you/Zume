- id: gold-tool-006
  domain: cicd
  subdomain: quality-gates
  title: Layered PR, nightly, and release quality gates without a blanket rerun policy
  level: advanced
  priority: P0
  frequency: very_common
  question_type: framework_design
  question: >-
    Design PR, nightly, and release quality gates for an automation platform. Explain which failures block
    immediately and which create follow-up work instead of blocking.
  concise_answer: >-
    PR gates must be fast and deterministic: unit tests, lint and type checks, and a small, curated smoke
    or critical-path suite, all of which block merge on failure because they are trusted, low-latency
    signals. Nightly gates run the broader regression and integration suite against a stable environment;
    failures there create triaged follow-up rather than blocking anyone's in-flight PR. Release gates
    add environment-specific checks, smoke against the release candidate, contract or compatibility checks,
    performance and security gates, and these do block the release itself. The dividing line is trust
    and latency: block immediately only on fast, low-flake, high-confidence checks, route everything else
    to owned follow-up with visible trend metrics, and never adopt a blanket rerun-to-green policy that
    launders real failures into passes.
  recommended_answer: |-
    A PR gate exists to give a developer fast, trustworthy feedback before merge, which means it must stay under roughly ten to fifteen minutes, be deterministic, and have a low false-positive rate; every flaky or slow test admitted into that gate erodes developer trust in the signal, and once developers stop trusting a red build they stop waiting for it. The PR gate therefore holds unit tests, static analysis, and a small, deliberately curated smoke or critical-invariant suite, and any failure there blocks the merge.

    A nightly gate exists to provide broader coverage, cross-service integration, longer-running regression, without imposing that latency on every PR. Nightly failures should not block in-flight PRs, but they should block a 'green build' designation used to decide deploy eligibility, so the distinction is not blocking versus non-blocking in absolute terms but blocking what, PR merge versus deploy readiness.

    A release gate is the last blocking checkpoint before production and can justifiably be slower and stricter: smoke tests against the actual release artifact, security scanning, performance-regression thresholds, and, for high-risk changes, an explicit manual sign-off. Because it gates production, its failures block the release outright.

    Across all three tiers, failures need to be routed by classified cause, not lumped into one triage queue: flaky-test failures get a bounded, tracked quarantine with an explicit owner and expiry date rather than a silent, permanent skip; infrastructure failures, grid down, environment unreachable, get an infrastructure ticket, not a code revert; confirmed product-defect failures get a bug and block the release if severity warrants. Every gate should publish pass and fail trend history, flake rate, and mean time to fix, visible to the team, so deferred failures stay visible rather than becoming invisible technical debt. A blanket 'rerun every failure until green' policy is explicitly dangerous here, because it converts real, intermittent defects into statistically likely passes, destroying the pipeline's signal value at exactly the tier where the team most needs to trust it.
  key_points:
  - >-
    PR gates must be fast, deterministic, and few enough that developers trust and wait for them.
  - >-
    Nightly gates provide broader coverage but should not block in-flight PRs; they gate deploy eligibility
    instead.
  - >-
    Release gates add environment- and artifact-specific checks and are the last blocking checkpoint before
    production.
  - >-
    Route flaky, infrastructure, and product-defect failures to distinct, owned follow-up rather than
    one triage queue.
  - >-
    Publish trend metrics and quarantine expiry so deferred failures stay visible instead of becoming
    invisible debt.
  code_examples:
  - |-
    jobs:
      pr-fast-gate:
        steps: [unit-tests, lint, smoke-suite]   # blocks merge
      nightly-full-regression:
        if: github.event_name == 'schedule'
        steps: [full-regression, integration-suite]  # gates deploy tag, not PRs
      release-gate:
        if: startsWith(github.ref, 'refs/tags/release-')
        steps: [rc-smoke, security-scan, perf-regression-check]  # blocks release
  strong_signals:
  - Explicitly ties gate speed and determinism to developer trust in the signal.
  - Distinguishes 'blocks the PR' from 'blocks the deploy tag' from 'blocks the release'.
  - Proposes quarantine with an expiry date and owner rather than a permanent silent skip.
  weak_signals:
  - >-
    Proposes running the entire regression suite on every PR 'to be safe' without addressing latency or
    flake cost.
  - Treats all failures the same regardless of cause.
  red_flags:
  - Recommends a blanket rerun-until-green retry policy as the primary flake strategy.
  - Has no plan for surfacing quarantined tests, letting them accumulate silently.
  common_mistakes:
  - Putting slow or flaky suites in the PR gate, training developers to ignore red builds.
  - Never revisiting quarantined tests because there is no expiry or owner.
  - Conflating an infrastructure outage with a product regression in the same triage bucket.
  follow_ups:
  - question: How would you prevent a permanently quarantined test suite from becoming invisible debt?
    recommended_answer: >-
      Require every quarantine to carry an owner, a reason, a linked ticket, and an expiry date; run a
      scheduled report listing quarantined tests past their expiry and escalate them; block new quarantines
      past a team-level cap so the practice cannot silently grow unbounded, and periodically audit quarantined
      tests for ones that are actually deterministic product defects mislabeled as flaky.
  - question: How would you decide whether a nightly-only failure should block the next release?
    recommended_answer: >-
      Classify the failure first, product defect, infrastructure, test-data, or automation defect, using
      reproducible evidence; if it is a confirmed product defect in a code path shipping in the release,
      it blocks regardless of when it was detected; if it is an environment or automation issue unrelated
      to the shipped code, it is tracked but does not block, provided the release gate's own smoke and
      compatibility checks still pass on the actual release candidate.
  role_tracks: *id002
  years_range:
  - 5
  - 16
  tags:
  - cicd
  - quality-gates
  - github-actions
  - jenkins
  - flakiness
  - release-management
  estimated_minutes: 7
