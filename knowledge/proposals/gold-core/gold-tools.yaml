- id: gold-tool-005
  domain: git-maven
  subdomain: merge-rebase
  title: Merge versus rebase, and revert versus reset, in a shared repository
  level: intermediate
  priority: P1
  frequency: common
  question_type: compare_contrast
  question: >-
    Compare merge and rebase for a shared automation repository. What history and collaboration risks
    drive the choice, and when would you use revert instead of reset after a bad merge?
  concise_answer: >-
    Merge preserves the true topology of history, every branch point and integration stays visible, commits
    keep their original identity, and it is always safe on shared or published branches because it never
    rewrites existing commits. Rebase rewrites history, new commit hashes replayed on a new base, to produce
    a linear log; it is valuable on a private, not-yet-pushed branch to clean up before review, but rebasing
    a branch others have already pulled forces everyone downstream to reconcile diverged history. The
    team convention should be: rebase freely on your own unpublished branch, never rebase shared history,
    and protect main so history rewrites there are impossible.
  recommended_answer: |-
    A true merge creates a merge commit with two parents, leaving every existing commit's SHA untouched and the branch topology visible in the log; a fast-forward merge simply moves the pointer when there is no divergence. Rebase instead replays a branch's commits one by one onto a new base, which changes every replayed commit's hash. That single fact drives the risk: any reference to the old commits, other branches built on top, open pull requests, tags, becomes stale, and anyone who already pulled the pre-rebase branch will see a diverged history when they fetch, forcing a disruptive reconciliation. This is Git's own documented golden rule: never rebase a branch that other people have already based work on.

    For a shared automation repository specifically, a comprehensible history matters beyond aesthetics: diagnosing when a flaky test regression was introduced relies on `git bisect` walking a log that accurately reflects what was built and tested at each point, and a force-pushed rebase of a shared branch can strand collaborators' local branches or silently drop commits if done carelessly, especially during an interactive rebase that reorders or squashes commits. Conflict resolution itself should never be trusted from a clean text merge alone; two branches can each adjust the same wait timeout or the same test-data fixture to different, now-incompatible values with no textual conflict at all, so the affected test suite should be re-run after any merge or rebase, not just visually reviewed.

    Once a bad merge has already been pushed and pulled by others, the safe fix is revert, which creates a new commit undoing the previous change while leaving history intact, rather than reset, which moves a branch pointer and can discard commits that others may have already fetched. Reset is appropriate only for local, unpublished cleanup before anyone else has seen the commits.
  key_points:
  - Merge preserves topology and commit identity; it is always safe on shared branches.
  - >-
    Rebase rewrites commit hashes and is safe only on branches nobody else has already pulled.
  - 'The golden rule is: never rebase branches with public or shared history.'
  - >-
    Resolve merge or rebase conflicts by re-running tests, not just trusting a clean text merge.
  - >-
    Use revert, a new undo commit, rather than reset, which rewrites shared history, once a bad merge
    is already shared.
  code_examples:
  - |-
    # Safe: rebase your own unpublished feature branch before opening a PR
    git checkout feature/flaky-fix
    git fetch origin
    git rebase origin/main

    # Undo a bad merge already pushed to shared main:
    git revert -m 1 <merge-commit-sha>
  strong_signals:
  - 'Articulates the golden rule precisely: rebase only unpublished history.'
  - >-
    Explains why SHAs change on rebase and what that breaks, open PRs, other branches, bisect.
  - >-
    Distinguishes revert, safe and additive, from reset, rewrites shared history, for undoing a pushed
    bad merge.
  weak_signals:
  - Prefers rebase 'because it's cleaner' without addressing the shared-history risk.
  - Conflates revert and reset.
  red_flags:
  - Recommends force-pushing a rebased shared branch as routine practice.
  - >-
    Would use `reset --hard` on a shared branch to 'fix' a bad merge that others have already pulled.
  common_mistakes:
  - Rebasing main or another long-lived shared branch.
  - Resolving a merge conflict by picking one side without re-running tests.
  - Using `reset --hard` on a pushed branch instead of revert.
  follow_ups:
  - question: When would you use revert instead of reset after a bad merge?
    recommended_answer: >-
      Use revert whenever the bad merge, or any commit, has already been pushed and potentially pulled
      by others, because revert adds a new commit undoing the change without altering existing history,
      so everyone's local branches remain consistent with the remote; reset is appropriate only for undoing
      local, unpublished commits before anyone else has fetched them. For a merge commit specifically,
      `git revert -m 1 <sha>` is needed to tell Git which parent's history to treat as the mainline being
      restored.
  - question: >-
      How would you protect a shared automation repository so an accidental rebase-and-force-push cannot
      happen?
    recommended_answer: >-
      Enable branch protection on main, and other shared long-lived branches, requiring pull-request merges,
      disallowing force pushes and history rewrites, and requiring status checks to pass; combine that
      with a team convention, documented for contributors, that rebase is for private branches only, and
      never configure `pull --rebase` as a global default against protected branches.
  role_tracks: *id001
  years_range:
  - 3
  - 12
  tags:
  - git
  - merge
  - rebase
  - revert
  - reset
  - branch-protection
  - collaboration
  estimated_minutes: 5
