- id: gold-tool-004
  domain: git-maven
  subdomain: maven-lifecycle
  title: Surefire versus Failsafe across the Maven build lifecycle
  level: basic
  priority: P1
  frequency: very_common
  question_type: concept
  question: >-
    Explain the Maven build-lifecycle difference between unit-style tests and integration tests using
    Surefire and Failsafe, and why `mvn test` can pass while `mvn verify` fails.
  concise_answer: >-
    Maven's default lifecycle runs phases in order through validate, compile, test, package, verify, install,
    and deploy. The Surefire plugin binds to the test phase and runs fast, isolated unit tests, by default
    classes named *Test, *Tests, or *TestCase. The Failsafe plugin binds separately to integration-test
    and verify, by default classes named *IT, *ITCase, or IT*, precisely so a failing integration test
    does not abort the build before post-integration-test cleanup runs; Failsafe records failures during
    integration-test and only fails the build at the verify goal. `mvn test` only executes phases up through
    test, so it never reaches Failsafe at all; a broken integration test stays invisible until `mvn verify`
    or `mvn install` runs.
  recommended_answer: |-
    The default Maven lifecycle orders phases as validate, initialize, generate-sources, process-sources, generate-resources, process-resources, compile, process-classes, generate-test-sources, process-test-sources, generate-test-resources, process-test-resources, test-compile, test, package, pre-integration-test, integration-test, post-integration-test, verify, install, and deploy. Surefire binds its test goal to the test phase, so it runs before packaging, against compiled classes without needing a packaged artifact.

    Failsafe is deliberately split into two goals bound to two later phases: integration-test, which runs the *IT-named tests, and verify, which checks their results and fails the build if any test failed. That split exists so pre-integration-test and post-integration-test hooks, for example starting and stopping a packaged application, a Testcontainers instance, or a database, always run regardless of whether the integration tests themselves failed; if Failsafe failed the build immediately at integration-test, cleanup would be skipped and environments would leak. Surefire has no equivalent split, so a Surefire failure aborts the build at the test phase unless testFailureIgnore is set, which is discouraged because it hides failures rather than deferring their teardown.

    Because `mvn test` only executes phases up to and including test, it never triggers the integration-test or verify phases at all, so it is structurally incapable of running or failing on Failsafe-managed tests. A team that only ever runs `mvn test` in its pipeline is not exercising its integration-test suite, regardless of how well-written that suite is; only `mvn verify` or a later phase actually invokes Failsafe's integration-test and verify goals in sequence.
  key_points:
  - Surefire binds to the test phase and runs fast unit-style tests by naming convention.
  - >-
    Failsafe splits into integration-test, run, and verify, check and fail, so teardown runs even on failure.
  - >-
    `mvn test` never reaches the integration-test or verify phases, so it cannot run or fail on Failsafe
    tests.
  - >-
    Naming conventions, *Test versus *IT, determine which plugin picks up a class by default.
  - >-
    CI pipelines must explicitly invoke verify, or a later phase, to exercise integration coverage.
  code_examples:
  - |-
    <plugin>
      <groupId>org.apache.maven.plugins</groupId>
      <artifactId>maven-failsafe-plugin</artifactId>
      <executions>
        <execution>
          <goals>
            <goal>integration-test</goal>
            <goal>verify</goal>
          </goals>
        </execution>
      </executions>
    </plugin>
  strong_signals:
  - >-
    States the exact phase-binding difference and explains why it matters for teardown-before-failure.
  - Correctly predicts that `mvn test` cannot fail on an *IT class.
  weak_signals:
  - >-
    Says 'Failsafe is just Surefire for integration tests' without explaining the two-goal split or phase
    timing.
  red_flags:
  - Believes `mvn test` runs the full lifecycle including integration tests.
  - >-
    Suggests renaming integration tests to *Test so Surefire 'catches them too', without understanding
    the teardown implication.
  common_mistakes:
  - >-
    Naming integration tests with the unit-test suffix so they run, and abort, during the test phase,
    skipping environment teardown.
  - Running only `mvn test` in CI and assuming integration coverage is exercised.
  - Setting testFailureIgnore=true to 'fix' a red pipeline instead of triaging failures.
  follow_ups:
  - question: >-
      Why can `mvn test` pass while `mvn verify` fails, and what does that tell an on-call engineer about
      which suite regressed?
    recommended_answer: >-
      `mvn test` only runs phases through test, so a green result says nothing about integration coverage;
      a subsequent `mvn verify` failure means the regression is isolated to code paths only exercised
      with real collaborators wired up, a database, an external service, or a packaged artifact, rather
      than to logic covered by fast unit tests. The on-call engineer should inspect the Failsafe reports
      specifically and check what changed in configuration, test fixtures, or downstream service contracts,
      not the code already covered by the passing unit suite.
  - question: >-
      How would you keep the PR pipeline fast while still catching integration regressions before merge?
    recommended_answer: >-
      Run `mvn test`, Surefire, on every PR for fast feedback, and run a scoped `mvn verify` invocation
      limited to integration tests affected by the change, or a nightly full `mvn verify`; critical integration
      paths that gate releases should still run on every PR even if slower, while broader integration
      coverage can run less frequently, with clear ownership for triaging Failsafe-only failures separately
      from Surefire ones.
  role_tracks: *id001
  years_range:
  - 2
  - 10
  tags:
  - maven
  - surefire
  - failsafe
  - build-lifecycle
  - integration-tests
  - ci
  estimated_minutes: 5
  references:
  - source_id: maven-docs
    locator: >-
      Apache Maven documentation — Introduction to the Build Lifecycle (phase ordering and plugin bindings)
  - source_id: maven-docs
    locator: Apache Maven documentation — Maven Failsafe Plugin (integration-test and verify goals)
  last_verified: '2026-07-16'
  status: draft
  quality_origin: researched
  review_status: unreviewed
