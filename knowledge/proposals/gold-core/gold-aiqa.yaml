- id: gold-aiqa-005
  domain: ai-governance
  subdomain: data-privacy
  title: Privacy and governance policy for AI-assisted candidate and test data
  level: advanced
  priority: P0
  frequency: common
  question_type: leadership
  question: >-
    Create a privacy and governance policy for using resumes, test data and production
    evidence with external AI providers.
  concise_answer: >-
    Classify data before it can be sent anywhere: candidate PII and real production
    evidence are high-sensitivity by default and require minimization/redaction and an
    approved-provider list with contractual retention and no-training-on-our-data terms;
    synthetic or already-anonymized test data is lower risk but still governed. No
    secret, credential or real candidate data leaves the boundary by default — only
    explicitly approved, minimized categories do, under an accountable human owner who
    signs off on the exception. Every external call gets logged for audit, with an
    incident-response path if something sensitive is discovered to have leaked.
  recommended_answer: >-
    The policy starts with data classification, because "AI governance" without a
    classification step just means every prompt is a potential exposure. Candidate
    resumes, interview notes and any production log/response body count as
    high-sensitivity by default; synthetic or already-scrubbed test fixtures are
    lower-sensitivity but still tracked. The default for high-sensitivity data is that it
    does not go to an external AI provider at all; anything that must go external is
    minimized first — redact names, contact details, employer identifiers, and any
    payload field not strictly needed for the task — before it leaves the boundary.

    Only approved providers under a signed agreement covering retention limits and a
    no-training-on-customer-data clause are eligible destinations, and that approval list
    itself needs periodic review as vendor terms change. NIST's AI Risk Management
    Framework's GOVERN function is the right structural anchor for this: policies,
    accountable roles, and documented risk tolerance need to exist before a tool is
    adopted, not retrofitted after an incident, and its MAP function is where the
    specific data flows (what data, to which provider, for what purpose) get inventoried
    so "we didn't realize that field was going out" stops being possible.

    Concretely for this project: real candidate data and secrets must never be sent to an
    external AI provider by default; any exception requires an explicit, logged decision
    by an accountable human, not a default code path. Every external AI call involving
    any candidate-adjacent context should be logged with what was sent (or a hash/summary
    sufficient for audit without re-exposing the sensitive content itself), so an incident
    response process has something to investigate. That incident-response path — who is
    notified, what gets audited, how affected individuals are handled — needs to exist and
    be rehearsed before it is needed, not designed for the first time during an actual
    leak.
  key_points:
  - Classify data (PII, production evidence, synthetic/anonymized) before any external AI call.
  - Minimize and redact by default; only explicitly approved categories leave the boundary.
  - Use approved providers with contractual retention and no-training-on-our-data terms.
  - No secret or candidate data by default — require an explicit, accountable, logged exception.
  - Audit every relevant external call and maintain a rehearsed incident-response path.
  strong_signals:
  - Starts from data classification before discussing any provider or tooling choice.
  - Names GOVERN/MAP-style structural anchors — accountable roles and inventoried data flows — not just a rule list.
  - Designs the incident-response path before an incident, not as an afterthought.
  weak_signals:
  - Jumps straight to "which AI vendor to use" without a data classification step.
  - Treats redaction as optional or as something to add later if a problem occurs.
  red_flags:
  - Sends real candidate PII or secrets to an external provider by default with no logged exception process.
  - No incident-response plan exists for a hypothetical data leak.
  common_mistakes:
  - Redacting obvious fields (name) but missing indirect identifiers (unique combination of details).
  - No periodic re-review of the approved-provider list as vendor data-handling terms change.
  - Logging that a call happened but not what category of data it contained, making audits useless.
  follow_ups:
  - question: What technical controls prove that candidate data was not sent?
    recommended_answer: >-
      A deny-by-default data path: candidate-adjacent fields are excluded from the
      payload builder that talks to any external provider unless explicitly whitelisted,
      enforced in code rather than by developer discipline alone, plus automated
      scanning of outbound request payloads (pattern-matching for name/email/resume-shaped
      content) that fails the call or raises an alert if a disallowed field is present.
      Combined with request/response logging retained for audit, this gives a technical,
      checkable answer — "here is the enforced allowlist and the log showing no
      disallowed field appeared" — rather than a policy statement with nothing to verify
      it against.
  role_tracks:
  - AI QA Engineer
  - AI Test Engineer
  - AI Engineer
  - LLM/Agent Engineer
  - QA Manager
  - Quality Engineering Manager
  - Engineering Manager
  - Quality Engineering Lead
  years_range: [5, 20]
  tags: [ai-governance, data-privacy, nist-ai-rmf, redaction, incident-response]
  estimated_minutes: 7
  references:
  - source_id: nist-ai-rmf
    locator: NIST AI RMF 1.0 — GOVERN function (policies, accountable roles) and MAP function (inventorying AI data flows)
  - source_id: owasp-genai
    locator: OWASP Top 10 for LLM Applications — LLM02 Sensitive Information Disclosure, data minimization guidance
  last_verified: '2026-07-16'
