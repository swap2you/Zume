- id: gold-aiqa-006
  domain: ai-governance
  subdomain: roi
  title: Evaluating an AI automation initiative beyond an impressive demo
  level: advanced
  priority: P1
  frequency: common
  question_type: leadership
  question: >-
    Evaluate an AI automation initiative whose demo is impressive but whose operating
    cost and defect impact are unclear.
  concise_answer: >-
    Define a measurable baseline and outcome before scaling from the demo — what
    manual/automated cost does this replace, and what specific quality or cycle-time
    metric should move. Cost the full operating picture, not just the API bill: human
    review/oversight time, model and infrastructure spend, integration and maintenance
    effort, and the cost of handling its failure modes. Run a controlled pilot against
    that baseline, measure actual quality and cycle-time impact rather than demo
    impressiveness, and set explicit stop/scale criteria in advance so the decision to
    continue or halt is made against evidence, not sunk-cost momentum or how good the
    demo looked.
  recommended_answer: >-
    A demo is optimized to look impressive on a handful of hand-picked examples; it says
    almost nothing about operating cost or defect impact at scale, so the first move is
    to define what would actually prove the initiative works before running one more
    demo. That means a measurable baseline (current cost, cycle time, or defect rate for
    the task this is meant to improve) and a specific target outcome (reduce triage time
    by X%, reduce escaped defects of type Y), agreed before the pilot starts so success
    cannot be redefined after the fact to match whatever numbers arrive.

    Full-cost accounting has to include more than the visible API bill: the human review
    or oversight time the workflow still requires (an AI suggestion that still needs full
    human verification may not save net time at all), integration and ongoing maintenance
    engineering effort, and — critically — the cost of its failure modes, including how
    often a human has to catch and correct a wrong output and what that miss would have
    cost if uncaught. An initiative that looks free because "the model is cheap" but
    requires a senior engineer to review every output has a real, often underestimated,
    labor cost.

    The pilot itself should run against real, representative work — not curated demo
    cases — for long enough to see failure modes, and should measure the pre-agreed
    outcome metrics plus unplanned costs discovered along the way. Stop/scale criteria
    set in advance (e.g., "scale only if triage time drops ≥20% with no increase in
    escaped defects over a full release cycle; stop if oversight cost exceeds savings")
    protect the decision from sunk-cost reasoning and from continuing an initiative on the
    strength of enthusiasm rather than evidence — this mirrors NIST's AI RMF emphasis on
    the MEASURE and MANAGE functions treating an AI system's value and risk as something
    to continuously track post-deployment, not something settled once at the pitch stage.
  key_points:
  - Define a measurable baseline and target outcome before scaling beyond the demo.
  - Cost the full operating picture — review time, model/infra spend, integration, failure handling.
  - Run a controlled pilot on real representative work, not curated demo cases.
  - Measure actual quality and cycle-time impact, not demo impressiveness or sentiment.
  - Set explicit stop/scale criteria in advance to resist sunk-cost momentum.
  strong_signals:
  - Insists on a pre-agreed baseline and target before evaluating pilot results.
  - Names hidden costs (human oversight time, failure-mode handling) beyond the visible API bill.
  - Sets stop/scale criteria in advance rather than deciding after seeing favorable results.
  weak_signals:
  - Evaluates the initiative mainly by how impressive the demo looked.
  - Counts only direct API/compute cost, ignoring human review or integration effort.
  red_flags:
  - Recommends scaling company-wide straight from a demo with no pilot or baseline.
  - No stop criteria exist; continuation is assumed regardless of pilot outcome.
  common_mistakes:
  - Letting the pilot run only on hand-picked, favorable cases instead of representative work.
  - Redefining "success" after the pilot to match whatever result actually occurred.
  - Ignoring the labor cost of humans who must verify every AI-generated output.
  follow_ups:
  - question: Which evidence would cause you to stop the initiative despite positive user sentiment?
    recommended_answer: >-
      Sentiment is a weak proxy for value — users can like a flashy tool that is not
      actually net-positive. The evidence that should override positive sentiment: the
      pilot's pre-agreed outcome metric did not move (or moved the wrong way), the
      full-cost accounting shows the human oversight/failure-handling cost exceeds the
      time saved, or escaped defects attributable to relying on the tool's output
      increased. Any of those against the pre-set stop criteria should trigger stopping
      or redesigning the initiative regardless of how enthusiastic users are about the
      demo experience.
