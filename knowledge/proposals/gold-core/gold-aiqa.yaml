- id: gold-aiqa-003
  domain: ai-quality
  subdomain: evals
  title: Building an evaluation dataset for a test-generation assistant
  level: advanced
  priority: P0
  frequency: common
  question_type: test_strategy
  question: >-
    Build an evaluation dataset for a QA assistant that generates tests from
    requirements.
  concise_answer: >-
    Assemble a representative set of real requirements spanning the defect-risk
    categories the assistant is meant to help with — ambiguous requirements, boundary
    conditions, negative/error paths, cross-feature interactions — and write gold rubrics
    for each (what a correct set of generated tests must cover), not just a single gold
    test list, since multiple correct decompositions usually exist. Score generated tests
    on coverage of required scenarios, correctness of assertions, redundancy, and whether
    any suggestion is actively harmful (a destructive test against production, a test
    that asserts the wrong expected behavior). Have humans review the genuinely hard
    cases, version the dataset, and control for training-data contamination if the
    assistant's underlying model may have seen similar requirements before.
  recommended_answer: >-
    A good dataset starts from real requirements documents (redacted/anonymized as
    needed) chosen to span the defect-risk categories that matter in practice: ambiguous
    or underspecified requirements (does the assistant ask a clarifying question or guess
    silently), explicit boundary and edge conditions, negative/error paths that
    requirements documents habitually under-specify, and cross-feature interactions that
    a single-feature reading would miss. Each case needs a rubric, not a single "gold"
    test list, because two competent testers would often produce differently structured
    but equally valid test sets from the same requirement — grading against one fixed
    list would fail correct answers that simply organized coverage differently.

    Rubric dimensions to score per case: coverage (are the required scenario categories
    present — boundary, negative, interaction — regardless of exact wording), correctness
    (are the generated assertions actually right for the described behavior, not just
    plausible-sounding), redundancy (did it generate ten variations of the same check
    while missing a distinct risk), and harmful-suggestion detection (did it propose
    something dangerous — a test that mutates production data, an assertion that
    encodes the wrong expected value as if it were correct). The last category deserves
    its own metric and its own severity, since a harmful suggestion is a different kind
    of failure than merely incomplete coverage.

    Difficult or ambiguous cases should get human review rather than being auto-scored,
    both to build ground truth for calibrating any automated grader and to catch cases
    where the rubric itself was wrong. Version the dataset as it grows, and track which
    version produced which score so improvements are comparable release over release.
    If the requirements documents used as fixtures are similar to public or widely
    circulated examples, screen for contamination — the model may already have memorized
    the "right answer" for a famous example, inflating scores in a way that will not
    hold for the team's actual, unpublished requirements.
  key_points:
  - Source representative requirements spanning real defect-risk categories, not only easy cases.
  - Write gold rubrics per case rather than a single fixed gold test list.
  - Score coverage, correctness, redundancy and harmful-suggestion risk as separate dimensions.
  - Route difficult or ambiguous cases to human review to calibrate the grader.
  - Version the dataset and control for training-data contamination.
  strong_signals:
  - Uses rubrics rather than a single fixed gold answer, recognizing multiple valid decompositions.
  - Treats harmful/dangerous suggestions as their own graded dimension with distinct severity.
  - Raises contamination risk when fixtures resemble widely known public examples.
  weak_signals:
  - Grades generated tests only against a single fixed "correct" test list.
  - Has no plan for scoring or flagging actively harmful suggestions.
  red_flags:
  - Dataset contains only easy, unambiguous requirements — no boundary/negative/interaction cases.
  - No human review step anywhere; the entire eval is fully automated with no calibration.
  common_mistakes:
  - Measuring only "did it generate N tests" instead of whether they cover the right risks.
  - Never updating the dataset after finding a real gap the assistant missed in production use.
  - Ignoring redundant, low-value generated tests when computing a coverage score.
  follow_ups:
  - question: How would you measure whether generated tests find defects rather than only look plausible?
    recommended_answer: >-
      Run the generated tests against seeded, known defects (mutation testing or a
      curated set of previously real bugs reintroduced into a branch) and measure defect
      detection rate, not just whether the tests execute and pass against correct code.
      A test suite that looks thorough but never fails against a real regression is
      scoring well on a plausibility metric while failing the metric that actually
      matters — did it catch something. Track this alongside coverage/correctness scores
      as the strongest signal of genuine usefulness.
  role_tracks:
  - AI QA Engineer
  - AI Test Engineer
  - AI Engineer
  - LLM/Agent Engineer
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  years_range: [4, 18]
  tags: [ai-quality, evals, test-generation, rubrics, dataset-design]
  estimated_minutes: 7
  references:
  - source_id: openai-docs
    locator: OpenAI Platform docs — Evals guide, rubric-based and model-graded evaluation design
  - source_id: google-testing-blog
    locator: Google Testing Blog — Test Sizes and Code Health series, categorizing defect-risk scenarios for coverage design
  last_verified: '2026-07-16'
  freshness_days: 365
