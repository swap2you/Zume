# Optional Selenium lab profile. Internal network only; no secret/candidate mounts.
services:
  web-under-test:
    image: nginx:1.27-alpine
    networks: [labnet]
    read_only: true
    volumes:
      - ../../training/web-under-test:/usr/share/nginx/html:ro
  selenium:
    image: selenium/standalone-chromium:4.25.0
    networks: [labnet]
    shm_size: 1gb
    depends_on: [web-under-test]
  java-runner:
    image: curlimages/curl:8.10.1
    networks: [labnet]
    depends_on: [web-under-test]
    profiles: ["runner"]
    command: ["--fail", "--silent", "--show-error", "http://web-under-test/", "--output", "/dev/null"]

networks:
  labnet:
    internal: true
