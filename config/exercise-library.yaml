# Zume interview exercise library.
#
# INTERVIEWER-ONLY material. Reference solutions, expected reasoning, red flags,
# recommended answers and independence questions must never be shown to
# candidates. Candidate-facing output includes only the task text.
#
# Each exercise carries rotation metadata:
#   status:         active | draft | retired   (only 'active' is selectable)
#   rotation_group: exercises that test the same competency; rotate within it
#   variant_family: never assign two from the same family to one candidate
#   difficulty:     easy | medium | hard
#   skill_area:     the core area key
#
# Answer contract (enforced by tests/test_exercises.py for every ACTIVE exercise):
#   requirement_change_recommended_answer : non-empty
#   debugging_recommended_answer          : non-empty
#   independence_questions[].recommended_answer : non-empty
#
# Rotation state (usage_count, last_used, per-candidate history) is tracked in
# the SQLite index, not here, so this file stays declarative.

scoring_dimensions:
  approach_before_coding: 2
  independent_implementation: 3
  explanation: 2
  modification_debugging: 2
  code_quality_cleanup: 1

rotation:
  # Avoid re-assigning a primary exercise while unused active alternatives exist.
  prefer_unused: true
  avoid_repeat_for_candidate: true

areas:
  java:
    label: Java
    core: true
    exercises:
      - id: java_duplicate_frequency
        title: Duplicate frequency
        skill_area: java
        variant_family: java_collections_counting
        rotation_group: java-core
        difficulty: easy
        status: active
        task: >
          Count duplicate words in a sentence using a Map and print only the words
          whose count is greater than 1.
        requirement_change_follow_up: Make it case-insensitive and ignore punctuation.
        requirement_change_recommended_answer: >
          Normalize each token before counting: lower-case it and strip punctuation
          (e.g. replaceAll("[^a-z0-9]", "") after toLowerCase, or split on
          "\\W+"). Counting logic is unchanged; only the key normalization moves
          ahead of merge. Mention that an empty token from leading/trailing
          punctuation must be skipped.
        debugging_follow_up: >
          The candidate's map prints every word, not only duplicates. Ask them to
          find and fix the off-by-one filter condition live.
        debugging_recommended_answer: >
          The filter should print only when the count is strictly greater than 1
          (c > 1), not >= 1. They should locate the print/filter step, correct the
          comparison, and re-run to confirm only repeated words appear.
        expected_reasoning: >
          Populate a HashMap with merge/getOrDefault, then filter entries whose
          value exceeds 1. O(n) time, O(k) space.
        reference_solution: |
          Map<String, Integer> counts = new HashMap<>();
          for (String w : sentence.split("\\s+")) counts.merge(w, 1, Integer::sum);
          counts.forEach((w, c) -> { if (c > 1) System.out.println(w + "=" + c); });
        scoring_rubric:
          - Chooses a Map and explains why (2)
          - Correct counting and filter (3)
          - Explains complexity (2)
          - Adapts to case-insensitive/punctuation (2)
          - Clean, readable code (1)
        red_flags:
          - Cannot explain merge/getOrDefault.
          - Index-based iteration over the map.
          - Cannot adapt to case-insensitive comparison.
        independence_questions:
          - question: Why did you pick a HashMap over a TreeMap here?
            recommended_answer: >
              HashMap gives O(1) average put/get and order does not matter for
              counting; TreeMap adds O(log n) per operation to keep keys sorted,
              which is only worth it if sorted output is required.
          - question: Walk me through what merge does on the second occurrence.
            recommended_answer: >
              On the first occurrence the key is absent so merge stores the initial
              value 1; on the second occurrence merge applies the remapping
              function (Integer::sum) to the existing value and 1, producing 2.
      - id: java_preserve_order
        title: Preserve insertion order
        skill_area: java
        variant_family: java_collections_ordering
        rotation_group: java-core
        difficulty: easy
        status: active
        task: Remove duplicates from a list while preserving insertion order.
        requirement_change_follow_up: Now also return the count of removed duplicates.
        requirement_change_recommended_answer: >
          Removed count = original size minus the de-duplicated size. Build the
          LinkedHashSet, capture its size, and return items.size() - unique.size();
          no second pass is needed.
        debugging_follow_up: >
          A provided version uses HashSet and the order is wrong; ask the candidate
          to diagnose why and correct it.
        debugging_recommended_answer: >
          HashSet does not preserve insertion order because it hashes elements into
          buckets. Swap it for a LinkedHashSet, which maintains a linked list of
          insertion order while keeping O(1) membership, so iteration order matches
          input order.
        expected_reasoning: >
          LinkedHashSet preserves insertion order with O(1) membership; HashSet does
          not guarantee order.
        reference_solution: |
          List<String> unique = new ArrayList<>(new LinkedHashSet<>(items));
        scoring_rubric:
          - Correct data structure choice (3)
          - Explains HashSet vs LinkedHashSet (2)
          - States complexity (2)
          - Handles the follow-up (2)
          - Clean code (1)
        red_flags:
          - Sorts the list, losing order.
          - Cannot state membership complexity.
        independence_questions:
          - question: What breaks if you swap LinkedHashSet for HashSet?
            recommended_answer: >
              Membership de-duplication still works, but insertion order is lost, so
              the returned list is in unspecified (hash-bucket) order and the
              order-preservation requirement fails.
      - id: java_json_extraction
        title: Nested JSON extraction
        skill_area: java
        variant_family: java_json
        rotation_group: java-core
        difficulty: medium
        status: active
        task: Extract the IDs of failed records from a nested JSON payload.
        requirement_change_follow_up: Also group the IDs by their error code.
        requirement_change_recommended_answer: >
          Iterate the failed records and collect into a
          Map<String, List<String>> keyed by errorCode (e.g.
          Collectors.groupingBy(r -> r.errorCode, mapping(r -> r.id, toList()))),
          guarding a missing errorCode with a default bucket such as "UNKNOWN".
        debugging_follow_up: >
          Given code throws a NullPointerException when 'status' is absent; ask the
          candidate to make it null-safe live.
        debugging_recommended_answer: >
          Guard the missing key before comparing: read status defensively
          (path.optString / Optional / null check) and treat absent status as
          not-FAILED rather than calling .equals on null. Prefer
          "FAILED".equals(status) so the constant is the receiver.
        expected_reasoning: >
          Parse with Jackson/Gson or JsonPath, iterate the nested array, filter
          status == FAILED, collect ids, and guard missing keys.
        reference_solution: |
          List<String> failed = JsonPath.read(json,
              "$.records[?(@.status == 'FAILED')].id");
        scoring_rubric:
          - Parses rather than string-splits (3)
          - Correct filtering (2)
          - Null/missing-field safety (2)
          - Handles grouping follow-up (2)
          - Clean code (1)
        red_flags:
          - String-splits raw JSON.
          - No handling for a missing status field.
        independence_questions:
          - question: How would you handle a malformed payload?
            recommended_answer: >
              Wrap parsing in try/catch for the parser's exception, validate the
              expected structure before reading, and fail fast with a clear error
              (or skip the record and log) rather than letting an unchecked
              exception propagate unexplained.
      - id: java_stream_grouping
        title: Stream grouping (draft)
        skill_area: java
        variant_family: java_streams
        rotation_group: java-core
        difficulty: medium
        status: draft
        task: Group employees by department and compute the average salary per group.
        requirement_change_follow_up: Return only departments whose average exceeds a threshold.
        requirement_change_recommended_answer: >
          Filter the resulting map entries by value > threshold, or wrap the
          groupingBy with Collectors.filtering; explain that filtering after the
          aggregation is correct because the average must be computed first.
        debugging_follow_up: Fix a collector that returns counts instead of averages.
        debugging_recommended_answer: >
          Collectors.counting() was used as the downstream collector; replace it
          with Collectors.averagingDouble(Employee::salary) so each group reduces
          to an average rather than a count.
        expected_reasoning: >
          Use Collectors.groupingBy with Collectors.averagingDouble; explain the
          downstream collector.
        reference_solution: |
          Map<String, Double> avg = emps.stream().collect(
              Collectors.groupingBy(Employee::dept,
                  Collectors.averagingDouble(Employee::salary)));
        scoring_rubric:
          - Correct groupingBy usage (3)
          - Correct downstream collector (2)
          - Explains stream pipeline (2)
          - Handles threshold follow-up (2)
          - Clean code (1)
        red_flags:
          - Manual loops when a collector is clearer and asked for.
        independence_questions:
          - question: What does the downstream collector control?
            recommended_answer: >
              It defines how the elements of each group are reduced — count, sum,
              average, mapping to another type, etc. groupingBy only partitions;
              the downstream collector produces each group's value.
  selenium:
    label: Selenium
    core: true
    exercises:
      - id: selenium_third_result
        title: Third search result
        skill_area: selenium
        variant_family: selenium_dynamic_list
        rotation_group: selenium-core
        difficulty: medium
        status: active
        task: >
          Search a term, click the third organic result, and return the resulting
          page title from a method.
        requirement_change_follow_up: Handle the result opening in a new tab.
        requirement_change_recommended_answer: >
          Capture existing window handles before the click, click, then wait for the
          handle count to increase, switch to the new handle
          (driver.switchTo().window(newHandle)), read the title, and switch back or
          close as appropriate.
        debugging_follow_up: >
          A provided script uses Thread.sleep and flakes; ask the candidate to
          replace it with an explicit wait.
        debugging_recommended_answer: >
          Replace Thread.sleep with a WebDriverWait plus an ExpectedCondition (e.g.
          visibilityOfAllElementsLocatedBy for the results). This waits only as long
          as needed and fails with a clear timeout rather than racing a fixed delay.
        expected_reasoning: >
          Explicit wait for results, collect result elements, index the third,
          handle window handles, return title from a method.
        reference_solution: |
          wait.until(ExpectedConditions.visibilityOfAllElementsLocatedBy(RESULTS));
          driver.findElements(RESULTS).get(2).click();
          return driver.getTitle();
        scoring_rubric:
          - Explicit waits over sleeps (3)
          - Robust locator strategy (2)
          - New-tab handling (2)
          - Returns via method (1)
          - Clean code (2)
        red_flags:
          - Thread.sleep instead of waits.
          - Brittle absolute XPath.
        independence_questions:
          - question: Why is an explicit wait better than a fixed sleep here?
            recommended_answer: >
              An explicit wait polls for a specific condition and returns as soon as
              it is met (and fails fast with a useful message if not), so it is both
              faster and more reliable than a fixed sleep, which either wastes time
              or flakes when the page is slower than the guessed delay.
      - id: selenium_dynamic_table
        title: Dynamic table lookup
        skill_area: selenium
        variant_family: selenium_table
        rotation_group: selenium-core
        difficulty: medium
        status: active
        task: Find a row by business ID and return its status column.
        requirement_change_follow_up: Resolve the status column from its header text, not a fixed index.
        requirement_change_recommended_answer: >
          Read the header row, find the index of the "Status" header dynamically
          (loop headers or an XPath count of preceding-sibling th), then use that
          computed index for the cell lookup so the code survives column reordering.
        debugging_follow_up: Fix a locator that matches multiple rows.
        debugging_recommended_answer: >
          Anchor the locator on the unique business ID cell with normalize-space
          equality (//tr[td[normalize-space()='ID']]) instead of a contains match,
          and assert exactly one match; broaden or narrow the predicate until a
          single row is selected.
        expected_reasoning: >
          Relative XPath keyed on the business ID; resolve the status cell from the
          header rather than a hard-coded index.
        reference_solution: |
          String xpath = "//tr[td[normalize-space()='" + id + "']]";
          WebElement row = wait.until(
              ExpectedConditions.visibilityOfElementLocated(By.xpath(xpath)));
          return row.findElement(By.xpath("./td[" + statusCol + "]")).getText();
        scoring_rubric:
          - Locator keyed on business data (3)
          - Dynamic column resolution (2)
          - Explicit wait (2)
          - Handles ambiguity (2)
          - Clean code (1)
        red_flags:
          - Nested loops over every cell.
          - Hard-coded column index left in after the follow-up.
        independence_questions:
          - question: How do you make the column index dynamic?
            recommended_answer: >
              Locate the header cells, iterate them to find the one whose text equals
              the target column name, and use its 1-based position as the td index —
              so the lookup does not depend on a hard-coded column number.
      - id: selenium_page_object
        title: Login Page Object
        skill_area: selenium
        variant_family: selenium_pom
        rotation_group: selenium-core
        difficulty: medium
        status: active
        task: Build a login Page Object with explicit waits and an error-message accessor.
        requirement_change_follow_up: Make it parallel-safe and add screenshot-on-failure.
        requirement_change_recommended_answer: >
          Use an instance (non-static) WebDriver, typically via ThreadLocal in a
          driver factory so each thread has its own driver; add a TestNG/JUnit
          listener that captures a screenshot on failure using the current thread's
          driver. No shared mutable driver state.
        debugging_follow_up: A shared static WebDriver causes cross-test failures; ask them to fix it.
        debugging_recommended_answer: >
          Remove the static driver; give each test/thread its own WebDriver instance
          (constructor injection or ThreadLocal in the factory) so parallel tests no
          longer stomp on one another's session.
        expected_reasoning: >
          Instance WebDriver, By locators, waits wrapped in helpers, login returns
          next page, error accessor waits for visibility.
        reference_solution: |
          public class LoginPage {
            private final WebDriver driver; private final WebDriverWait wait;
            public HomePage login(String u, String p) { /* type, click, return */ }
            public String errorMessage() {
              return wait.until(ExpectedConditions
                  .visibilityOfElementLocated(ERROR)).getText(); }
          }
        scoring_rubric:
          - Encapsulation and locators (3)
          - Waits in helpers (2)
          - Parallel-safety reasoning (2)
          - Screenshot-on-failure (2)
          - Clean code (1)
        red_flags:
          - Static WebDriver shared across tests.
          - Assertions inside the page object.
        independence_questions:
          - question: Why must the driver not be static for parallel runs?
            recommended_answer: >
              A static driver is shared across all threads, so parallel tests would
              operate on the same browser session, interleaving actions and causing
              nondeterministic failures. Each thread needs its own driver instance.
  rest_assured:
    label: REST Assured
    core: true
    exercises:
      - id: rest_create_retrieve
        title: Create and retrieve
        skill_area: rest_assured
        variant_family: rest_crud
        rotation_group: rest-core
        difficulty: medium
        status: active
        task: POST a resource, validate 201, extract the ID, GET it by ID and validate fields.
        requirement_change_follow_up: Extract a reusable RequestSpecification for base URI and headers.
        requirement_change_recommended_answer: >
          Build a RequestSpecification once (RequestSpecBuilder with base URI,
          content-type and auth headers) and pass it via given().spec(spec) in every
          call, removing duplicated setup and centralizing configuration.
        debugging_follow_up: A test hard-codes the created ID; ask them to extract it instead.
        debugging_recommended_answer: >
          Extract the id from the POST response
          (.extract().jsonPath().getString("id")) and reuse that variable in the GET
          path parameter, so the test works against any freshly created resource
          instead of a stale hard-coded value.
        expected_reasoning: >
          given/when/then, JSON body, extract id via jsonPath, chain GET with the
          extracted id, assert body fields.
        reference_solution: |
          String id = given().spec(spec).body(payload).when().post("/items")
              .then().statusCode(201).extract().jsonPath().getString("id");
          given().spec(spec).when().get("/items/{id}", id)
              .then().statusCode(200).body("name", equalTo("widget"));
        scoring_rubric:
          - Programmatic chaining (3)
          - Correct extraction (2)
          - Reusable spec (2)
          - Assertions on body (2)
          - Clean code (1)
        red_flags:
          - Describes Postman steps instead of code.
          - Hard-codes the created ID.
        independence_questions:
          - question: Where does the id come from in the second call?
            recommended_answer: >
              It is extracted from the POST response body at runtime and stored in a
              variable, then supplied as the path parameter of the GET, so the two
              calls are chained on the newly created resource.
      - id: rest_negative_auth
        title: Negative authorization
        skill_area: rest_assured
        variant_family: rest_auth
        rotation_group: rest-core
        difficulty: medium
        status: active
        task: Validate missing, invalid and expired bearer-token scenarios.
        requirement_change_follow_up: Add a role/scope case expecting 403 and explain 401 vs 403.
        requirement_change_recommended_answer: >
          Add a test with a valid but under-privileged token asserting 403. 401 means
          unauthenticated (no/invalid/expired credentials); 403 means authenticated
          but not authorized for the resource. Assert both the status and the error
          body.
        debugging_follow_up: A case asserts 200 for an expired token; ask them to correct the expectation.
        debugging_recommended_answer: >
          An expired token is not valid authentication, so the expected status is 401
          (or 403 if the API models it that way), never 200. Fix the assertion to the
          correct 4xx and verify the error message body.
        expected_reasoning: >
          Three setups asserting 401 (and 403 where applicable), asserting error
          bodies as well as status codes.
        reference_solution: |
          given().spec(spec).when().get("/secure").then().statusCode(401);
          given().spec(spec).header("Authorization","Bearer bad")
              .when().get("/secure").then().statusCode(401);
        scoring_rubric:
          - Distinct negative setups (3)
          - Status + body assertions (2)
          - 401 vs 403 reasoning (3)
          - Clean code (2)
        red_flags:
          - Only checks status codes; cannot explain 401 vs 403.
        independence_questions:
          - question: When is 403 correct rather than 401?
            recommended_answer: >
              403 is correct when the caller IS authenticated (valid credentials) but
              lacks permission/role/scope for the resource. 401 is for missing or
              invalid authentication.
      - id: rest_async_status
        title: Asynchronous status polling
        skill_area: rest_assured
        variant_family: rest_async
        rotation_group: rest-core
        difficulty: hard
        status: active
        task: POST returns 202; poll the status endpoint until COMPLETED.
        requirement_change_follow_up: Handle a terminal FAILED status and an overall timeout.
        requirement_change_recommended_answer: >
          Treat FAILED as a terminal state that stops polling and fails the test
          immediately, and cap the total wait with an overall timeout (Awaitility
          atMost) so a stuck job aborts with a clear timeout rather than looping
          forever.
        debugging_follow_up: An unbounded while-loop hangs on FAILED; ask them to bound it.
        debugging_recommended_answer: >
          Add a terminal-state check (stop on COMPLETED or FAILED) and an overall
          deadline / max attempts so the loop cannot spin forever; prefer Awaitility
          with atMost and pollInterval over a raw while-true.
        expected_reasoning: >
          Bounded polling with delay (or Awaitility), stop on COMPLETED, fail fast on
          FAILED, enforce a timeout.
        reference_solution: |
          Awaitility.await().atMost(60, SECONDS).pollInterval(2, SECONDS)
              .until(() -> getStatus(id), anyOf(is("COMPLETED"), is("FAILED")));
          assertThat(getStatus(id), is("COMPLETED"));
        scoring_rubric:
          - Bounded polling (3)
          - Terminal-state handling (2)
          - Timeout enforcement (2)
          - Explains polling vs sleep (2)
          - Clean code (1)
        red_flags:
          - Unbounded loop with no timeout.
          - Fixed long sleep instead of polling.
        independence_questions:
          - question: What stops this loop if the job never completes?
            recommended_answer: >
              The overall timeout (Awaitility atMost, or a max-attempts/deadline
              guard) — once exceeded it throws a timeout exception and the test fails
              fast instead of hanging indefinitely.
  sql_oracle:
    label: SQL / Oracle
    core: true
    exercises:
      - id: sql_missing_child
        title: Missing or failed child rows
        skill_area: sql_oracle
        variant_family: sql_outer_join
        rotation_group: sql-core
        difficulty: medium
        status: active
        task: Return completed parent records that have no successful child/feed row.
        requirement_change_follow_up: Also return the count of missing children per parent.
        requirement_change_recommended_answer: >
          Left join and aggregate: COUNT of child rows (or a correlated subquery)
          per parent, or COUNT(*) of parents grouped where the successful child is
          absent. Keep the child-status predicate in the ON clause and count the
          NULL/absent side per parent.
        debugging_follow_up: A query uses INNER JOIN and returns nothing; ask why and fix it.
        debugging_recommended_answer: >
          INNER JOIN drops parents with no matching successful child — exactly the
          rows we want. Switch to LEFT JOIN with the child status condition in the ON
          clause and keep rows WHERE child.id IS NULL.
        expected_reasoning: >
          LEFT JOIN with the child status filter in the ON clause; keep rows where
          the child key IS NULL.
        reference_solution: |
          SELECT p.id FROM parent p
          LEFT JOIN child c ON c.parent_id = p.id AND c.status = 'SUCCESS'
          WHERE p.status = 'COMPLETED' AND c.id IS NULL;
        scoring_rubric:
          - Correct outer join (3)
          - Filter placement in ON vs WHERE (3)
          - Explains why INNER fails (2)
          - Clean SQL (2)
        red_flags:
          - INNER JOIN and cannot see why rows vanish.
          - Child filter in WHERE, defeating the outer join.
        independence_questions:
          - question: Why does moving the status filter to WHERE change the result?
            recommended_answer: >
              A predicate on the child in WHERE runs after the join and rejects the
              NULL rows produced by the outer join, effectively turning it back into
              an inner join. Keeping the child-status condition in ON preserves the
              unmatched parents.
      - id: sql_duplicates
        title: Duplicate detection
        skill_area: sql_oracle
        variant_family: sql_grouping
        rotation_group: sql-core
        difficulty: easy
        status: active
        task: Find duplicate rows by business key and date.
        requirement_change_follow_up: Return only the newest duplicate group.
        requirement_change_recommended_answer: >
          Keep the GROUP BY ... HAVING COUNT(*) > 1 to find duplicate groups, then
          order by the max date descending and take the top group (FETCH FIRST 1 ROW
          / ROWNUM=1 after ordering, or a subquery on MAX(txn_date)).
        debugging_follow_up: A query uses WHERE COUNT(*)>1; ask them to fix it to HAVING.
        debugging_recommended_answer: >
          Aggregates cannot be used in WHERE because WHERE is evaluated before
          grouping. Move the COUNT(*) > 1 condition to a HAVING clause, which filters
          after GROUP BY.
        expected_reasoning: GROUP BY business key and date with HAVING COUNT(*) > 1.
        reference_solution: |
          SELECT business_key, txn_date, COUNT(*)
          FROM txns GROUP BY business_key, txn_date HAVING COUNT(*) > 1;
        scoring_rubric:
          - Correct grouping (3)
          - HAVING vs WHERE (3)
          - Newest-group follow-up (2)
          - Clean SQL (2)
        red_flags:
          - Confuses HAVING and WHERE.
        independence_questions:
          - question: Why can't COUNT(*) be filtered in WHERE?
            recommended_answer: >
              WHERE is applied to individual rows before aggregation, so the group
              COUNT does not exist yet. HAVING is applied to grouped results, which
              is where aggregate conditions belong.
      - id: sql_latest_record
        title: Latest record per account
        skill_area: sql_oracle
        variant_family: sql_window
        rotation_group: sql-core
        difficulty: hard
        status: active
        task: Return the latest record per account using ROW_NUMBER.
        requirement_change_follow_up: Explain ROW_NUMBER vs RANK vs DENSE_RANK on ties.
        requirement_change_recommended_answer: >
          ROW_NUMBER always yields unique sequential numbers (one winner even on
          ties). RANK gives tied rows the same rank then skips numbers (1,1,3).
          DENSE_RANK ties without gaps (1,1,2). For exactly one latest row per
          account use ROW_NUMBER; to keep all ties use RANK/DENSE_RANK = 1.
        debugging_follow_up: A MAX(date) self-join returns duplicate ties; ask them to fix with a window function.
        debugging_recommended_answer: >
          The MAX(date) self-join returns every row sharing the max timestamp.
          Replace it with ROW_NUMBER() OVER (PARTITION BY account ORDER BY created_at
          DESC) and filter rn = 1 to guarantee a single latest row per account.
        expected_reasoning: >
          ROW_NUMBER() OVER (PARTITION BY account ORDER BY created_at DESC), filter
          rn = 1 in an outer query.
        reference_solution: |
          SELECT * FROM (
            SELECT t.*, ROW_NUMBER() OVER (
              PARTITION BY account_id ORDER BY created_at DESC) rn FROM txns t
          ) WHERE rn = 1;
        scoring_rubric:
          - Correct window function (3)
          - Partition/order reasoning (3)
          - Tie-behavior explanation (2)
          - Clean SQL (2)
        red_flags:
          - MAX(date) join with ties unhandled.
          - Cannot describe partition vs order.
        independence_questions:
          - question: How do RANK and DENSE_RANK differ from ROW_NUMBER on ties?
            recommended_answer: >
              On ties ROW_NUMBER still assigns distinct numbers (arbitrary winner),
              RANK assigns the same number then skips (1,1,3), and DENSE_RANK assigns
              the same number with no gap (1,1,2).
  framework_design:
    label: Framework design
    core: true
    exercises:
      - id: framework_layered_design
        title: Layered framework design
        skill_area: framework_design
        variant_family: framework_architecture
        rotation_group: framework-core
        difficulty: hard
        status: active
        task: Design a UI/API/DB framework with configuration, reporting and test data.
        requirement_change_follow_up: Add ThreadLocal-based parallel execution.
        requirement_change_recommended_answer: >
          Hold the driver/client in a ThreadLocal owned by a factory so each thread
          gets its own instance; ensure setup/teardown create and remove the
          ThreadLocal per test, and that reporting and data are also thread-scoped.
          No shared mutable statics.
        debugging_follow_up: A design leaks driver state across threads; ask them to fix ownership.
        debugging_recommended_answer: >
          Move driver ownership into a ThreadLocal (or per-test instance) managed by
          the factory, and remove()/quit() in teardown to avoid leaks. Nothing
          outside the factory should hold a driver reference.
        expected_reasoning: >
          Layered: config, driver/client factories, page/service objects, data
          providers, assertions, reporting, logging, CI hooks; explain dependency flow.
        reference_solution: |
          config/ -> factories/ -> pages/ + services/ + db/ -> tests/
          reporting via listener; data via DataProvider or external YAML.
        scoring_rubric:
          - Clear layering and responsibilities (3)
          - Dependency direction (2)
          - Reporting/data strategy (2)
          - Parallelism design (2)
          - Communication (1)
        red_flags:
          - Names folders but cannot explain wiring.
        independence_questions:
          - question: Which layer owns the WebDriver lifecycle and why?
            recommended_answer: >
              A driver factory/manager layer owns creation and disposal (ideally via
              ThreadLocal), so tests and page objects receive a ready driver and
              never construct or quit it themselves — centralizing lifecycle and
              enabling safe parallelism.
      - id: framework_reporting_data
        title: Reporting and test data strategy
        skill_area: framework_design
        variant_family: framework_reporting
        rotation_group: framework-core
        difficulty: medium
        status: active
        task: Design reporting and test-data management for a mixed UI/API suite.
        requirement_change_follow_up: Add environment-specific data sets without code changes.
        requirement_change_recommended_answer: >
          Externalize data per environment (e.g. data/{env}.yaml overlaying a base
          set) and select the active environment via a runtime property/profile, so
          switching environments is configuration, not code changes.
        debugging_follow_up: Reports lose failure screenshots on parallel runs; ask them to fix.
        debugging_recommended_answer: >
          Screenshots are being written to a shared path/instance; capture them from
          the current thread's driver and attach per-thread artifacts (thread-scoped
          report node or unique filenames), so parallel runs do not overwrite each
          other's evidence.
        expected_reasoning: >
          Externalized data (YAML/JSON/DB), a reporting listener (Extent/Allure),
          per-thread artifacts, environment overlays.
        reference_solution: |
          data/{env}.yaml overlays base; listener attaches screenshots per thread.
        scoring_rubric:
          - Data externalization (3)
          - Reporting design (2)
          - Environment overlays (2)
          - Parallel artifact handling (2)
          - Communication (1)
        red_flags:
          - Hard-coded test data in tests.
        independence_questions:
          - question: How do you keep reports correct under parallel execution?
            recommended_answer: >
              Use a thread-safe reporter with per-thread test nodes (ThreadLocal),
              write uniquely named or thread-scoped artifacts, and flush once at the
              end, so concurrent tests never share or overwrite report state.
      - id: framework_stabilize_suite
        title: Stabilize an unstable suite
        skill_area: framework_design
        variant_family: framework_stability
        rotation_group: framework-core
        difficulty: hard
        status: active
        task: Stabilize a 400-test suite with a 65% pass rate.
        requirement_change_follow_up: Produce a 30-day plan with metrics.
        requirement_change_recommended_answer: >
          A staged plan: week 1 classify and quarantine flaky tests and instrument
          metrics; weeks 2-3 fix the largest root-cause clusters (locators, waits,
          data, env); week 4 gate new flakiness in CI and track weekly pass-rate and
          flaky-rate trends toward a target.
        debugging_follow_up: Blanket retries hide real failures; ask them to propose a better approach.
        debugging_recommended_answer: >
          Replace blanket retries with root-cause classification: quarantine failing
          tests, fix by category, and allow retries only for known-transient causes
          while tracking metrics — so genuine regressions are not masked.
        expected_reasoning: >
          Quarantine and classify (locator/data/env/timing), fix top clusters, retry
          only known-transient, track weekly pass-rate metrics.
        reference_solution: |
          classify -> quarantine -> fix clusters -> gate new flakiness -> trend metrics
        scoring_rubric:
          - Root-cause classification (3)
          - Prioritization (2)
          - Metric tracking (2)
          - Judicious retries (2)
          - Communication (1)
        red_flags:
          - Blanket retries as the primary fix.
        independence_questions:
          - question: When is a retry acceptable and when is it masking a bug?
            recommended_answer: >
              A retry is acceptable only for a known, external transient (e.g. a
              proven network blip) that is measured and bounded. It masks a bug when
              used to paper over deterministic failures, races, or bad
              locators/data, because it hides the real regression.
  debugging:
    label: Debugging
    core: true
    exercises:
      - id: debug_ci_only_failure
        title: Local pass, CI fail
        skill_area: debugging
        variant_family: debug_environment
        rotation_group: debug-core
        difficulty: hard
        status: active
        task: Diagnose a pipeline failure that only happens in CI.
        requirement_change_follow_up: Prioritize the checks and state the evidence each would give.
        requirement_change_recommended_answer: >
          Prioritize by likelihood and cheapness of evidence: first read CI logs and
          screenshots (points to the failing layer), then compare browser/driver
          versions and headless/resolution (rules out environment), then
          secrets/env and finally test ordering/parallelism — each step yields
          specific evidence that narrows the cause.
        debugging_follow_up: Given CI logs showing a headless-only failure, isolate the root cause live.
        debugging_recommended_answer: >
          A headless-only failure usually means viewport/rendering or
          timing differences; reproduce locally with the headless flag and CI
          window size, add a wait or set an explicit window size, and confirm the
          element is present/visible under headless before asserting.
        expected_reasoning: >
          Compare environment (browser/driver versions, headless, resolution,
          network, credentials, parallelism, timing), read CI artifacts, reproduce
          locally with CI flags, isolate the first failing layer.
        reference_solution: |
          read CI log + screenshots -> pin versions -> run headless at CI resolution
          -> check secrets/env -> isolate test order/parallel interference
        scoring_rubric:
          - Systematic diagnostic sequence (3)
          - Environment comparison (2)
          - Evidence-driven prioritization (2)
          - Reproduction strategy (2)
          - Communication (1)
        red_flags:
          - Immediately blames flakiness with no diagnostic sequence.
        independence_questions:
          - question: What is the first piece of evidence you would gather and why?
            recommended_answer: >
              The CI logs and failure screenshot/artifact for the exact run, because
              they show which layer failed and the actual error, letting you form a
              hypothesis instead of guessing.
      - id: debug_flaky_locator
        title: Flaky locator triage
        skill_area: debugging
        variant_family: debug_flaky
        rotation_group: debug-core
        difficulty: medium
        status: active
        task: A test passes locally but intermittently fails finding an element in CI.
        requirement_change_follow_up: Make the fix generic for all similar dynamic components.
        requirement_change_recommended_answer: >
          Encapsulate the wait-on-stable-attribute pattern in a shared helper/base
          component method and reuse it for every dynamic component, instead of
          patching one test — so all similar components inherit the robust wait.
        debugging_follow_up: Given a stack trace, identify whether it is a wait, locator or timing issue.
        debugging_recommended_answer: >
          NoSuchElement usually means the locator or a missing wait;
          StaleElementReference means the element was re-rendered (race/timing);
          TimeoutException means the wait condition never became true. Read the
          exception type and the line to classify, then apply the matching fix.
        expected_reasoning: >
          Distinguish stale element, race with async render, and brittle locator;
          apply explicit wait on a stable attribute; avoid index-based locators.
        reference_solution: |
          wait.until(ExpectedConditions.presenceOfElementLocated(STABLE_LOCATOR));
        scoring_rubric:
          - Correct root-cause categories (3)
          - Explicit wait on stable attribute (2)
          - Generic fix (2)
          - Reasoning from stack trace (2)
          - Communication (1)
        red_flags:
          - Adds a fixed sleep and moves on.
        independence_questions:
          - question: How do you tell a stale-element issue from a bad locator?
            recommended_answer: >
              A stale-element error means the element WAS found then the DOM changed
              (re-render), whereas a bad locator never finds the element
              (NoSuchElement). The exception type and whether it worked before the
              re-render distinguish them.
      - id: debug_data_contamination
        title: Test data contamination
        skill_area: debugging
        variant_family: debug_data
        rotation_group: debug-core
        difficulty: medium
        status: active
        task: A suite fails only when run in a certain order.
        requirement_change_follow_up: Propose isolation so order no longer matters.
        requirement_change_recommended_answer: >
          Give each test its own fresh data and state via per-test setup/teardown,
          remove shared mutable statics, and reset or use transactions/unique keys,
          so tests are independent and order cannot affect outcomes.
        debugging_follow_up: Identify the shared mutable state causing the coupling.
        debugging_recommended_answer: >
          Look for static fields, shared fixtures, or data left in the database/files
          by one test and read by another; the coupling is whatever one test mutates
          and another depends on. Make that state per-test or clean it up.
        expected_reasoning: >
          Order dependence points to shared state or un-cleaned data; isolate with
          per-test setup/teardown and independent data.
        reference_solution: |
          @BeforeMethod create fresh data; @AfterMethod clean up; no shared statics.
        scoring_rubric:
          - Identifies order-dependence cause (3)
          - Isolation strategy (2)
          - Data lifecycle design (2)
          - Reasoning (2)
          - Communication (1)
        red_flags:
          - Fixes by pinning test order instead of removing coupling.
        independence_questions:
          - question: Why is pinning the order a poor long-term fix?
            recommended_answer: >
              It hides the real coupling rather than removing it, is fragile to any
              new or reordered test, blocks parallel execution, and leaves shared
              mutable state that will cause failures again later.
  appium:
    label: Appium
    core: false
    exercises:
      - id: appium_native_login
        title: Native login
        skill_area: appium
        variant_family: appium_native
        rotation_group: appium-optional
        difficulty: medium
        status: active
        task: Launch the app, log in, and validate the home screen.
        requirement_change_follow_up: Handle a permission prompt and screenshot on failure.
        requirement_change_recommended_answer: >
          Wait for and accept the OS permission dialog (via its accessibility id or
          an autoGrantPermissions capability), and add a failure hook that captures
          driver.getScreenshotAs on the current thread's session.
        debugging_follow_up: Coordinate taps break on another device; switch to locators.
        debugging_recommended_answer: >
          Absolute coordinates depend on screen size/density and break across
          devices. Replace them with accessibility-id (or resource-id) locators plus
          a wait, so the tap targets the element regardless of resolution.
        expected_reasoning: Capabilities per platform, waits on accessibility IDs, screen object.
        reference_solution: |
          driver.findElement(AppiumBy.accessibilityId("login")).click();
        scoring_rubric:
          - Locator strategy (3)
          - Waits (2)
          - Permission handling (2)
          - Screenshot on failure (2)
          - Clean code (1)
        red_flags:
          - Coordinate taps instead of locators.
        independence_questions:
          - question: Why are coordinate taps fragile across devices?
            recommended_answer: >
              Coordinates map to a specific screen size, density and orientation, so
              the same x/y hits a different element (or nothing) on another device.
              Accessibility-id locators target the element itself and are portable.
      - id: appium_hybrid_context
        title: Hybrid context switch
        skill_area: appium
        variant_family: appium_context
        rotation_group: appium-optional
        difficulty: hard
        status: active
        task: Switch from native context to WEBVIEW and back.
        requirement_change_follow_up: Wait for the context instead of a fixed sleep.
        requirement_change_recommended_answer: >
          Poll getContextHandles until a WEBVIEW handle appears (a WebDriverWait or
          Awaitility condition), then switch — instead of a fixed sleep that either
          races or wastes time.
        debugging_follow_up: A fixed sleep before switching flakes; replace it.
        debugging_recommended_answer: >
          Replace the Thread.sleep with an explicit wait that returns once a WEBVIEW
          context handle is present, then call driver.context(webview); this removes
          the race and fails fast if the webview never loads.
        expected_reasoning: Enumerate context handles, wait for WEBVIEW, switch, act, switch back.
        reference_solution: |
          wait.until(d -> driver.getContextHandles().stream()
              .anyMatch(c -> c.contains("WEBVIEW")));
          driver.context(webviewContext);
        scoring_rubric:
          - Context enumeration (3)
          - Wait for context (2)
          - Correct switch back (2)
          - Reasoning (2)
          - Clean code (1)
        red_flags:
          - Fixed Thread.sleep before switching.
        independence_questions:
          - question: How do you know the WEBVIEW context is ready?
            recommended_answer: >
              getContextHandles lists a handle containing "WEBVIEW"; wait until that
              handle is present (and switchable) before calling context(), rather
              than assuming a fixed delay is enough.
      - id: appium_cross_platform
        title: Cross-platform locators
        skill_area: appium
        variant_family: appium_locators
        rotation_group: appium-optional
        difficulty: medium
        status: active
        task: Design an Android/iOS locator strategy for shared tests.
        requirement_change_follow_up: Explain accessibility ID vs resource ID vs predicate vs XPath.
        requirement_change_recommended_answer: >
          Prefer shared accessibility IDs (portable across platforms). resource-id is
          Android-only; iOS predicate/class chain is fast and iOS-specific; XPath is
          the most flexible but slowest and most brittle — use it only as a last
          resort. Isolate platform-specific locators behind a strategy.
        debugging_follow_up: An XPath-only strategy breaks on iOS; propose a fallback.
        debugging_recommended_answer: >
          Introduce platform-aware locators: use accessibility ids where shared, and
          provide an iOS predicate/class-chain fallback (e.g.
          @AndroidFindBy/@iOSXCUITFindBy), keeping XPath only where nothing else
          works.
        expected_reasoning: Prefer shared accessibility IDs; platform fallbacks isolated behind a strategy.
        reference_solution: |
          @AndroidFindBy(id="...") @iOSXCUITFindBy(accessibility="...") WebElement el;
        scoring_rubric:
          - Shared-ID preference (3)
          - Platform fallbacks (2)
          - Tradeoff reasoning (2)
          - Isolation of platform locators (2)
          - Communication (1)
        red_flags:
          - XPath-only with no fallback reasoning.
        independence_questions:
          - question: Why prefer accessibility IDs across platforms?
            recommended_answer: >
              A shared accessibility id can be set identically on Android and iOS, so
              one locator works on both platforms, is more stable than XPath, and
              keeps shared tests free of platform branching.
