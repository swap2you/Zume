  performance:
    label: "Performance testing"
    core: false
    questions:
      - id: perf-b1
        area: performance
        level: basic
        question: "What is the difference between load, stress, and soak testing?"
        recommended_answer: "Load tests expected concurrency; stress pushes beyond limits to find breaking points; soak runs sustained load over time to reveal leaks/degradation. Each answers a different reliability question."
        key_points: ["load = expected", "stress = beyond limit", "soak = sustained/duration"]
        strong_signals: ["maps each to a purpose", "mentions leak detection in soak"]
        weak_signals: ["uses the terms interchangeably"]
        red_flags: ["no distinction at all"]
        follow_ups:
          - question: "What does a soak test typically uncover?"
            recommended_answer: "Memory leaks, resource exhaustion, and gradual performance degradation that only appear over extended runtime."
        score_guidance: "Credit for correct test-type distinctions."
        resume_tags: ["performance", "load testing"]
        time_minutes: 4
      - id: perf-b2
        area: performance
        level: basic
        question: "Which metrics matter most in a performance test?"
        recommended_answer: "Response time (percentiles, not just average), throughput (req/s), error rate, and resource utilization (CPU/memory). Percentiles (p95/p99) reveal tail latency users actually feel."
        key_points: ["percentile latency", "throughput + error rate", "resource utilization"]
        strong_signals: ["emphasizes p95/p99 over average", "watches error rate"]
        weak_signals: ["only looks at average response time"]
        red_flags: ["reports averages only"]
        follow_ups:
          - question: "Why are averages misleading for latency?"
            recommended_answer: "Averages hide tail latency; a good average can still mean many users experience slow p95/p99 responses."
        score_guidance: "Credit for percentile awareness."
        resume_tags: ["performance", "metrics"]
        time_minutes: 4
      - id: perf-i1
        area: performance
        level: intermediate
        question: "How do you design a realistic load test?"
        recommended_answer: "Model real user journeys and mix, use production-like data/volume, ramp up gradually, include think times, run against a representative environment, and set pass/fail thresholds from SLAs."
        key_points: ["realistic journeys + mix", "ramp + think time", "SLA-based thresholds"]
        strong_signals: ["mirrors real traffic patterns", "ties to SLAs"]
        weak_signals: ["hammers one endpoint with no ramp"]
        red_flags: ["tests against a tiny dev box and extrapolates"]
        follow_ups:
          - question: "Why include think time between actions?"
            recommended_answer: "Real users pause between actions; omitting think time creates unrealistic, overly aggressive load that misrepresents behavior."
        score_guidance: "Credit for realistic modeling."
        resume_tags: ["performance", "jmeter", "gatling"]
        time_minutes: 6
      - id: perf-i2
        area: performance
        level: intermediate
        question: "How do you identify a bottleneck from performance test results?"
        recommended_answer: "Correlate response-time/throughput degradation with resource metrics (CPU, memory, DB, network) and downstream dependencies, find the saturating resource, and drill into that layer (e.g., slow queries, thread pool exhaustion)."
        key_points: ["correlate latency with resources", "find saturating layer", "drill into that component"]
        strong_signals: ["correlates across layers", "checks DB/dependencies"]
        weak_signals: ["only reads client-side numbers"]
        red_flags: ["blames the network by default"]
        follow_ups:
          - question: "What's a common backend bottleneck under load?"
            recommended_answer: "Database (slow queries, connection-pool/lock contention) or thread-pool exhaustion in the application tier."
        score_guidance: "Credit for cross-layer bottleneck analysis."
        resume_tags: ["performance", "bottleneck"]
        time_minutes: 6
      - id: perf-a1
        area: performance
        level: advanced
        question: "How do you integrate performance testing into CI/CD without slowing delivery?"
        recommended_answer: "Run lightweight performance smoke/baseline checks with thresholds on key transactions in the pipeline, schedule full load tests separately in a stable environment, track trends over time, and gate on regressions beyond a tolerance."
        key_points: ["lightweight perf smoke in CI", "full load scheduled separately", "trend tracking + regression gate"]
        strong_signals: ["separates smoke vs full load", "trend-based regression gate"]
        weak_signals: ["full load on every commit"]
        red_flags: ["no performance baseline at all"]
        follow_ups:
          - question: "Why track performance trends over time?"
            recommended_answer: "To catch gradual regressions early against a baseline, rather than discovering a big slowdown only at release."
        score_guidance: "Credit for pragmatic perf-in-CI strategy."
        resume_tags: ["performance", "cicd"]
        time_minutes: 7
      - id: perf-a2
        area: performance
        level: advanced
        question: "How do you ensure performance test results are trustworthy and reproducible?"
        recommended_answer: "Use a stable, isolated, production-like environment, controlled data/state, warm-up, sufficient duration and repetitions, consistent load-generator capacity, and report percentiles with confidence — not single noisy runs."
        key_points: ["stable isolated prod-like env", "warm-up + duration + repeats", "percentiles, not single runs"]
        strong_signals: ["controls environment + repeats", "avoids single-run conclusions"]
        weak_signals: ["one run on a shared box"]
        red_flags: ["draws conclusions from noisy single runs"]
        follow_ups:
          - question: "Why warm up before measuring?"
            recommended_answer: "JIT compilation, caches, and connection pools stabilize after warm-up; measuring cold skews results toward artificially slow numbers."
        score_guidance: "Credit for rigor and reproducibility."
        resume_tags: ["performance", "reproducibility"]
        time_minutes: 7
