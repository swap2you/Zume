# Zume interview question library
#
# INTERVIEWER-ONLY. Contains recommended answers and signals. Never share.
#
# Every question and every follow-up has a non-empty recommended_answer.
# Depth contract (enforced by tests/test_question_library.py):
#   core areas    : >= 3 basic, >= 3 intermediate, >= 3 advanced
#   optional areas: >= 2 basic, >= 2 intermediate, >= 2 advanced
#
# Question record schema:
#   id, area, level, question, recommended_answer, key_points,
#   strong_signals, weak_signals, red_flags,
#   follow_ups[{question, recommended_answer}],
#   score_guidance, resume_tags, time_minutes

meta:
  version: 1
  levels: [basic, intermediate, advanced]

areas:
  java:
    label: "Java"
    core: true
    questions:
      - id: java-b1
        area: java
        level: basic
        question: "What is the difference between `==` and `.equals()` for objects, and why does it matter for Strings?"
        recommended_answer: "`==` compares references (identity); `.equals()` compares logical value. For Strings, literals may be interned so `==` sometimes appears to work, but value comparison must use `.equals()`."
        key_points: ["reference vs value", "String interning is not guaranteed", "override equals/hashCode together"]
        strong_signals: ["mentions hashCode contract", "gives a concrete String pool example"]
        weak_signals: ["says == always works for Strings"]
        red_flags: ["cannot explain why == may pass in tests but fail in production"]
        follow_ups:
          - question: "Why must you override hashCode when you override equals?"
            recommended_answer: "Because hash-based collections (HashMap/HashSet) locate objects by hashCode first; equal objects with different hashCodes break the collection contract."
        score_guidance: "Full credit for value-vs-reference plus the hashCode contract."
        resume_tags: ["java", "core java"]
        time_minutes: 4
      - id: java-b2
        area: java
        level: basic
        question: "Explain checked vs unchecked exceptions and when you would create a custom exception."
        recommended_answer: "Checked exceptions are enforced at compile time (recoverable, external conditions); unchecked (RuntimeException) signal programming errors. Custom exceptions add domain meaning and cleaner handling at boundaries."
        key_points: ["compile-time enforcement", "recoverable vs programming error", "domain clarity"]
        strong_signals: ["discusses not swallowing exceptions", "wraps low-level exceptions with context"]
        weak_signals: ["catches Exception broadly everywhere"]
        red_flags: ["empty catch blocks are acceptable"]
        follow_ups:
          - question: "What is wrong with `catch (Exception e) {}`?"
            recommended_answer: "It swallows all errors silently, hiding failures and making debugging impossible; at minimum log and rethrow or handle specifically."
        score_guidance: "Credit for the distinction plus a sensible custom-exception rationale."
        resume_tags: ["java"]
        time_minutes: 4
      - id: java-b3
        area: java
        level: basic
        question: "What are the main differences between ArrayList and HashMap, and when do you pick each?"
        recommended_answer: "ArrayList is an ordered, index-accessible list (O(1) get by index, O(n) search). HashMap is a key/value store with average O(1) lookup by key. Choose by access pattern: sequence vs keyed retrieval."
        key_points: ["ordered list vs keyed store", "complexity of common ops", "access pattern drives choice"]
        strong_signals: ["mentions load factor / collisions", "knows List allows duplicates, Map keys unique"]
        weak_signals: ["cannot state lookup complexity"]
        red_flags: ["uses a List and linear search where a Map is obvious"]
        follow_ups:
          - question: "How does HashMap behave with a poor hashCode?"
            recommended_answer: "Many collisions degrade lookups toward O(n) (buckets become long chains / trees since Java 8); a good, well-distributed hashCode keeps it near O(1)."
        score_guidance: "Credit for correct data-structure selection reasoning."
        resume_tags: ["java", "collections"]
        time_minutes: 4
      - id: java-i1
        area: java
        level: intermediate
        question: "How do Java Streams differ from loops, and what are the trade-offs?"
        recommended_answer: "Streams express declarative pipelines (map/filter/collect) with lazy evaluation; they improve readability for transformations but can hurt debuggability and performance for trivial loops or heavy side effects."
        key_points: ["declarative vs imperative", "laziness / short-circuiting", "avoid side effects in streams"]
        strong_signals: ["knows terminal vs intermediate ops", "mentions when NOT to use streams"]
        weak_signals: ["thinks streams are always faster"]
        red_flags: ["mutates external state inside a stream"]
        follow_ups:
          - question: "What does `Collectors.groupingBy` do?"
            recommended_answer: "Groups elements into a Map keyed by a classifier function, with values as lists (or a downstream collector result) per key."
        score_guidance: "Credit for trade-off awareness, not just syntax."
        resume_tags: ["java", "streams", "java 8"]
        time_minutes: 5
      - id: java-i2
        area: java
        level: intermediate
        question: "Explain how you achieve thread safety for shared mutable state."
        recommended_answer: "Prefer immutability; otherwise synchronize access (synchronized/locks), use concurrent collections (ConcurrentHashMap), atomics, or confine state to one thread. Choose the least-locking correct option."
        key_points: ["immutability first", "synchronization vs concurrent collections", "atomics"]
        strong_signals: ["mentions visibility (volatile) vs atomicity", "knows ConcurrentHashMap semantics"]
        weak_signals: ["synchronizes everything indiscriminately"]
        red_flags: ["believes volatile makes compound actions atomic"]
        follow_ups:
          - question: "Difference between `volatile` and `synchronized`?"
            recommended_answer: "`volatile` guarantees visibility of a single variable's latest value but not atomic compound actions; `synchronized` provides both mutual exclusion and visibility for a block."
        score_guidance: "Credit for visibility vs atomicity distinction."
        resume_tags: ["java", "concurrency", "multithreading"]
        time_minutes: 6
      - id: java-i3
        area: java
        level: intermediate
        question: "What is the difference between an interface and an abstract class in modern Java?"
        recommended_answer: "Interfaces define capability and support multiple inheritance and default methods; abstract classes hold shared state and partial implementation. Use interfaces for contracts, abstract classes for shared base behavior/state."
        key_points: ["multiple interfaces vs single superclass", "default methods", "state in abstract class"]
        strong_signals: ["mentions default methods and diamond resolution", "composition over inheritance"]
        weak_signals: ["says interfaces cannot have method bodies (pre-Java 8 view)"]
        red_flags: ["deep inheritance chains as default design"]
        follow_ups:
          - question: "When would you favor composition over inheritance?"
            recommended_answer: "When behavior varies independently or you need flexibility; composition avoids fragile base-class coupling and supports runtime swapping of collaborators."
        score_guidance: "Credit for design reasoning, not just definitions."
        resume_tags: ["java", "oop", "design"]
        time_minutes: 5
      - id: java-a1
        area: java
        level: advanced
        question: "Walk through diagnosing a memory leak in a long-running Java test framework or service."
        recommended_answer: "Reproduce and monitor heap (JVisualVM/JFR), capture a heap dump, analyze dominators (MAT) for growing retained sets, identify GC roots holding references (static caches, ThreadLocals, listeners), then fix retention and verify."
        key_points: ["heap dump + dominator analysis", "common culprits: statics, ThreadLocal, unbounded caches", "verify after fix"]
        strong_signals: ["names concrete tools", "mentions ThreadLocal leaks in thread pools"]
        weak_signals: ["only says add more memory"]
        red_flags: ["no methodology, guesses randomly"]
        follow_ups:
          - question: "Why are ThreadLocals dangerous in pooled threads?"
            recommended_answer: "Pooled threads live long and are reused; if you never remove() the ThreadLocal, the value is retained across tasks and leaks memory (and can bleed state)."
        score_guidance: "Full credit for a systematic, tool-backed methodology."
        resume_tags: ["java", "performance", "jvm"]
        time_minutes: 8
      - id: java-a2
        area: java
        level: advanced
        question: "How would you design a reusable, thread-safe utility used across parallel tests?"
        recommended_answer: "Make it stateless or immutable; if state is required, isolate per-thread (ThreadLocal with cleanup) or use concurrent structures; expose a small, well-documented API and cover it with concurrency tests."
        key_points: ["stateless/immutable design", "per-thread isolation vs shared", "concurrency testing"]
        strong_signals: ["discusses cleanup and lifecycle", "considers test parallelism explicitly"]
        weak_signals: ["global mutable singleton without synchronization"]
        red_flags: ["shared static WebDriver across parallel tests"]
        follow_ups:
          - question: "Why is a shared static WebDriver a problem in parallel runs?"
            recommended_answer: "WebDriver is not thread-safe; parallel threads would interleave commands on one session, causing flaky, corrupted results. Use per-thread driver instances."
        score_guidance: "Credit for concrete parallel-safety design."
        resume_tags: ["java", "concurrency", "framework"]
        time_minutes: 8
      - id: java-a3
        area: java
        level: advanced
        question: "Explain generics wildcards (`? extends` vs `? super`) and when to use each."
        recommended_answer: "Use `? extends T` for producers (read T out) and `? super T` for consumers (write T in) — the PECS rule (Producer Extends, Consumer Super). This maximizes API flexibility while keeping type safety."
        key_points: ["PECS", "producer vs consumer", "type safety vs flexibility"]
        strong_signals: ["states PECS and gives a Collections.copy-style example"]
        weak_signals: ["uses raw types to avoid the issue"]
        red_flags: ["cannot reason about compile errors from wildcards"]
        follow_ups:
          - question: "Why can't you add elements to a `List<? extends Number>`?"
            recommended_answer: "The exact element type is unknown (could be Integer or Double), so the compiler forbids inserts to preserve type safety; you can only read as Number."
        score_guidance: "Credit for PECS with correct rationale."
        resume_tags: ["java", "generics"]
        time_minutes: 7

  selenium:
    label: "Selenium"
    core: true
    questions:
      - id: sel-b1
        area: selenium
        level: basic
        question: "What locator strategies does Selenium support and how do you choose a robust one?"
        recommended_answer: "id, name, className, tagName, linkText, cssSelector, xpath. Prefer stable, unique locators (id or a purpose-built data attribute), then CSS; use XPath when you need text or axis relationships."
        key_points: ["prefer stable/unique", "CSS over XPath generally", "avoid brittle absolute XPath"]
        strong_signals: ["advocates data-test attributes", "explains CSS vs XPath trade-offs"]
        weak_signals: ["defaults to absolute XPath copied from devtools"]
        red_flags: ["locators tied to auto-generated dynamic ids"]
        follow_ups:
          - question: "When is XPath genuinely better than CSS?"
            recommended_answer: "When you must match by visible text, traverse to a parent/ancestor, or select based on sibling relationships — things CSS cannot express."
        score_guidance: "Credit for stability-first reasoning."
        resume_tags: ["selenium", "locators"]
        time_minutes: 4
      - id: sel-b2
        area: selenium
        level: basic
        question: "Explain implicit vs explicit waits and why mixing them is discouraged."
        recommended_answer: "Implicit wait sets a global poll timeout for element lookups; explicit wait (WebDriverWait + ExpectedConditions) waits for a specific condition. Mixing them can compound timeouts and cause unpredictable waits."
        key_points: ["global vs conditional", "ExpectedConditions", "do not mix"]
        strong_signals: ["prefers explicit waits for conditions", "mentions FluentWait"]
        weak_signals: ["uses Thread.sleep everywhere"]
        red_flags: ["thinks sleep is equivalent to explicit wait"]
        follow_ups:
          - question: "Why is Thread.sleep an anti-pattern?"
            recommended_answer: "It waits a fixed time regardless of readiness — slow when too long, flaky when too short. Condition-based waits are both faster and more reliable."
        score_guidance: "Credit for condition-based waiting."
        resume_tags: ["selenium", "waits", "synchronization"]
        time_minutes: 4
      - id: sel-b3
        area: selenium
        level: basic
        question: "What is the Page Object Model and what problem does it solve?"
        recommended_answer: "POM encapsulates each page's locators and actions in a class, separating test logic from UI structure. It reduces duplication and localizes maintenance when the UI changes."
        key_points: ["encapsulation of locators/actions", "reduces duplication", "maintainability"]
        strong_signals: ["separates assertions from page actions", "mentions loadable/component pattern"]
        weak_signals: ["puts assertions inside page objects"]
        red_flags: ["no abstraction; locators scattered in tests"]
        follow_ups:
          - question: "Should assertions live in page objects?"
            recommended_answer: "Generally no — page objects model behavior/state; assertions belong in tests to keep pages reusable across scenarios."
        score_guidance: "Credit for separation of concerns."
        resume_tags: ["selenium", "page object", "pom"]
        time_minutes: 4
      - id: sel-i1
        area: selenium
        level: intermediate
        question: "How do you handle a flaky element that is sometimes not interactable?"
        recommended_answer: "Diagnose the cause (animation, overlay, not-yet-rendered), use explicit waits for elementToBeClickable, ensure it is scrolled into view, and avoid blind retries; fix the root synchronization issue rather than sleeping."
        key_points: ["find root cause", "elementToBeClickable", "scroll into view / overlays"]
        strong_signals: ["distinguishes visible vs clickable", "checks for overlays/spinners"]
        weak_signals: ["adds retries without diagnosis"]
        red_flags: ["increases global sleep to mask flakiness"]
        follow_ups:
          - question: "Difference between visibilityOf and elementToBeClickable?"
            recommended_answer: "visibilityOf checks the element is displayed and has size; elementToBeClickable additionally requires it be enabled and not obscured, so it is safer before clicks."
        score_guidance: "Credit for root-cause diagnosis."
        resume_tags: ["selenium", "flaky", "waits"]
        time_minutes: 6
      - id: sel-i2
        area: selenium
        level: intermediate
        question: "How do you manage WebDriver lifecycle across parallel tests?"
        recommended_answer: "Instantiate one driver per thread (ThreadLocal) or per test method, initialize in setup, quit in teardown, and never share a driver across threads. Manage driver binaries via a manager or Selenium Manager."
        key_points: ["per-thread driver", "setup/teardown lifecycle", "no shared driver"]
        strong_signals: ["ThreadLocal<WebDriver> with cleanup", "quit in finally/teardown"]
        weak_signals: ["single static driver"]
        red_flags: ["never quits drivers (leaks sessions)"]
        follow_ups:
          - question: "What happens if you never call driver.quit()?"
            recommended_answer: "Browser processes and sessions leak, consuming memory and grid slots and eventually failing runs; quit releases the session cleanly."
        score_guidance: "Credit for parallel-safe lifecycle."
        resume_tags: ["selenium", "parallel", "webdriver"]
        time_minutes: 6
      - id: sel-i3
        area: selenium
        level: intermediate
        question: "How do you interact with elements inside an iframe or a new browser tab?"
        recommended_answer: "For iframes, switch with driver.switchTo().frame(...) and back with defaultContent(); for tabs/windows, capture window handles and switchTo().window(handle). Always switch back after interacting."
        key_points: ["switchTo().frame / window", "window handles", "switch back"]
        strong_signals: ["remembers to switch back to default content", "handles multiple handles set"]
        weak_signals: ["forgets context switching, gets NoSuchElement"]
        red_flags: ["cannot explain why element is not found in iframe"]
        follow_ups:
          - question: "How do you return focus to the main document from a nested frame?"
            recommended_answer: "Use switchTo().defaultContent() to jump to the top, or switchTo().parentFrame() to move up one level."
        score_guidance: "Credit for correct context handling."
        resume_tags: ["selenium", "iframe", "windows"]
        time_minutes: 5
      - id: sel-a1
        area: selenium
        level: advanced
        question: "Design a resilient wait/synchronization utility for a framework used by many teams."
        recommended_answer: "Wrap WebDriverWait with configurable timeout/polling, expose intent-based methods (waitClickable, waitVisible), ignore transient exceptions (StaleElement), log context on timeout, and keep it stateless/thread-safe."
        key_points: ["configurable, intent-based API", "ignore transient exceptions", "diagnostic logging on timeout"]
        strong_signals: ["handles StaleElementReferenceException retry", "adds screenshot/log on failure"]
        weak_signals: ["hardcoded timeouts only"]
        red_flags: ["catches and hides all exceptions"]
        follow_ups:
          - question: "How do you handle StaleElementReferenceException robustly?"
            recommended_answer: "Re-find the element inside the wait/polling loop rather than caching the reference, so each poll re-locates a fresh element."
        score_guidance: "Credit for a reusable, diagnosable design."
        resume_tags: ["selenium", "framework", "waits"]
        time_minutes: 8
      - id: sel-a2
        area: selenium
        level: advanced
        question: "A UI suite is 15% flaky. How do you systematically drive it toward reliable?"
        recommended_answer: "Quantify and categorize failures, fix synchronization root causes, isolate test data and state, stabilize environment, quarantine truly flaky tests, and track flakiness as a metric over time rather than blanket-retrying."
        key_points: ["measure/categorize", "fix sync + data isolation", "quarantine + track metric"]
        strong_signals: ["treats flakiness as a first-class metric", "data/state isolation"]
        weak_signals: ["just enables retries"]
        red_flags: ["deletes failing tests to make suite green"]
        follow_ups:
          - question: "When is a retry acceptable?"
            recommended_answer: "As a temporary safety net for known-external instability while the root cause is being fixed — never as the permanent solution, and always with visibility into retry rates."
        score_guidance: "Credit for a measurable, root-cause program."
        resume_tags: ["selenium", "flaky", "reliability"]
        time_minutes: 8
      - id: sel-a3
        area: selenium
        level: advanced
        question: "How would you structure a Selenium framework to support web plus future mobile with minimal duplication?"
        recommended_answer: "Layer the framework: driver/session abstraction, page/screen objects behind interfaces, shared business flows, and platform-specific implementations selected by config. Appium's WebDriver protocol lets much tooling be reused."
        key_points: ["driver abstraction layer", "interface-based pages", "config-selected implementations"]
        strong_signals: ["separates business flows from platform", "mentions Appium protocol reuse"]
        weak_signals: ["copies the whole framework per platform"]
        red_flags: ["platform-specific logic leaks into tests"]
        follow_ups:
          - question: "What stays common between Selenium and Appium layers?"
            recommended_answer: "Waits/utilities, reporting, test data, business-flow orchestration, and the WebDriver-style API; only locators and driver setup are platform-specific."
        score_guidance: "Credit for a layered, extensible design."
        resume_tags: ["selenium", "appium", "framework"]
        time_minutes: 8

  testng:
    label: "TestNG"
    core: true
    questions:
      - id: tng-b1
        area: testng
        level: basic
        question: "What are the common TestNG annotations and their order of execution?"
        recommended_answer: "@BeforeSuite/Test/Class/Method and their After counterparts wrap @Test methods. Order: BeforeSuite > BeforeTest > BeforeClass > BeforeMethod > Test > AfterMethod ... AfterSuite."
        key_points: ["lifecycle annotations", "scope hierarchy", "setup/teardown placement"]
        strong_signals: ["correct nesting order", "knows @BeforeMethod runs per test"]
        weak_signals: ["confuses class vs method scope"]
        red_flags: ["puts per-test setup in @BeforeClass causing state bleed"]
        follow_ups:
          - question: "Where do you put per-test data setup?"
            recommended_answer: "In @BeforeMethod so each test gets a fresh, isolated state; @BeforeClass is for expensive one-time setup shared safely across tests."
        score_guidance: "Credit for correct scope reasoning."
        resume_tags: ["testng"]
        time_minutes: 4
      - id: tng-b2
        area: testng
        level: basic
        question: "How do groups and priorities work in TestNG?"
        recommended_answer: "Groups tag tests for selective inclusion/exclusion in the suite XML; priority orders @Test methods (lower runs first). Groups enable smoke/regression slicing without code changes."
        key_points: ["groups for selection", "priority for ordering", "suite XML control"]
        strong_signals: ["uses groups for smoke/regression", "avoids over-relying on priority"]
        weak_signals: ["orders tests via priority to create dependencies"]
        red_flags: ["tests depend on execution order implicitly"]
        follow_ups:
          - question: "Why avoid inter-test ordering dependencies?"
            recommended_answer: "They make tests fragile and non-parallelizable; each test should set up its own state and pass independently."
        score_guidance: "Credit for independence awareness."
        resume_tags: ["testng", "groups"]
        time_minutes: 4
      - id: tng-b3
        area: testng
        level: basic
        question: "What is a DataProvider and when do you use it?"
        recommended_answer: "A DataProvider supplies multiple data sets to a single @Test, enabling data-driven testing; the test runs once per row returned."
        key_points: ["data-driven", "one test, many inputs", "returns Object[][] or Iterator"]
        strong_signals: ["externalizes data", "combines with parallel data providers"]
        weak_signals: ["copies the test per input"]
        red_flags: ["hardcodes many near-identical tests"]
        follow_ups:
          - question: "How do you run a DataProvider's rows in parallel?"
            recommended_answer: "Set parallel=true on the @DataProvider annotation so rows execute concurrently (ensure the test is thread-safe)."
        score_guidance: "Credit for data-driven understanding."
        resume_tags: ["testng", "dataprovider"]
        time_minutes: 4
      - id: tng-i1
        area: testng
        level: intermediate
        question: "How do you configure parallel execution in TestNG and what must you watch for?"
        recommended_answer: "Set parallel (methods/tests/classes) and thread-count in the suite XML. You must ensure thread safety: per-thread drivers, no shared mutable state, and isolated test data."
        key_points: ["parallel + thread-count", "thread safety", "ThreadLocal driver"]
        strong_signals: ["ties parallelism to ThreadLocal driver", "isolates data"]
        weak_signals: ["enables parallel without thread-safety changes"]
        red_flags: ["shared statics cause random failures"]
        follow_ups:
          - question: "What's the difference between parallel='methods' and 'classes'?"
            recommended_answer: "'methods' runs individual @Test methods concurrently; 'classes' runs each class in its own thread but methods within a class sequentially."
        score_guidance: "Credit for parallel + safety linkage."
        resume_tags: ["testng", "parallel"]
        time_minutes: 6
      - id: tng-i2
        area: testng
        level: intermediate
        question: "How do you implement retry logic for genuinely flaky tests in TestNG?"
        recommended_answer: "Implement IRetryAnalyzer to retry failed tests up to N times, attach via annotation or IAnnotationTransformer globally, and track retry counts so flakiness stays visible rather than hidden."
        key_points: ["IRetryAnalyzer", "global via IAnnotationTransformer", "keep flakiness visible"]
        strong_signals: ["logs retries as a metric", "uses retry as temporary"]
        weak_signals: ["blanket retry to force green"]
        red_flags: ["retries mask real product bugs"]
        follow_ups:
          - question: "How do you apply a retry analyzer to all tests without editing each?"
            recommended_answer: "Use an IAnnotationTransformer listener to set the retry analyzer on every @Test at runtime."
        score_guidance: "Credit for controlled, visible retries."
        resume_tags: ["testng", "retry", "listeners"]
        time_minutes: 6
      - id: tng-i3
        area: testng
        level: intermediate
        question: "How do TestNG listeners help build reporting and diagnostics?"
        recommended_answer: "ITestListener/ISuiteListener hook lifecycle events (onTestFailure, etc.) to capture screenshots, logs, and feed reporters like ExtentReports without cluttering test code."
        key_points: ["ITestListener hooks", "screenshot on failure", "decouples reporting"]
        strong_signals: ["captures artifacts on failure", "central reporting"]
        weak_signals: ["reporting logic copied into every test"]
        red_flags: ["no failure diagnostics captured"]
        follow_ups:
          - question: "Which listener method captures a screenshot on failure?"
            recommended_answer: "onTestFailure(ITestResult) in an ITestListener implementation."
        score_guidance: "Credit for decoupled diagnostics."
        resume_tags: ["testng", "listeners", "reporting"]
        time_minutes: 5
      - id: tng-a1
        area: testng
        level: advanced
        question: "How would you design dependency and ordering handling for a large TestNG suite?"
        recommended_answer: "Minimize dependencies; where necessary use dependsOnMethods/Groups for setup gating, keep tests independent for parallelism, and prefer setup fixtures over test-to-test coupling."
        key_points: ["minimize dependencies", "dependsOnGroups for gating", "independence for parallelism"]
        strong_signals: ["treats dependencies as last resort", "keeps suite parallelizable"]
        weak_signals: ["heavy dependsOn chains"]
        red_flags: ["suite only passes when run in one exact order"]
        follow_ups:
          - question: "What is the downside of dependsOnMethods at scale?"
            recommended_answer: "It serializes execution and creates cascading skips; a single upstream failure skips many tests and blocks parallelism."
        score_guidance: "Credit for scalable, independent design."
        resume_tags: ["testng", "design"]
        time_minutes: 7
      - id: tng-a2
        area: testng
        level: advanced
        question: "How do you integrate TestNG with a data-driven, environment-parameterized pipeline?"
        recommended_answer: "Parameterize via suite XML @Parameters or external config, drive data with DataProviders sourced from files/DB, and select suites/groups per environment in CI to run the right slice."
        key_points: ["@Parameters + external config", "external data source", "env-based suite selection"]
        strong_signals: ["separates config from code", "CI selects groups per env"]
        weak_signals: ["hardcodes environment values"]
        red_flags: ["credentials hardcoded in suite XML"]
        follow_ups:
          - question: "How do you keep environment secrets out of the suite XML?"
            recommended_answer: "Inject them via environment variables or a secrets manager at runtime; never commit secrets to XML or code."
        score_guidance: "Credit for config/secret separation."
        resume_tags: ["testng", "cicd", "data-driven"]
        time_minutes: 7
      - id: tng-a3
        area: testng
        level: advanced
        question: "Compare TestNG and JUnit 5 for a senior automation framework decision."
        recommended_answer: "Both support parameterization, parallelism, and lifecycle hooks. TestNG has mature suite XML, groups, and built-in data providers; JUnit 5 has extensions and a modern module model. Choose by team familiarity, ecosystem, and parallel/data needs."
        key_points: ["feature parity in essentials", "TestNG suite/groups vs JUnit extensions", "decision by context"]
        strong_signals: ["balanced, context-driven choice", "no dogma"]
        weak_signals: ["picks one purely by habit"]
        red_flags: ["cannot name any real difference"]
        follow_ups:
          - question: "What TestNG feature is hardest to replicate in JUnit?"
            recommended_answer: "Rich suite-level configuration with groups and flexible parallel policies via suite XML, though JUnit 5 narrows the gap with tags and extensions."
        score_guidance: "Credit for a reasoned, non-dogmatic comparison."
        resume_tags: ["testng", "junit"]
        time_minutes: 6

  cucumber:
    label: "Cucumber / BDD"
    core: true
    questions:
      - id: cuc-b1
        area: cucumber
        level: basic
        question: "What is Gherkin and how do Given/When/Then map to a test?"
        recommended_answer: "Gherkin is a business-readable DSL. Given sets context/preconditions, When performs the action, Then asserts the outcome. Steps bind to step-definition methods."
        key_points: ["business-readable DSL", "Given/When/Then roles", "step bindings"]
        strong_signals: ["keeps steps declarative", "one behavior per scenario"]
        weak_signals: ["writes UI-click steps in Gherkin"]
        red_flags: ["scenarios describe implementation, not behavior"]
        follow_ups:
          - question: "Should Gherkin describe clicks or behavior?"
