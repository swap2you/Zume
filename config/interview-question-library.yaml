    questions:
      - id: sql-b1
        area: sql_oracle
        level: basic
        question: "Explain INNER JOIN vs LEFT JOIN with a testing example."
        recommended_answer: "INNER JOIN returns only matching rows in both tables; LEFT JOIN returns all left rows plus matches (NULLs where none). For test validation, LEFT JOIN helps find records missing a related row."
        key_points: ["match-only vs all-left", "NULLs for non-matches", "use to find missing relations"]
        strong_signals: ["gives a data-validation use case", "knows NULL behavior"]
        weak_signals: ["confuses which side is preserved"]
        red_flags: ["cannot write a basic join"]
        follow_ups:
          - question: "How do you find left rows with no match?"
            recommended_answer: "LEFT JOIN then filter WHERE right_table.key IS NULL."
        score_guidance: "Credit for correct join semantics + example."
        resume_tags: ["sql", "oracle", "joins"]
        time_minutes: 4
      - id: sql-b2
        area: sql_oracle
        level: basic
        question: "What is the difference between WHERE and HAVING?"
        recommended_answer: "WHERE filters rows before aggregation; HAVING filters groups after GROUP BY aggregation. Use HAVING for conditions on aggregate values like COUNT/SUM."
        key_points: ["pre- vs post-aggregation", "HAVING for aggregates", "GROUP BY interaction"]
        strong_signals: ["correctly places aggregate filters", "clear ordering understanding"]
        weak_signals: ["uses HAVING where WHERE suffices"]
        red_flags: ["cannot aggregate at all"]
        follow_ups:
          - question: "Can you use an aggregate in WHERE?"
            recommended_answer: "No — aggregates aren't available at WHERE time; you must use HAVING (or a subquery) for conditions on aggregated values."
        score_guidance: "Credit for correct filtering stages."
        resume_tags: ["sql", "aggregation"]
        time_minutes: 4
      - id: sql-b3
        area: sql_oracle
        level: basic
        question: "How do you remove duplicates and count distinct values?"
        recommended_answer: "SELECT DISTINCT removes duplicate rows; COUNT(DISTINCT col) counts unique values. GROUP BY can also collapse duplicates while aggregating."
        key_points: ["DISTINCT", "COUNT(DISTINCT ...)", "GROUP BY alternative"]
        strong_signals: ["knows DISTINCT vs GROUP BY trade-offs"]
        weak_signals: ["confuses COUNT(*) and COUNT(DISTINCT)"]
        red_flags: ["deduplicates in application code unnecessarily"]
        follow_ups:
          - question: "Difference between COUNT(*) and COUNT(col)?"
            recommended_answer: "COUNT(*) counts all rows; COUNT(col) counts rows where col is non-NULL."
        score_guidance: "Credit for distinct/aggregate correctness."
        resume_tags: ["sql", "distinct"]
        time_minutes: 3
      - id: sql-i1
        area: sql_oracle
        level: intermediate
        question: "Write logic to fetch the latest record per group (e.g., latest order per customer)."
        recommended_answer: "Use a window function: ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date DESC) and filter rn = 1; or a correlated subquery on MAX(order_date)."
        key_points: ["ROW_NUMBER + PARTITION BY", "filter rn=1", "correlated subquery alternative"]
        strong_signals: ["reaches for window functions", "handles ties deliberately"]
        weak_signals: ["only GROUP BY MAX losing other columns"]
        red_flags: ["cannot retrieve full latest row"]
        follow_ups:
          - question: "Why is GROUP BY MAX(date) alone often insufficient?"
            recommended_answer: "It gives the max date but not the other columns of that specific row; you need a window function or join back to recover the full record."
        score_guidance: "Credit for window-function fluency."
