        area: sql_oracle
        level: intermediate
        question: "How do you validate data integrity between two systems using SQL?"
        recommended_answer: "Compare row counts, use EXCEPT/MINUS to find rows in one not the other, checksum/hash key columns, and reconcile on business keys — automating these as data-quality tests."
        key_points: ["counts + MINUS/EXCEPT", "hash/checksum comparison", "reconcile on business key"]
