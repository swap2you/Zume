        level: intermediate
        question: "How do subqueries and CTEs differ, and when do you prefer a CTE?"
        recommended_answer: "Both nest queries; a CTE (WITH) is named and reusable within the statement, improving readability and enabling recursion. Prefer CTEs for complex, multi-step logic."
