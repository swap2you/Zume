        area: sql_oracle
        level: advanced
        question: "A validation query runs slowly. How do you diagnose and optimize it?"
        recommended_answer: "Read the execution plan (EXPLAIN PLAN/autotrace), look for full scans on large tables and missing indexes, check SARGable predicates, reduce returned columns/rows, and add/adjust indexes or rewrite joins; re-measure."
        key_points: ["execution plan analysis", "indexes + SARGable predicates", "measure before/after"]
        strong_signals: ["reads plans", "knows functions on columns kill index use"]
        weak_signals: ["adds indexes blindly"]
        red_flags: ["no plan analysis at all"]
        follow_ups:
          - question: "Why can wrapping a column in a function disable an index?"
            recommended_answer: "The predicate is no longer SARGable — the DB can't use the plain-column index; a function-based index or rewriting the predicate is needed."
