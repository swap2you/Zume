  rest_assured:
    label: "REST Assured / API automation"
    core: true
    questions:
      - id: api-b1
        area: rest_assured
        level: basic
        question: "Describe the given/when/then structure of a REST Assured test."
        recommended_answer: "given() sets request spec (headers, auth, body/params), when() issues the HTTP method, then() asserts status, headers, and body. It reads as a clear request/response contract."
        key_points: ["request spec / action / assertion", "status + body validation", "readable structure"]
        strong_signals: ["validates status and payload", "uses specs for reuse"]
        weak_signals: ["only checks status code"]
        red_flags: ["no assertions on response body"]
        follow_ups:
          - question: "What should you always assert beyond the status code?"
            recommended_answer: "Key response body fields and critical headers/schema, since a 200 can still return wrong or malformed data."
        score_guidance: "Credit for full response validation."
        resume_tags: ["rest assured", "api", "rest"]
        time_minutes: 4
      - id: api-b2
        area: rest_assured
        level: basic
        question: "How do you validate a JSON response body in REST Assured?"
        recommended_answer: "Use body() with JsonPath expressions (or hamcrest matchers) to assert fields, or deserialize to a POJO and assert on objects; JSON schema validation covers structure."
        key_points: ["JsonPath / matchers", "POJO deserialization", "schema validation"]
