        time_minutes: 4
      - id: api-b3
        area: rest_assured
        level: basic
        question: "How do you handle authentication (e.g., bearer token) in API tests?"
        recommended_answer: "Obtain a token via an auth call or config, set it in the Authorization header (or use auth().oauth2()), and centralize it in a request spec so tests don't repeat auth setup."
