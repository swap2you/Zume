name: CI

on:
  push:
    branches: [main, "release/zume-1.0"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional diagnostic note (never contains secrets)"
        required: false
        default: ""

# Never expose candidate data. This workflow uses only fictional demo data and
# does not upload candidate folders or generated candidate documents.
permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.13']
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Clean install (source of truth)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build

      - name: Byte-compile
        run: python -m compileall src

      - name: Lint (ruff)
        run: ruff check .

      - name: Types (mypy)
        run: mypy src

      - name: Tests with coverage threshold
        run: pytest -q --cov=zume --cov-report=xml --cov-fail-under=80

      - name: Demo (fictional data only)
        run: zume demo

      - name: Candidate-folder validation (v2 contract)
        run: |
          python - <<'PY'
          import subprocess, sys
          from pathlib import Path
          folders = [p.name for p in Path("candidates").iterdir()
                     if (p / "_internal" / "candidate.json").exists()
                     or (p / "candidate.json").exists()]
          assert folders, "demo did not produce a candidate folder"
          rc = subprocess.run(
              ["zume", "validate", "--candidate", folders[0], "--no-render"]).returncode
          sys.exit(rc)
          PY

      - name: Simplification invariants (contract, count, no versioned files)
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          root = next(p for p in Path("candidates").iterdir()
                      if (p / "_internal" / "candidate.json").exists())
          errors = []
          for sub in ("source", "_internal", "deliverables"):
              if not (root / sub).is_dir():
                  errors.append(f"missing {sub}/ contract folder")
          if (root / "99-final").exists():
              errors.append("legacy 99-final/ folder present")
          docx = list((root / "deliverables").glob("*.docx"))
          if not (1 <= len(docx) <= 7):
              errors.append(f"expected 1..7 deliverables, found {len(docx)}")
          if list(root.rglob("*__v[0-9]*")):
              errors.append("versioned __vN files present")
          if errors:
              print("\n".join(errors)); sys.exit(1)
          print(f"contract OK: {len(docx)} deliverables, no __vN, no 99-final")
          PY

      - name: Privacy and security checks
        run: pytest -q tests/test_privacy.py tests/test_security.py

      - name: No candidate data tracked by Git
        run: |
          python - <<'PY'
          import subprocess, sys
          out = subprocess.run(["git", "status", "--porcelain", "--untracked-files=all"],
                               capture_output=True, text=True).stdout
          leaked = [ln for ln in out.splitlines()
                    if any(seg in ln for seg in
                           ("candidates/", "input/", "output/", "private/", "data/"))]
          if leaked:
              print("candidate/private data would be tracked:"); print("\n".join(leaked))
              sys.exit(1)
          print("git status clean of candidate/private data")
          PY

      - name: Package build verification
        run: |
          python -m build
          ls -l dist

  reproducible-install:
    name: reproducible install (pinned constraints)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Clean install with pinned constraints
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints.txt
      - name: Smoke test
        run: |
          python -m compileall src
          zume --help

  frontend:
    name: frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  knowledge-quality:
    name: knowledge quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints.txt
      - run: zume knowledge validate
      - run: zume knowledge content-quality
      - run: zume knowledge stats
      - run: zume knowledge gaps
      - name: Reject generic published fingerprints
        run: |
          python - <<'PY'
          from pathlib import Path
          from zume.knowledge.content_quality import scan_content_quality
          errors = scan_content_quality(Path('.'))
          assert not errors, "\n".join(errors[:30])
          print("content-quality OK")
          PY

  lab-security:
    name: lab security tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints.txt
      - run: pytest -q tests/test_labs_security.py tests/test_correction_regressions.py -k "sql or api or java or lab"

  browser-e2e:
    name: playwright workflows + screenshots
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install Python + frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints.txt
          cd apps/web && npm ci && npm run build
      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Start Zume server
        run: |
          zume serve --port 8787 --no-open &
          echo $! > /tmp/zume-serve.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8787/api/health >/dev/null; then
              echo "server ready"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start"
          exit 1
      - name: Playwright workflows
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8787
        run: npx playwright test --reporter=line
      - name: Capture desktop/tablet screenshots
        working-directory: apps/web
        run: |
          mkdir -p ../../reports/screenshots-ci
          node --input-type=module <<'EOF'
          import { chromium } from 'playwright';
          import path from 'path';
          import fs from 'fs';
          const out = path.resolve('../../reports/screenshots-ci');
          fs.mkdirSync(out, { recursive: true });
          const browser = await chromium.launch();
          const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
          const routes = [['home','/'],['library','/library'],['practice','/practice'],
            ['interview-builder','/interview-builder'],['intake','/intake'],['finalize','/finalize'],
            ['lab','/lab'],['ask','/ask'],['settings','/settings']];
          for (const [name, route] of routes) {
            await page.goto('http://127.0.0.1:8787' + route, { waitUntil: 'networkidle' });
            await page.screenshot({ path: path.join(out, name + '.png'), fullPage: true });
          }
          await page.setViewportSize({ width: 900, height: 1200 });
          await page.goto('http://127.0.0.1:8787/', { waitUntil: 'networkidle' });
          await page.screenshot({ path: path.join(out, 'home-tablet.png'), fullPage: true });
          await browser.close();
          EOF
      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: reports/screenshots-ci/
          retention-days: 14
      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/zume-serve.pid ]; then kill $(cat /tmp/zume-serve.pid) || true; fi

  release-candidate:
    name: Windows release package scan
    runs-on: windows-latest
    needs: [validate, frontend, knowledge-quality]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install and build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints.txt
          python scripts/build_windows_release.py
      - name: Scan release ZIP
        run: |
          python - <<'PY'
          import hashlib, zipfile
          from pathlib import Path
          zip_path = Path("releases/Zume-v1.0.0-Windows.zip")
          assert zip_path.exists(), "release zip missing"
          digest = hashlib.sha256(zip_path.read_bytes()).hexdigest()
          Path("releases/Zume-v1.0.0-Windows.zip.sha256").write_text(
              f"{digest}  {zip_path.name}\n", encoding="utf-8")
          forbidden = ("candidates/", ".venv", "node_modules/", "OPENAI_API_KEY",
                       "AarohanSecrets", "data/chat/", "data/audio-cache/")
          with zipfile.ZipFile(zip_path) as zf:
              names = zf.namelist()
              bad = [n for n in names if any(f in n.replace("\\", "/") for f in forbidden)]
              assert not bad, bad
              # Sample text members for secret-like patterns
              for name in names:
                  if name.endswith((".py", ".md", ".txt", ".json", ".yml", ".yaml", ".ps1")):
                      text = zf.read(name).decode("utf-8", errors="ignore")
                      assert "BEGIN PRIVATE KEY" not in text
                      assert "AKIA" not in text
          print("release scan OK", digest)
          PY
      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate
          path: |
            releases/Zume-v1.0.0-Windows.zip
            releases/Zume-v1.0.0-Windows.zip.sha256
          retention-days: 14
