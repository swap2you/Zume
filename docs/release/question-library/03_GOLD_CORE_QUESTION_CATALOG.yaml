  answer_key_points:
  - Join type represents inclusion semantics.
  - One-to-many joins multiply rows.
  - Null handling matters in outer joins.
  - Validate expected cardinality before aggregating.
  follow_up: How would you detect an accidental many-to-many join in a reconciliation query?
