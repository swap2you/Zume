- id: gold-api-001
  domain: api-openapi
  subdomain: methods-idempotency
  level: basic
  priority: P0
  frequency: very_common
  role_tracks: *id001
  question: Explain safety and idempotency for GET, PUT, POST, PATCH and DELETE. How should those semantics influence
    retries and automated assertions?
  answer_key_points:
  - Safe means no intended state change.
  - Idempotent means repeated identical requests have the same intended effect.
  - POST is not generally idempotent; PUT and DELETE are intended to be.
  - Retries require operation semantics and idempotency keys where supported.
  follow_up: How would you test an idempotency-key implementation under duplicate concurrent requests?
  status: blueprint
  publication_note: Expand into the full Zume schema, source-check, independently review, then publish.
