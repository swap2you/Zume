  - Solution Architect
  - Technical Architect
  question: A test passes locally and fails only in CI with click interception. Give a disciplined investigation sequence
    and explain why adding a retry is not the first fix.
  answer_key_points:
  - Inspect screenshot, DOM, browser console, network and timing evidence.
  - Identify overlays, viewport, animations, stale state and environment differences.
  - Reproduce with CI browser/version and viewport.
  - Retries classify uncertainty but can hide defects.
  - Fix the causal synchronization or application condition.
  follow_up: When is a bounded retry justified, and what telemetry must accompany it?
