- id: gold-sel-004
  domain: selenium
  subdomain: grid-parallelism
  level: advanced
  priority: P1
  frequency: common
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  - Test Automation Architect
  - Test/Quality Architect
  - Solution Architect
  - Technical Architect
  question: Design a parallel Selenium execution model for local and cloud grids. Cover driver ownership, capability
    construction, test data, artifact naming and cleanup.
  answer_key_points:
  - One driver/session owner per test execution context.
  - Immutable capability creation.
  - Unique test data and artifact correlation.
  - Guaranteed quit in finally/fixture teardown.
  - Concurrency limits based on environment capacity and vendor quota.
  follow_up: How would you diagnose a failure that occurs only at 20-way parallelism?
