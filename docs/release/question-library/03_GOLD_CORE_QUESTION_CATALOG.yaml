  question: Design negative tests for an API error contract. Go beyond checking the status code.
  answer_key_points:
  - Validate stable error code, message policy, field/path details and correlation ID.
  - Check content type and schema.
  - Ensure sensitive internals are not leaked.
  - Test malformed, missing, unauthorized, forbidden, conflict and rate-limit cases.
  follow_up: Which error fields should remain stable enough for automation, and which should not?
