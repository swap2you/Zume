- id: gold-sel-002
  domain: selenium
  subdomain: waits-synchronization
  level: intermediate
  priority: P0
  frequency: very_common
  role_tracks: *id001
  question: Explain why element visibility is not always the condition required before interaction. Give examples involving
    overlays, stale elements and asynchronous state.
  answer_key_points:
  - Wait for the state the next action needs.
  - Visibility does not guarantee enabled, unobstructed or stable.
  - Use staleness or state-change conditions after refreshes.
  - Avoid mixing implicit and explicit timing reasoning.
  - Timeout messages should expose the awaited condition.
  follow_up: How would you create a reusable wait without hiding application-specific conditions?
  status: blueprint
  publication_note: Expand into the full Zume schema, source-check, independently review, then publish.
