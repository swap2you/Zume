version: 1
purpose: High-signal content blueprint derived from the interview-guide style used in this project.
publication_policy:
- Blueprint records are not automatically published.
- Cursor must expand each into the complete Zume schema.
- Each answer must be verified against official/primary sources.
- A separate critic must approve technical accuracy, relevance, originality and role mapping.
- Only reviewed records may enter candidate interview packages.
records:
- id: gold-java-001
  domain: java
  subdomain: equals-hashcode
  level: basic
  priority: P0
  frequency: very_common
  role_tracks: &id001
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  question: A value object is used as a HashMap key. Explain the equals/hashCode contract and what breaks when fields
    used by that contract are mutated after insertion.
  answer_key_points:
  - Equal objects must return equal hash codes.
  - Hash collections use hash and equality during lookup.
  - Mutating key fields can move the logical key without moving its bucket.
  - Prefer immutable key state and test retrieval with an equal instance.
  follow_up: How would records change the implementation, and what risks remain if a record contains mutable components?
  status: blueprint
  publication_note: Expand into the full Zume schema, source-check, independently review, then publish.
- id: gold-java-002
  domain: java
  subdomain: collections
  level: intermediate
  priority: P0
  frequency: very_common
  role_tracks: *id001
  question: Choose collections for ordered input with duplicates, keyed lookup, and concurrent updates. Explain the trade-offs
    rather than naming one universal collection.
  answer_key_points:
  - Model sequence and keyed lookup as separate requirements.
  - ArrayList, LinkedHashMap, ConcurrentHashMap and immutable snapshots serve different semantics.
  - Define duplicate-key and ordering behavior explicitly.
  - Thread safety of a collection does not make compound operations atomic.
  follow_up: Show how you would make a read-modify-write operation atomic without locking the entire application.
  status: blueprint
  publication_note: Expand into the full Zume schema, source-check, independently review, then publish.
- id: gold-java-003
  domain: java
  subdomain: exceptions
  level: intermediate
  priority: P1
  frequency: common
  role_tracks: *id001
  question: Where should an automation framework translate low-level exceptions into domain-specific failures, and what
    information must be preserved?
  answer_key_points:
  - Translate at an ownership boundary.
  - Preserve original cause, operation, input identity and environment evidence.
  - Avoid broad catch-and-log patterns.
  - Distinguish assertion failure, infrastructure failure, test-data failure and programming defect.
  follow_up: How should retryable failures differ from non-retryable failures in the exception model?
  status: blueprint
  publication_note: Expand into the full Zume schema, source-check, independently review, then publish.
- id: gold-java-004
  domain: java
  subdomain: streams-lambdas
  level: intermediate
  priority: P1
  frequency: common
  role_tracks: *id001
  question: A Stream pipeline is concise but difficult to debug and performs side effects. How would you decide whether
    to keep it, refactor it, or replace it with an explicit loop?
  answer_key_points:
  - Streams suit declarative transformations.
  - Side effects and hidden mutable state make pipelines fragile.
  - Readability and observability outweigh line-count reduction.
  - Parallel streams require evidence, not assumption.
  follow_up: What specific risks appear when the same pipeline is changed to parallelStream()?
  status: blueprint
  publication_note: Expand into the full Zume schema, source-check, independently review, then publish.
- id: gold-java-005
  domain: java
  subdomain: concurrency
  level: advanced
  priority: P1
  frequency: common
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  - Test Automation Architect
  - Test/Quality Architect
  - Solution Architect
  - Technical Architect
  question: A parallel test framework occasionally assigns the wrong driver and test data to a test. Diagnose the likely
    concurrency design errors and propose a safer ownership model.
  answer_key_points:
  - Shared static mutable state is a primary suspect.
  - Use per-test/per-thread scoped context carefully.
  - ThreadLocal requires cleanup and does not solve async handoff automatically.
  - Prefer explicit ownership and immutable configuration.
  - Capture correlation IDs and thread/test identity in logs.
  follow_up: How would virtual threads affect this design, and which ThreadLocal assumptions would you re-evaluate?
  status: blueprint
  publication_note: Expand into the full Zume schema, source-check, independently review, then publish.
- id: gold-java-006
  domain: java
  subdomain: jvm-memory-gc
  level: advanced
  priority: P2
  frequency: occasional
  role_tracks:
  - Senior SDET
  - Lead SDET
  - Test Automation Architect
  - Quality Engineering Lead
  - Test Automation Architect
  - Test/Quality Architect
  - Solution Architect
  - Technical Architect
  question: A long regression suite slows over time and eventually fails with memory pressure. Explain how you would
    separate a real application leak, test-framework retention, browser-process growth and normal GC behavior.
  answer_key_points:
  - Collect heap, process and browser metrics over time.
  - Inspect dominators and retained references.
  - Check listeners, screenshots, response bodies, static caches and ThreadLocal cleanup.
  - Correlate GC pauses with throughput rather than assuming GC is the root cause.
  follow_up: Which artifacts would you capture in CI before increasing heap size?
  status: blueprint
  publication_note: Expand into the full Zume schema, source-check, independently review, then publish.
- id: gold-sel-001
  domain: selenium
  subdomain: locators
  level: basic
  priority: P0
  frequency: very_common
  role_tracks: *id001
  question: A button has generated classes and moves during layout changes. Design a locator strategy that remains stable
    and explain when text, accessibility attributes, data attributes, CSS and XPath are appropriate.
  answer_key_points:
  - Prefer intentional semantic/test contracts.
  - Verify uniqueness.
  - Avoid absolute paths, indexes and styling classes.
  - Use XPath only when its relationship/text capabilities are needed.
  - Coordinate with developers for stable attributes.
  follow_up: How would you validate that a locator fails for the right reason after a UI redesign?
