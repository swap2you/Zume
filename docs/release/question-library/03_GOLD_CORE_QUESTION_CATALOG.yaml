  question: Explain common Oracle-specific pitfalls involving empty strings, NULL, DATE versus TIMESTAMP, time zones
    and implicit conversion.
  answer_key_points:
  - Oracle treats empty string as NULL in SQL contexts.
  - DATE includes time to seconds.
  - TIMESTAMP and time-zone types differ.
  - Implicit conversion depends on session settings.
  - Use explicit formats and types in tests.
  follow_up: How would you make a date/time assertion stable across sessions and daylight-saving changes?
