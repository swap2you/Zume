  question: Return the latest status row per account while preserving deterministic tie handling. Compare ROW_NUMBER,
    RANK and a correlated subquery.
  answer_key_points:
  - Partition by business key.
  - Order by effective timestamp plus deterministic tie breaker.
  - ROW_NUMBER selects one row; RANK may return ties.
  - Indexes and data semantics affect performance and correctness.
  follow_up: How would you return both the latest row and the immediately previous row?
