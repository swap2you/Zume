  - Solution Architect
  - Technical Architect
  question: Design tests for retries, backoff, circuit breakers and rate limits without creating a slow or destructive
    test suite.
  answer_key_points:
  - Use controllable mocks/fault injection.
  - Assert retry count, delay bounds and terminal behavior.
  - Respect Retry-After semantics.
  - Avoid testing resilience by attacking shared environments.
  - Separate deterministic component tests from limited environment checks.
  follow_up: How would you prove that retries do not duplicate a business transaction?
