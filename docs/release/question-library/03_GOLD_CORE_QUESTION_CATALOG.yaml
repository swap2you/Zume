  question: A validation query works on small data but times out in production-like volumes. Explain how you would inspect
    its execution plan and improve it without changing correctness.
  answer_key_points:
  - Check access paths, cardinality estimates, joins, sorts and predicates.
  - Avoid functions that prevent index use when possible.
  - Use representative statistics.
  - Measure before and after.
  - Do not add indexes blindly to production.
  follow_up: How can bind-variable behavior or stale statistics change the chosen plan?
